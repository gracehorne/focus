          return TEMPLATES.slice().sort(

      // ============================================================
      //  id generation
      // ============================================================

      function genId() {
        if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
        return Date.now().toString(36) + Math.random().toString(36).slice(2);
      }

      // ============================================================
      //  date utilities
      // ============================================================

      const _MS = [
        "Jan",
        "Feb",
        "Mar",
        "Apr",
        "May",
        "Jun",
        "Jul",
        "Aug",
        "Sep",
        "Oct",
        "Nov",
        "Dec",
      ];
      const _DL = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

      function _p2(n) {
        return String(n).padStart(2, "0");
      }

      function isoToday() {
        const d = new Date();
        return `${d.getFullYear()}-${_p2(d.getMonth() + 1)}-${_p2(d.getDate())}`;
      }

      function isoFromDate(d) {
        return `${d.getFullYear()}-${_p2(d.getMonth() + 1)}-${_p2(d.getDate())}`;
      }

      function isoAddDays(isoStr, n) {
        const [y, mo, day] = isoStr.split("-").map(Number);
        const d = new Date(y, mo - 1, day);
        d.setDate(d.getDate() + n);
        return isoFromDate(d);
      }

      function dateLabelFull(isoStr) {
        const [y, mo, day] = isoStr.split("-").map(Number);
        const d = new Date(y, mo - 1, day);
        const dow = _DL[d.getDay()].slice(0, 3);
        return `${dow}  ${_MS[mo - 1]} ${day}`;
      }

      // ============================================================
      //  estimate accuracy (rolling 14-day)
      //  reads from the API, falls back to nothing if unavailable
      // ============================================================

      async function getEstimateAccuracy() {
        let sumRatio = 0,
          count = 0;
        for (let i = 0; i < 14; i++) {
          const iso = isoAddDays(state.currentDate, -i);
          try {
            const result = await apiPost({ action: "get_tasks", date: iso });
            for (const t of result.tasks || []) {
              const est = parseMinutes(t.estimate || "");
              const act = parseMinutes(t.actual || "");
              if (est > 0 && act > 0) {
                sumRatio += Math.min(est, act) / Math.max(est, act);
                count++;
              }
            }
          } catch {
            /* skip */
          }
        }
        return count >= 2 ? Math.round((sumRatio / count) * 100) : null;
      }

      // ============================================================
      //  time / duration utilities
      // ============================================================

      function textKey(t) {
        return (t || "").toLowerCase().trim().substring(0, 60);
      }

      function normalizeTaskType(value) {
        const v = String(value || "").toLowerCase();
        if (v === "note" || v === "event") return v;
        return "task";
      }

      function normalizeCollectionName(value) {
        const trimmed = String(value || "").trim();
        return trimmed || null;
      }

      function taskGlyph(task) {
        const type = normalizeTaskType(task && task.taskType);
        if ((task && task.marker) === "DONE") return "x";
        if (type === "note") return "-";
        if (type === "event") return "○";
        return "•";
      }

      function canCompleteTask(task) {
        return normalizeTaskType(task && task.taskType) === "task";
      }

      // ---- priority helpers --------------------------------------
      // priority lives either on task.priority ('A'|'B'|'C'|null)
      // or legacy [#A] / [#B] / [#C] anywhere in task.content
      function getPriority(task) {
        if (task && task.priority && /^[ABC]$/i.test(task.priority))
          return task.priority.toUpperCase();
        const m = ((task && task.content) || "").match(/\[#([ABC])\]/i);
        return m ? m[1].toUpperCase() : null;
      }
      function stripPriority(content) {
        return (content || "").replace(/\[#[ABC]\]\s*/gi, "").trim();
      }
      function nextPriority(cur) {
        if (!cur) return "A";
        if (cur === "A") return "B";
        if (cur === "B") return "C";
        return null; // C -> none
      }

      function parseMinutes(str) {
        if (!str) return 0;
        let mins = 0;
        const h = str.match(/(\d+(?:\.\d+)?)\s*h/i);
        const m = str.match(/(\d+)\s*m(?!o)/i);
        if (h) mins += parseFloat(h[1]) * 60;
        if (m) mins += parseInt(m[1]);
        if (!h && !m) mins = parseInt(str) || 0;
        return Math.round(mins);
      }

      function recurringDaysFromRule(recurrence) {
        const set = new Set();
        if (!recurrence) return set;
        if (recurrence === "daily") {
          for (let i = 0; i < 7; i++) set.add(i);
          return set;
        }
        if (recurrence === "weekdays") {
          [1, 2, 3, 4, 5].forEach((day) => set.add(day));
          return set;
        }
        const single = String(recurrence || "").match(/^weekly:(\d)$/);
        if (single) {
          set.add(parseInt(single[1], 10));
          return set;
        }
        const many = String(recurrence || "").match(/^weekly:([0-6](?:,[0-6])*)$/);
        if (many) {
          many[1].split(",").forEach((day) => set.add(parseInt(day, 10)));
        }
        return set;
      }

      function recurrenceFromDays(daysSet) {
        const days = [...daysSet].sort((a, b) => a - b);
        if (!days.length) return "";
        if (days.length === 7) return "daily";
        if (days.join(",") === "1,2,3,4,5") return "weekdays";
        if (days.length === 1) return `weekly:${days[0]}`;
        return `weekly:${days.join(",")}`;
      }

      function heuristicBreakdown(taskText) {
        const text = String(taskText || "").trim();
        if (!text) return [];
        const words = text.split(/\s+/).filter(Boolean);
        const verb = words[0] || "do";
        return [
          `clarify outcome for: ${text}`,
          `gather inputs needed to ${verb.toLowerCase()}`,
          `start first focused pass`,
          `review and tighten final result`,
        ];
      }

      async function generateAIBreakdown(taskText) {
        const fallback = heuristicBreakdown(taskText);
        const modelApi = typeof window !== "undefined" ? window.ai : null;
        if (!modelApi || !modelApi.languageModel || !modelApi.languageModel.create) return fallback;
        try {
          const session = await modelApi.languageModel.create();
          const prompt = `Break this task into 4-7 actionable subtasks. Return only one subtask per line with no numbering. Task: ${taskText}`;
          const response = await session.prompt(prompt);
          const lines = String(response || "")
            .split("\n")
            .map((line) => line.replace(/^[-*\d.)\s]+/, "").trim())
            .filter(Boolean);
          return lines.length ? lines.slice(0, 7) : fallback;
        } catch {
          return fallback;
        }
      }

      function formatMinutes(total) {
        if (!total) return "";
        const h = Math.floor(total / 60),
          m = total % 60;
        if (h && m) return `${h}h ${m}m`;
        return h ? `${h}h` : `${m}m`;
      }

      function roundUpTo10(mins) {
        return Math.ceil(mins / 10) * 10;
      }

      function parseTimeInput(str) {
        const s = (str || "").trim().toLowerCase().replace(/\s+/g, "");
        let h, min, m;
        if ((m = s.match(/^(\d{1,2}):(\d{2})$/))) {
          h = +m[1];
          min = +m[2];
        } else if ((m = s.match(/^(\d{1,2}):(\d{2})(am|pm)$/))) {
          h = +m[1];
          min = +m[2];
          if (m[3] === "pm" && h < 12) h += 12;
          if (m[3] === "am" && h === 12) h = 0;
        } else if ((m = s.match(/^(\d{1,2})(am|pm)$/))) {
          h = +m[1];
          min = 0;
          if (m[2] === "pm" && h < 12) h += 12;
          if (m[2] === "am" && h === 12) h = 0;
        } else if ((m = s.match(/^(\d{1,2})$/))) {
          h = +m[1];
          min = 0;
        }
        if (h === undefined || h < 0 || h > 23 || min < 0 || min > 59) return null;
        return { h, min };
      }

      function fmtHM(h, min) {
        return `${h % 12 || 12}:${String(min).padStart(2, "0")}${h >= 12 ? "pm" : "am"}`;
      }
      function fmtCalTime(iso) {
        const d = new Date(iso);
        return fmtHM(d.getHours(), d.getMinutes());
      }

      function formatDueDate(iso) {
        if (!iso) return "";
        const [y, mo, d] = iso.split("-").map(Number);
        const due = new Date(y, mo - 1, d),
          today = new Date();
        today.setHours(0, 0, 0, 0);
        const diff = Math.round((due - today) / 86400000);
        if (diff < 0) return `${Math.abs(diff)}d overdue`;
        if (diff === 0) return "due today";
        if (diff === 1) return "due tomorrow";
        if (diff <= 7) return `due in ${diff}d`;
        return `due ${_MS[due.getMonth()]} ${due.getDate()}`;
      }

      function dueDateClass(iso) {
        if (!iso) return "";
        const [y, mo, d] = iso.split("-").map(Number);
        const due = new Date(y, mo - 1, d),
          today = new Date();
        today.setHours(0, 0, 0, 0);
        const diff = Math.round((due - today) / 86400000);
        if (diff < 0) return "overdue";
        if (diff === 0) return "today";
        if (diff <= 3) return "soon";
        return "later";
      }

      // ============================================================
      //  linkify / escape
      // ============================================================

      function esc(str) {
        return String(str || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function linkifyContent(raw) {
        if (!raw) return "";
        const parts = raw.split(/(\[[^\]]+\]\([^)]+\)|https?:\/\/[^\s]+)/g);
        return parts
          .map((part, i) => {
            if (i % 2 === 0) return esc(part.replace(/\n/g, " "));
            const md = part.match(/^\[([^\]]+)\]\(([^)]+)\)$/);
            if (md)
              return `${esc(md[1])}<a class="task-link-arrow" href="${esc(md[2])}" target="_blank">&#x2192;</a>`;
            return `<a class="task-link-arrow" href="${esc(part)}" target="_blank">&#x2192;</a>`;
          })
          .join("");
      }

      // ============================================================
      //  toast
      // ============================================================

      function showToast(msg, type = "info", duration = 2800) {
        const c = document.getElementById("toast-container");
        const el = document.createElement("div");
        el.className = `toast ${type}`;
        el.textContent = msg;
        c.appendChild(el);
        setTimeout(() => el.remove(), duration);
      }

      // ============================================================
      //  kinopio helpers
      // ============================================================

      function knSlug(n) {
        return (n || "")
          .replace(/[^a-zA-Z0-9]+/g, "-")
          .replace(/^-|-$/g, "")
          .toLowerCase();
      }

      function knParseCard(card, spaceName, listName) {
        const raw = (card.name || "").trim();
        if (!raw) return null;
        const lines = raw.split("\n");
        let taskText = "",
          urls = [],
          due = null;
        for (const line of lines) {
          const s = line.trim();
          if (!s) continue;
          if (/^https?:\/\//.test(s)) {
            urls.push(s);
            continue;
          }
          if (/^due:/i.test(s)) {
            const m = s.match(/due:\s*(\d{1,2})[/\-](\d{1,2})(?:[/\-](\d{2,4}))?/i);
            if (m) {
              let y = m[3] ? parseInt(m[3]) : new Date().getFullYear();
              if (y < 100) y += 2000;
              due = `${y}-${String(+m[1]).padStart(2, "0")}-${String(+m[2]).padStart(2, "0")}`;
            }
            continue;
          }
          if (!taskText) taskText = s.replace(/^\[[ xX]?\]\s*/, "").trim();
        }
        if (!taskText) return null;
        const first = lines.find((l) => l.trim()) || "";
        const isDone = /^\[[xX]\]/.test(first.trim()) || !!card.isDone;
        return { id: card.id, text: taskText, isDone, urls, due, space: spaceName, list: listName };
      }

      async function knFetch(path) {
        const resp = await fetch(`https://api.kinopio.club${path}`, {
          headers: { Authorization: KN_API_KEY, "Content-Type": "application/json" },
        });
        if (!resp.ok) throw new Error(`kinopio ${path}: ${resp.status}`);
        return resp.json();
      }

      function knSpaceSortKey(n) {
        if (/broom/i.test(n)) return "0" + n;
        if (/ephemera/i.test(n)) return "2" + n;
        return "1" + n;
      }

      function findKnCardIdInState(cardText) {
        const key = textKey(cardText);
        for (const cards of Object.values(state.kinopioGroups || {})) {
          for (const card of cards || []) {
            if (textKey(card.text) === key && card.id) return card.id;
          }
        }
        return null;
      }

      function knCheckedName(name, checked = true) {
        const raw = String(name || "");
        const checkbox = /^\s*\[(?:\s|x|X)?\]\s*/;
        if (checkbox.test(raw)) {
          return raw.replace(checkbox, checked ? "[x] " : "[] ");
        }
        return `${checked ? "[x] " : "[] "}${raw}`.trim();
      }

      async function knMarkCardDone(cardText, cardId = null) {
        if (DEV_MODE) {
          console.log("[df dev] knMarkCardDone suppressed:", cardText);
          return;
        }
        const resolvedId = cardId || getKnCardId(cardText) || findKnCardIdInState(cardText);
        if (!resolvedId) throw new Error("could not resolve kinopio card id");
        saveKnCardId(cardText, resolvedId);

        let originalName = "";
        try {
          const current = await knFetch(`/card/${encodeURIComponent(resolvedId)}`);
          originalName = String(current?.name || "");
        } catch {}

        const nextName = knCheckedName(originalName || cardText, true);
        const resp = await fetch("https://api.kinopio.club/card", {
          method: "PATCH",
          headers: { Authorization: KN_API_KEY, "Content-Type": "application/json" },
          body: JSON.stringify({ id: resolvedId, name: nextName }),
        });
        if (!resp.ok) {
          if (resp.status === 401 || resp.status === 403) {
            throw new Error(
              `kinopio denied update for card ${resolvedId} (check API key and edit access)`,
            );
          }
          const details = await resp.text().catch(() => "");
          throw new Error(`kinopio update failed (${resp.status})${details ? ": " + details : ""}`);
        }

        // Confirm the server-side card now has a checked checkbox prefix.
        try {
          const updated = await knFetch(`/card/${encodeURIComponent(resolvedId)}`);
          const checked = /^\s*\[[xX]\]\s*/.test(String(updated?.name || ""));
          if (!checked) throw new Error("kinopio accepted request but checkbox was not updated");
        } catch (err) {
          throw new Error(`kinopio verification failed: ${err.message || err}`);
        }
      }

      async function syncFromKinopio(opts = {}) {
        const interactive = !!opts.interactive;
        if (DEV_MODE) {
          // seed a couple of fake kinopio cards so the ui is exercisable
          state.kinopioGroups = {
            "dev sandbox": [
              {
                id: "dev-1",
                text: "example kinopio card",
                isDone: false,
                urls: [],
                due: null,
                space: "dev sandbox",
                list: null,
              },
              {
                id: "dev-2",
                text: "another one, drag me",
                isDone: false,
                urls: [],
                due: null,
                space: "dev sandbox",
                list: null,
              },
            ],
          };
          renderInboxTab();
          bindDynamicEvents();
          showToast("dev mode: fake kinopio data loaded", "info");
          return;
        }
        if (!requireKinopioConfig(interactive)) return;
        const btn = document.getElementById("kn-sync-btn");
        if (btn) {
          btn.disabled = true;
          btn.textContent = "↻ syncing\u2026";
        }
        try {
          const spaces = await knFetch("/user/todos");
          const completedKeys = new Set(
            (state.tasks || [])
              .filter((t) => {
                const marker = String((t && t.marker) || "").toUpperCase();
                return marker === "DONE" || marker === "CANCELED";
              })
              .map((t) => textKey(t.content)),
          );
          const groups = {};
          for (const space of spaces || []) {
            const spaceName = space.name || "Untitled";
            if (KN_HIDDEN_SPACES.has(knSlug(spaceName))) continue;
            const spaceCards = space.cards || [];
            let lists = {};
            if (space.id && spaceCards.some((c) => c.listId)) {
              try {
                const d = await knFetch(`/space/${space.id}`);
                for (const l of d.lists || []) if (l.id) lists[l.id] = l.name || "";
              } catch {}
            }
            for (const rawCard of spaceCards) {
              const parsed = knParseCard(rawCard, spaceName, lists[rawCard.listId] || null);
              if (!parsed) continue;
              if (parsed.id) saveKnCardId(parsed.text, parsed.id);
              if (parsed.isDone) continue;
              if (completedKeys.has(textKey(parsed.text))) continue;
              // skip cards we already marked done locally this session
              if (_knLocalDone.has(textKey(parsed.text))) continue;
              if (!groups[spaceName]) groups[spaceName] = [];
              groups[spaceName].push(parsed);
            }
          }
          state.kinopioGroups = groups;
          renderInboxTab();
          bindDynamicEvents();
          showToast("kinopio synced", "success");
        } catch (err) {
          showToast("sync failed: " + (err.message || err), "error");
        } finally {
          if (btn) {
            btn.disabled = false;
            btn.textContent = "\u21bb sync";
          }
        }
      }

      function parseCalendarResult(result) {
        if (result && result.status === "error")
          throw new Error(result.message || "calendar error");
        return result;
      }

      function requestCalendarJsonp(payload) {
        return new Promise((resolve, reject) => {
          if (typeof document === "undefined" || !document.head) {
            reject(new Error("calendar fallback unavailable"));
            return;
          }

          const callbackName = `__dfCalendarCb_${Date.now()}_${Math.random().toString(36).slice(2)}`;
          const script = document.createElement("script");
          const url = new URL(GCAL_SCRIPT_URL);
          let timeoutId = null;

          const cleanup = () => {
            if (timeoutId) clearTimeout(timeoutId);
            if (script.parentNode) script.parentNode.removeChild(script);
            try {
              delete window[callbackName];
            } catch {
              window[callbackName] = undefined;
            }
          };

          for (const [key, value] of Object.entries(payload || {})) {
            if (value !== undefined && value !== null) url.searchParams.set(key, String(value));
          }
          url.searchParams.set("callback", callbackName);

          timeoutId = setTimeout(() => {
            cleanup();
            reject(new Error("calendar request timed out"));
          }, 15000);

          window[callbackName] = (data) => {
            cleanup();
            try {
              resolve(parseCalendarResult(data));
            } catch (err) {
              reject(err);
            }
          };

          script.src = url.toString();
          script.async = true;
          script.onerror = () => {
            cleanup();
            reject(new Error("calendar request failed"));
          };
          document.head.appendChild(script);
        });
      }

      function isMobileBrowser() {
        if (typeof navigator === "undefined") return false;
        const ua = String(navigator.userAgent || "");
        return (
          /Android|iPhone|iPad|iPod|Mobile/i.test(ua) ||
          (navigator.maxTouchPoints > 1 && /Macintosh/i.test(ua))
        );
      }

      async function requestCalendarFetch(payload) {
        const resp = await fetch(GCAL_SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(payload),
          cache: "no-store",
        });
        if (!resp.ok) throw new Error(`server error: ${resp.status}`);
        const result = await resp.json();
        return parseCalendarResult(result);
      }

      async function requestCalendar(payload, opts = {}) {
        const strict = !!opts.strict;
        const transport = opts.transport || "auto";
        const preferJsonp = transport === "jsonp" || (transport === "auto" && isMobileBrowser());

        if (preferJsonp) {
          try {
            return await requestCalendarJsonp(payload);
          } catch (err) {
            if (strict || transport === "jsonp") throw err;
            return requestCalendarFetch(payload);
          }
        }

        try {
          return await requestCalendarFetch(payload);
        } catch (err) {
          if (strict) throw err;
          return requestCalendarJsonp(payload);
        }
      }

      async function loadCalendarEvents(dateISO) {
        if (DEV_MODE) {
          state.calendarEvents = [];
          renderRightCol();
          return;
        }
        if (!requireCalendarConfig(false)) {
          state.calendarEvents = [];
          renderRightCol();
          return;

        state.calendarEvents = null;
        renderRightCol();
        try {
          const events = await requestCalendar({ action: "get_calendar_events", date: dateISO });
          state.calendarEvents = (Array.isArray(events) ? events : []).sort(
            (a, b) => new Date(a.start) - new Date(b.start),
          );
        } catch (err) {
          console.warn("[df] loadCalendarEvents failed:", err.message);
          state.calendarEvents = [];
          const calEl = document.getElementById("cal-events");
          if (calEl) {
            const msg = err.message || "connection error";
            calEl.innerHTML = `<div class="cal-loading" style="font-size:11px;color:var(--danger)">calendar unavailable: ${esc(msg)}. open daily focus/settings to check URL.</div>`;
          }
          return;
        }
        renderRightCol();
      }

      function scheduleTask(taskId) {
        const task = state.tasks.find((t) => t.id === taskId);
        if (!task) return;
        state.schedulingId = taskId;
        const est = task.estimate || "",
          mins = parseMinutes(est),
          rounded = mins > 0 ? roundUpTo10(mins) : null;
        const hint = document.getElementById("schedule-dur-hint");
        if (hint)
          hint.textContent = rounded
            ? `duration: ${formatMinutes(rounded)} (${est} rounded up to nearest 10m)`
            : "no estimate set \u2014 will default to 30m";
        document.getElementById("schedule-time-input").value = "";
        document.getElementById("schedule-modal").style.display = "flex";
        setTimeout(() => document.getElementById("schedule-time-input").focus(), 50);
      }

      async function confirmScheduleTask() {
        const id = state.schedulingId;
        if (!id) return;
        document.getElementById("schedule-modal").style.display = "none";
        const task = state.tasks.find((t) => t.id === id);
        if (!task) {
          state.schedulingId = null;
          return;
        }
        const parsed = parseTimeInput(document.getElementById("schedule-time-input").value);
        if (!parsed) {
          showToast('invalid time \u2014 try "2pm" or "14:30"', "error");
          state.schedulingId = null;
          return;
        }
        const estMins = parseMinutes(task.estimate || ""),
          durationMins = estMins > 0 ? roundUpTo10(estMins) : 30;
        const [y, mo, d] = state.currentDate.split("-").map(Number);
        const start = new Date(y, mo - 1, d, parsed.h, parsed.min, 0);
        const end = new Date(start.getTime() + durationMins * 60000);
        const title = stripPriority(task.content);
        state.schedulingId = null;
        try {
          showToast("adding to calendar\u2026", "info", 2000);
          if (DEV_MODE) {
            // in dev mode, fake the response and just add to the local calendar list
            state.calendarEvents = (state.calendarEvents || [])
              .concat([
                {
                  id: "dev-" + Date.now(),
                  title: "Focus: " + title,
                  start: start.toISOString(),
                  end: end.toISOString(),
                },
              ])
              .sort((a, b) => new Date(a.start) - new Date(b.start));
            renderRightCol();
            renderFocusTab();
            bindDynamicEvents();
            showToast(
              `[dev] ${fmtHM(parsed.h, parsed.min)}\u2013${fmtCalTime(end.toISOString())} (${formatMinutes(durationMins)})`,
              "success",
            );
            return;
          }
          if (!requireCalendarConfig(true)) return;
          const result = await requestCalendar({
            action: "create_focus_time",
            title,
            start: start.toISOString(),
            end: end.toISOString(),
          });
          state.calendarEvents = (state.calendarEvents || [])
            .concat([
              {
                id: result.id || "local-" + Date.now(),
                title: "Focus: " + title,
                start: start.toISOString(),
                end: end.toISOString(),
              },
            ])
            .sort((a, b) => new Date(a.start) - new Date(b.start));
          renderRightCol();
          renderFocusTab();
          bindDynamicEvents();
          showToast(
            `\u{1F4C5} ${fmtHM(parsed.h, parsed.min)}\u2013${fmtCalTime(end.toISOString())} (${formatMinutes(durationMins)})`,
            "success",
          );
        } catch (err) {
          showToast("calendar error: " + err.message, "error");
        }
      }

      async function quickAddTask(text) {
        text = (text || "").trim();
        if (!text) return;
        let taskType = "task";
        let content = text.replace(/^(TODO|DOING|DONE|NOW|LATER|WAITING)\s+/i, "").trim();
        if (/^[-–]\s+/.test(content)) {
          taskType = "note";
          content = content.replace(/^[-–]\s+/, "").trim();
        } else if (/^o\s+/i.test(content) || /^event:\s+/i.test(content)) {
          taskType = "event";
          content = content
            .replace(/^o\s+/i, "")
            .replace(/^event:\s+/i, "")
            .trim();
        }
        const task = {
          id: genId(),
          content,
          marker: "TODO",
          subtasks: [],
          dueDate: null,
          carriedFrom: null,
          estimate: "",
          actual: "",
          createdAt: new Date().toISOString(),
          fromKinopio: false,
          knCardId: null,
          priority: null,
          defers: 0,
          taskType,
          collection: null,
          tags: [],
        };
        state.tasks.push(task);
        await persistTasks(state.currentDate, state.tasks);
        render();
        document.getElementById("quick-add-input").value = "";
        showToast("task added", "success");
      }

      async function setPriority(taskId, pri) {
        const task = state.tasks.find((t) => t.id === taskId);
        if (!task) return;
        // clear any legacy [#X] out of the content so it doesn't double-up
        task.content = stripPriority(task.content);
        task.priority = pri || null;
        await persistTasks(state.currentDate, state.tasks);
        render();
      }

      function markDone(taskId) {
        const task = state.tasks.find((t) => t.id === taskId);
        if (!task || !canCompleteTask(task)) return;
        state.pendingDoneId = taskId;
        document.getElementById("actual-input").value = "";
        document.getElementById("actual-notes").value = "";
        document.getElementById("actual-modal").style.display = "flex";
        setTimeout(() => {
          const inp = document.getElementById("actual-input");
          inp.focus();

      }

      async function completeDone(actualTime, notes) {
        const id = state.pendingDoneId;
        if (!id) return;
        document.getElementById("actual-modal").style.display = "none";
        const task = state.tasks.find((t) => t.id === id);
        if (!task) {
          state.pendingDoneId = null;
          return;
        }
        const actualTrimmed = (actualTime || "").trim();
        task.marker = "DONE";
        if (actualTrimmed) task.actual = actualTrimmed;
        await persistTasks(state.currentDate, state.tasks);
        logToWebhook({
          date: state.currentDate,
          task: stripPriority(task.content),
          estimate: task.estimate || "",
          actual: actualTrimmed,
          deferred: task.defers || 0,
          notes: (notes || "").trim(),
          event: "done",
          priority: getPriority(task) || "",
        });
        if (task.fromKinopio && task.knCardId) {
          try {
            await knMarkCardDone(task.content, task.knCardId);
          } catch (err) {
            showToast("kinopio update failed: " + (err.message || err), "error");
          }
          for (const s of Object.keys(state.kinopioGroups))
            state.kinopioGroups[s] = (state.kinopioGroups[s] || []).filter(
              (c) => textKey(c.text) !== textKey(task.content),
            );
          // force a re-sync so kinopio state is confirmed (and the card does not re-appear on next pull)
          syncFromKinopio().catch(() => {});
        }
        state.pendingDoneId = null;
        render();
      }

      async function removeDoneFromWebhook(task) {
        if (DEV_MODE) return;
        if (!LOG_WEBHOOK_URL) return;
        const payload = {
          action: "delete_task",
          date: state.currentDate,
          task: stripPriority(task.content),
          taskId: task.id,
          event: "done",
        };
        try {
          await sendWebhookPayload(payload, LOG_WEBHOOK_URL, { strict: true });
          await flushWebhookQueue();
        } catch (err) {
          enqueueWebhookPayload(payload);
          showToast("undo saved; spreadsheet delete queued for retry", "info", 3200);
          console.warn("[df] delete_task webhook failed; queued for retry", err);
        }
      }

      async function undoDone(taskId) {

      async function logToWebhook(payload) {
        if (DEV_MODE) {
          console.log("[df dev] logToWebhook suppressed:", payload);
          return;
        }
        if (!LOG_WEBHOOK_URL) {
          console.warn("[df] webhook skipped: LOG_WEBHOOK_URL not configured");
          return;
        }
        try {
          await sendWebhookPayload(payload);
          await flushWebhookQueue();
        } catch (err) {
          enqueueWebhookPayload(payload);
          console.warn("[df] webhook failed; queued for retry", err);
          showToast("time tracking sync queued - will retry", "info");
        }
      }

      function readWebhookQueue() {
        try {
          const parsed = JSON.parse(localStorage.getItem(WEBHOOK_QUEUE_KEY) || "[]");
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function writeWebhookQueue(queue) {
        try {
          localStorage.setItem(WEBHOOK_QUEUE_KEY, JSON.stringify(queue));
        } catch {
          // ignore storage failures; user still gets immediate webhook attempts
        }
      }

      function enqueueWebhookPayload(payload) {
        const queue = readWebhookQueue();
        queue.push({
          payload,
          queuedAt: new Date().toISOString(),
        });
        writeWebhookQueue(queue.slice(-200));
      }

      async function sendWebhookPayload(payload, webhookUrl = LOG_WEBHOOK_URL, opts = {}) {
        if (isGoogleSheetUrl(webhookUrl)) {
          throw new Error(
            "LOG_WEBHOOK_URL points to a Google Sheet, not a script web app endpoint",
          );
        }
        if (!isGoogleAppsScriptUrl(webhookUrl)) {
          throw new Error("LOG_WEBHOOK_URL is not a valid Google Apps Script web app URL");
        }
        const strict = !!opts.strict;
        const wirePayload =
          payload && payload.action
            ? payload
            : Object.assign({ action: "log_task" }, payload || {});
        const body = JSON.stringify(wirePayload);

        try {
          const resp = await fetch(webhookUrl, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body,
            keepalive: true,
          });
          if (!resp.ok) throw new Error("status " + resp.status);

          if (strict) {
            const contentType = String(resp.headers.get("content-type") || "").toLowerCase();
            if (contentType.includes("application/json")) {
              const parsed = await resp.json().catch(() => null);
              if (parsed && parsed.status === "error") {
                throw new Error(parsed.message || "script returned error");
              }
            } else {
              const txt = await resp.text().catch(() => "");
              if (/\berror\b/i.test(txt)) {
                throw new Error(txt.slice(0, 180));
              }
            }
          }

          return;
        } catch (err) {
          if (strict) throw err;

          // Fallback transport for environments where Apps Script CORS response
          // is not readable even when the POST is accepted.
          if (typeof navigator !== "undefined" && typeof navigator.sendBeacon === "function") {
            try {
              const blob = new Blob([body], { type: "text/plain;charset=UTF-8" });
              if (navigator.sendBeacon(webhookUrl, blob)) return;
            } catch {
              // continue to no-cors fallback below
            }
          }

          // Last resort: no-cors sends the request even if response is opaque.
          await fetch(webhookUrl, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain" },
            body,
            keepalive: true,
          });
          return;
        }
      }

      async function flushWebhookQueue() {
        if (!LOG_WEBHOOK_URL) return;
        const queue = readWebhookQueue();
        if (!queue.length) return;
        const remaining = [];
        for (const item of queue) {
          try {
            await sendWebhookPayload(item.payload);
          } catch {
            remaining.push(item);
          }
        }
        writeWebhookQueue(remaining);
        if (!remaining.length) {
          showToast("time tracking sync caught up", "success", 1800);
        }
      }

        if (!task) return;
        const tomorrowISO = isoAddDays(state.currentDate, 1);
        const tomorrowTasks = await fetchTasks(tomorrowISO);
        const newDefers = (task.defers || 0) + 1;
        if (!tomorrowTasks.some((t) => textKey(t.content) === textKey(task.content))) {
          tomorrowTasks.push({

      let isCarryingOver = false;

      async function autoCarryUndoneTasksToDate(targetDateISO) {
        if (DEV_MODE) {
          console.log("[df dev] autoCarryUndoneTasksToDate suppressed:", targetDateISO);
          return;
        }

        // Prevent race conditions by ensuring only one carry-over happens at a time
        if (isCarryingOver) {
          return;
        }
        isCarryingOver = true;

        try {
          const targetTasks = await fetchTasks(targetDateISO);
          const todayISO = isoToday();

          // Only carry over if the target date is today or later than today
          if (targetDateISO < todayISO) return;

          // Global skip list — tasks the user deliberately removed should never be re-carried.
          const globalSkippedKeys = getGlobalSkippedSet();

          // Start from yesterday and go back to find all undone tasks
          let currentBackDate = isoAddDays(targetDateISO, -1);
          const tasksToCarry = [];

          // Look back up to 30 days to find undone tasks
          for (let i = 0; i < 30; i++) {
            if (currentBackDate < "2024-01-01") break; // Safety limit

            const prevTasks = await fetchTasks(currentBackDate);
            const undone = prevTasks.filter((t) => t.marker !== "DONE" && t.marker !== "CANCELED");

            for (const task of undone) {
              // Check if this task already exists in the target date
              const alreadyExists = targetTasks.some(
                (t) => textKey(t.content) === textKey(task.content),
              );
              // Also check if this task is already in tasksToCarry to prevent duplicates
              const alreadyInCarry = tasksToCarry.some(
                (t) => textKey(t.content) === textKey(task.content),
              );
              // Skip tasks the user explicitly removed on any day in the window
              const wasSkipped = globalSkippedKeys.has(textKey(task.content));
              if (!alreadyExists && !alreadyInCarry && !wasSkipped) {
                tasksToCarry.push({
                  ...task,
                  id: genId(),
                  marker: "TODO",
                  carriedFrom: currentBackDate,
                  actual: "",
                  createdAt: new Date().toISOString(),
                  defers: (task.defers || 0) + 1,
                });
              }
            }

            currentBackDate = isoAddDays(currentBackDate, -1);
          }

          // Add all carried tasks to the target date
          if (tasksToCarry.length > 0) {
            // Re-fetch target tasks right before persist to catch any race conditions
            const latestTargetTasks = await fetchTasks(targetDateISO);

            // Filter out any carried tasks that now exist in the latest fetch
            // (in case another operation added them while we were looking back)
            const finalTasksToCarry = tasksToCarry.filter((carryTask) => {
              return !latestTargetTasks.some(
                (t) => textKey(t.content) === textKey(carryTask.content),
              );
            });

            // Only persist if there are actually new tasks to add
            if (finalTasksToCarry.length > 0) {
              latestTargetTasks.push(...finalTasksToCarry);
              await persistTasks(targetDateISO, latestTargetTasks);

              // Log each carryover to webhook
              for (const task of finalTasksToCarry) {
                logToWebhook({
                  date: targetDateISO,
                  task: stripPriority(task.content),
                  estimate: task.estimate || "",
                  actual: "",
                  deferred: task.defers,
                  event: "autocarry",
                  priority: getPriority(task) || "",
                  carriedFrom: task.carriedFrom,
                });
              }
            }
          }
        } catch (err) {
          console.warn("[df] autoCarryUndoneTasksToDate failed:", err);
        } finally {
          isCarryingOver = false;
        }
      }

      // set of card IDs (or textKeys) we have locally marked done this session,
      // so a background re-sync does not resurrect them before the API confirms
      const _knLocalDone = new Set();

      async function markKinopioItemDone(cardText, cardId) {
        if (cardId) saveKnCardId(cardText, cardId);
        const k = textKey(cardText);
        // optimistically suppress this card in future syncs for this session
        _knLocalDone.add(k);
        try {
          await knMarkCardDone(cardText, cardId || null);
        } catch (err) {
          _knLocalDone.delete(k);
          showToast("kinopio update failed: " + (err.message || err), "error");
          return;
        }
        for (const s of Object.keys(state.kinopioGroups))
          state.kinopioGroups[s] = (state.kinopioGroups[s] || []).filter(
            (c) => textKey(c.text) !== k,
          );
        const before = state.tasks.length;
        state.tasks = state.tasks.filter((t) => textKey(t.content) !== k);
        if (state.tasks.length !== before) await persistTasks(state.currentDate, state.tasks);
        render();
        showToast("marked done in kinopio", "success");
        // note: intentionally no re-sync here — the PATCH may not have propagated yet.
        // the card is suppressed locally; a manual sync will confirm the server state.
      }

      function saveRecurringFromModal() {
        const taskId = state.recurringTaskId;
        if (!taskId) return;
        const task = state.tasks.find((t) => t.id === taskId);
        if (!task) {
          closeRecurringModal();
          return;
        }
        const selected = new Set();
        document
          .querySelectorAll("#recurring-weekdays input[data-day]:checked")
          .forEach((input) => {
            selected.add(parseInt(input.dataset.day, 10));
          });
        const recurrence = recurrenceFromDays(selected);
        // remove any existing rule for this task content
        const list = loadRecurring().filter((r) => textKey(r.content) !== textKey(task.content));
        if (recurrence) {
          list.push({
            id: genId(),
            content: task.content,
            recurrence,
            estimate: task.estimate || "",
            priority: task.priority || null,
          });
          showToast("recurring task saved: " + recurringLabel(recurrence), "success");
        } else {
          showToast("recurring removed", "info");
        }
        saveRecurring(list);
        // stamp the task so a recur badge shows in the UI
        task.recurringId = recurrence ? list[list.length - 1]?.id || null : null;
        persistTasks(state.currentDate, state.tasks);
        render();
        closeRecurringModal();
      }

      // returns true if the recurring rule fires on the given ISO date
      function recurringFiresOn(recurrence, isoStr) {
        const [y, mo, d] = isoStr.split("-").map(Number);
        const dow = new Date(y, mo - 1, d).getDay(); // 0=Sun
        return recurringDaysFromRule(recurrence).has(dow);
      }

      // inject any recurring tasks for dateISO that are not already present in tasks array
      function injectRecurringTasks(dateISO, tasks) {
        const recurring = loadRecurring();
        let changed = false;
        for (const r of recurring) {
          if (!recurringFiresOn(r.recurrence, dateISO)) continue;
          const already = tasks.some((t) => textKey(t.content) === textKey(r.content));
          if (already) continue;
          tasks.push({
            id: genId(),
            content: r.content,
            marker: "TODO",
            subtasks: [],
            dueDate: null,
            carriedFrom: null,
            estimate: r.estimate || "",
            actual: "",
            createdAt: new Date().toISOString(),
            fromKinopio: false,
            knCardId: null,
            priority: r.priority || null,
            defers: 0,
            taskType: "task",
            recurringId: r.id, // link back so we can identify it
          });
          changed = true;
        }
        return changed;
      }

      function recurringLabel(recurrence) {
        if (recurrence === "daily") return "daily";
        if (recurrence === "weekdays") return "weekdays";
        const m = (recurrence || "").match(/^weekly:([0-6](?:,[0-6])*)$/);
        if (m) {
          const labels = ["sun", "mon", "tue", "wed", "thu", "fri", "sat"];
          const days = m[1]
            .split(",")
            .map((v) => labels[parseInt(v, 10)])
            .filter(Boolean);
          return "weekly \u00b7 " + days.join("/");
        }
        return recurrence || "";
      }

      function slugifyTplName(name) {
        const base =
          (name || "")
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/^-|-$/g, "") || "template";
        // ensure uniqueness
        const existing = new Set(TEMPLATES.map((t) => t.id));
        if (!existing.has(base)) return base;
        let n = 2;
        while (existing.has(base + "-" + n)) n++;
        return base + "-" + n;
      }

          .map((sub) => {

            const isEditing =
              state.editingSubtask &&
              state.editingSubtask.taskId === task.id &&
              state.editingSubtask.subtaskId === sub.id;
            const content = isEditing
              ? `<input class="subtask-input" type="text" data-sub-id="${esc(sub.id)}" data-parent-id="${esc(task.id)}" value="${esc(sub.content)}" placeholder="clear to remove" autocomplete="off"/>`
              : `<span class="subtask-text ${done ? "done" : ""}" data-sub-id="${esc(sub.id)}" data-parent-id="${esc(task.id)}">${linkifyContent(sub.content)}</span>`;
            return `<div class="subtask-item">
      <div class="subtask-check ${done ? "done" : ""}" data-sub-id="${esc(sub.id)}" data-parent-id="${esc(task.id)}">${done ? "x" : "•"}</div>
      ${content}
    </div>`;
          })
          .join("");
        return `<div class="subtask-list" data-parent-id="${esc(task.id)}"${collapsed ? ' style="display:none"' : ""}>${items}</div>`;
      }

      function renderFilterBar() {
        const bar = document.getElementById("tag-filter-bar");
        const chip = document.getElementById("tag-filter-active");
        if (!bar || !chip) return;
        if (state.activeTagFilter) {
          bar.classList.add("active");
          chip.textContent = state.activeTagFilter;
        } else {
          bar.classList.remove("active");
          chip.textContent = "";
        }
      }

      function renderFocusTab() {
        renderFilterBar();
        const el = document.getElementById("task-list");
        const deferred = getDeferredList(state.currentDate);
        if (state.tasks.length === 0 && deferred.length === 0) {
          el.innerHTML =
            '<div class="empty-state">no tasks for this day.<br>add one above or use a template.</div>';
          return;
        }

        const filterTag = state.activeTagFilter;
        const filterFn = filterTag
          ? (task) => (task.tags || []).includes(filterTag)
          : () => true;

        const openTasks = state.tasks.filter((task) => task.marker !== "DONE" && filterFn(task));
        const doneTasks = state.tasks.filter((task) => task.marker === "DONE" && filterFn(task));
        const orderedTasks = openTasks.concat(doneTasks);

        const items = orderedTasks
          .map((task) => {
            task.taskType = normalizeTaskType(task.taskType);
            const isDone = task.marker === "DONE";
            const taskCanComplete = canCompleteTask(task);
            const isEditingEst = state.editingEstId === task.id,
              isEditingContent = state.editingContentId === task.id;
            const hasSubtasks = task.subtasks && task.subtasks.length > 0,
              collapsed = state.collapsedTasks.has(task.id);
            const doingBadge =
              task.marker === "DOING" ? '<span class="doing-badge">DOING</span>' : "";
            const deferBadge =
              (task.defers || 0) > 0
                ? `<span class="carried-badge" title="deferred ${task.defers} time${task.defers === 1 ? "" : "s"}">&#x21bb;${task.defers}</span>`
                : "";
            const recurRule = task.recurringId
              ? loadRecurring().find((r) => r.id === task.recurringId)
              : null;
            const recurBadge = recurRule
              ? `<span class="recurring-badge" title="${esc(recurringLabel(recurRule.recurrence))}">&#x21ba;</span>`
              : "";
            const collectionBadge = task.collection
              ? `<span class="collection-badge" title="collection: ${esc(task.collection)}">${esc(task.collection)}</span>`
              : "";
            const toggleHtml = hasSubtasks
              ? `<span class="task-toggle${collapsed ? " collapsed" : ""}" data-toggle-id="${esc(task.id)}" title="${collapsed ? "expand subtasks" : "collapse subtasks"}"></span>`
              : "";
            const dueBadge = task.dueDate
              ? `<span class="due-badge ${dueDateClass(task.dueDate)}">${esc(formatDueDate(task.dueDate))}</span>`
              : "";
            const pri = getPriority(task);
            const priBadge = "";
            // strip legacy [#X] out of what we show in the task row; the badge carries the priority
            const displayContent = stripPriority(task.content);
            const contentHtml = isEditingContent
              ? `<input class="task-content-input" type="text" data-edit-id="${esc(task.id)}" value="${esc(task.content)}" autocomplete="off"/>`
              : `<span class="task-content" data-content-id="${esc(task.id)}" title="double-click to edit">${linkifyContent(displayContent)}</span>`;
            const estTag =
              !isDone && !isEditingEst && task.estimate
                ? `<span class="estimate-badge" data-est-id="${esc(task.id)}" title="click to edit">:${esc(task.estimate)}</span>`
                : "";
            const estEdit = isEditingEst
              ? `<div class="inline-edit" data-id="${esc(task.id)}"><input class="est-input" type="text" value="${esc(task.estimate)}" placeholder="e.g. 25m" autocomplete="off"><button class="save-btn">save</button><button class="cancel-est-btn">&#xd7;</button></div>`
              : "";
            const actHtml = task.actual
              ? `<span class="actual-badge">&#x2713; ${esc(task.actual)}</span>`
              : "";
            const taskTitle = stripPriority(task.content);
            const isScheduled = (state.calendarEvents || []).some(
              (ev) => ev.title === "Focus: " + taskTitle,
            );
            const schedBtn =
              isDone || !taskCanComplete
                ? ""
                : `<button class="sched-btn${isScheduled ? " scheduled" : ""}" data-sched-id="${esc(task.id)}" title="${isScheduled ? "already on calendar" : "schedule as focus time"}">&#x2d35;</button>`;
            const hasMeta = estEdit || actHtml || dueBadge || collectionBadge;
            const tagsHtml = (task.tags || []).length
              ? `<div class="task-meta">${(task.tags || []).map((t) => `<span class="task-tag${state.activeTagFilter === t ? " active-filter" : ""}" data-tag="${esc(t)}" title="click to filter">${esc(t)}</span>`).join("")}</div>`
              : "";
            return `
      <div class="task-item${task.fromKinopio ? " kn-task" : ""}${isDone ? " done-task" : ""}${pri ? " pri-" + pri.toLowerCase() : ""}" data-id="${esc(task.id)}" draggable="true">
        <div class="pri-tab" data-pri-id="${esc(task.id)}" title="click to cycle priority"></div>
        <span class="drag-handle" title="drag to reorder">&#x22ee;&#x22ee;</span>
        <div class="task-check${isDone ? " done" : ""}${taskCanComplete ? "" : " passive"}" data-done-id="${esc(task.id)}" data-done-state="${isDone ? "done" : "todo"}" title="${taskCanComplete ? (isDone ? "completed" : "mark done") : `${task.taskType} entry`}">${taskGlyph(task)}</div>
        <div class="task-body">
          <div class="task-text">${toggleHtml}${priBadge}${doingBadge}${deferBadge}${recurBadge}${contentHtml}${isEditingContent ? "" : estTag + schedBtn}</div>
          ${hasMeta ? `<div class="task-meta">${estEdit}${actHtml}${dueBadge}${collectionBadge}</div>` : ""}
          ${tagsHtml}
        </div>
        <button class="task-menu-btn" data-menu-id="${esc(task.id)}" title="options">&#x22ef;</button>
      </div>
      ${renderSubtaskList(task)}`;
          })
          .join("");

        if (orderedTasks.length === 0 && filterTag) {
          el.innerHTML = `<div class="empty-state">no tasks tagged <em>${esc(filterTag)}</em>.</div>`;
          return;
        }

        const deferredHtml =
          deferred.length === 0
            ? ""
            : `<div class="deferred-section"><div class="deferred-label">&#x2192; tomorrow</div>${deferred.map((t) => `<div class="deferred-item">${linkifyContent(t)}</div>`).join("")}</div>`;

        el.innerHTML = items + deferredHtml;
      }

      function renderInboxTab() {
        const el = document.getElementById("inbox-list");
        const groups = state.kinopioGroups;
        const completedKeys = new Set(
          (state.tasks || [])
            .filter((t) => {
              const marker = String((t && t.marker) || "").toUpperCase();
              return marker === "DONE" || marker === "CANCELED";
            })
            .map((t) => textKey(t.content)),
        );
        const names = Object.keys(groups)
          .sort((a, b) => knSpaceSortKey(a).localeCompare(knSpaceSortKey(b)))
          .filter((s) =>
            (groups[s] || []).some(
              (card) => card && !card.isDone && !completedKeys.has(textKey(card.text)),
            ),
          );
        if (names.length === 0) {
          el.innerHTML =
            '<div class="empty-state">no kinopio cards loaded.<br>click sync to pull from the API.</div>';
          return;
        }
        // apply any saved manual order per space (from drag-reorder)
        for (const space of names) {
          const order = getKnOrder(space);
          if (order && order.length) {
            const cards = groups[space];
            const byKey = new Map(cards.map((c) => [textKey(c.text), c]));
            const ordered = [];
            for (const k of order)
              if (byKey.has(k)) {
                ordered.push(byKey.get(k));
                byKey.delete(k);
              }
            for (const [, c] of byKey) ordered.push(c);
            groups[space] = ordered;
          }
        }
        el.innerHTML = names
          .map((space) => {
            const dateISO = state.currentDate;
            const cardsHtml = (groups[space] || [])
              .filter((card) => card && !card.isDone && !completedKeys.has(textKey(card.text)))
              .map((card) => {
                const markerClass = card.isDone ? "done" : "todo";
                const dueBadge = card.due
                  ? `<span class="due-badge ${dueDateClass(card.due)}" style="display:inline-block;margin-top:3px">${esc(formatDueDate(card.due))}</span>`
                  : "";
                const added = isAddedToDay(dateISO, card.text);
                const addBtn = added
                  ? `<button class="inbox-readd-btn" data-kn-text="${esc(card.text)}" data-kn-id="${esc(card.id || "")}" data-kn-space="${esc(space)}" title="re-add to today">added &times;</button>`
                  : `<button class="inbox-add-btn"   data-kn-text="${esc(card.text)}" data-kn-id="${esc(card.id || "")}" data-kn-due="${esc(card.due || "")}" data-kn-space="${esc(space)}" title="add to today">+ day</button>`;
                const urlBtns = (card.urls || [])
                  .map(
                    (u) => `<a class="kn-url-arrow" href="${esc(u)}" target="_blank">&#x2192;</a>`,
                  )
                  .join("");
                const knKey = (space || "") + "::" + textKey(card.text);
                return `<div class="inbox-item" draggable="true" data-kn-key="${esc(knKey)}" data-kn-space="${esc(space)}">
        <span class="drag-handle" title="drag to reorder">&#x22ee;&#x22ee;</span>
        <span class="inbox-status ${markerClass}">${card.isDone ? "DONE" : "TODO"}</span>
        <span class="inbox-text">${linkifyContent(card.text)}${urlBtns}${dueBadge ? "<br>" + dueBadge : ""}</span>
        <div class="inbox-actions">${addBtn}<button class="inbox-done-btn" data-kn-text="${esc(card.text)}" data-kn-id="${esc(card.id || "")}">&#x2713;</button></div>
      </div>`;
              })
              .join("");
            return `<div class="inbox-space-header">${esc(space)}</div>${cardsHtml}`;
          })
          .join("");
      }

      function renderTemplatesTab() {
        const sort = getTplSort();
        const sortSelect = document.getElementById("tpl-sort");
        if (sortSelect && sortSelect.value !== sort) sortSelect.value = sort;
        const uses = getTplUses();
        const list = getSortedTemplates();
        const grouped = TEMPLATE_CATEGORY_ORDER.map((category) => ({
          category,
          templates: list.filter(
            (template) =>
              normalizeTemplateCategory(template.category, template.name, template.tasks) ===
              category,
          ),
        })).filter((group) => group.templates.length);
        document.getElementById("template-grid").innerHTML =
          grouped
            .map((group) => {
              const categoryMeta = getTemplateCategoryMeta(group.category);
              return `<section class="template-section">
      <div class="template-section-title">
        <span>${esc(categoryMeta.label)}</span>
        <span class="template-section-count">${group.templates.length}</span>
      </div>
      <div class="template-section-body">${group.templates
        .map((t) => {
          const count = uses[t.id] || 0;
          const category = normalizeTemplateCategory(t.category, t.name, t.tasks);
          const badgeMeta = getTemplateCategoryMeta(category);
          const meta = `${t.tasks.length} steps${count > 0 ? ` \u00b7 used ${count}\u00d7` : ""}`;
          return `<div class="template-card category-${esc(category)}" data-tpl-id="${esc(t.id)}">
          <button class="tpl-edit-btn" data-tpl-edit="${esc(t.id)}" title="edit template">edit</button>
          <div class="template-name">${esc(t.name)}</div>
          <div class="template-count"><span class="template-category-badge category-${esc(category)}">${esc(badgeMeta.label)}</span><span>${esc(meta)}</span></div>
        </div>`;
        })
        .join("")}</div>
    </section>`;
            })
            .join("") || '<div class="empty-state">no templates yet</div>';
      }

      function renderRightCol() {
        const calendarConfigured = !!GCAL_SCRIPT_URL;
        const refreshBtn = document.getElementById("cal-refresh-btn");
        if (refreshBtn) {
          refreshBtn.textContent = calendarConfigured ? "\u21bb" : "set up";
          refreshBtn.classList.toggle("calendar-config-btn", !calendarConfigured);
          refreshBtn.title = calendarConfigured ? "refresh calendar" : "connect calendar";
        }

        // calendar
        const calEl = document.getElementById("cal-events");
        if (!calendarConfigured) {
          calEl.innerHTML =
            '<div class="cal-loading" style="font-size:11px">calendar not configured &mdash; connect it to load events</div>';
        } else if (state.calendarEvents === null) {
          calEl.innerHTML = '<div class="cal-loading">loading&#x2026;</div>';
        } else if (state.calendarEvents.length === 0) {
          calEl.innerHTML = '<div class="cal-loading">no events</div>';
        } else {
          const calEvTypes = getCalEventTypes();
          calEl.innerHTML = state.calendarEvents
            .map((ev) => {
              const isFocus = ev.title.startsWith("Focus:");
              const evType = calEvTypes[ev.id] || "default";
              const def = CAL_EVENT_TYPE_DEFS[evType];
              const dotHtml = def.icon
                ? `<i class="bi ${def.icon} cal-event-dot${isFocus ? " focus" : ""} type-${evType}" data-ev-id="${esc(ev.id)}" style="color:${def.color}" title="click to change type"></i>`
                : `<span class="cal-event-dot${isFocus ? " focus" : ""} type-default" data-ev-id="${esc(ev.id)}" title="click to change type"></span>`;
              return `<div class="cal-event">
        <span class="cal-event-time">${esc(fmtCalTime(ev.start) + "\u2013" + fmtCalTime(ev.end))}</span>
        ${dotHtml}
        <span class="cal-event-title${isFocus ? " focus" : ""}" title="${esc(ev.title)}">${esc(isFocus ? ev.title.replace(/^Focus:\s*/, "") : ev.title)}</span>
      </div>`;
            })
            .join("");
        }

        // time summary
        const summaryEl = document.getElementById("time-summary-body");
        const totalMin = state.tasks.reduce((sum, t) => sum + parseMinutes(t.estimate || ""), 0);
        if (!totalMin) {
          summaryEl.innerHTML = '<div class="cal-loading">no estimates set</div>';
          return;
        }
        const now = new Date(),
          end = new Date(now.getTime() + totalMin * 60000),
          endStr = fmtHM(end.getHours(), end.getMinutes());
        const byPri = { A: 0, B: 0, C: 0 };
        for (const t of state.tasks) {
          const p = getPriority(t);
          if (p) byPri[p] = (byPri[p] || 0) + parseMinutes(t.estimate || "");
        }
        const priChips = ["A", "B", "C"]
          .filter((p) => byPri[p] > 0)
          .map(
            (p) =>
              `<span class="pri-chip pri-${p.toLowerCase()}">#${p} ${formatMinutes(byPri[p])}</span>`,
          )
          .join("");
        summaryEl.innerHTML = `<div class="summary-row"><span>${formatMinutes(totalMin)} est &middot; done ~${endStr}</span></div>${priChips ? `<div class="pri-row">${priChips}</div>` : ""}`;
      }

      function renderTagPalette() {
        const container = document.getElementById("tag-palette-container");
        if (!container) return;
        const timeChips = ["5m", "15m", "25m", "50m"]
          .map((v) => `<div class="tag-chip time-chip" draggable="true" data-chip-type="time" data-chip-value="${v}">${v}</div>`)
          .join("");
        const catChips = TEMPLATE_CATEGORIES
          .map((c) => `<div class="tag-chip tpl-chip" draggable="true" data-chip-type="tpl" data-chip-value="${esc(c.id)}">${esc(c.label)}</div>`)
          .join("");
        container.innerHTML = `
          <div class="tag-palette-group">
            <div class="tag-palette-group-label">time</div>
            <div class="tag-palette-chips">${timeChips}</div>
          </div>
          <div class="tag-palette-group">
            <div class="tag-palette-group-label">category</div>
            <div class="tag-palette-chips">${catChips}</div>
          </div>`;
      }

      function render() {
        renderFocusTab();
        renderInboxTab();
        renderTemplatesTab();
        renderRightCol();
        renderTagPalette();
        applyPanelCollapseState();
        bindDynamicEvents();
      }

      // ============================================================
      //  tab switching
      // ============================================================

      function switchTab(name) {
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.toggle("active", t.dataset.tab === name));
        document
          .querySelectorAll(".tab-content")
          .forEach((c) => c.classList.toggle("active", c.id === "tab-" + name));
        const isMobile = window.innerWidth <= 768;
        document.getElementById("quick-add-row").style.display =
          isMobile || name === "focus" ? "flex" : "none";
        state.currentTab = name;
      }

      // ============================================================
      //  date navigation
      // ============================================================

      async function setDate(isoStr) {
        state.currentDate = isoStr;
        state.calendarEvents = null;
        document.getElementById("date-label").textContent = dateLabelFull(isoStr);

        // Auto-carry undone tasks from previous days
        await autoCarryUndoneTasksToDate(isoStr);

        state.tasks = (await fetchTasks(isoStr)).map((task) => ({
          ...task,
          subtasks: Array.isArray(task.subtasks) ? task.subtasks : [],
          taskType: normalizeTaskType(task.taskType),
          collection: normalizeCollectionName(task.collection),
        }));
        const recurringAdded = injectRecurringTasks(isoStr, state.tasks);
        if (recurringAdded) await persistTasks(isoStr, state.tasks);
        render();
        loadCalendarEvents(isoStr).catch(() => {});
      }

      // ============================================================
      //  dynamic event binding
      // ============================================================

      function bindDynamicEvents() {
        document.querySelectorAll("[data-done-id]").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            const task = state.tasks.find((t) => t.id === el.dataset.doneId);
            if (!task || !canCompleteTask(task)) return;
            if (el.dataset.doneState === "done") {
              undoDone(el.dataset.doneId).catch(() => {});
              return;
            }
            markDone(el.dataset.doneId);
          }),
        );

        document.querySelectorAll("[data-content-id]").forEach((el) =>
          el.addEventListener("dblclick", (e) => {
            e.stopPropagation();
            state.editingContentId = el.dataset.contentId;
            render();
            setTimeout(() => {
              const inp = document.querySelector(
                `.task-content-input[data-edit-id="${el.dataset.contentId}"]`,
              );
              if (inp) {
                inp.focus();
                inp.select();
              }
            }, 30);
          }),
        );

        document.querySelectorAll(".task-content-input").forEach((el) => {
          el.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              updateContent(el.dataset.editId, el.value);
            }
            if (e.key === "Escape") {
              state.editingContentId = null;
              render();
            }
          });
          el.addEventListener("blur", () => updateContent(el.dataset.editId, el.value));
        });

        document.querySelectorAll("[data-est-id]").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            state.editingEstId = el.dataset.estId;
            render();
            setTimeout(() => {
              const inp = document.querySelector(".est-input");
              if (inp) {
                inp.focus();
                inp.select();
              }
            }, 30);
          }),
        );

        document.querySelectorAll(".save-btn").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            const row = el.closest(".inline-edit");
            if (row) updateEstimate(row.dataset.id, row.querySelector(".est-input").value);
          }),
        );
        document.querySelectorAll(".cancel-est-btn").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            state.editingEstId = null;
            render();
          }),
        );
        document.querySelectorAll(".est-input").forEach((el) =>
          el.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              const row = el.closest(".inline-edit");
              if (row) updateEstimate(row.dataset.id, el.value);
            } else if (e.key === "Escape") {
              state.editingEstId = null;
              render();
            }
          }),
        );

        document.querySelectorAll("[data-toggle-id]").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            const id = el.dataset.toggleId;
            const list = document.querySelector(`.subtask-list[data-parent-id="${id}"]`);
            if (state.collapsedTasks.has(id)) {
              state.collapsedTasks.delete(id);
              el.classList.remove("collapsed");
              el.title = "collapse subtasks";
              if (list) list.style.display = "block";
            } else {
              state.collapsedTasks.add(id);
              el.classList.add("collapsed");
              el.title = "expand subtasks";
              if (list) list.style.display = "none";
            }
          }),
        );

        document.querySelectorAll(".subtask-check").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            toggleSubtask(el.dataset.parentId, el.dataset.subId);
          }),
        );

        document.querySelectorAll(".subtask-text[data-sub-id]").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            beginSubtaskEdit(el.dataset.parentId, el.dataset.subId);
          }),
        );

        document.querySelectorAll(".subtask-input").forEach((el) => {
          el.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              saveSubtaskEdit(el.dataset.parentId, el.dataset.subId, el.value);
            } else if (e.key === "Escape") {
              cancelSubtaskEdit();
            }
          });
          el.addEventListener("blur", () =>
            saveSubtaskEdit(el.dataset.parentId, el.dataset.subId, el.value),
          );
        });

        document.querySelectorAll("[data-delete-id]").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            skipTask(el.dataset.deleteId);
          }),
        );

        document.querySelectorAll("[data-menu-id]").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            state.activeMenuId = el.dataset.menuId;
            const rect = el.getBoundingClientRect(),
              menu = document.getElementById("options-menu");
            menu.style.display = "block";
            if (window.innerWidth < 768) {
              // on mobile: center the menu horizontally with 16px side margins
              const mw = window.innerWidth - 32;
              menu.style.width = mw + "px";
              menu.style.left = "16px";
              // position below the tapped button, but keep inside the viewport
              const top = Math.min(rect.bottom + 4, window.innerHeight - menu.offsetHeight - 12);
              menu.style.top = Math.max(8, top) + "px";
            } else {
              menu.style.width = "";
              const menuW = 180,
                left = Math.min(rect.left - menuW + rect.width, window.innerWidth - menuW - 8);
              menu.style.left = Math.max(8, left) + "px";
              menu.style.top = rect.bottom + 4 + "px";
            }
          }),
        );

        document.querySelectorAll("[data-sched-id]").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            if (!el.classList.contains("scheduled")) scheduleTask(el.dataset.schedId);
          }),
        );

        document.querySelectorAll(".inbox-add-btn").forEach((el) =>
          el.addEventListener("click", () =>
            addKinopioItemToDay({
              text: el.dataset.knText,
              id: el.dataset.knId || null,
              due: el.dataset.knDue || null,

      // ---- kinopio tooltip ----
      let _knTooltipTimer = null;

      function showKnTooltip(item, e) {
        const space = item.dataset.knSpace;
        const cards = (state.kinopioGroups[space] || []).filter((c) => c && !c.isDone);
        if (cards.length <= 1) return;
        const currentText = item.querySelector(".inbox-text")?.textContent?.trim() || "";
        const curIdx = cards.findIndex((c) => (c.text || "").trim() === currentText);
        const nearby = [];
        for (let i = Math.max(0, curIdx - 2); i <= Math.min(cards.length - 1, curIdx + 2); i++) {
          nearby.push({ text: cards[i].text, isCurrent: i === curIdx });
        }
        const tooltip = document.getElementById("kn-tooltip");
        tooltip.innerHTML = `<div class="kn-tooltip-title">${esc(space)}</div>` +
          nearby.map((c) => `<div class="kn-tooltip-card${c.isCurrent ? " current" : ""}">${esc((c.text || "").slice(0, 60))}</div>`).join("");
        tooltip.style.display = "block";
        positionKnTooltip(e);
      }

      function positionKnTooltip(e) {
        const tooltip = document.getElementById("kn-tooltip");
        if (tooltip.style.display === "none") return;
        const x = Math.min(e.clientX + 14, window.innerWidth - 260);
        const y = Math.min(e.clientY - 8, window.innerHeight - 160);
        tooltip.style.left = x + "px";
        tooltip.style.top = y + "px";
      }

      function hideKnTooltip() {
        const tooltip = document.getElementById("kn-tooltip");
        if (tooltip) tooltip.style.display = "none";

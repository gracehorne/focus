function formatElapsed(secs) { const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60; if(h>0)return`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; return`${m}:${String(s).padStart(2,'0')}`; }
function getElapsedSeconds() { return state.timerElapsed+(state.timerStart?Math.floor((Date.now()-state.timerStart)/1000):0); }
function elapsedToTimeStr(secs) { const h=Math.floor(secs/3600),m=Math.ceil((secs%3600)/60); if(h>0&&m>0)return`${h}h ${m}m`; if(h>0)return`${h}h`; return`${m||1}m`; }

function startTimer(taskId) {
  if (state.timerInterval) clearInterval(state.timerInterval);
  if (state.timerPausedUuid!==taskId) state.timerElapsed=0;
  state.timerPausedUuid=null; state.activeTimerUuid=taskId; state.timerStart=Date.now();
  state.timerInterval=setInterval(updateTimerDisplay,1000);
  render();
}

function stopTimer() {
  if (state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null;}
  const uuid=state.activeTimerUuid, elapsed=getElapsedSeconds();
  state.timerElapsed=elapsed; state.timerPausedUuid=uuid; state.activeTimerUuid=null; state.timerStart=null;
  return {uuid,elapsed};
}

function updateTimerDisplay() {
  const id=state.activeTimerUuid; if(!id)return;
  const secs=getElapsedSeconds();
  const el=document.getElementById('timer-elapsed-'+id); if(el)el.textContent=formatElapsed(secs);
  const task=state.tasks.find(t=>t.id===id);
  const badge=task&&document.querySelector(`.estimate-badge[data-est-id="${id}"]`);
  if(badge&&task){const estMins=parseMinutes(task.estimate||''); if(estMins>0)badge.classList.toggle('overrun',secs/60>estMins);}
}

// ============================================================
//  rendering
// ============================================================

function renderSubtaskList(task) {
  if (!task.subtasks||task.subtasks.length===0) return '';
  const collapsed = state.collapsedTasks.has(task.id);
  const items = task.subtasks.map(sub=>{
    const done=sub.marker==='DONE';
    return `<div class="subtask-item">
      <div class="subtask-check ${done?'done':''}" data-sub-id="${esc(sub.id)}" data-parent-id="${esc(task.id)}"></div>
      <span class="subtask-text ${done?'done':''}" data-sub-id="${esc(sub.id)}">${linkifyContent(sub.content)}</span>
    </div>`;
  }).join('');
  return `<div class="subtask-list" data-parent-id="${esc(task.id)}"${collapsed?' style="display:none"':''}>${items}</div>`;
}

function renderFocusTab() {
  const el=document.getElementById('task-list');
  const deferred=getDeferredList(state.currentDate);
  if (state.tasks.length===0&&deferred.length===0) { el.innerHTML='<div class="empty-state">no tasks for this day.<br>add one above or use a template.</div>'; return; }

  const items = state.tasks.map(task=>{
    const isEditingEst=state.editingEstId===task.id, isEditingContent=state.editingContentId===task.id;
    const hasSubtasks=task.subtasks&&task.subtasks.length>0, collapsed=state.collapsedTasks.has(task.id), isTimerRunning=state.activeTimerUuid===task.id;
    const doingBadge=task.marker==='DOING'?'<span class="doing-badge">DOING</span>':'';
    const carriedBadge=task.carriedFrom?'<span class="carried-badge">&#x2190; carried</span>':'';
    const deferBadge=(task.defers||0)>0?`<span class="carried-badge" title="deferred ${task.defers} time${task.defers===1?'':'s'}">&#x21bb;${task.defers}</span>`:'';
    const recurRule=task.recurringId?loadRecurring().find(r=>r.id===task.recurringId):null;
    const recurBadge=recurRule?`<span class="recurring-badge" title="${esc(recurringLabel(recurRule.recurrence))}">&#x21ba;</span>`:'';
    const toggleHtml=hasSubtasks?`<span class="task-toggle" data-toggle-id="${esc(task.id)}">${collapsed?'&#x25b6;':'&#x25bc;'}</span>`:'';
    const dueBadge=task.dueDate?`<span class="due-badge ${dueDateClass(task.dueDate)}">${esc(formatDueDate(task.dueDate))}</span>`:'';
    const pri=getPriority(task);
    const priClass = pri ? 'pri-'+pri.toLowerCase() : 'pri-none';
    const priLabel = pri || '';
    const priBadge = `<button class="priority-badge ${priClass}" data-pri-id="${esc(task.id)}" title="priority (click to cycle A \u2192 B \u2192 C \u2192 none)">${priLabel}</button>`;
    // strip legacy [#X] out of what we show in the task row; the badge carries the priority
    const displayContent = stripPriority(task.content);
    const contentHtml=isEditingContent
      ?`<input class="task-content-input" type="text" data-edit-id="${esc(task.id)}" value="${esc(task.content)}" autocomplete="off"/>`
      :`<span class="task-content" data-content-id="${esc(task.id)}" title="double-click to edit">${linkifyContent(displayContent)}</span>`;
    const estTag=!isEditingEst&&task.estimate?`<span class="estimate-badge" data-est-id="${esc(task.id)}" title="click to edit">:${esc(task.estimate)}</span>`:'';
    const estEdit=isEditingEst?`<div class="inline-edit" data-id="${esc(task.id)}"><input class="est-input" type="text" value="${esc(task.estimate)}" placeholder="e.g. 25m" autocomplete="off"><button class="save-btn">save</button><button class="cancel-est-btn">&#xd7;</button></div>`:'';
    const actHtml=task.actual?`<span class="actual-badge">&#x2713; ${esc(task.actual)}</span>`:'';
    const timerBtn=`<button class="timer-btn${isTimerRunning?' running':''}" data-timer-id="${esc(task.id)}" title="${isTimerRunning?'stop timer':'start timer'}">${isTimerRunning?'&#x25a0;':'&#x25b6;'}</button>`;
    const elapsedHtml=isTimerRunning?`<span class="task-elapsed" id="timer-elapsed-${esc(task.id)}">${formatElapsed(getElapsedSeconds())}</span>`:'';
    const taskTitle=stripPriority(task.content);
    const isScheduled=(state.calendarEvents||[]).some(ev=>ev.title==='Focus: '+taskTitle);
    const schedBtn=`<button class="sched-btn${isScheduled?' scheduled':''}" data-sched-id="${esc(task.id)}" title="${isScheduled?'already on calendar':'schedule as focus time'}">&#x2d35;</button>`;
    const hasMeta=estEdit||actHtml||dueBadge;
    return `
      <div class="task-item${task.fromKinopio?' kn-task':''}" data-id="${esc(task.id)}" draggable="true">
        <span class="drag-handle" title="drag to reorder">&#x22ee;&#x22ee;</span>
        <div class="task-check" data-done-id="${esc(task.id)}" title="mark done"></div>
        <div class="task-body">
          <div class="task-text">${toggleHtml}${priBadge}${doingBadge}${carriedBadge}${deferBadge}${recurBadge}${contentHtml}${isEditingContent?'':estTag+timerBtn+elapsedHtml+schedBtn}</div>
          ${hasMeta?`<div class="task-meta">${estEdit}${actHtml}${dueBadge}</div>`:''}
        </div>
        <button class="task-menu-btn" data-menu-id="${esc(task.id)}" title="options">&#x22ef;</button>
      </div>
      ${renderSubtaskList(task)}`;
  }).join('');

  const deferredHtml=deferred.length===0?'':
    `<div class="deferred-section"><div class="deferred-label">&#x2192; tomorrow</div>${deferred.map(t=>`<div class="deferred-item">${linkifyContent(t)}</div>`).join('')}</div>`;

  el.innerHTML = items+deferredHtml;
}

function renderInboxTab() {
  const el=document.getElementById('inbox-list');
  const groups=state.kinopioGroups;
  const names=Object.keys(groups).sort((a,b)=>knSpaceSortKey(a).localeCompare(knSpaceSortKey(b))).filter(s=>(groups[s]||[]).length>0);
  if (names.length===0){el.innerHTML='<div class="empty-state">no kinopio cards loaded.<br>click sync to pull from the API.</div>';return;}
  // apply any saved manual order per space (from drag-reorder)
  for (const space of names) {
    const order = getKnOrder(space);
    if (order && order.length) {
      const cards = groups[space];
      const byKey = new Map(cards.map(c => [textKey(c.text), c]));
      const ordered = [];
      for (const k of order) if (byKey.has(k)) { ordered.push(byKey.get(k)); byKey.delete(k); }
      for (const [, c] of byKey) ordered.push(c);
      groups[space] = ordered;
    }
  }
  el.innerHTML=names.map(space=>{
    const dateISO=state.currentDate;
    const cardsHtml=(groups[space]||[]).map(card=>{
      const markerClass=card.isDone?'done':'todo';
      const dueBadge=card.due?`<span class="due-badge ${dueDateClass(card.due)}" style="display:inline-block;margin-top:3px">${esc(formatDueDate(card.due))}</span>`:'';
      const added=isAddedToDay(dateISO,card.text);
      const addBtn=added
        ?`<button class="inbox-readd-btn" data-kn-text="${esc(card.text)}" data-kn-id="${esc(card.id||'')}" title="re-add to today">added &times;</button>`
        :`<button class="inbox-add-btn"   data-kn-text="${esc(card.text)}" data-kn-id="${esc(card.id||'')}" data-kn-due="${esc(card.due||'')}" title="add to today">+ day</button>`;
      const urlBtns=(card.urls||[]).map(u=>`<a class="kn-url-arrow" href="${esc(u)}" target="_blank">&#x2192;</a>`).join('');
      const knKey = (space||'') + '::' + textKey(card.text);
      return `<div class="inbox-item" draggable="true" data-kn-key="${esc(knKey)}" data-kn-space="${esc(space)}">
        <span class="drag-handle" title="drag to reorder">&#x22ee;&#x22ee;</span>
        <span class="inbox-status ${markerClass}">${card.isDone?'DONE':'TODO'}</span>
        <span class="inbox-text">${linkifyContent(card.text)}${urlBtns}${dueBadge?'<br>'+dueBadge:''}</span>
        <div class="inbox-actions">${addBtn}<button class="inbox-done-btn" data-kn-text="${esc(card.text)}" data-kn-id="${esc(card.id||'')}">&#x2713;</button></div>
      </div>`;
    }).join('');
    return `<div class="inbox-space-header">${esc(space)}</div>${cardsHtml}`;
  }).join('');
}

function renderTemplatesTab() {
  const sort = getTplSort();
  const sortSelect = document.getElementById('tpl-sort');
  if (sortSelect && sortSelect.value !== sort) sortSelect.value = sort;
  const uses = getTplUses();
  const list = getSortedTemplates();
  document.getElementById('template-grid').innerHTML=list.map(t=>{
    const count = uses[t.id] || 0;
    const meta  = `${t.tasks.length} steps${count>0?` \u00b7 used ${count}\u00d7`:''}`;
    return `<div class="template-card" data-tpl-id="${esc(t.id)}">
      <button class="tpl-edit-btn" data-tpl-edit="${esc(t.id)}" title="edit template">edit</button>
      <div class="template-name">${esc(t.name)}</div>
      <div class="template-count">${meta}</div>
    </div>`;
  }).join('');
}

async function renderRightCol() {
  const calendarConfigured = !!GCAL_SCRIPT_URL;
  const refreshBtn = document.getElementById('cal-refresh-btn');
  if (refreshBtn) {
    refreshBtn.textContent = calendarConfigured ? '\u21bb' : 'set up';
    refreshBtn.classList.toggle('calendar-config-btn', !calendarConfigured);
    refreshBtn.title = calendarConfigured ? 'refresh calendar' : 'connect calendar';
  }

  // calendar
  const calEl=document.getElementById('cal-events');
  if (!calendarConfigured) { calEl.innerHTML='<div class="cal-loading" style="font-size:11px">calendar not configured &mdash; connect it to load events</div>'; }
  else if (state.calendarEvents===null) { calEl.innerHTML='<div class="cal-loading">loading&#x2026;</div>'; }
  else if (state.calendarEvents.length===0) { calEl.innerHTML='<div class="cal-loading">no events</div>'; }
  else {
    calEl.innerHTML=state.calendarEvents.map(ev=>{
      const isFocus=ev.title.startsWith('Focus:');
      return `<div class="cal-event">
        <span class="cal-event-time">${esc(fmtCalTime(ev.start)+'\u2013'+fmtCalTime(ev.end))}</span>
        <span class="cal-event-dot${isFocus?' focus':''}"></span>
        <span class="cal-event-title${isFocus?' focus':''}" title="${esc(ev.title)}">${esc(isFocus?ev.title.replace(/^Focus:\s*/,''):ev.title)}</span>
      </div>`;
    }).join('');
  }

  // time summary
  const summaryEl=document.getElementById('time-summary-body');
  const totalMin=state.tasks.reduce((sum,t)=>sum+parseMinutes(t.estimate||''),0);
  if (!totalMin){summaryEl.innerHTML='<div class="cal-loading">no estimates set</div>';return;}
  const now=new Date(), end=new Date(now.getTime()+totalMin*60000), endStr=fmtHM(end.getHours(),end.getMinutes());
  const acc=await getEstimateAccuracy();
  const accHtml=acc!==null?`<span class="accuracy-badge ${acc>=80?'accuracy-good':acc>=55?'accuracy-ok':'accuracy-poor'}" title="accuracy over last 14 days">${acc}% acc.</span>`:'';
  const byPri={A:0,B:0,C:0};
  for(const t of state.tasks){const p=getPriority(t);if(p)byPri[p]=(byPri[p]||0)+parseMinutes(t.estimate||'');}
  const priChips=['A','B','C'].filter(p=>byPri[p]>0).map(p=>`<span class="pri-chip pri-${p.toLowerCase()}">#${p} ${formatMinutes(byPri[p])}</span>`).join('');
  summaryEl.innerHTML=`<div class="summary-row"><span>${formatMinutes(totalMin)} est &middot; done ~${endStr}</span>${accHtml}</div>${priChips?`<div class="pri-row">${priChips}</div>`:''}`;
}

function render() {
  renderFocusTab();
  renderInboxTab();
  renderTemplatesTab();
  renderRightCol();
  bindDynamicEvents();
}

// ============================================================
//  tab switching
// ============================================================

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active',c.id==='tab-'+name));
  document.getElementById('quick-add-row').style.display=name==='focus'?'flex':'none';
  state.currentTab=name;
}

// ============================================================
//  date navigation
// ============================================================

async function setDate(isoStr) {
  state.currentDate = isoStr;
  state.calendarEvents = null;
  document.getElementById('date-label').textContent = dateLabelFull(isoStr);
  if (state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null;}
  state.activeTimerUuid=null; state.timerStart=null; state.timerElapsed=0; state.timerPausedUuid=null;
  state.tasks = await fetchTasks(isoStr);
  const recurringAdded = injectRecurringTasks(isoStr, state.tasks);
  if (recurringAdded) await persistTasks(isoStr, state.tasks);
  render();
  loadCalendarEvents(isoStr).catch(()=>{});
}

// ============================================================
//  dynamic event binding
// ============================================================

function bindDynamicEvents() {
  document.querySelectorAll('[data-done-id]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();markDone(el.dataset.doneId);}));

  document.querySelectorAll('[data-content-id]').forEach(el=>el.addEventListener('dblclick',e=>{
    e.stopPropagation(); state.editingContentId=el.dataset.contentId; render();
    setTimeout(()=>{const inp=document.querySelector(`.task-content-input[data-edit-id="${el.dataset.contentId}"]`);if(inp){inp.focus();inp.select();}},30);
  }));

  document.querySelectorAll('.task-content-input').forEach(el=>{
    el.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();updateContent(el.dataset.editId,el.value);}if(e.key==='Escape'){state.editingContentId=null;render();}});
    el.addEventListener('blur',()=>updateContent(el.dataset.editId,el.value));
  });

  document.querySelectorAll('[data-est-id]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation(); state.editingEstId=el.dataset.estId; render();
    setTimeout(()=>{const inp=document.querySelector('.est-input');if(inp){inp.focus();inp.select();}},30);
  }));

  document.querySelectorAll('.save-btn').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();const row=el.closest('.inline-edit');if(row)updateEstimate(row.dataset.id,row.querySelector('.est-input').value);}));
  document.querySelectorAll('.cancel-est-btn').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();state.editingEstId=null;render();}));
  document.querySelectorAll('.est-input').forEach(el=>el.addEventListener('keydown',e=>{if(e.key==='Enter'){const row=el.closest('.inline-edit');if(row)updateEstimate(row.dataset.id,el.value);}else if(e.key==='Escape'){state.editingEstId=null;render();}}));

  document.querySelectorAll('[data-toggle-id]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation(); const id=el.dataset.toggleId; const list=document.querySelector(`.subtask-list[data-parent-id="${id}"]`);
    if(state.collapsedTasks.has(id)){state.collapsedTasks.delete(id);el.innerHTML='&#x25bc;';if(list)list.style.display='block';}
    else{state.collapsedTasks.add(id);el.innerHTML='&#x25b6;';if(list)list.style.display='none';}
  }));

  document.querySelectorAll('.subtask-check').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();toggleSubtask(el.dataset.parentId,el.dataset.subId);}));

  document.querySelectorAll('[data-delete-id]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation(); skipTask(el.dataset.deleteId);
  }));

  document.querySelectorAll('[data-menu-id]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation(); state.activeMenuId=el.dataset.menuId;
    const rect=el.getBoundingClientRect(), menu=document.getElementById('options-menu');
    menu.style.display='block';
    if (window.innerWidth < 768) {
      // on mobile: center the menu horizontally with 16px side margins
      const mw = window.innerWidth - 32;
      menu.style.width = mw + 'px';
      menu.style.left  = '16px';
      // position below the tapped button, but keep inside the viewport
      const top = Math.min(rect.bottom + 4, window.innerHeight - menu.offsetHeight - 12);
      menu.style.top = Math.max(8, top) + 'px';
    } else {
      menu.style.width = '';
      const menuW=180, left=Math.min(rect.left-menuW+rect.width,window.innerWidth-menuW-8);
      menu.style.left=Math.max(8,left)+'px'; menu.style.top=(rect.bottom+4)+'px';
    }
  }));

  document.querySelectorAll('[data-timer-id]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation(); const id=el.dataset.timerId;
    if(state.activeTimerUuid===id){stopTimer();render();}else{if(state.activeTimerUuid)stopTimer();startTimer(id);}
  }));

  document.querySelectorAll('[data-sched-id]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();if(!el.classList.contains('scheduled'))scheduleTask(el.dataset.schedId);}));

  document.querySelectorAll('.inbox-add-btn').forEach(el=>el.addEventListener('click',()=>addKinopioItemToDay({text:el.dataset.knText,id:el.dataset.knId||null,due:el.dataset.knDue||null})));
  document.querySelectorAll('.inbox-readd-btn').forEach(el=>el.addEventListener('click',()=>{unmarkAddedToDay(state.currentDate,el.dataset.knText);addKinopioItemToDay({text:el.dataset.knText,id:el.dataset.knId||null,due:el.dataset.knDue||null});}));
  document.querySelectorAll('.inbox-done-btn').forEach(el=>el.addEventListener('click',()=>markKinopioItemDone(el.dataset.knText,el.dataset.knId)));

  // template card: click to insert, edit-btn to open editor
  document.querySelectorAll('[data-tpl-id]').forEach(el=>el.addEventListener('click',e=>{
    if (e.target.closest('[data-tpl-edit]')) return;  // handled below
    insertTemplate(el.dataset.tplId);
  }));
  document.querySelectorAll('[data-tpl-edit]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation(); openTemplateEditor(el.dataset.tplEdit);
  }));

  // priority badge: cycle A -> B -> C -> none
  document.querySelectorAll('[data-pri-id]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const task = state.tasks.find(t => t.id === el.dataset.priId);
    if (!task) return;
    setPriority(task.id, nextPriority(getPriority(task)));
  }));

  bindTaskDragEvents();
  bindInboxDragEvents();
  bindTouchReorderListeners();
}

// ============================================================
//  drag and drop
// ============================================================

function clearDropHints(selector) {
  document.querySelectorAll(selector).forEach(el => {
    el.classList.remove('drop-above','drop-below','drop-before','drop-after');
  });
}

const touchDragState = {
  active: false,
  kind: null,
  pointerId: null,
  sourceEl: null,
  sourceId: null,
  sourceSpace: null,
  targetEl: null,
  before: true,
};

function getTouchDropTarget(kind, clientX, clientY) {
  const el = document.elementFromPoint(clientX, clientY);
  if (!el) return null;
  return el.closest(kind === 'task' ? '.task-item[draggable="true"]' : '.inbox-item[draggable="true"]');
}

function updateTouchDropHint(kind, targetEl, clientX, clientY) {
  const selector = kind === 'task' ? '.task-item' : '.inbox-item';
  clearDropHints(selector);
  if (!targetEl) return true;
  const rect = targetEl.getBoundingClientRect();
  const before = (clientY - rect.top) < (rect.height / 2);
  targetEl.classList.add(before ? 'drop-above' : 'drop-below');
  touchDragState.targetEl = targetEl;
  touchDragState.before = before;
  return before;
}

function beginTouchDrag(kind, itemEl, pointerId) {
  touchDragState.active = true;
  touchDragState.kind = kind;
  touchDragState.pointerId = pointerId;
  touchDragState.sourceEl = itemEl;
  touchDragState.sourceId = kind === 'task' ? itemEl.dataset.id : itemEl.dataset.knKey;
  touchDragState.sourceSpace = kind === 'task' ? null : itemEl.dataset.knSpace;
  touchDragState.targetEl = itemEl;
  touchDragState.before = true;
  itemEl.classList.add('dragging');
}

function cancelTouchDrag() {
  if (!touchDragState.active) return;
  if (touchDragState.sourceEl) touchDragState.sourceEl.classList.remove('dragging');
  clearDropHints(touchDragState.kind === 'task' ? '.task-item' : '.inbox-item');
  touchDragState.active = false;
  touchDragState.kind = null;
  touchDragState.pointerId = null;
  touchDragState.sourceEl = null;
  touchDragState.sourceId = null;
  touchDragState.sourceSpace = null;
  touchDragState.targetEl = null;
  touchDragState.before = true;
}

async function commitTouchDrag(clientX, clientY) {
  if (!touchDragState.active) return;
  const { kind, sourceEl, sourceId, sourceSpace } = touchDragState;
  const targetEl = getTouchDropTarget(kind, clientX, clientY);
  const before = updateTouchDropHint(kind, targetEl, clientX, clientY);
  if (!targetEl || !sourceEl) {
    cancelTouchDrag();
    return;
  }

  if (kind === 'task') {
    const dstId = targetEl.dataset.id;
    if (!sourceId || !dstId || sourceId === dstId) {
      cancelTouchDrag();
      return;
    }
    const srcIdx = state.tasks.findIndex(t => t.id === sourceId);
    const dstIdx = state.tasks.findIndex(t => t.id === dstId);
    if (srcIdx < 0 || dstIdx < 0) { cancelTouchDrag(); return; }
    const [moved] = state.tasks.splice(srcIdx, 1);
    const adjustedDstIdx = state.tasks.findIndex(t => t.id === dstId);
    state.tasks.splice(before ? adjustedDstIdx : adjustedDstIdx + 1, 0, moved);
    await persistTasks(state.currentDate, state.tasks);
    render();
    return;
  }

  const dstKey = targetEl.dataset.knKey;
  if (!sourceId || !dstKey || sourceId === dstKey || sourceSpace !== targetEl.dataset.knSpace) {
    cancelTouchDrag();
    return;
  }
  const cards = state.kinopioGroups[sourceSpace] || [];
  const srcKey = sourceId.split('::').slice(1).join('::');
  const dstTextKey = dstKey.split('::').slice(1).join('::');
  const srcIdx = cards.findIndex(c => textKey(c.text) === srcKey);
  const dstIdx = cards.findIndex(c => textKey(c.text) === dstTextKey);
  if (srcIdx < 0 || dstIdx < 0) { cancelTouchDrag(); return; }
  const [moved] = cards.splice(srcIdx, 1);
  const adjustedDstIdx = cards.findIndex(c => textKey(c.text) === dstTextKey);
  cards.splice(before ? adjustedDstIdx : adjustedDstIdx + 1, 0, moved);
  state.kinopioGroups[sourceSpace] = cards;
  saveKnOrder(sourceSpace, cards.map(c => textKey(c.text)));
  renderInboxTab();
  bindDynamicEvents();
}

function bindTouchReorderListeners() {
  if (document.__dfTouchReorderBound) return;
  document.__dfTouchReorderBound = true;
  document.addEventListener('pointermove', e => {
    if (!touchDragState.active || e.pointerId !== touchDragState.pointerId) return;
    e.preventDefault();
    const targetEl = getTouchDropTarget(touchDragState.kind, e.clientX, e.clientY);
    updateTouchDropHint(touchDragState.kind, targetEl, e.clientX, e.clientY);
  }, { passive: false });
  document.addEventListener('pointerup', e => {
    if (!touchDragState.active || e.pointerId !== touchDragState.pointerId) return;
    commitTouchDrag(e.clientX, e.clientY).catch(() => cancelTouchDrag());
    cancelTouchDrag();
  });
  document.addEventListener('pointercancel', e => {
    if (!touchDragState.active || e.pointerId !== touchDragState.pointerId) return;
    cancelTouchDrag();
  });
}

function reorderTaskByPointer(srcId, dstId, before) {
  const srcIdx = state.tasks.findIndex(t => t.id === srcId);
  const dstIdx = state.tasks.findIndex(t => t.id === dstId);
  if (srcIdx < 0 || dstIdx < 0) return false;
  const [moved] = state.tasks.splice(srcIdx, 1);
  const adjustedDstIdx = state.tasks.findIndex(t => t.id === dstId);
  state.tasks.splice(before ? adjustedDstIdx : adjustedDstIdx + 1, 0, moved);
  return true;
}

function reorderInboxCardByPointer(space, srcKey, dstKey, before) {
  const cards = state.kinopioGroups[space] || [];
  const srcIdx = cards.findIndex(c => textKey(c.text) === srcKey);
  if (srcIdx < 0) return false;
  const [moved] = cards.splice(srcIdx, 1);
  const adjustedDstIdx = cards.findIndex(c => textKey(c.text) === dstKey);
  if (adjustedDstIdx < 0) {
    cards.push(moved);
  } else {
    cards.splice(before ? adjustedDstIdx : adjustedDstIdx + 1, 0, moved);
  }
  state.kinopioGroups[space] = cards;
  return true;
}

function bindTaskDragEvents() {
  document.querySelectorAll('.task-item[draggable="true"]').forEach(item => {
    item.addEventListener('dragstart', e => {
      state.draggingTaskId = item.dataset.id;
      item.classList.add('dragging');
      try { e.dataTransfer.setData('text/plain', item.dataset.id); } catch {}
      if (e.dataTransfer) e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
      clearDropHints('.task-item');
      state.draggingTaskId = null;
    });
    item.addEventListener('dragover', e => {
      if (!state.draggingTaskId) return;
      e.preventDefault();
      if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
      const rect = item.getBoundingClientRect();
      const above = (e.clientY - rect.top) < (rect.height / 2);
      clearDropHints('.task-item');
      item.classList.add(above ? 'drop-above' : 'drop-below');
    });
    item.addEventListener('dragleave', () => {
      item.classList.remove('drop-above','drop-below');
    });
    item.addEventListener('drop', async e => {
      e.preventDefault();
      const srcId = state.draggingTaskId;
      const dstId = item.dataset.id;
      clearDropHints('.task-item');
      if (!srcId || !dstId || srcId === dstId) return;
      const rect = item.getBoundingClientRect();
      const above = (e.clientY - rect.top) < (rect.height / 2);
      if (!reorderTaskByPointer(srcId, dstId, above)) return;
      await persistTasks(state.currentDate, state.tasks);
      render();
    });

    const handle = item.querySelector('.drag-handle');
    if (handle) {
      handle.addEventListener('pointerdown', e => {
        if (e.pointerType === 'mouse') return;
        e.preventDefault();
        beginTouchDrag('task', item, e.pointerId);
      });
    }
  });
}

function bindInboxDragEvents() {
  document.querySelectorAll('.inbox-item[draggable="true"]').forEach(item => {
    item.addEventListener('dragstart', e => {
      state.draggingKnKey = { key: item.dataset.knKey, space: item.dataset.knSpace };
      item.classList.add('dragging');
      if (e.dataTransfer) e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
      clearDropHints('.inbox-item');
      state.draggingKnKey = null;
    });
    item.addEventListener('dragover', e => {
      if (!state.draggingKnKey) return;
      // only allow reordering within the same space
      if (state.draggingKnKey.space !== item.dataset.knSpace) return;
      e.preventDefault();
      if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
      const rect = item.getBoundingClientRect();
      const above = (e.clientY - rect.top) < (rect.height / 2);
      clearDropHints('.inbox-item');
      item.classList.add(above ? 'drop-above' : 'drop-below');
    });
    item.addEventListener('dragleave', () => { item.classList.remove('drop-above','drop-below'); });
    item.addEventListener('drop', e => {
      e.preventDefault();
      const drag = state.draggingKnKey;
      clearDropHints('.inbox-item');
      if (!drag) return;
      if (drag.space !== item.dataset.knSpace) return;
      if (drag.key === item.dataset.knKey) return;

      const space = drag.space;
      const cards = state.kinopioGroups[space] || [];
      // find indices by textKey (knKey = space::textKey)
      const srcKey = drag.key.split('::').slice(1).join('::');
      const dstKey = item.dataset.knKey.split('::').slice(1).join('::');
      const rect = item.getBoundingClientRect();
      const above = (e.clientY - rect.top) < (rect.height / 2);
      if (!reorderInboxCardByPointer(space, srcKey, dstKey, above)) return;
      saveKnOrder(space, cards.map(c => textKey(c.text)));
      renderInboxTab();
      bindDynamicEvents();
    });

    const handle = item.querySelector('.drag-handle');
    if (handle) {
      handle.addEventListener('pointerdown', e => {
        if (e.pointerType === 'mouse') return;
        e.preventDefault();
        beginTouchDrag('inbox', item, e.pointerId);
      });
    }
  });
}

document.getElementById('options-menu').addEventListener('click',async e=>{
  const btn=e.target.closest('[data-action]'); if(!btn)return;
  const id=state.activeMenuId, action=btn.dataset.action;
  document.getElementById('options-menu').style.display='none'; state.activeMenuId=null;
  if(!id)return;
  if(action==='edit-content'){state.editingContentId=id;render();setTimeout(()=>{const inp=document.querySelector(`.task-content-input[data-edit-id="${id}"]`);if(inp){inp.focus();inp.select();}},40);}
  else if(action==='edit-estimate'){state.editingEstId=id;render();setTimeout(()=>{const inp=document.querySelector('.est-input');if(inp){inp.focus();inp.select();}},40);}
  else if(action==='breakdown'){state.breakdownId=id;document.getElementById('breakdown-input').value='';document.getElementById('breakdown-modal').style.display='flex';setTimeout(()=>document.getElementById('breakdown-input').focus(),50);}
  else if(action==='set-recurring'){openRecurringModal(id);}
  else if(action==='skip') await skipTask(id);
  else if(action==='move-tomorrow') await moveToTomorrow(id);
});

// ============================================================
//  init — check session then load
// ============================================================

(async () => {
  loadTemplates();
  if (DEV_MODE) {
    await loadIntegrationsConfig();
    document.getElementById('dev-mode-badge').style.display = 'inline-block';
    hideLogin();
    await setDate(isoToday());
    return;
  }
  try {
    const result = await apiPost({ action: 'check' });
    if (result.ok) {
      await loadIntegrationsConfig();
      hideLogin();
      await setDate(isoToday());
    } else {
      showLogin();
    }
  } catch {
    showLogin();
  }
})();

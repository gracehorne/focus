<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dashboard</title>
    <link

    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #303446;
        --surface: #292c3c;
        --surface2: #414559;
        --border: #51576d;
        --accent: #ca9ee6;
        --accent-dim: #a37fce;
        --text: #c6d0f5;
        --text-muted: #838ba7;
        --danger: #e78284;
        --success: #a6d189;
        --peach: #ef9f76;
        --radius: 6px;
        --font: "Input Sans Narrow", "SF Pro Text", system-ui, sans-serif;
        --font-mono: "Input Mono", "SF Mono", monospace;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 14px;
      }

      /* ---- login overlay ---- */

      #login-overlay {
        position: fixed;
        inset: 0;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9000;
      }

      .login-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 32px 28px;
        width: 280px;
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
      }

      .login-title {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.08em;
        color: var(--accent);
        text-transform: lowercase;
        margin-bottom: 20px;
      }

      .login-box input[type="password"] {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: var(--font);
        font-size: 14px;
        padding: 8px 12px;
        outline: none;
        margin-bottom: 10px;
      }
      .login-box input[type="password"]:focus {
        border-color: var(--accent);
      }

      #login-error {
        font-size: 11px;
        color: var(--danger);
        margin-bottom: 10px;
        min-height: 16px;
      }

      .login-btn {
        width: 100%;
        background: var(--accent-dim);
        border: none;
        border-radius: var(--radius);
        color: #303446;
        cursor: pointer;
        font-family: var(--font);
        font-size: 13px;
        font-weight: 600;
        padding: 8px;
      }
      .login-btn:hover {
        background: var(--accent);
      }

      /* ---- app shell ---- */

      #layout {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      #app-header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 11px 20px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .app-name {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: var(--accent);
        text-transform: lowercase;
      }

      .app-name-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        font: inherit;
        font-weight: 700;
        color: inherit;
      }
      .app-name-btn:hover {
        color: var(--accent-dim);
      }
      .app-name-btn:focus-visible {
        outline: 1px solid var(--accent);
        outline-offset: 3px;
        border-radius: 3px;
      }

      .date-nav {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .date-nav-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 12px;
        padding: 2px 8px;
        line-height: 1.5;
      }
      .date-nav-btn:hover {
        color: var(--text);
        border-color: var(--text-muted);
      }

      .date-label {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text-muted);
        min-width: 120px;
        text-align: center;
      }

      .today-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 2px 7px;
      }
      .today-btn:hover {
        color: var(--accent);
        border-color: var(--accent);
      }

      .calendar-config-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 2px 7px;
      }
      .calendar-config-btn:hover {
        color: var(--accent);
        border-color: var(--accent);
      }

      .sync-indicator {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-muted);
        margin-left: auto;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .sync-indicator.visible {
        opacity: 1;
      }

      .logout-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 11px;
        padding: 2px 6px;
      }
      .logout-btn:hover {
        color: var(--danger);
      }

      /* ---- two-column layout ---- */

      #columns {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      #left-col {
        flex: 1;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
        overflow: hidden;
      }

      #right-col {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: none;
        min-width: 280px;
        transition:
          min-width 0.15s,
          opacity 0.15s;
      }
      #right-col::-webkit-scrollbar {
        display: none;
      }
      #right-col.collapsed {
        flex: 0 0 0;
        min-width: 0;
        overflow: hidden;
        opacity: 0;
        pointer-events: none;
      }

      #col-resize-handle.hidden-handle {
        display: none;
      }
      #col-resize-handle {
        flex: 0 0 5px;
        background: transparent;
        cursor: col-resize;
        position: relative;
        z-index: 10;
        transition: background 0.15s;
        flex-shrink: 0;
      }
      #col-resize-handle::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: 2px;
        right: 2px;
        background: var(--border);
        opacity: 0;
        transition: opacity 0.15s;
      }
      #col-resize-handle:hover::after,
      #col-resize-handle.dragging::after {
        opacity: 1;
      }

      /* ---- tabs ---- */

      .tabs-bar {
        display: flex;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .tab {
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font);
        font-size: 12px;
        padding: 8px 14px 9px;
        letter-spacing: 0.04em;
      }
      .tab:hover {
        color: var(--text);
      }
      .tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      /* ---- quick add ---- */

      .quick-add-row {
        display: flex;
        gap: 6px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        background: var(--bg);
      }

      .quick-add-row input {
        flex: 1;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: var(--font);
        font-size: 13px;
        padding: 5px 10px;
        outline: none;
      }
      .quick-add-row input::placeholder {
        color: var(--text-muted);
        opacity: 1;
      }
      .quick-add-row input:focus {
        border-color: var(--accent);
      }

      .quick-add-btn {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--accent);
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
        padding: 2px 10px 4px;
      }
      .quick-add-btn:hover {
        background: rgba(202, 158, 230, 0.15);
      }

      /* ---- main scroll area ---- */

      #left-scroll {
        flex: 1;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }

      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }

      /* ---- task items ---- */

      .task-item {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 9px 14px;
        border-bottom: 1px solid var(--surface2);
        position: relative;
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
      }
      .task-item:hover {
        background: rgba(255, 255, 255, 0.025);
      }
      .task-item.kn-task {
        box-shadow: inset 2px 0 0 rgba(202, 158, 230, 0.35);
        padding-left: 12px;
      }
      .task-item.done-task {
        opacity: 0.72;
      }

      .task-check {
        width: 16px;
        height: 16px;
        border: none;
        cursor: pointer;
        flex-shrink: 0;
        margin-top: 1px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-family: var(--font-mono);
        color: var(--text-muted);
        transition: color 0.1s;
      }
      .task-check:hover {
        color: var(--accent);
      }
      .task-check.done {
        color: var(--success);
      }
      .task-check.passive {
        cursor: default;
        opacity: 0.9;
      }
      .task-check.passive:hover {
        color: var(--text-muted);
      }

      .task-body {
        flex: 1;
        min-width: 0;
      }

      .task-text {
        display: flex;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 5px;
        font-size: 13px;
        line-height: 1.4;
      }

      .task-content {
        flex: 1;
        min-width: 0;
        word-break: break-word;
        overflow-wrap: anywhere;
      }
      .task-item.done-task .task-content {
        text-decoration: line-through;
        opacity: 0.7;
      }

      .task-content-input {
        flex: 1;
        background: var(--surface2);
        border: 1px solid var(--accent);
        border-radius: 3px;
        color: var(--text);
        font-family: var(--font);
        font-size: 13px;
        padding: 2px 6px;
        outline: none;
        width: 100%;
      }

      .carried-badge {
        font-size: 9px;
        font-family: var(--font-mono);
        color: var(--peach);
        background: rgba(239, 159, 118, 0.11);
        border: 1px solid rgba(239, 159, 118, 0.28);
        padding: 1px 6px;
        border-radius: 8px;
        letter-spacing: 0.02em;
        flex-shrink: 0;
      }

      .doing-badge {
        font-size: 9px;
        font-family: var(--font-mono);
        color: var(--accent);
        border: 1px solid rgba(202, 158, 230, 0.4);
        border-radius: 2px;
        padding: 0 3px;
      }

      .task-meta {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 4px;
      }

      .estimate-badge {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--accent);
        background: rgba(202, 158, 230, 0.1);
        padding: 1px 8px;
        border-radius: 10px;
        cursor: pointer;
        border: 1px solid rgba(202, 158, 230, 0.25);
        user-select: none;
        letter-spacing: 0.02em;
      }
      .estimate-badge:hover {
        background: rgba(202, 158, 230, 0.2);
        border-color: rgba(202, 158, 230, 0.5);
      }
      .estimate-badge.overrun {
        background: rgba(231, 130, 132, 0.15);
        color: var(--danger);
        border-color: rgba(231, 130, 132, 0.35);
      }

      .actual-badge {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--success);
        background: rgba(166, 209, 137, 0.1);
        padding: 1px 6px;
        border-radius: 3px;
      }

      .due-badge {
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 3px;
      }
      .due-badge.overdue {
        color: var(--danger);
        background: rgba(231, 130, 132, 0.12);
      }
      .due-badge.today {
        color: var(--peach);
        background: rgba(239, 159, 118, 0.12);
      }
      .due-badge.soon {
        color: var(--text-muted);
        background: var(--surface2);
      }
      .due-badge.later {
        color: var(--text-muted);
        background: var(--surface2);
      }

      .task-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        border-radius: 3px;
        cursor: pointer;
        -webkit-user-select: none;
        user-select: none;
        flex-shrink: 0;
        color: var(--text-muted);
      }
      .task-toggle::before {
        content: "";
        display: block;
        width: 5px;
        height: 5px;
        border-right: 1.5px solid currentColor;
        border-bottom: 1.5px solid currentColor;
        transform: rotate(45deg);
        transition: transform 0.15s;
        margin-top: -2px;
      }
      .task-toggle.collapsed::before {
        transform: rotate(-45deg);
        margin-top: 0;
        margin-right: -2px;
      }
      .task-toggle:hover {
        color: var(--accent);
      }

      .task-link-arrow,
      .kn-url-arrow {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        margin-left: 4px;
        border-radius: 5px;
        background: rgba(239, 159, 118, 0.13);
        border: 1px solid rgba(239, 159, 118, 0.35);
        color: var(--peach);
        font-size: 11px;
        text-decoration: none;
        cursor: pointer;
        vertical-align: middle;
        flex-shrink: 0;
      }
      .task-link-arrow:hover,
      .kn-url-arrow:hover {
        background: rgba(239, 159, 118, 0.28);
        border-color: var(--peach);
      }

      .sched-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-muted);
        font-size: 11px;
        padding: 1px 3px;
        border-radius: 3px;
        line-height: 1;
        flex-shrink: 0;
        opacity: 0.55;
      }
      .sched-btn:hover {
        color: var(--accent);
        opacity: 1;
        background: var(--surface2);
      }
      .sched-btn.scheduled {
        color: var(--accent);
        opacity: 1;
      }

      .task-menu-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 18px;
        padding: 0 3px;
        opacity: 0;
        flex-shrink: 0;
        line-height: 1;
      }
      .task-item:hover .task-menu-btn {
        opacity: 1;
      }
      .task-menu-btn:hover {
        color: var(--text);
      }

      .inline-edit {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-top: 4px;
      }
      .inline-edit input {
        width: 80px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 11px;
        padding: 3px 7px;
        outline: none;
      }
      .inline-edit input:focus {
        border-color: var(--accent);
      }
      .inline-edit .save-btn {
        background: var(--accent-dim);
        border: none;
        border-radius: 3px;
        color: #303446;
        cursor: pointer;
        font-size: 11px;
        padding: 3px 8px;
      }
      .inline-edit .cancel-est-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 11px;
      }

      .subtask-list {
        border-left: 2px solid var(--surface2);
        margin: 0 14px 3px 36px;
      }
      .subtask-item {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 4px 8px;
      }
      .subtask-check {
        width: 13px;
        height: 13px;
        border: none;
        cursor: pointer;
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-family: var(--font-mono);
        color: var(--text-muted);
      }
      .subtask-check:hover:not(.done) {
        color: var(--accent);
      }
      .subtask-check.done {
        color: var(--success);
      }
      .subtask-text {
        font-size: 12px;
        color: var(--text-muted);
        flex: 1;
        line-height: 1.4;
        word-break: break-word;
      }
      .subtask-text.done {
        text-decoration: line-through;
        opacity: 0.45;
      }
      .subtask-input {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--accent);
        border-radius: 3px;
        color: var(--text);
        font-family: var(--font);
        font-size: 12px;
        padding: 2px 6px;
        outline: none;
      }

      .deferred-section {
        margin-top: 10px;
        border-top: 1px solid var(--border);
        padding: 7px 14px 4px;
      }
      .deferred-label {
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--peach);
        letter-spacing: 0.07em;
        text-transform: uppercase;
        margin-bottom: 4px;
        opacity: 0.7;
      }
      .deferred-item {
        font-size: 11px;
        color: var(--text-muted);
        padding: 2px 0;
        opacity: 0.45;
        text-decoration: line-through;
        text-decoration-color: rgba(239, 159, 118, 0.35);
        display: flex;
        align-items: baseline;
        gap: 6px;
      }
      .deferred-remove {
        flex-shrink: 0;
        font-size: 11px;
        color: var(--text-muted);
        cursor: pointer;
        opacity: 0;
        text-decoration: none;
        line-height: 1;
      }
      .deferred-item:hover .deferred-remove {
        opacity: 0.6;
      }
      .deferred-remove:hover {
        opacity: 1 !important;
      }

      .recurring-badge {
        font-size: 9px;
        font-family: var(--font-mono);
        color: var(--success);
        background: rgba(166, 209, 137, 0.1);
        border: 1px solid rgba(166, 209, 137, 0.28);
        padding: 1px 6px;
        border-radius: 8px;
        letter-spacing: 0.02em;
        flex-shrink: 0;
      }

      .collection-badge {
        font-size: 9px;
        font-family: var(--font-mono);
        color: var(--accent);
        background: rgba(202, 158, 230, 0.12);
        border: 1px solid rgba(202, 158, 230, 0.3);
        padding: 1px 6px;
        border-radius: 8px;
        letter-spacing: 0.02em;
        flex-shrink: 0;
        max-width: 180px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .empty-state {
        padding: 48px 20px;
        text-align: center;
        color: var(--text-muted);
        font-size: 12px;
        line-height: 1.7;
      }

      /* ---- options menu ---- */

      #options-menu {
        position: fixed;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        z-index: 500;
        min-width: 175px;
        overflow: hidden;
      }
      #options-menu button {
        display: block;
        width: 100%;
        text-align: left;
        background: none;
        border: none;
        color: var(--text);
        cursor: pointer;
        font-family: var(--font);
        font-size: 12px;
        padding: 8px 14px;
      }
      #options-menu button:hover {
        background: var(--surface2);
      }
      #options-menu button.danger {
        color: var(--danger);
      }
      #options-menu button.danger:hover {
        background: rgba(231, 130, 132, 0.1);
      }
      .menu-sep {
        height: 1px;
        background: var(--border);
        margin: 2px 0;
      }

      /* ---- kinopio inbox ---- */

      .inbox-header-bar {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 8px 14px 0;
      }

      .kn-sync-btn {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 3px 9px;
      }
      .kn-sync-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .kn-sync-btn:disabled {
        opacity: 0.45;
        cursor: default;
      }

      .inbox-space-header {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        padding: 10px 14px 4px;
        letter-spacing: 0.06em;
        text-transform: lowercase;
      }

      .inbox-item {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 7px 14px;
        border-bottom: 1px solid var(--surface2);
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
      }

      /* ---- kinopio hover tooltip ---- */
      .kn-tooltip {
        position: fixed;
        z-index: 700;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.45);
        padding: 8px 10px;
        max-width: 240px;
        min-width: 160px;
        font-size: 11px;
        pointer-events: none;
        display: none;
      }
      .kn-tooltip-title {
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        margin-bottom: 6px;
      }
      .kn-tooltip-card {
        padding: 2px 0;
        color: var(--text-muted);
        line-height: 1.45;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .kn-tooltip-card.current {
        color: var(--text);
        font-weight: 600;
      }
      .inbox-item:hover {
        background: rgba(255, 255, 255, 0.025);
      }

      .inbox-status {
        font-size: 9px;
        font-family: var(--font-mono);
        padding: 1px 4px;
        border-radius: 2px;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .inbox-status.todo {
        color: var(--text-muted);
        border: 1px solid var(--border);
      }
      .inbox-status.doing {
        color: var(--accent);
        border: 1px solid rgba(202, 158, 230, 0.4);
      }
      .inbox-status.done {
        color: var(--success);
        border: 1px solid rgba(166, 209, 137, 0.3);
      }

      .inbox-text {
        flex: 1;
        font-size: 13px;
        line-height: 1.4;
        color: var(--text);
        word-break: break-word;
      }
      .inbox-actions {
        display: flex;
        gap: 5px;
        flex-shrink: 0;
        align-items: flex-start;
      }

      .inbox-add-btn {
        background: rgba(202, 158, 230, 0.1);
        border: 1px solid rgba(202, 158, 230, 0.3);
        border-radius: 3px;
        color: var(--accent);
        cursor: pointer;
        font-size: 10px;
        padding: 2px 8px;
        white-space: nowrap;
      }
      .inbox-add-btn:hover {
        background: rgba(202, 158, 230, 0.22);
        border-color: var(--accent);
      }

      .inbox-readd-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 2px 6px;
        opacity: 0.6;
      }
      .inbox-readd-btn:hover {
        opacity: 1;
        border-color: var(--accent);
        color: var(--accent);
      }

      .inbox-done-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 10px;
        padding: 2px 8px;
      }
      .inbox-done-btn:hover {
        border-color: var(--success);
        color: var(--success);
      }

      /* ---- templates ---- */

      .template-grid {
        display: block;
        padding: 12px;
      }
      .template-sections {
        display: grid;
        gap: 14px;
        padding: 12px;
      }
      .template-section {
        display: grid;
        gap: 8px;
      }
      .template-section-title {
        font-size: 10px;
        font-family: var(--font-mono);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 2px;
      }
      .template-section-count {
        font-size: 10px;
        color: var(--text-muted);
        font-family: var(--font-mono);
        padding: 1px 6px;
        border: 1px solid var(--border);
        border-radius: 999px;
      }
      .template-section-body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .template-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 11px 12px;
        cursor: pointer;
      }
      .template-card:hover {
        border-color: var(--accent);
        background: var(--surface2);
      }
      .template-name {
        font-size: 12px;
        color: var(--text);
        line-height: 1.3;
      }
      .template-count {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        font-size: 10px;
        color: var(--text-muted);
        margin-top: 5px;
        font-family: var(--font-mono);
      }
      .template-category-badge {
        font-size: 9px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border-radius: 999px;
        padding: 1px 6px;
        border: 1px solid transparent;
      }
      .template-card.category-life {
        border-left: 3px solid #a6d189;
      }
      .template-card.category-work {
        border-left: 3px solid #8caaee;
      }
      .template-card.category-body {
        border-left: 3px solid #e5c890;
      }
      .template-card.category-mind {
        border-left: 3px solid #ca9ee6;
      }
      .template-card.category-liminal {
        border-left: 3px solid #81c8be;
      }
      .template-category-badge.category-life {
        color: #a6d189;
        border-color: rgba(166, 209, 137, 0.3);
        background: rgba(166, 209, 137, 0.12);
      }
      .template-category-badge.category-work {
        color: #8caaee;
        border-color: rgba(140, 170, 238, 0.3);
        background: rgba(140, 170, 238, 0.12);
      }
      .template-category-badge.category-body {
        color: #e5c890;
        border-color: rgba(229, 200, 144, 0.3);
        background: rgba(229, 200, 144, 0.12);
      }
      .template-category-badge.category-mind {
        color: #ca9ee6;
        border-color: rgba(202, 158, 230, 0.3);
        background: rgba(202, 158, 230, 0.12);
      }
      .template-category-badge.category-liminal {
        color: #81c8be;
        border-color: rgba(129, 200, 190, 0.3);
        background: rgba(129, 200, 190, 0.12);
      }
      .tpl-category-select {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text);
        font-family: var(--font);
        font-size: 12px;
        padding: 6px 10px;
        outline: none;
        margin-bottom: 12px;
      }
      .modal-hint {
        opacity: 0.5;
      }

      /* ---- right column ---- */

      .right-section {
        padding: 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .right-section:last-child {
        border-bottom: none;
      }
      .right-section-body {
        min-width: 0;
      }
      .right-section-body[style*="max-height"] {
        overflow: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }

      .right-section-title {
        font-size: 10px;
        font-family: var(--font-mono);
        color: var(--text-muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .right-section.collapsed .right-section-body {
        display: none;
      }
      .panel-actions {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .panel-toggle-btn {
        background: none;
        border: 1px solid transparent;
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 11px;
        padding: 2px 7px;
        line-height: 1;
      }
      .panel-toggle-btn:hover {
        color: var(--accent);
        border-color: var(--border);
      }

      .cal-refresh-btn {
        background: none;
        border: 1px solid transparent;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 11px;
        padding: 2px 7px;
        border-radius: 3px;
      }
      .cal-refresh-btn:hover {
        color: var(--accent);
      }
      .cal-refresh-btn.calendar-config-btn {
        border-color: var(--border);
      }
      .cal-refresh-btn.calendar-config-btn:hover {
        border-color: var(--accent);
      }

      .cal-event {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        padding: 3px 0;
      }
      .cal-event-time {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-muted);
        width: 96px;
        flex-shrink: 0;
        white-space: nowrap;
      }
      .cal-event-dot {
        width: 16px;
        height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        cursor: pointer;
        font-size: 13px;
        border-radius: 50%;
      }
      .cal-event-dot.type-default::before {
        content: "";
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--border);
        display: block;
      }
      .cal-event-dot.focus.type-default::before {
        background: var(--accent-dim);
      }
      .cal-event-dot:hover {
        opacity: 0.75;
      }
      .cal-event-title {
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text-muted);
      }
      .cal-event-title.focus {
        color: var(--accent);
      }
      .cal-loading {
        font-size: 11px;
        color: var(--text-muted);
        font-style: italic;
      }

      /* ---- tag palette ---- */
      .tag-palette-group {
        margin-bottom: 8px;
      }
      .tag-palette-group-label {
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        margin-bottom: 5px;
      }
      .tag-palette-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }
      .tag-chip {
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--text-muted);
        cursor: grab;
        user-select: none;
        -webkit-user-select: none;
        white-space: nowrap;
        transition: opacity 0.1s;
      }
      .tag-chip.time-chip {
        border-color: rgba(202, 158, 230, 0.35);
        color: var(--accent);
      }
      .tag-chip.dragging {
        opacity: 0.35;
      }
      .task-item.chip-drop-target {
        box-shadow: inset 0 0 0 2px var(--accent);
      }
      .task-tag {
        font-family: var(--font-mono);
        font-size: 9px;
        padding: 1px 6px;
        border-radius: 8px;
        border: 1px solid var(--border);
        color: var(--text-muted);
        background: var(--surface2);
        margin-left: 3px;
      }
      .task-tag.cat-life {
        color: #a6d189;
        border-color: rgba(166, 209, 137, 0.3);
        background: rgba(166, 209, 137, 0.12);
      }
      .task-tag.cat-work {
        color: #8caaee;
        border-color: rgba(140, 170, 238, 0.3);
        background: rgba(140, 170, 238, 0.12);
      }
      .task-tag.cat-body {
        color: #e5c890;
        border-color: rgba(229, 200, 144, 0.3);
        background: rgba(229, 200, 144, 0.12);
      }
      .task-tag.cat-mind {
        color: #ca9ee6;
        border-color: rgba(202, 158, 230, 0.3);
        background: rgba(202, 158, 230, 0.12);
      }
      .task-tag.cat-liminal {
        color: #81c8be;
        border-color: rgba(129, 200, 190, 0.3);
        background: rgba(129, 200, 190, 0.12);
      }
      .tag-remove {
        display: none;
        margin-left: 3px;
        opacity: 0.6;
        cursor: pointer;
        font-size: 10px;
        line-height: 1;
      }
      .task-tag:hover .tag-remove {
        display: inline;
      }
      .tag-remove:hover {
        opacity: 1;
      }

      .integrations-inline-section {
        display: none;
      }
      .field-error {
        border-color: var(--error, #e06c75) !important;
        box-shadow: 0 0 0 2px rgba(224, 108, 117, 0.3);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .integrations-inline-fields {
        display: grid;
        gap: 8px;
      }
      .integrations-inline-fields input {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 12px;
        padding: 8px 10px;
        outline: none;
      }
      .integrations-inline-fields input:focus {
        border-color: var(--accent);
      }
      .integrations-inline-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .integrations-inline-actions button {
        background: none;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font);
        font-size: 12px;
        padding: 6px 12px;
      }
      .integrations-inline-actions .primary {
        background: var(--accent-dim);
        border-color: var(--accent-dim);
        color: #303446;
      }
      .integrations-inline-actions button:hover:not(.primary) {
        color: var(--text);
        border-color: var(--text-muted);
      }

      .summary-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        font-size: 11px;
        color: var(--text-muted);
        font-family: var(--font-mono);
        margin-bottom: 5px;
      }

      /* ---- drag and drop ---- */
      .drag-handle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 14px;
        color: var(--text-muted);
        cursor: grab;
        font-size: 12px;
        line-height: 1;
        opacity: 0;
        flex-shrink: 0;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      .task-item:hover .drag-handle,
      .inbox-item:hover .drag-handle {
        opacity: 0.7;
      }
      .drag-handle:hover {
        color: var(--accent);
        opacity: 1 !important;
      }
      .drag-handle:active {
        cursor: grabbing;
      }

      .task-item.dragging,
      .inbox-item.dragging {
        opacity: 0.35;
      }
      .task-item.drop-above {
        box-shadow: inset 0 2px 0 0 var(--accent);
      }
      .task-item.drop-below {
        box-shadow: inset 0 -2px 0 0 var(--accent);
      }
      .inbox-item.drop-above {
        box-shadow: inset 0 2px 0 0 var(--accent);
      }
      .inbox-item.drop-below {
        box-shadow: inset 0 -2px 0 0 var(--accent);
      }

      /* ---- templates toolbar + editor ---- */
      .template-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px 0;
        flex-wrap: wrap;
      }
      .template-toolbar label {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .template-toolbar select {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text);
        font-family: var(--font);
        font-size: 12px;
        padding: 3px 8px;
        outline: none;
      }
      .template-toolbar select:focus {
        border-color: var(--accent);
      }
      .template-toolbar .new-tpl-btn {
        margin-left: auto;
        background: rgba(202, 158, 230, 0.1);
        border: 1px solid rgba(202, 158, 230, 0.3);
        border-radius: 3px;
        color: var(--accent);
        cursor: pointer;
        font-family: var(--font);
        font-size: 12px;
        padding: 3px 10px;
      }
      .template-toolbar .new-tpl-btn:hover {
        background: rgba(202, 158, 230, 0.22);
        border-color: var(--accent);
      }
      .template-toolbar .journal-prompt-btn {
        background: rgba(129, 200, 190, 0.1);
        border: 1px solid rgba(129, 200, 190, 0.3);
        border-radius: 3px;
        color: #81c8be;
        cursor: pointer;
        font-family: var(--font);
        font-size: 12px;
        padding: 3px 10px;
        margin-left: 6px;
      }
      .template-toolbar .journal-prompt-btn:hover {
        background: rgba(129, 200, 190, 0.22);
        border-color: #81c8be;
      }
      .journal-prompt-display {
        font-size: 14px;
        color: var(--text);
        line-height: 1.65;
        margin-bottom: 16px;
        min-height: 60px;
      }

      /* ---- pin badges ---- */
      /* ---- priority badge ---- */
      .pin-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 15px;
        height: 15px;
        border-radius: 3px;
        font-size: 10px;
        font-weight: 700;
        font-family: var(--font-mono);
        flex-shrink: 0;
        margin-right: 4px;
        vertical-align: middle;
        cursor: pointer;
        transition: opacity 0.1s;
      }
      .pin-empty {
        opacity: 0;
        background: none;
        border: 1px solid transparent;
        color: var(--text-muted);
      }
      .task-item:hover .pin-empty {
        opacity: 0.3;
      }
      .pin-empty:hover {
        opacity: 0.65 !important;
      }
      .pin-A {
        background: rgba(166, 218, 149, 0.18);
        color: #a6da95;
        border: 1px solid rgba(166, 218, 149, 0.3);
      }
      .pin-B {
        background: rgba(138, 173, 244, 0.18);
        color: #8aadf4;
        border: 1px solid rgba(138, 173, 244, 0.3);
      }
      .pin-C {
        background: rgba(245, 169, 127, 0.18);
        color: #f5a97f;
        border: 1px solid rgba(245, 169, 127, 0.3);
      }

      /* ---- stats tab ---- */
      .stats-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .stats-label {
        font-size: 10px;
        font-family: var(--font-mono);
        color: var(--text-muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .stats-refresh-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font);
        font-size: 11px;
        padding: 3px 10px;
      }
      .stats-refresh-btn:hover {
        color: var(--text);
        border-color: var(--text-muted);
      }
      .stats-refresh-btn:disabled {
        opacity: 0.45;
        cursor: default;
      }
      #stats-body {
        overflow-y: auto;
        flex: 1;
      }
      .stats-section {
        padding: 14px;
        border-bottom: 1px solid var(--border);
      }
      .stats-section-title {
        font-size: 10px;
        font-family: var(--font-mono);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        margin-bottom: 10px;
      }
      .stats-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 4px 0;
        border-bottom: 1px solid rgba(81, 87, 109, 0.25);
      }
      .stats-row:last-child {
        border-bottom: none;
      }
      .stats-row-label {
        color: var(--text-muted);
        font-size: 12px;
        max-width: 200px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .stats-row-value {
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 12px;
        flex-shrink: 0;
        margin-left: 8px;
      }
      .stats-big {
        font-size: 26px;
        font-family: var(--font-mono);
        color: var(--accent);
        margin-bottom: 2px;
      }
      .stats-sub {
        font-size: 11px;
        color: var(--text-muted);
        line-height: 1.5;
      }
      .stats-bar-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 0;
        font-size: 12px;
      }
      .stats-bar-label {
        color: var(--text-muted);
        min-width: 54px;
      }
      .stats-bar-track {
        flex: 1;
        height: 6px;
        background: var(--surface2);
        border-radius: 999px;
        overflow: hidden;
      }
      .stats-bar-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 999px;
        opacity: 0.65;
        transition: width 0.3s;
      }
      .stats-bar-value {
        color: var(--text-muted);
        font-family: var(--font-mono);
        font-size: 11px;
        min-width: 24px;
        text-align: right;
      }
      .stats-cache-note {
        font-size: 10px;
        color: var(--text-muted);
        padding: 8px 14px 14px;
        font-family: var(--font-mono);
        opacity: 0.6;
      }

      /* ---- zombie tab ---- */

      #zombie-body {
        overflow-y: auto;
        flex: 1;
      }
      .zombie-header {
        padding: 14px 14px 10px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .zombie-header-title {
        font-size: 11px;
        font-family: var(--font-mono);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-muted);
      }
      .zombie-header-date {
        font-size: 11px;
        font-family: var(--font-mono);
        color: var(--text-muted);
        opacity: 0.7;
      }
      .zombie-reset-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font);
        font-size: 10px;
        padding: 2px 6px;
        opacity: 0.6;
        margin-left: auto;
      }
      .zombie-reset-btn:hover {
        color: var(--danger);
        opacity: 1;
      }
      .zombie-kickoff-bar {
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .zombie-kickoff-label {
        font-size: 11px;
        color: var(--text-muted);
        flex: 1;
      }
      .zombie-start-btn {
        background: var(--accent-dim);
        border: none;
        border-radius: var(--radius);
        color: #303446;
        cursor: pointer;
        font-family: var(--font);
        font-size: 12px;
        padding: 6px 14px;
        font-weight: 600;
      }
      .zombie-start-btn:hover {
        opacity: 0.88;
      }
      .zombie-blocks {
        display: flex;
        flex-direction: column;
      }
      .zombie-block {
        padding: 14px;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 8px;
        transition: background 0.15s;
      }
      .zombie-block.active-block {
        background: rgba(202, 158, 230, 0.06);
        border-left: 3px solid var(--accent);
        padding-left: 11px;
      }
      .zombie-block.done-block {
        opacity: 0.55;
      }
      .zombie-block-head {
        display: flex;
        align-items: baseline;
        gap: 8px;
      }
      .zombie-block-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }
      .zombie-block-time {
        font-size: 11px;
        font-family: var(--font-mono);
        color: var(--text-muted);
      }
      .zombie-block-status {
        font-size: 10px;
        font-family: var(--font-mono);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 2px 7px;
        border-radius: 3px;
        margin-left: auto;
      }
      .zombie-block-status.status-pending {
        color: var(--text-muted);
        border: 1px solid var(--border);
      }
      .zombie-block-status.status-active {
        color: var(--accent);
        border: 1px solid rgba(202, 158, 230, 0.4);
        background: rgba(202, 158, 230, 0.08);
      }
      .zombie-block-status.status-complete {
        color: var(--success);
        border: 1px solid rgba(166, 209, 137, 0.4);
        background: rgba(166, 209, 137, 0.07);
      }
      .zombie-block-body {
        font-size: 12px;
        color: var(--text-muted);
        line-height: 1.5;
      }
      .zombie-block-detail {
        font-size: 12px;
        color: var(--text);
        background: var(--surface2);
        border-radius: var(--radius);
        padding: 6px 10px;
        line-height: 1.5;
      }
      .zombie-action-btn {
        align-self: flex-start;
        background: none;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font);
        font-size: 11px;
        padding: 4px 12px;
      }
      .zombie-action-btn:hover {
        color: var(--text);
        border-color: var(--text-muted);
      }
      .zombie-action-btn.primary {
        border-color: var(--accent-dim);
        color: var(--accent);
      }
      .zombie-action-btn.primary:hover {
        background: rgba(202, 158, 230, 0.1);
      }
      .zombie-movement-picker {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .zombie-movement-chip {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 99px;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font);
        font-size: 11px;
        padding: 4px 12px;
      }
      .zombie-movement-chip:hover {
        border-color: var(--text-muted);
        color: var(--text);
      }
      .zombie-movement-chip.selected {
        border-color: var(--peach);
        color: var(--peach);
        background: rgba(239, 159, 118, 0.1);
      }
      .zombie-note-input {
        width: 100%;
        box-sizing: border-box;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: var(--font);
        font-size: 12px;
        padding: 8px 10px;
        resize: vertical;
        min-height: 64px;
        outline: none;
      }
      .zombie-note-input:focus {
        border-color: var(--accent);
      }
      .zombie-list-section {
        padding: 14px;
        border-bottom: 1px solid var(--border);
      }
      .zombie-list-title {
        font-size: 10px;
        font-family: var(--font-mono);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        margin-bottom: 8px;
      }
      .zombie-list-item {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 5px 0;
        border-bottom: 1px solid rgba(81, 87, 109, 0.18);
        font-size: 12px;
      }
      .zombie-list-item:last-child {
        border-bottom: none;
      }
      .zombie-list-item-label {
        flex: 1;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .zombie-list-item-url {
        font-size: 10px;
        color: var(--text-muted);
        font-family: var(--font-mono);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 120px;
      }
      .zombie-list-del-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 13px;
        padding: 0 2px;
        line-height: 1;
        flex-shrink: 0;
      }
      .zombie-list-del-btn:hover {
        color: var(--danger);
      }
      .zombie-add-row {
        display: flex;
        gap: 6px;
        margin-top: 8px;
        flex-wrap: wrap;
      }
      .zombie-add-input {
        flex: 1;
        min-width: 0;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: var(--font);
        font-size: 12px;
        padding: 5px 9px;
        outline: none;
      }
      .zombie-add-input:focus {
        border-color: var(--accent);
      }
      .zombie-add-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--accent);
        cursor: pointer;
        font-family: var(--font);
        font-size: 12px;
        padding: 5px 12px;
        flex-shrink: 0;
      }
      .zombie-add-btn:hover {
        background: rgba(202, 158, 230, 0.1);
      }
      .zombie-preload-section {
        margin-top: 10px;
        padding: 10px;
        background: rgba(202, 158, 230, 0.05);
        border: 1px solid rgba(202, 158, 230, 0.18);
        border-radius: var(--radius);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .zombie-preload-title {
        font-size: 10px;
        font-family: var(--font-mono);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--accent);
        opacity: 0.8;
      }
      [data-theme="light"] .zombie-block.active-block {
        background: rgba(136, 57, 239, 0.04);
      }
      .zombie-drag-handle {
        color: var(--text-muted);
        cursor: grab;
        font-size: 13px;
        flex-shrink: 0;
        opacity: 0.5;
        -webkit-user-select: none;
        user-select: none;
      }
      .zombie-drag-handle:active {
        cursor: grabbing;
      }
      .zombie-list-item.zombie-drag-ghost {
        opacity: 0.4;
      }
      .zombie-list-item.zombie-drag-over {
        border-top: 2px solid var(--accent);
      }
      .zombie-times-toggle {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font);
        font-size: 11px;
        padding: 0;
        margin-left: auto;
      }
      .zombie-times-toggle:hover {
        color: var(--text);
      }
      .zombie-times-grid {
        display: grid;
        grid-template-columns: 80px 1fr auto 1fr;
        gap: 4px 6px;
        align-items: center;
        margin-top: 6px;
      }
      .zombie-times-label {
        font-size: 11px;
        color: var(--text-muted);
        font-family: var(--font-mono);
      }
      .zombie-times-sep {
        font-size: 11px;
        color: var(--text-muted);
        text-align: center;
      }
      .zombie-time-input {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 11px;
        padding: 3px 6px;
        outline: none;
        width: 100%;
        min-width: 0;
      }
      .zombie-time-input:focus {
        border-color: var(--accent);
      }
      .zombie-template-swatch {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
        display: inline-block;
      }
      .zombie-template-color-picker {
        display: flex;
        gap: 4px;
        align-items: center;
        flex-shrink: 0;
      }
      .zombie-template-color-chip {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid transparent;
        cursor: pointer;
        padding: 0;
        flex-shrink: 0;
      }
      .zombie-template-color-chip.selected,
      .zombie-template-color-chip:hover {
        border-color: var(--text);
      }

      .template-card {
        position: relative;
      }
      .template-card .tpl-edit-btn {
        position: absolute;
        top: 6px;
        right: 6px;
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 12px;
        padding: 2px 6px;
        line-height: 1;
        opacity: 0;
        border-radius: 3px;
      }
      .template-card:hover .tpl-edit-btn {
        opacity: 1;
      }
      .template-card .tpl-edit-btn:hover {
        color: var(--accent);
        background: var(--surface2);
      }
      .modal-box.wide {
        width: 420px;
        max-width: calc(100vw - 32px);
      }
      .tpl-delete-btn {
        background: none;
        border: 1px solid rgba(231, 130, 132, 0.4);
        border-radius: 3px;
        color: var(--danger);
        cursor: pointer;
        font-family: var(--font);
        font-size: 12px;
        padding: 5px 12px;
        margin-right: auto;
      }
      .tpl-delete-btn:hover {
        background: rgba(231, 130, 132, 0.12);
      }

      /* ---- modals ---- */

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .modal-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
        width: 280px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.55);
      }
      .modal-box p {
        font-size: 13px;
        margin-bottom: 12px;
        color: var(--text);
      }
      .modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }
      .modal-head p {
        margin: 0;
      }
      .modal-close-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 12px;
        line-height: 1;
        padding: 6px 9px;
        min-height: 32px;
        min-width: 32px;
      }
      .modal-close-btn:hover {
        color: var(--text);
        border-color: var(--text-muted);
      }
      .modal-label {
        font-size: 11px;
        color: var(--text-muted);
        margin-bottom: 5px;
        display: block;
      }
      .modal-box input,
      .modal-box textarea {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 12px;
        padding: 6px 10px;
        outline: none;
        margin-bottom: 12px;
      }
      .modal-box textarea {
        font-family: var(--font);
        resize: vertical;
      }
      .modal-box input:focus,
      .modal-box textarea:focus {
        border-color: var(--accent);
      }
      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }
      .modal-actions button {
        background: none;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font);
        font-size: 12px;
        padding: 5px 12px;
      }
      .modal-actions button.primary {
        background: var(--accent-dim);
        border-color: var(--accent-dim);
        color: #303446;
      }
      .modal-actions button:hover:not(.primary) {
        color: var(--text);
        border-color: var(--text-muted);
      }

      .recurring-weekdays {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        margin-bottom: 12px;
      }
      .recurring-weekdays label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--text-muted);
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 5px 7px;
        cursor: pointer;
      }
      .recurring-weekdays input {
        accent-color: var(--accent);
      }
      .recurring-helper-actions {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }
      .recurring-helper-actions button {
        background: none;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 4px 8px;
      }
      .recurring-helper-actions button:hover {
        color: var(--accent);
        border-color: var(--accent);
      }

      /* ---- toast ---- */

      #toast-container {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 2000;
        display: flex;
        flex-direction: column;
        gap: 6px;
        pointer-events: none;
      }
      .toast {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 8px 14px;
        font-size: 12px;
        color: var(--text);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        animation: toast-in 0.15s ease;
        max-width: 280px;
      }
      .toast.success {
        border-left: 3px solid var(--success);
      }
      .toast.error {
        border-left: 3px solid var(--danger);
      }
      .toast.info {
        border-left: 3px solid var(--accent);
      }
      @keyframes toast-in {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      /* ============================================================
       mobile — screens narrower than 768 px
       ============================================================ */

      @media (max-width: 768px) {
        #col-resize-handle {
          display: none;
        }

        /* --- base --- */
        html,
        body {
          font-size: 15px;
        }

        /* prevent iOS auto-zoom on input focus */
        input,
        textarea,
        select {
          font-size: 16px !important;
        }

        /* --- header --- */
        #app-header {
          padding: 8px 12px;
          gap: 8px;
          flex-wrap: wrap;
        }
        .app-name {
          font-size: 12px;
        }
        .date-label {
          min-width: 78px;
          font-size: 11px;
        }
        .date-nav-btn {
          padding: 5px 11px;
          font-size: 15px;
          min-height: 36px;
        }
        .today-btn {
          padding: 5px 10px;
          min-height: 36px;
        }
        .sync-indicator {
          display: none;
        }
        .logout-btn {
          padding: 5px 8px;
          font-size: 12px;
          min-height: 36px;
        }

        /* --- tabs: focus only --- */
        .tab[data-tab="inbox"],
        .tab[data-tab="templates"],
        .tab[data-tab="stats"] {
          display: none;
        }

        /* --- quick-add --- */
        .quick-add-row {
          padding: 10px 12px;
          gap: 8px;
        }
        .quick-add-row input {
          padding: 9px 12px;
        }
        .quick-add-btn {
          padding: 4px 14px 6px;
          font-size: 22px;
          min-width: 44px;
        }

        /* --- task items --- */
        .task-item {
          padding: 12px 12px;
          gap: 10px;
        }
        .drag-handle {
          opacity: 0.7;
          font-size: 16px;
          width: 20px;
          padding-right: 4px;
        }

        /* bigger visual checkbox */
        .task-check {
          width: 20px;
          height: 20px;
          font-size: 13px;
          border-width: 2px;
          margin-top: 0;
          flex-shrink: 0;
        }

        .task-text {
          font-size: 14px;
        }

        /* action buttons hidden on hover are useless on touch — always show them */
        .task-menu-btn {
          opacity: 1 !important;
          font-size: 20px;
          padding: 2px 8px;
        }
        .sched-btn {
          opacity: 1;
          font-size: 14px;
          padding: 3px 6px;
        }

        /* --- subtasks --- */
        .subtask-item {
          padding: 7px 8px;
          gap: 10px;
        }
        .subtask-check {
          width: 17px;
          height: 17px;
          flex-shrink: 0;
          font-size: 15px;
        }
        .subtask-text {
          font-size: 13px;
        }

        /* --- options menu --- */
        /* JS sets inline left/top; on mobile we override width and reposition via JS */
        #options-menu button {
          padding: 12px 16px;
          font-size: 14px;
        }

        /* --- modals --- */
        .modal-box {
          width: calc(100% - 32px);
          max-width: 460px;
          padding: 24px 20px;
          /* keep modals inside the viewport vertically */
          max-height: 90vh;
          overflow-y: auto;
        }
        .modal-box input,
        .modal-box textarea {
          padding: 12px 12px;
        }
        .modal-actions button {
          padding: 12px 18px;
          font-size: 14px;
          min-height: 44px;
        }

        /* --- login --- */
        .login-box {
          width: calc(100% - 40px);
          max-width: 360px;
          padding: 28px 24px;
        }
        .login-box input[type="password"] {
          padding: 10px 12px;
        }
        .login-btn {
          padding: 11px;
          font-size: 14px;
        }

        /* --- toast: span full width --- */
        #toast-container {
          bottom: 16px;
          right: 12px;
          left: 12px;
        }
        .toast {
          max-width: 100%;
        }

        /* --- right col --- */
        .right-section {
          padding: 14px 14px;
        }
        .cal-event-time {
          font-size: 10px;
          width: 76px;
        }
        .calendar-config-btn {
          padding: 5px 10px;
          font-size: 11px;
          min-height: 30px;
        }

        /* --- template grid: single column --- */
        .template-grid {
          display: block;
          padding: 12px;
        }
        .template-sections {
          gap: 12px;
          padding: 12px;
        }
        .template-section-body {
          grid-template-columns: 1fr;
        }
        .template-card {
          padding: 14px 14px;
        }
        .template-name {
          font-size: 13px;
        }

        /* --- inbox --- */
        .inbox-item {
          padding: 10px 14px;
        }
        .inbox-item .drag-handle {
          opacity: 0.7;
          font-size: 16px;
          width: 20px;
          padding-right: 4px;
        }
        .inbox-text {
          font-size: 14px;
        }
        .inbox-add-btn,
        .inbox-done-btn,
        .inbox-readd-btn {
          padding: 6px 10px;
          font-size: 11px;
          min-height: 30px;
        }
      }

      /* ---- tag filter bar ---- */
      #tag-filter-bar {
        display: none;
        align-items: center;
        gap: 6px;
        padding: 5px 14px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        flex-wrap: wrap;
      }
      #tag-filter-bar.active {
        display: flex;
      }
      .tag-filter-label {
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        flex-shrink: 0;
      }
      .tag-filter-chip {
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 1px 8px;
        border-radius: 10px;
        border: 1px solid var(--accent);
        background: rgba(136, 57, 239, 0.15);
        color: var(--accent);
        cursor: pointer;
      }
      .tag-filter-clear {
        font-family: var(--font-mono);

    <script>
      "use strict";

      // ============================================================
      //  constants & pre-compiled regexes
      // ============================================================

      // Pre-compiled regex patterns for performance
      const TIME_REGEX_HM = /^(\d{1,2}):(\d{2})$/;
      const TIME_REGEX_HMAM = /^(\d{1,2}):(\d{2})(am|pm)$/;
      const TIME_REGEX_HAM = /^(\d{1,2})(am|pm)$/;
      const TIME_REGEX_H = /^(\d{1,2})$/;
      const MINUTES_REGEX_H = /(\d+(?:\.\d+)?)\s*h/i;
      const MINUTES_REGEX_M = /(\d+)\s*m(?!o)/i;
      const LINK_REGEX = /(\[[^\]]+\]\([^)]+\)|https?:\/\/[^\s]+)/g;
      const WEEKLY_SINGLE = /^weekly:(\d)$/;
      const WEEKLY_MANY = /^weekly:([0-6](?:,[0-6])*)$/;

      // dev mode: open focus.html?dev=1 to skip login and stub the backend with localStorage.
      // intended for local testing only — no server/DB/webhook needed.
      const DEV_MODE = new URLSearchParams(location.search).has("dev");

      // ---- theme ----
      const THEME_KEY = "df-theme";
      function getTheme() {
        return localStorage.getItem(THEME_KEY) || "dark";
      }
      function setTheme(t) {
        localStorage.setItem(THEME_KEY, t);
        document.documentElement.setAttribute("data-theme", t === "light" ? "light" : "");
        const btn = document.getElementById("theme-toggle-btn");
        if (btn) btn.innerHTML = t === "light" ? "&#x263d;" : "&#x263c;";
        btn.title = t === "light" ? "switch to dark mode" : "switch to light mode";
      }

      // ---- calendar event types ----
      const CAL_EVENT_TYPES_KEY = "df-cal-event-types";
      const CAL_EVENT_TYPE_DEFS = {
        default: { icon: null, color: null },
        movement: { icon: "bi-person-arms-up", color: "#e5c890" },
        focus: { icon: "bi-bell-slash-fill", color: "#ca9ee6" },
        meal: { icon: "bi-egg-fried", color: "#ef9f76" },
        social: { icon: "bi-emoji-smile-fill", color: "#81c8be" },
        hobby: { icon: "bi-palette", color: "#ca9ee6" },
        meeting: { icon: "bi-person-fill", color: "#8caaee" },
        work: { icon: "bi-buildings-fill", color: "#8caaee" },
      };
      const CAL_EVENT_TYPE_ORDER = [
        "default",
        "movement",
        "focus",
        "meal",
        "social",
        "hobby",
        "meeting",
        "work",
      ];
      function getCalEventTypes() {
        try {
          return JSON.parse(localStorage.getItem(CAL_EVENT_TYPES_KEY) || "{}");
        } catch {
          return {};
        }
      }
      function setCalEventType(evId, type) {
        const types = getCalEventTypes();
        types[evId] = type;
        localStorage.setItem(CAL_EVENT_TYPES_KEY, JSON.stringify(types));
      }

      // Integration config is loaded at runtime (local/account/runtime), not hardcoded here.

      const INTEGRATIONS_STORE_KEY = "df-integrations-config";
      const INTEGRATIONS_ACCOUNT_KEY = "__integrations__";
      const WEBHOOK_QUEUE_KEY = "df-webhook-queue";

      let LOG_WEBHOOK_URL = "";
      let GCAL_SCRIPT_URL = "";
      let KN_API_KEY = "";
      const KN_HIDDEN_SPACES = new Set(["inbox"]);
      const KN_LIST_STATUS_MAP = {
        todo: "TODO",
        active: "DOING",
        doing: "DOING",
        now: "NOW",
        later: "LATER",
        waiting: "WAITING",
        done: "DONE",
        canceled: "CANCELED",
        cancelled: "CANCELED",
      };

      // recurring tasks store key — entries: { id, content, recurrence, estimate, priority }
      // recurrence: 'daily' | 'weekdays' | 'weekly:<0-6>' (0=Sun)
      const RECURRING_STORE_KEY = "df-recurring-tasks";

      const TEMPLATE_CATEGORIES = [
        { id: "life", label: "life" },
        { id: "work", label: "work" },
        { id: "body", label: "body" },
        { id: "mind", label: "mind" },
        { id: "liminal", label: "liminal" },
      ];

      const TEMPLATE_CATEGORY_ORDER = TEMPLATE_CATEGORIES.map((category) => category.id);

      function normalizeTemplateCategory(value, name = "", tasks = []) {
        const raw = String(value || "")
          .trim()
          .toLowerCase();
        if (TEMPLATE_CATEGORIES.some((category) => category.id === raw)) return raw;
        const haystack =
          `${name || ""} ${Array.isArray(tasks) ? tasks.join(" ") : ""}`.toLowerCase();
        if (/(liminal|transition|reset|arrival|departure|threshold|ritual|shutdown)/.test(haystack))
          return "liminal";
        if (
          /(journal|brain dump|weekly review|read|review|reflection|writing session|peer review|data analysis|inbox zero)/.test(
            haystack,
          )
        )
          return "mind";
        if (
          /(movement|stretch|pt|workout|exercise|run|yoga|cycle|calf|quad|hamstring|body)/.test(
            haystack,
          )
        )
          return "body";
        if (/(work|meeting|project|draft|blog|email|inbox|frog|analysis|task|write)/.test(haystack))
          return "work";
        return "life";
      }

      function getTemplateCategoryMeta(category) {
        return TEMPLATE_CATEGORIES.find((entry) => entry.id === category) || TEMPLATE_CATEGORIES[0];
      }

      const DEFAULT_TEMPLATES = [
        {
          id: "morning-routine",
          name: "morning routine",
          category: "life",
          tasks: [
            "go outside before checking your phone",
            "drink a glass of water",
            "do one quiet thing before the day starts: stretch, journal, sit with your coffee",
            "set one intention for today",
          ],
        },
        {
          id: "shutdown-routine",
          name: "shutdown routine",
          category: "life",
          tasks: [
            "close tabs and apps",
            "write down what tomorrow needs from you",
            "write down anything still on your mind",
            "leave your workspace. physically step away",
            "name one thing that went okay today",
          ],
        },
        {
          id: "tomorrow-prep",
          name: "tomorrow prep",
          category: "life",
          tasks: [
            "pack your bag or lay out what you'll need",
            "set out clothes for tomorrow",
            "prep or plan lunch so morning-you doesn't have to decide",
            "check your calendar: what's the first thing tomorrow?",
            "write one thing you want to remember to do first",
            "charge your phone and anything else that needs it",
            "close out today: tabs, apps, kitchen, whatever feels open",
          ],
        },
        {
          id: "house-cleaning",
          name: "house cleaning",
          category: "life",
          tasks: [
            "start with the most visible mess",

      function isPlaceholderSecret(value) {
        const v = String(value || "")
          .trim()
          .toLowerCase();
        if (!v) return true;
        return (
          v === "your-logging-gas-url-here" ||
          v === "your-calendar-gas-url-here" ||
          v === "your-kanboard-api-key-here" ||
          v.includes("your-script-id") ||
          v.includes("your-calendar-script-id")
        );
      }

      function normalizeSecret(value) {
        const trimmed = String(value || "").trim();
        return isPlaceholderSecret(trimmed) ? "" : trimmed;
      }

      function normalizeMobileInput(value) {
        return String(value || "")
          .replace(/[\u200B-\u200D\uFEFF]/g, "")
          .replace(/[\u2018\u2019]/g, "'")
          .replace(/[\u201C\u201D]/g, '"')
          .replace(/\s+/g, " ")
          .trim();
      }

      function isGoogleAppsScriptUrl(value) {
        const v = String(value || "").trim();
        if (!v) return false;
        try {
          const u = new URL(v);
          if (u.protocol !== "https:") return false;
          if (u.hostname !== "script.google.com") return false;
          return /\/macros\/s\/.+\/(exec|dev)\/?$/i.test(u.pathname);
        } catch {
          return false;
        }
      }

      function isGoogleSheetUrl(value) {
        const v = String(value || "").trim();
        if (!v) return false;
        try {
          const u = new URL(v);
          return u.hostname === "docs.google.com" && /^\/spreadsheets\//i.test(u.pathname);
        } catch {
          return false;
        }
      }

      function getWebhookValidationError(value) {
        if (!value) return "";
        if (isGoogleSheetUrl(value)) {
          return "time tracking webhook must be a Google Apps Script web app URL, not a sheet URL";
        }
        if (!isGoogleAppsScriptUrl(value)) {
          return "time tracking webhook URL must look like script.google.com/macros/s/.../exec";
        }
        return "";
      }

        LOG_WEBHOOK_URL = normalizeSecret(config.LOG_WEBHOOK_URL);
        GCAL_SCRIPT_URL = normalizeSecret(config.GCAL_SCRIPT_URL);
        KN_API_KEY = normalizeSecret(config.KN_API_KEY);

      function firstNonEmpty(...values) {
        for (const value of values) {
          const trimmed = String(value || "").trim();
          if (trimmed) return trimmed;
        }
        return "";
      }

      function firstConfigured(...values) {
        for (const value of values) {
          const normalized = normalizeSecret(value);
          if (normalized) return normalized;
        }
        return "";
      }

      async function loadAccountIntegrationsConfig() {
        if (DEV_MODE) return {};
        try {
          const result = await apiPost({ action: "get_tasks", date: INTEGRATIONS_ACCOUNT_KEY });
          const entry = Array.isArray(result.tasks)
            ? result.tasks.find(
                (task) => task && typeof task.content === "string" && task.content.trim(),
              )
            : null;
          if (!entry) return {};
          const parsed = JSON.parse(entry.content);
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch {
          return {};
        }
      }

      async function loadIntegrationsConfig() {
        const runtime = getRuntimeIntegrationsConfig();
        const local = getLocalIntegrationsConfig();
        const account = await loadAccountIntegrationsConfig();
        applyIntegrationsConfig({
          LOG_WEBHOOK_URL: firstConfigured(
            local.LOG_WEBHOOK_URL,
            account.LOG_WEBHOOK_URL,
            runtime.LOG_WEBHOOK_URL,
          ),
          GCAL_SCRIPT_URL: firstConfigured(
            local.GCAL_SCRIPT_URL,
            account.GCAL_SCRIPT_URL,
            runtime.GCAL_SCRIPT_URL,
          ),
          KN_API_KEY: firstConfigured(local.KN_API_KEY, account.KN_API_KEY, runtime.KN_API_KEY),
        });

      async function saveIntegrationsConfig() {
        const payload = {
          LOG_WEBHOOK_URL: LOG_WEBHOOK_URL || "",
          GCAL_SCRIPT_URL: GCAL_SCRIPT_URL || "",
          KN_API_KEY: KN_API_KEY || "",
        };
        let savedToBackend = false;
        let savedLocally = false;
        try {
          localStorage.setItem(INTEGRATIONS_STORE_KEY, JSON.stringify(payload));
          savedLocally = true;
        } catch {}
        if (!savedLocally) {
          try {
            sessionStorage.setItem(INTEGRATIONS_STORE_KEY, JSON.stringify(payload));
            savedLocally = true;
          } catch {}
        }
        if (!DEV_MODE) {
          try {
            await apiPost({
              action: "save_tasks",
              date: INTEGRATIONS_ACCOUNT_KEY,
              tasks: [
                {
                  id: "integrations-config",
                  content: JSON.stringify(payload),
                  marker: "META",

                  fromKinopio: false,

                  defers: 0,
                },
              ],
            });
            savedToBackend = true;
          } catch (err) {
            console.warn("[df] Failed to save integrations to backend:", err.message);
          }
        }
        return { payload, savedLocally, savedToBackend };
      }

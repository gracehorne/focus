<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>daily focus</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cellipse cx='20' cy='24' rx='16' ry='10' fill='%23ca9ee6' opacity='0.85' transform='rotate(-20 20 24)'/%3E%3Cellipse cx='44' cy='24' rx='16' ry='10' fill='%23a37fce' opacity='0.85' transform='rotate(20 44 24)'/%3E%3Cellipse cx='18' cy='42' rx='12' ry='8' fill='%23ca9ee6' opacity='0.7' transform='rotate(15 18 42)'/%3E%3Cellipse cx='46' cy='42' rx='12' ry='8' fill='%23a37fce' opacity='0.7' transform='rotate(-15 46 42)'/%3E%3Cellipse cx='32' cy='32' rx='3' ry='18' fill='%23414559'/%3E%3Ccircle cx='32' cy='14' r='3' fill='%23414559'/%3E%3Cline x1='30' y1='14' x2='22' y2='6' stroke='%23414559' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='34' y1='14' x2='42' y2='6' stroke='%23414559' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #303446;
        --surface: #292c3c;
        --surface2: #414559;
        --border: #51576d;
        --accent: #ca9ee6;
        --accent-dim: #a37fce;
        --text: #c6d0f5;
        --text-muted: #838ba7;
        --danger: #e78284;
        --success: #a6d189;
        --peach: #ef9f76;
        --radius: 6px;
        --font: "Input Sans Narrow", "SF Pro Text", system-ui, sans-serif;
        --font-mono: "Input Mono", "SF Mono", monospace;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 14px;
      }

      /* ---- login overlay ---- */

      #login-overlay {
        position: fixed;
        inset: 0;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9000;
      }

      .login-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 32px 28px;
        width: 280px;
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
      }

      .login-title {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.08em;
        color: var(--accent);
        text-transform: lowercase;
        margin-bottom: 20px;
      }

      .login-box input[type="password"] {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: var(--font);
        font-size: 14px;
        padding: 8px 12px;
        outline: none;
        margin-bottom: 10px;
      }
      .login-box input[type="password"]:focus {
        border-color: var(--accent);
      }

      #login-error {
        font-size: 11px;
        color: var(--danger);
        margin-bottom: 10px;
        min-height: 16px;
      }

      .login-btn {
        width: 100%;
        background: var(--accent-dim);
        border: none;
        border-radius: var(--radius);
        color: #303446;
        cursor: pointer;
        font-family: var(--font);
        font-size: 13px;
        font-weight: 600;
        padding: 8px;
      }
      .login-btn:hover {
        background: var(--accent);
      }

      /* ---- app shell ---- */

      #layout {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      #app-header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 11px 20px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .app-name {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: var(--accent);
        text-transform: lowercase;
      }

      .app-name-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        font: inherit;
        font-weight: 700;
        color: inherit;
      }
      .app-name-btn:hover {
        color: var(--accent-dim);
      }
      .app-name-btn:focus-visible {
        outline: 1px solid var(--accent);
        outline-offset: 3px;
        border-radius: 3px;
      }

      .date-nav {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .date-nav-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 12px;
        padding: 2px 8px;
        line-height: 1.5;
      }
      .date-nav-btn:hover {
        color: var(--text);
        border-color: var(--text-muted);
      }

      .date-label {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text-muted);
        min-width: 120px;
        text-align: center;
      }

      .today-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 2px 7px;
      }
      .today-btn:hover {
        color: var(--accent);
        border-color: var(--accent);
      }

      .calendar-config-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 2px 7px;
      }
      .calendar-config-btn:hover {
        color: var(--accent);
        border-color: var(--accent);
      }

      .sync-indicator {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-muted);
        margin-left: auto;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .sync-indicator.visible {
        opacity: 1;
      }

      .logout-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 11px;
        padding: 2px 6px;
      }
      .logout-btn:hover {
        color: var(--danger);
      }

      /* ---- two-column layout ---- */

      #columns {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      #left-col {
        flex: 0 0 62%;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
        overflow: hidden;
      }

      #right-col {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
        min-width: 0;
        transition: min-width 0.15s, opacity 0.15s;
      }
      #right-col.collapsed {
        flex: 0 0 0;
        overflow: hidden;
        opacity: 0;
        pointer-events: none;
      }

      #col-resize-handle {
        flex: 0 0 5px;
        background: transparent;
        cursor: col-resize;
        position: relative;
        z-index: 10;
        transition: background 0.15s;
        flex-shrink: 0;
      }
      #col-resize-handle::after {
        content: "";
        position: absolute;
        top: 0; bottom: 0;
        left: 2px; right: 2px;
        background: var(--border);
        opacity: 0;
        transition: opacity 0.15s;
      }
      #col-resize-handle:hover::after,
      #col-resize-handle.dragging::after {
        opacity: 1;
      }

      /* ---- tabs ---- */

      .tabs-bar {
        display: flex;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .tab {
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font);
        font-size: 12px;
        padding: 8px 14px 9px;
        letter-spacing: 0.04em;
      }
      .tab:hover {
        color: var(--text);
      }
      .tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      /* ---- quick add ---- */

      .quick-add-row {
        display: flex;
        gap: 6px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        background: var(--bg);
      }

      .quick-add-row input {
        flex: 1;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: var(--font);
        font-size: 13px;
        padding: 5px 10px;
        outline: none;
      }
      .quick-add-row input::placeholder {
        color: var(--text-muted);
        opacity: 1;
      }
      .quick-add-row input:focus {
        border-color: var(--accent);
      }

      .quick-add-btn {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--accent);
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
        padding: 2px 10px 4px;
      }
      .quick-add-btn:hover {
        background: rgba(202, 158, 230, 0.15);
      }

      /* ---- main scroll area ---- */

      #left-scroll {
        flex: 1;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }

      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }

      /* ---- task items ---- */

      .task-item {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 9px 14px;
        border-bottom: 1px solid var(--surface2);
        position: relative;
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
      }
      .task-item:hover {
        background: rgba(255, 255, 255, 0.025);
      }
      .task-item.kn-task {
        box-shadow: inset 2px 0 0 rgba(202, 158, 230, 0.35);
        padding-left: 12px;
      }
      .task-item.done-task {
        opacity: 0.72;
      }

      .task-check {
        width: 16px;
        height: 16px;
        border: none;
        cursor: pointer;
        flex-shrink: 0;
        margin-top: 1px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-family: var(--font-mono);
        color: var(--text-muted);
        transition: color 0.1s;
      }
      .task-check:hover {
        color: var(--accent);
      }
      .task-check.done {
        color: var(--success);
      }
      .task-check.passive {
        cursor: default;
        opacity: 0.9;
      }
      .task-check.passive:hover {
        color: var(--text-muted);
      }

      .task-body {
        flex: 1;
        min-width: 0;
      }

      .task-text {
        display: flex;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 5px;
        font-size: 13px;
        line-height: 1.4;
      }

      .task-content {
        flex: 1;
        min-width: 0;
        word-break: break-word;
        overflow-wrap: anywhere;
      }
      .task-item.done-task .task-content {
        text-decoration: line-through;
        opacity: 0.7;
      }

      .task-content-input {
        flex: 1;
        background: var(--surface2);
        border: 1px solid var(--accent);
        border-radius: 3px;
        color: var(--text);
        font-family: var(--font);
        font-size: 13px;
        padding: 2px 6px;
        outline: none;
        width: 100%;
      }

      .carried-badge {
        font-size: 9px;
        font-family: var(--font-mono);
        color: var(--peach);
        background: rgba(239, 159, 118, 0.11);
        border: 1px solid rgba(239, 159, 118, 0.28);
        padding: 1px 6px;
        border-radius: 8px;
        letter-spacing: 0.02em;
        flex-shrink: 0;
      }

      .doing-badge {
        font-size: 9px;
        font-family: var(--font-mono);
        color: var(--accent);
        border: 1px solid rgba(202, 158, 230, 0.4);
        border-radius: 2px;
        padding: 0 3px;
      }

      .task-meta {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 4px;
      }

      .estimate-badge {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--accent);
        background: rgba(202, 158, 230, 0.1);
        padding: 1px 8px;
        border-radius: 10px;
        cursor: pointer;
        border: 1px solid rgba(202, 158, 230, 0.25);
        user-select: none;
        letter-spacing: 0.02em;
      }
      .estimate-badge:hover {
        background: rgba(202, 158, 230, 0.2);
        border-color: rgba(202, 158, 230, 0.5);
      }
      .estimate-badge.overrun {
        background: rgba(231, 130, 132, 0.15);
        color: var(--danger);
        border-color: rgba(231, 130, 132, 0.35);
      }

      .actual-badge {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--success);
        background: rgba(166, 209, 137, 0.1);
        padding: 1px 6px;
        border-radius: 3px;
      }

      .due-badge {
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 3px;
      }
      .due-badge.overdue {
        color: var(--danger);
        background: rgba(231, 130, 132, 0.12);
      }
      .due-badge.today {
        color: var(--peach);
        background: rgba(239, 159, 118, 0.12);
      }
      .due-badge.soon {
        color: var(--text-muted);
        background: var(--surface2);
      }
      .due-badge.later {
        color: var(--text-muted);
        background: var(--surface2);
      }

      .task-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        border-radius: 3px;
        cursor: pointer;
        -webkit-user-select: none;
        user-select: none;
        flex-shrink: 0;
        color: var(--text-muted);
      }
      .task-toggle::before {
        content: "";
        display: block;
        width: 5px;
        height: 5px;
        border-right: 1.5px solid currentColor;
        border-bottom: 1.5px solid currentColor;
        transform: rotate(45deg);
        transition: transform 0.15s;
        margin-top: -2px;
      }
      .task-toggle.collapsed::before {
        transform: rotate(-45deg);
        margin-top: 0;
        margin-right: -2px;
      }
      .task-toggle:hover {
        color: var(--accent);
      }

      .task-link-arrow,
      .kn-url-arrow {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        margin-left: 4px;
        border-radius: 5px;
        background: rgba(239, 159, 118, 0.13);
        border: 1px solid rgba(239, 159, 118, 0.35);
        color: var(--peach);
        font-size: 11px;
        text-decoration: none;
        cursor: pointer;
        vertical-align: middle;
        flex-shrink: 0;
      }
      .task-link-arrow:hover,
      .kn-url-arrow:hover {
        background: rgba(239, 159, 118, 0.28);
        border-color: var(--peach);
      }

      .sched-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-muted);
        font-size: 11px;
        padding: 1px 3px;
        border-radius: 3px;
        line-height: 1;
        flex-shrink: 0;
        opacity: 0.55;
      }
      .sched-btn:hover {
        color: var(--accent);
        opacity: 1;
        background: var(--surface2);
      }
      .sched-btn.scheduled {
        color: var(--accent);
        opacity: 1;
      }

      .task-menu-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 18px;
        padding: 0 3px;
        opacity: 0;
        flex-shrink: 0;
        line-height: 1;
      }
      .task-item:hover .task-menu-btn {
        opacity: 1;
      }
      .task-menu-btn:hover {
        color: var(--text);
      }

      .inline-edit {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-top: 4px;
      }
      .inline-edit input {
        width: 80px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 11px;
        padding: 3px 7px;
        outline: none;
      }
      .inline-edit input:focus {
        border-color: var(--accent);
      }
      .inline-edit .save-btn {
        background: var(--accent-dim);
        border: none;
        border-radius: 3px;
        color: #303446;
        cursor: pointer;
        font-size: 11px;
        padding: 3px 8px;
      }
      .inline-edit .cancel-est-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 11px;
      }

      .subtask-list {
        border-left: 2px solid var(--surface2);
        margin: 0 14px 3px 36px;
      }
      .subtask-item {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 4px 8px;
      }
      .subtask-check {
        width: 13px;
        height: 13px;
        border: none;
        cursor: pointer;
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-family: var(--font-mono);
        color: var(--text-muted);
      }
      .subtask-check:hover:not(.done) {
        color: var(--accent);
      }
      .subtask-check.done {
        color: var(--success);
      }
      .subtask-text {
        font-size: 12px;
        color: var(--text-muted);
        flex: 1;
        line-height: 1.4;
        word-break: break-word;
      }
      .subtask-text.done {
        text-decoration: line-through;
        opacity: 0.45;
      }
      .subtask-input {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--accent);
        border-radius: 3px;
        color: var(--text);
        font-family: var(--font);
        font-size: 12px;
        padding: 2px 6px;
        outline: none;
      }

      .deferred-section {
        margin-top: 10px;
        border-top: 1px solid var(--border);
        padding: 7px 14px 4px;
      }
      .deferred-label {
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--peach);
        letter-spacing: 0.07em;
        text-transform: uppercase;
        margin-bottom: 4px;
        opacity: 0.7;
      }
      .deferred-item {
        font-size: 11px;
        color: var(--text-muted);
        padding: 2px 0;
        opacity: 0.45;
        text-decoration: line-through;
        text-decoration-color: rgba(239, 159, 118, 0.35);
      }

      .recurring-badge {
        font-size: 9px;
        font-family: var(--font-mono);
        color: var(--success);
        background: rgba(166, 209, 137, 0.1);
        border: 1px solid rgba(166, 209, 137, 0.28);
        padding: 1px 6px;
        border-radius: 8px;
        letter-spacing: 0.02em;
        flex-shrink: 0;
      }

      .collection-badge {
        font-size: 9px;
        font-family: var(--font-mono);
        color: var(--accent);
        background: rgba(202, 158, 230, 0.12);
        border: 1px solid rgba(202, 158, 230, 0.3);
        padding: 1px 6px;
        border-radius: 8px;
        letter-spacing: 0.02em;
        flex-shrink: 0;
        max-width: 180px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .empty-state {
        padding: 48px 20px;
        text-align: center;
        color: var(--text-muted);
        font-size: 12px;
        line-height: 1.7;
      }

      /* ---- options menu ---- */

      #options-menu {
        position: fixed;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        z-index: 500;
        min-width: 175px;
        overflow: hidden;
      }
      #options-menu button {
        display: block;
        width: 100%;
        text-align: left;
        background: none;
        border: none;
        color: var(--text);
        cursor: pointer;
        font-family: var(--font);
        font-size: 12px;
        padding: 8px 14px;
      }
      #options-menu button:hover {
        background: var(--surface2);
      }
      #options-menu button.danger {
        color: var(--danger);
      }
      #options-menu button.danger:hover {
        background: rgba(231, 130, 132, 0.1);
      }
      .menu-sep {
        height: 1px;
        background: var(--border);
        margin: 2px 0;
      }

      /* ---- kinopio inbox ---- */

      .inbox-header-bar {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 8px 14px 0;
      }

      .kn-sync-btn {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 3px 9px;
      }
      .kn-sync-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .kn-sync-btn:disabled {
        opacity: 0.45;
        cursor: default;
      }

      .inbox-space-header {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        padding: 10px 14px 4px;
        letter-spacing: 0.06em;
        text-transform: lowercase;
      }

      .inbox-item {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 7px 14px;
        border-bottom: 1px solid var(--surface2);
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
      }

      /* ---- kinopio hover tooltip ---- */
      .kn-tooltip {
        position: fixed;
        z-index: 700;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: 0 4px 20px rgba(0,0,0,0.45);
        padding: 8px 10px;
        max-width: 240px;
        min-width: 160px;
        font-size: 11px;
        pointer-events: none;
        display: none;
      }
      .kn-tooltip-title {
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        margin-bottom: 6px;
      }
      .kn-tooltip-card {
        padding: 2px 0;
        color: var(--text-muted);
        line-height: 1.45;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .kn-tooltip-card.current {
        color: var(--text);
        font-weight: 600;
      }
      .inbox-item:hover {
        background: rgba(255, 255, 255, 0.025);
      }

      .inbox-status {
        font-size: 9px;
        font-family: var(--font-mono);
        padding: 1px 4px;
        border-radius: 2px;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .inbox-status.todo {
        color: var(--text-muted);
        border: 1px solid var(--border);
      }
      .inbox-status.doing {
        color: var(--accent);
        border: 1px solid rgba(202, 158, 230, 0.4);
      }
      .inbox-status.done {
        color: var(--success);
        border: 1px solid rgba(166, 209, 137, 0.3);
      }

      .inbox-text {
        flex: 1;
        font-size: 13px;
        line-height: 1.4;
        color: var(--text);
        word-break: break-word;
      }
      .inbox-actions {
        display: flex;
        gap: 5px;
        flex-shrink: 0;
        align-items: flex-start;
      }

      .inbox-add-btn {
        background: rgba(202, 158, 230, 0.1);
        border: 1px solid rgba(202, 158, 230, 0.3);
        border-radius: 3px;
        color: var(--accent);
        cursor: pointer;
        font-size: 10px;
        padding: 2px 8px;
        white-space: nowrap;
      }
      .inbox-add-btn:hover {
        background: rgba(202, 158, 230, 0.22);
        border-color: var(--accent);
      }

      .inbox-readd-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 2px 6px;
        opacity: 0.6;
      }
      .inbox-readd-btn:hover {
        opacity: 1;
        border-color: var(--accent);
        color: var(--accent);
      }

      .inbox-done-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 10px;
        padding: 2px 8px;
      }
      .inbox-done-btn:hover {
        border-color: var(--success);
        color: var(--success);
      }

      /* ---- templates ---- */

      .template-grid {
        display: block;
        padding: 12px;
      }
      .template-sections {
        display: grid;
        gap: 14px;
        padding: 12px;
      }
      .template-section {
        display: grid;
        gap: 8px;
      }
      .template-section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 10px;
        font-family: var(--font-mono);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-muted);
      }
      .template-section-count {
        font-size: 10px;
        color: var(--text-muted);
        font-family: var(--font-mono);
        padding: 1px 6px;
        border: 1px solid var(--border);
        border-radius: 999px;
      }
      .template-section-body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .template-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 11px 12px;
        cursor: pointer;
      }
      .template-card:hover {
        border-color: var(--accent);
        background: var(--surface2);
      }
      .template-name {
        font-size: 12px;
        color: var(--text);
        line-height: 1.3;
      }
      .template-count {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        font-size: 10px;
        color: var(--text-muted);
        margin-top: 5px;
        font-family: var(--font-mono);
      }
      .template-category-badge {
        font-size: 9px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border-radius: 999px;
        padding: 1px 6px;
        border: 1px solid transparent;
      }
      .template-card.category-life {
        border-left: 3px solid #a6d189;
      }
      .template-card.category-work {
        border-left: 3px solid #8caaee;
      }
      .template-card.category-body {
        border-left: 3px solid #ef9f76;
      }
      .template-card.category-mind {
        border-left: 3px solid #ca9ee6;
      }
      .template-card.category-liminal {
        border-left: 3px solid #e5c890;
      }
      .template-category-badge.category-life {
        color: #a6d189;
        border-color: rgba(166, 209, 137, 0.3);
        background: rgba(166, 209, 137, 0.12);
      }
      .template-category-badge.category-work {
        color: #8caaee;
        border-color: rgba(140, 170, 238, 0.3);
        background: rgba(140, 170, 238, 0.12);
      }
      .template-category-badge.category-body {
        color: #ef9f76;
        border-color: rgba(239, 159, 118, 0.3);
        background: rgba(239, 159, 118, 0.12);
      }
      .template-category-badge.category-mind {
        color: #ca9ee6;
        border-color: rgba(202, 158, 230, 0.3);
        background: rgba(202, 158, 230, 0.12);
      }
      .template-category-badge.category-liminal {
        color: #e5c890;
        border-color: rgba(229, 200, 144, 0.3);
        background: rgba(229, 200, 144, 0.12);
      }
      .tpl-category-select {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text);
        font-family: var(--font);
        font-size: 12px;
        padding: 6px 10px;
        outline: none;
        margin-bottom: 12px;
      }
      .modal-hint {
        opacity: 0.5;
      }

      /* ---- right column ---- */

      .right-section {
        padding: 16px;
        border-bottom: 1px solid var(--border);
      }
      .right-section:last-child {
        border-bottom: none;
      }
      .right-section-body {
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }
      .section-resize-handle {
        height: 5px;
        margin: 6px -16px -16px;
        cursor: ns-resize;
        background: transparent;
        transition: background 0.15s;
        flex-shrink: 0;
      }
      .section-resize-handle:hover,
      .section-resize-handle.dragging {
        background: var(--border);
      }

      .right-section-title {
        font-size: 10px;
        font-family: var(--font-mono);
        color: var(--text-muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .right-section.collapsed .right-section-body {
        display: none;
      }
      .panel-actions {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .panel-toggle-btn {
        background: none;
        border: 1px solid transparent;
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 11px;
        padding: 2px 7px;
        line-height: 1;
      }
      .panel-toggle-btn:hover {
        color: var(--accent);
        border-color: var(--border);
      }

      .cal-refresh-btn {
        background: none;
        border: 1px solid transparent;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 11px;
        padding: 2px 7px;
        border-radius: 3px;
      }
      .cal-refresh-btn:hover {
        color: var(--accent);
      }
      .cal-refresh-btn.calendar-config-btn {
        border-color: var(--border);
      }
      .cal-refresh-btn.calendar-config-btn:hover {
        border-color: var(--accent);
      }

      .cal-event {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        padding: 3px 0;
      }
      .cal-event-time {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-muted);
        width: 96px;
        flex-shrink: 0;
        white-space: nowrap;
      }
      .cal-event-dot {
        width: 16px;
        height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        cursor: pointer;
        font-size: 13px;
        border-radius: 50%;
      }
      .cal-event-dot.type-default::before {
        content: "";
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--border);
        display: block;
      }
      .cal-event-dot.focus.type-default::before {
        background: var(--accent-dim);
      }
      .cal-event-dot:hover { opacity: 0.75; }
      .cal-event-title {
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text-muted);
      }
      .cal-event-title.focus {
        color: var(--accent);
      }
      .cal-loading {
        font-size: 11px;
        color: var(--text-muted);
        font-style: italic;
      }

      /* ---- tag palette ---- */
      .tag-palette-group { margin-bottom: 8px; }
      .tag-palette-group-label {
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        margin-bottom: 5px;
      }
      .tag-palette-chips { display: flex; flex-wrap: wrap; gap: 5px; }
      .tag-chip {
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--text-muted);
        cursor: grab;
        user-select: none;
        -webkit-user-select: none;
        white-space: nowrap;
        transition: opacity 0.1s;
      }
      .tag-chip.time-chip {
        border-color: rgba(202, 158, 230, 0.35);
        color: var(--accent);
      }
      .tag-chip.dragging { opacity: 0.35; }
      .task-item.chip-drop-target { box-shadow: inset 0 0 0 2px var(--accent); }
      .task-tag {
        font-family: var(--font-mono);
        font-size: 9px;
        padding: 1px 6px;
        border-radius: 8px;
        border: 1px solid var(--border);
        color: var(--text-muted);
        background: var(--surface2);
        margin-left: 3px;
      }

      .integrations-inline-section {
        display: none;
      }
      .field-error {
        border-color: var(--error, #e06c75) !important;
        box-shadow: 0 0 0 2px rgba(224, 108, 117, 0.3);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .integrations-inline-fields {
        display: grid;
        gap: 8px;
      }
      .integrations-inline-fields input {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 12px;
        padding: 8px 10px;
        outline: none;
      }
      .integrations-inline-fields input:focus {
        border-color: var(--accent);
      }
      .integrations-inline-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .integrations-inline-actions button {
        background: none;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font);
        font-size: 12px;
        padding: 6px 12px;
      }
      .integrations-inline-actions .primary {
        background: var(--accent-dim);
        border-color: var(--accent-dim);
        color: #303446;
      }
      .integrations-inline-actions button:hover:not(.primary) {
        color: var(--text);
        border-color: var(--text-muted);
      }

      .summary-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        font-size: 11px;
        color: var(--text-muted);
        font-family: var(--font-mono);
        margin-bottom: 5px;
      }

      .pri-row {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 4px;
      }
      .pri-chip {
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 10px;
        border: 1px solid var(--border);
      }
      .pri-a {
        color: #e78284;
        border-color: rgba(231, 130, 132, 0.3);
      }
      .pri-b {
        color: #e5c890;
        border-color: rgba(229, 200, 144, 0.3);
      }
      .pri-c {
        color: #a6d189;
        border-color: rgba(166, 209, 137, 0.3);
      }

      /* ---- priority left border ---- */
      .task-item { border-left: 3px solid transparent; }
      .task-item.pri-a { border-left-color: #e78284; }
      .task-item.pri-b { border-left-color: #e5c890; }
      .task-item.pri-c { border-left-color: #a6d189; }
      .pri-tab {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 10px;
        cursor: pointer;
        z-index: 1;
      }

      /* ---- drag and drop ---- */
      .drag-handle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 14px;
        color: var(--text-muted);
        cursor: grab;
        font-size: 12px;
        line-height: 1;
        opacity: 0;
        flex-shrink: 0;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      .task-item:hover .drag-handle,
      .inbox-item:hover .drag-handle {
        opacity: 0.7;
      }
      .drag-handle:hover {
        color: var(--accent);
        opacity: 1 !important;
      }
      .drag-handle:active {
        cursor: grabbing;
      }

      .task-item.dragging,
      .inbox-item.dragging {
        opacity: 0.35;
      }
      .task-item.drop-above {
        box-shadow: inset 0 2px 0 0 var(--accent);
      }
      .task-item.drop-below {
        box-shadow: inset 0 -2px 0 0 var(--accent);
      }
      .inbox-item.drop-above {
        box-shadow: inset 0 2px 0 0 var(--accent);
      }
      .inbox-item.drop-below {
        box-shadow: inset 0 -2px 0 0 var(--accent);
      }

      /* ---- templates toolbar + editor ---- */
      .template-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px 0;
        flex-wrap: wrap;
      }
      .template-toolbar label {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .template-toolbar select {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text);
        font-family: var(--font);
        font-size: 12px;
        padding: 3px 8px;
        outline: none;
      }
      .template-toolbar select:focus {
        border-color: var(--accent);
      }
      .template-toolbar .new-tpl-btn {
        margin-left: auto;
        background: rgba(202, 158, 230, 0.1);
        border: 1px solid rgba(202, 158, 230, 0.3);
        border-radius: 3px;
        color: var(--accent);
        cursor: pointer;
        font-family: var(--font);
        font-size: 12px;
        padding: 3px 10px;
      }
      .template-toolbar .new-tpl-btn:hover {
        background: rgba(202, 158, 230, 0.22);
        border-color: var(--accent);
      }

      .template-card {
        position: relative;
      }
      .template-card .tpl-edit-btn {
        position: absolute;
        top: 6px;
        right: 6px;
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 12px;
        padding: 2px 6px;
        line-height: 1;
        opacity: 0;
        border-radius: 3px;
      }
      .template-card:hover .tpl-edit-btn {
        opacity: 1;
      }
      .template-card .tpl-edit-btn:hover {
        color: var(--accent);
        background: var(--surface2);
      }
      .modal-box.wide {
        width: 420px;
        max-width: calc(100vw - 32px);
      }
      .tpl-delete-btn {
        background: none;
        border: 1px solid rgba(231, 130, 132, 0.4);
        border-radius: 3px;
        color: var(--danger);
        cursor: pointer;
        font-family: var(--font);
        font-size: 12px;
        padding: 5px 12px;
        margin-right: auto;
      }
      .tpl-delete-btn:hover {
        background: rgba(231, 130, 132, 0.12);
      }

      /* ---- modals ---- */

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .modal-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
        width: 280px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.55);
      }
      .modal-box p {
        font-size: 13px;
        margin-bottom: 12px;
        color: var(--text);
      }
      .modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }
      .modal-head p {
        margin: 0;
      }
      .modal-close-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 12px;
        line-height: 1;
        padding: 6px 9px;
        min-height: 32px;
        min-width: 32px;
      }
      .modal-close-btn:hover {
        color: var(--text);
        border-color: var(--text-muted);
      }
      .modal-label {
        font-size: 11px;
        color: var(--text-muted);
        margin-bottom: 5px;
        display: block;
      }
      .modal-box input,
      .modal-box textarea {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 12px;
        padding: 6px 10px;
        outline: none;
        margin-bottom: 12px;
      }
      .modal-box textarea {
        font-family: var(--font);
        resize: vertical;
      }
      .modal-box input:focus,
      .modal-box textarea:focus {
        border-color: var(--accent);
      }
      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }
      .modal-actions button {
        background: none;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font);
        font-size: 12px;
        padding: 5px 12px;
      }
      .modal-actions button.primary {
        background: var(--accent-dim);
        border-color: var(--accent-dim);
        color: #303446;
      }
      .modal-actions button:hover:not(.primary) {
        color: var(--text);
        border-color: var(--text-muted);
      }

      .recurring-weekdays {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        margin-bottom: 12px;
      }
      .recurring-weekdays label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--text-muted);
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 5px 7px;
        cursor: pointer;
      }
      .recurring-weekdays input {
        accent-color: var(--accent);
      }
      .recurring-helper-actions {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }
      .recurring-helper-actions button {
        background: none;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 4px 8px;
      }
      .recurring-helper-actions button:hover {
        color: var(--accent);
        border-color: var(--accent);
      }

      /* ---- toast ---- */

      #toast-container {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 2000;
        display: flex;
        flex-direction: column;
        gap: 6px;
        pointer-events: none;
      }
      .toast {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 8px 14px;
        font-size: 12px;
        color: var(--text);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        animation: toast-in 0.15s ease;
        max-width: 280px;
      }
      .toast.success {
        border-left: 3px solid var(--success);
      }
      .toast.error {
        border-left: 3px solid var(--danger);
      }
      .toast.info {
        border-left: 3px solid var(--accent);
      }
      @keyframes toast-in {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      /* ============================================================
       mobile — screens narrower than 768 px
       ============================================================ */

      @media (max-width: 768px) {
        #col-resize-handle { display: none; }

        /* --- base --- */
        html,
        body {
          font-size: 15px;
        }

        /* prevent iOS auto-zoom on input focus */
        input,
        textarea,
        select {
          font-size: 16px !important;
        }

        /* --- header --- */
        #app-header {
          padding: 8px 12px;
          gap: 8px;
          flex-wrap: wrap;
        }
        .app-name {
          font-size: 12px;
        }
        .date-label {
          min-width: 78px;
          font-size: 11px;
        }
        .date-nav-btn {
          padding: 5px 11px;
          font-size: 15px;
          min-height: 36px;
        }
        .today-btn {
          padding: 5px 10px;
          min-height: 36px;
        }
        .sync-indicator {
          display: none;
        }
        .logout-btn {
          padding: 5px 8px;
          font-size: 12px;
          min-height: 36px;
        }

        /* --- columns: stack vertically --- */
        #columns {
          flex-direction: column;
          overflow-y: auto;
          overflow-x: hidden;
        }

        #left-col {
          flex: none;
          width: 100%;
          border-right: none;
          border-bottom: 1px solid var(--border);
          overflow: visible;
        }

        /* cap the task list scroll area so the right col is reachable below */
        #left-scroll {
          max-height: 58vh;
        }

        #right-col {
          flex: none;
          width: 100%;
          overflow-y: visible;
          padding-bottom: 32px;
        }

        /* --- tabs: fill full width --- */
        .tabs-bar {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
        }
        .tab {
          padding: 11px 8px 12px;
          font-size: 13px;
          text-align: center;
        }

        /* --- quick-add --- */
        .quick-add-row {
          padding: 10px 12px;
          gap: 8px;
        }
        .quick-add-row input {
          padding: 9px 12px;
        }
        .quick-add-btn {
          padding: 4px 14px 6px;
          font-size: 22px;
          min-width: 44px;
        }

        /* --- task items --- */
        .task-item {
          padding: 12px 12px;
          gap: 10px;
        }
        .drag-handle {
          opacity: 0.7;
          font-size: 16px;
          width: 20px;
          padding-right: 4px;
        }

        /* bigger visual checkbox */
        .task-check {
          width: 20px;
          height: 20px;
          font-size: 13px;
          border-width: 2px;
          margin-top: 0;
          flex-shrink: 0;
        }

        .task-text {
          font-size: 14px;
        }

        /* action buttons hidden on hover are useless on touch — always show them */
        .task-menu-btn {
          opacity: 1 !important;
          font-size: 20px;
          padding: 2px 8px;
        }
        .sched-btn {
          opacity: 1;
          font-size: 14px;
          padding: 3px 6px;
        }

        /* --- subtasks --- */
        .subtask-item {
          padding: 7px 8px;
          gap: 10px;
        }
        .subtask-check {
          width: 17px;
          height: 17px;
          flex-shrink: 0;
          font-size: 15px;
        }
        .subtask-text {
          font-size: 13px;
        }

        /* --- options menu --- */
        /* JS sets inline left/top; on mobile we override width and reposition via JS */
        #options-menu button {
          padding: 12px 16px;
          font-size: 14px;
        }

        /* --- modals --- */
        .modal-box {
          width: calc(100% - 32px);
          max-width: 460px;
          padding: 24px 20px;
          /* keep modals inside the viewport vertically */
          max-height: 90vh;
          overflow-y: auto;
        }
        .modal-box input,
        .modal-box textarea {
          padding: 12px 12px;
        }
        .modal-actions button {
          padding: 12px 18px;
          font-size: 14px;
          min-height: 44px;
        }

        /* --- login --- */
        .login-box {
          width: calc(100% - 40px);
          max-width: 360px;
          padding: 28px 24px;
        }
        .login-box input[type="password"] {
          padding: 10px 12px;
        }
        .login-btn {
          padding: 11px;
          font-size: 14px;
        }

        /* --- toast: span full width --- */
        #toast-container {
          bottom: 16px;
          right: 12px;
          left: 12px;
        }
        .toast {
          max-width: 100%;
        }

        /* --- right col --- */
        .right-section {
          padding: 14px 14px;
        }
        .cal-event-time {
          font-size: 10px;
          width: 76px;
        }
        .calendar-config-btn {
          padding: 5px 10px;
          font-size: 11px;
          min-height: 30px;
        }

        /* --- template grid: single column --- */
        .template-grid {
          display: block;
          padding: 12px;
        }
        .template-sections {
          gap: 12px;
          padding: 12px;
        }
        .template-section-body {
          grid-template-columns: 1fr;
        }
        .template-card {
          padding: 14px 14px;
        }
        .template-name {
          font-size: 13px;
        }

        /* --- inbox --- */
        .inbox-item {
          padding: 10px 14px;
        }
        .inbox-item .drag-handle {
          opacity: 0.7;
          font-size: 16px;
          width: 20px;
          padding-right: 4px;
        }
        .inbox-text {
          font-size: 14px;
        }
        .inbox-add-btn,
        .inbox-done-btn,
        .inbox-readd-btn {
          padding: 6px 10px;
          font-size: 11px;
          min-height: 30px;
        }

        /* --- mobile: quick-add only mode --- */

        /* hide header, right col, tabs, and task list */
        #app-header {
          display: none !important;
        }
        #right-col {
          display: none !important;
        }
        .tabs-bar {
          display: none !important;
        }
        #left-scroll {
          display: none !important;
        }

        /* turn columns + left-col into a full-screen centering container */
        #columns {
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          height: 100dvh;
          overflow: hidden;
        }
        #left-col {
          display: flex !important;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          width: 100%;
          height: 100%;
          border: none;
          overflow: visible;
        }

        /* small brand label above the input */
        #left-col::before {
          content: "daily focus";
          display: block;
          font-size: 11px;
          font-weight: 700;
          letter-spacing: 0.12em;
          color: var(--text-muted);
          text-transform: lowercase;
          text-align: center;
          margin-bottom: 28px;
          font-family: var(--font);
        }

        /* quick-add row: large, centered, full-width up to 480px */
        #quick-add-row {
          display: flex !important;
          flex-direction: column;
          gap: 12px;
          padding: 0 20px;
          width: 100%;
          max-width: 480px;
          border: none;
          background: transparent;
        }

        #quick-add-row input {
          font-size: 18px !important;
          padding: 16px 18px !important;
          border-radius: 10px;
          border: 1.5px solid var(--border);
          background: var(--surface);
          width: 100%;
        }
        #quick-add-row input:focus {
          border-color: var(--accent);
          box-shadow: 0 0 0 3px rgba(202, 158, 230, 0.18);
          outline: none;
        }

        #quick-add-row .quick-add-btn {
          width: 100%;
          padding: 14px !important;
          font-size: 18px !important;
          border-radius: 10px;
          min-height: 52px;
          background: var(--surface2);
          border-color: var(--border);
          color: var(--accent);
          letter-spacing: 0.04em;
        }
        #quick-add-row .quick-add-btn:active {
          background: rgba(202, 158, 230, 0.18);
        }
      }

      /* ---- tag filter bar ---- */
      #tag-filter-bar {
        display: none;
        align-items: center;
        gap: 6px;
        padding: 5px 14px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        flex-wrap: wrap;
      }
      #tag-filter-bar.active { display: flex; }
      .tag-filter-label {
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        flex-shrink: 0;
      }
      .tag-filter-chip {
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 1px 8px;
        border-radius: 10px;
        border: 1px solid var(--accent);
        background: rgba(136, 57, 239, 0.15);
        color: var(--accent);
        cursor: pointer;
      }
      .tag-filter-clear {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-muted);
        cursor: pointer;
        margin-left: auto;
        padding: 1px 4px;
        background: none;
        border: none;
      }
      .tag-filter-clear:hover { color: var(--danger); }
      .task-tag { cursor: pointer; }
      .task-tag:hover { border-color: var(--accent); color: var(--accent); }
      .task-tag.active-filter { background: rgba(202,158,230,0.25); border-color: var(--accent); color: var(--accent); }

      /* ---- light mode (Catppuccin Latte) ---- */
      [data-theme="light"] {
        --bg: #eff1f5;
        --surface: #e6e9ef;
        --surface2: #ccd0da;
        --border: #bcc0cc;
        --accent: #8839ef;
        --accent-dim: #7227d4;
        --text: #4c4f69;
        --text-muted: #8c8fa1;
        --danger: #d20f39;
        --success: #40a02b;
        --peach: #fe640b;
      }
      [data-theme="light"] .task-item:hover { background: rgba(0,0,0,0.04); }
      [data-theme="light"] #options-menu { box-shadow: 0 4px 20px rgba(0,0,0,0.18); }
      [data-theme="light"] .toast { box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
      [data-theme="light"] .modal-box { box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
      [data-theme="light"] .kn-tooltip { box-shadow: 0 4px 20px rgba(0,0,0,0.18); }

      .theme-toggle-btn {
        background: none;
        border: 1px solid transparent;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 15px;
        padding: 2px 6px;
        border-radius: 3px;
        line-height: 1;
      }
      .theme-toggle-btn:hover { color: var(--accent); }
    </style>
  </head>
  <body>
    <!-- login overlay — shown when not authenticated -->
    <div id="login-overlay">
      <div class="login-box">
        <div class="login-title">daily focus</div>
        <input
          type="password"
          id="login-pw"
          placeholder="password"
          autocomplete="current-password"
        />
        <div id="login-error"></div>
        <button class="login-btn" id="login-btn">sign in</button>
      </div>
    </div>

    <div id="layout">
      <header id="app-header">
        <button class="app-name app-name-btn" id="open-settings-btn" title="open settings">
          daily focus
        </button>
        <div class="date-nav">
          <button class="date-nav-btn" id="prev-day-btn">&#x2039;</button>
          <span class="date-label" id="date-label"></span>
          <button class="date-nav-btn" id="next-day-btn">&#x203a;</button>
        </div>
        <button class="today-btn" id="go-today-btn">today</button>
        <span class="sync-indicator" id="sync-indicator">saving&#x2026;</span>
        <span
          id="dev-mode-badge"
          style="
            display: none;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--peach);
            border: 1px solid rgba(239, 159, 118, 0.5);
            background: rgba(239, 159, 118, 0.1);
            padding: 2px 7px;
            border-radius: 3px;
            letter-spacing: 0.05em;
          "
          >DEV MODE</span
        >
        <button type="button" class="theme-toggle-btn" id="theme-toggle-btn" title="toggle light/dark mode">&#x263c;</button>
        <button class="logout-btn" id="logout-btn" title="sign out">&#x2192; out</button>
      </header>

      <div id="columns">
        <div id="left-col">
          <nav class="tabs-bar">
            <button class="tab active" data-tab="focus">focus</button>
            <button class="tab" data-tab="inbox">kinopio</button>
            <button class="tab" data-tab="templates">templates</button>
          </nav>

          <div class="quick-add-row" id="quick-add-row">
            <input
              type="text"
              id="quick-add-input"
              placeholder="add a task&#x2026;"
              autocomplete="off"
            />
            <button class="quick-add-btn" id="quick-add-btn">+</button>
          </div>

          <div id="tag-filter-bar">
            <span class="tag-filter-label">filter:</span>
            <span class="tag-filter-chip" id="tag-filter-active"></span>
            <button type="button" class="tag-filter-clear" id="tag-filter-clear" title="clear filter">&#xd7; clear</button>
          </div>
          <div id="left-scroll">
            <section id="tab-focus" class="tab-content active">
              <div id="task-list"></div>
            </section>
            <section id="tab-inbox" class="tab-content">
              <div class="inbox-header-bar">
                <button class="kn-sync-btn" id="kn-sync-btn">&#x21bb; sync</button>
              </div>
              <div id="inbox-list"></div>
            </section>
            <section id="tab-templates" class="tab-content">
              <div class="template-toolbar">
                <select id="tpl-sort">
                  <option value="popular">most popular</option>
                  <option value="alpha">alphabetical</option>
                </select>
                <button class="new-tpl-btn" id="tpl-new-btn">+ new template</button>
              </div>
              <div id="template-grid" class="template-grid"></div>
            </section>
          </div>
        </div>

        <div id="col-resize-handle" title="drag to resize"></div>
        <div id="right-col">
          <div class="right-section" id="panel-calendar">
            <div class="right-section-title">
              <span>calendar</span>
              <span class="panel-actions">
                <button class="panel-toggle-btn" id="panel-toggle-calendar" title="collapse/expand">
                  &#x2212;
                </button>
                <button class="cal-refresh-btn" id="cal-refresh-btn">&#x21bb;</button>
              </span>
            </div>
            <div class="right-section-body" id="panel-body-calendar">
              <div id="cal-events"><div class="cal-loading">loading&#x2026;</div></div>
              <div class="section-resize-handle" data-resize-panel="panel-body-calendar" title="drag to resize"></div>
            </div>
          </div>
          <div class="right-section" id="panel-time">
            <div class="right-section-title">
              <span>time</span>
              <button class="panel-toggle-btn" id="panel-toggle-time" title="collapse/expand">
                &#x2212;
              </button>
            </div>
            <div class="right-section-body" id="panel-body-time">
              <div id="time-summary-body"><div class="cal-loading">no estimates set</div></div>
              <div class="section-resize-handle" data-resize-panel="panel-body-time" title="drag to resize"></div>
            </div>
          </div>
          <div class="right-section" id="panel-tags">
            <div class="right-section-title">
              <span>tags</span>
              <button type="button" class="panel-toggle-btn" id="panel-toggle-tags" title="collapse/expand">&#x2212;</button>
            </div>
            <div class="right-section-body" id="panel-body-tags">
              <div id="tag-palette-container"></div>
              <div class="section-resize-handle" data-resize-panel="panel-body-tags" title="drag to resize"></div>
            </div>
          </div>
          <div class="right-section integrations-inline-section" id="panel-integrations">
            <div class="right-section-title">
              <span>integrations</span>
              <span class="panel-actions">
                <button
                  class="panel-toggle-btn"
                  id="panel-toggle-integrations"
                  title="collapse/expand"
                >
                  &#x2212;
                </button>
                <button class="cal-refresh-btn" id="integrations-inline-close-btn" title="hide">
                  hide
                </button>
              </span>
            </div>
            <div class="right-section-body" id="panel-body-integrations">
              <div class="integrations-inline-fields">
                <label class="modal-label" for="kn-api-key-inline">kinopio api key</label>
                <input
                  type="password"
                  id="kn-api-key-inline"
                  placeholder="paste kinopio api key"
                  autocomplete="off"
                  autocorrect="off"
                  spellcheck="false"
                />
                <label class="modal-label" for="gcal-script-url-inline"
                  >calendar integration script url</label
                >
                <input
                  type="text"
                  id="gcal-script-url-inline"
                  placeholder="https://script.google.com/macros/s/.../exec"
                  autocomplete="off"
                  autocorrect="off"
                  spellcheck="false"
                  inputmode="url"
                />
                <label class="modal-label" for="log-webhook-url-inline"
                  >time tracking webhook url <span style="opacity: 0.5">(optional)</span></label
                >
                <input
                  type="text"
                  id="log-webhook-url-inline"
                  placeholder="https://script.google.com/macros/s/.../exec"
                  autocomplete="off"
                  autocorrect="off"
                  spellcheck="false"
                  inputmode="url"
                />
              </div>
              <div class="integrations-inline-actions">
                <button id="integrations-inline-test-btn">test time tracking</button>
                <button id="integrations-inline-save-btn" class="primary">save</button>
              </div>
              <div class="section-resize-handle" data-resize-panel="panel-body-integrations" title="drag to resize"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- options menu -->
    <div id="options-menu" style="display: none">
      <button data-action="edit-content">edit task</button>
      <button data-action="edit-estimate">edit estimate</button>
      <button data-action="breakdown">breakdown</button>
      <button data-action="set-recurring">set recurring</button>
      <div class="menu-sep"></div>
      <button data-action="move-tomorrow">move to tomorrow</button>
      <button data-action="skip" class="danger">remove</button>
    </div>

    <!-- actual time modal -->
    <div id="actual-modal" class="modal-backdrop" style="display: none">
      <div class="modal-box">
        <p>how long did it actually take?</p>
        <input type="text" id="actual-input" placeholder="e.g. 25m or 1h 10m" autocomplete="off" />
        <label class="modal-label" for="actual-notes"
          >notes <span style="opacity: 0.5">(optional)</span></label
        >
        <textarea id="actual-notes" rows="3" placeholder="anything worth remembering"></textarea>
        <div class="modal-actions">
          <button id="actual-skip-btn">skip</button>
          <button id="actual-confirm-btn" class="primary">done</button>
        </div>
      </div>
    </div>

    <!-- subtask breakdown modal -->
    <div id="breakdown-modal" class="modal-backdrop" style="display: none">
      <div class="modal-box">
        <p>add subtasks (one per line)</p>
        <textarea
          id="breakdown-input"
          rows="5"
          placeholder="research the topic&#10;write outline&#10;draft first section"
          style="font-family: var(--font)"
        ></textarea>
        <div class="modal-actions">
          <button id="breakdown-cancel-btn">cancel</button>
          <button id="breakdown-confirm-btn" class="primary">add</button>
        </div>
      </div>
    </div>

    <!-- template editor modal -->
    <div id="tpl-modal" class="modal-backdrop" style="display: none">
      <div class="modal-box wide">
        <p id="tpl-modal-title">new template</p>
        <label class="modal-label" for="tpl-name-input">name</label>
        <input
          type="text"
          id="tpl-name-input"
          placeholder="e.g. morning routine"
          autocomplete="off"
        />
        <label class="modal-label" for="tpl-category-select">category</label>
        <select id="tpl-category-select" class="tpl-category-select">
          <button id="actual-cancel-btn">x cancel</button>
          <option value="life">life</option>
          <option value="work">work</option>
          <option value="body">body</option>
          <option value="mind">mind</option>
          <option value="liminal">liminal</option>
        </select>
        <label class="modal-label" for="tpl-tasks-input"
          >steps <span class="modal-hint">(one per line)</span></label
        >
        <textarea
          id="tpl-tasks-input"
          rows="8"
          placeholder="first step&#10;second step&#10;third step"
        ></textarea>
        <div class="modal-actions">
          <button id="tpl-delete-btn" class="tpl-delete-btn" style="display: none">delete</button>
          <button id="tpl-cancel-btn">cancel</button>
          <button id="tpl-save-btn" class="primary">save</button>
        </div>
      </div>
    </div>

    <!-- schedule modal -->
    <div id="schedule-modal" class="modal-backdrop" style="display: none">
      <div class="modal-box">
        <p>schedule as focus time</p>
        <label class="modal-label">start time</label>
        <input
          type="text"
          id="schedule-time-input"
          placeholder="e.g. 2pm or 14:30"
          autocomplete="off"
        />
        <div
          id="schedule-dur-hint"
          style="font-size: 11px; color: var(--text-muted); margin: -6px 0 12px; min-height: 16px"
        ></div>
        <div class="modal-actions">
          <button id="schedule-cancel-btn">cancel</button>
          <button id="schedule-confirm-btn" class="primary">add to calendar</button>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>

    <!-- integrations modal -->
    <div id="integrations-modal" class="modal-backdrop" style="display: none">
      <div class="modal-box wide">
        <div class="modal-head">
          <p>integrations</p>
          <button
            id="integrations-close-btn"
            class="modal-close-btn"
            aria-label="close integrations"
          >
            x
          </button>
        </div>
        <label class="modal-label" for="kn-api-key-input">kinopio api key</label>
        <input
          type="password"
          id="kn-api-key-input"
          placeholder="paste kinopio api key"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
        <label class="modal-label" for="gcal-script-url-input"
          >calendar integration script url</label
        >
        <input
          type="text"
          id="gcal-script-url-input"
          placeholder="https://script.google.com/macros/s/.../exec"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          inputmode="url"
        />
        <label class="modal-label" for="log-webhook-url-input"
          >time tracking webhook url <span style="opacity: 0.5">(optional)</span></label
        >
        <input
          type="text"
          id="log-webhook-url-input"
          placeholder="https://script.google.com/macros/s/.../exec"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          inputmode="url"
        />
        <div class="modal-actions">
          <button id="integrations-test-btn">test time tracking</button>
          <button id="integrations-cancel-btn">cancel</button>
          <button id="integrations-save-btn" class="primary">save</button>
        </div>
      </div>
    </div>

    <!-- recurring task modal -->

      <div class="modal-box">

        const haystack =
          `${name || ""} ${Array.isArray(tasks) ? tasks.join(" ") : ""}`.toLowerCase();

        if (
          /(journal|brain dump|weekly review|read|review|reflection|writing session|peer review|data analysis|inbox zero)/.test(
            haystack,

        )

        if (
          /(movement|stretch|pt|workout|exercise|run|yoga|cycle|calf|quad|hamstring|body)/.test(
            haystack,

        )
          return "body";
        if (/(work|meeting|project|draft|blog|email|inbox|frog|analysis|task|write)/.test(haystack))
          return "work";
        return "life";

        name: t.name,
        category: normalizeTemplateCategory(t.category, t.name, t.tasks),

      }));
      const TPL_STORE_KEY = "df-templates";
      function getLocalIntegrationsConfig() {
        try {
          const raw = localStorage.getItem(INTEGRATIONS_STORE_KEY);
          if (raw) return JSON.parse(raw);
        } catch {
          // continue to session fallback below
        }
        try {
          return JSON.parse(sessionStorage.getItem(INTEGRATIONS_STORE_KEY) || "{}");
        } catch {
          return {};
        }
      }

      function getRuntimeIntegrationsConfig() {
        return typeof window !== "undefined" &&
          window.FOCUS_CONFIG &&
          typeof window.FOCUS_CONFIG === "object"
          ? window.FOCUS_CONFIG
          : {};
      }

      function isPlaceholderSecret(value) {
        const v = String(value || "")
          .trim()
          .toLowerCase();
        if (!v) return true;
        return (
          v === "your-logging-gas-url-here" ||
          v === "your-calendar-gas-url-here" ||
          v === "your-kanboard-api-key-here" ||
          v.includes("your-script-id") ||
          v.includes("your-calendar-script-id")
        );
      }

      function normalizeSecret(value) {
        const trimmed = String(value || "").trim();
        return isPlaceholderSecret(trimmed) ? "" : trimmed;
      }

      function normalizeMobileInput(value) {
        return String(value || "")
          .replace(/[\u200B-\u200D\uFEFF]/g, "")
          .replace(/[\u2018\u2019]/g, "'")
          .replace(/[\u201C\u201D]/g, '"')
          .replace(/\s+/g, " ")
          .trim();
      }

      function isGoogleAppsScriptUrl(value) {
        const v = String(value || "").trim();
        if (!v) return false;
        try {
          const u = new URL(v);
          if (u.protocol !== "https:") return false;
          if (u.hostname !== "script.google.com") return false;
          return /\/macros\/s\/.+\/(exec|dev)\/?$/i.test(u.pathname);
        } catch {
          return false;
        }
      }

      function isGoogleSheetUrl(value) {
        const v = String(value || "").trim();
        if (!v) return false;
        try {
          const u = new URL(v);
          return u.hostname === "docs.google.com" && /^\/spreadsheets\//i.test(u.pathname);
        } catch {
          return false;
        }
      }

      function getWebhookValidationError(value) {
        if (!value) return "";
        if (isGoogleSheetUrl(value)) {
          return "time tracking webhook must be a Google Apps Script web app URL, not a sheet URL";
        }
        if (!isGoogleAppsScriptUrl(value)) {
          return "time tracking webhook URL must look like script.google.com/macros/s/.../exec";
        }
        return "";
      }

      function applyIntegrationsConfig(config) {
        LOG_WEBHOOK_URL = normalizeSecret(config.LOG_WEBHOOK_URL);
        GCAL_SCRIPT_URL = normalizeSecret(config.GCAL_SCRIPT_URL);
        KN_API_KEY = normalizeSecret(config.KN_API_KEY);
      }

      function firstNonEmpty(...values) {
        for (const value of values) {
          const trimmed = String(value || "").trim();
          if (trimmed) return trimmed;
        }
        return "";
      }

      function firstConfigured(...values) {
        for (const value of values) {
          const normalized = normalizeSecret(value);
          if (normalized) return normalized;
        }
        return "";
      }

      async function loadAccountIntegrationsConfig() {
        if (DEV_MODE) return {};
        try {
          const result = await apiPost({ action: "get_tasks", date: INTEGRATIONS_ACCOUNT_KEY });
          const entry = Array.isArray(result.tasks)
            ? result.tasks.find(
                (task) => task && typeof task.content === "string" && task.content.trim(),
              )
            : null;
          if (!entry) return {};
          const parsed = JSON.parse(entry.content);
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch {
          return {};
        }
      }

      async function loadIntegrationsConfig() {
        const runtime = getRuntimeIntegrationsConfig();
        const local = getLocalIntegrationsConfig();
        const account = await loadAccountIntegrationsConfig();
        applyIntegrationsConfig({
          LOG_WEBHOOK_URL: firstConfigured(
            local.LOG_WEBHOOK_URL,
            account.LOG_WEBHOOK_URL,
            runtime.LOG_WEBHOOK_URL,
          ),
          GCAL_SCRIPT_URL: firstConfigured(
            local.GCAL_SCRIPT_URL,
            account.GCAL_SCRIPT_URL,
            runtime.GCAL_SCRIPT_URL,
          ),
          KN_API_KEY: firstConfigured(local.KN_API_KEY, account.KN_API_KEY, runtime.KN_API_KEY),
        });
      }

      async function saveIntegrationsConfig() {
        const payload = {
          LOG_WEBHOOK_URL: LOG_WEBHOOK_URL || "",
          GCAL_SCRIPT_URL: GCAL_SCRIPT_URL || "",
          KN_API_KEY: KN_API_KEY || "",
        };
        let savedToBackend = false;
        let savedLocally = false;
        try {
          localStorage.setItem(INTEGRATIONS_STORE_KEY, JSON.stringify(payload));
          savedLocally = true;
        } catch {}
        if (!savedLocally) {
          try {
            sessionStorage.setItem(INTEGRATIONS_STORE_KEY, JSON.stringify(payload));
            savedLocally = true;
          } catch {}
        }
        if (!DEV_MODE) {
          try {
            await apiPost({
              action: "save_tasks",
              date: INTEGRATIONS_ACCOUNT_KEY,
              tasks: [
                {
                  id: "integrations-config",
                  content: JSON.stringify(payload),
                  marker: "META",
                  subtasks: [],
                  dueDate: null,
                  carriedFrom: null,
                  estimate: "",
                  actual: "",
                  createdAt: new Date().toISOString(),
                  fromKinopio: false,
                  knCardId: null,
                  priority: null,
                  defers: 0,
                },
              ],
            });
            savedToBackend = true;
          } catch (err) {
            console.warn("[df] Failed to save integrations to backend:", err.message);
          }
        }
        return { payload, savedLocally, savedToBackend };
      }

            "error",

          state.calendarEvents = null;

      const TPL_USES_KEY = "df-tpl-uses"; // use counts: { [id]: number }
      const TPL_SORT_KEY = "df-tpl-sort"; // 'popular' | 'alpha'
      const TPL_RESET_VERSION_KEY = "df-tpl-reset-version";
      const TPL_RESET_VERSION = "2026-04-20-template-refresh-v1";

      function loadTemplates() {
        try {
          const appliedVersion = localStorage.getItem(TPL_RESET_VERSION_KEY) || "";
          if (appliedVersion !== TPL_RESET_VERSION) {
            localStorage.removeItem(TPL_STORE_KEY);
            localStorage.removeItem(TPL_USES_KEY);
            localStorage.removeItem(TPL_SORT_KEY);
            localStorage.setItem(TPL_RESET_VERSION_KEY, TPL_RESET_VERSION);
          }
        } catch {}

        try {
          const raw = localStorage.getItem(TPL_STORE_KEY);
          if (raw) {
            const stored = JSON.parse(raw);
            if (Array.isArray(stored) && stored.length) {
              const filteredStored = stored.filter(isTemplateAllowed);
              const normalizedStored = filteredStored.map((t) => ({
                id: t.id,
                name: t.name,
                category: normalizeTemplateCategory(t.category, t.name, t.tasks),
                tasks: Array.isArray(t.tasks) ? t.tasks : [],
              }));
              const seen = new Set(normalizedStored.map((t) => t.id));
              const merged = normalizedStored.concat(
                getDefaultTemplates()
                  .filter((t) => !seen.has(t.id))
                  .map((t) => ({
                    id: t.id,
                    name: t.name,
                    category: normalizeTemplateCategory(t.category, t.name, t.tasks),
                    tasks: Array.isArray(t.tasks) ? t.tasks.slice() : [],
                  })),
              );
              TEMPLATES = merged;
              if (
                merged.length !== normalizedStored.length ||
                filteredStored.length !== stored.length
              )
                saveTemplates();
              return;
            }
          }
        } catch {
          /* fall through to defaults */
        }
        TEMPLATES = getDefaultTemplates().map((t) => ({
          id: t.id,
          name: t.name,
          category: normalizeTemplateCategory(t.category, t.name, t.tasks),
          tasks: Array.isArray(t.tasks) ? t.tasks.slice() : [],
        }));
      }
      function saveTemplates() {
        try {
          localStorage.setItem(TPL_STORE_KEY, JSON.stringify(TEMPLATES));
        } catch {}
      }
      function getTplUses() {

      // returns templates in the currently-selected sort order

        const mode = getTplSort();

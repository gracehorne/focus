      async function saveIntegrationsDraft(draft, mode = "modal") {
        KN_API_KEY = draft.KN_API_KEY;
        GCAL_SCRIPT_URL = draft.GCAL_SCRIPT_URL;
        LOG_WEBHOOK_URL = draft.LOG_WEBHOOK_URL;

        const webhookError = getWebhookValidationError(LOG_WEBHOOK_URL);
        if (webhookError) {
          showToast(webhookError, "error", 3500);
          focusIntegrationField("log", mode);
          flashIntegrationFieldError("log", mode);
          return false;
        }

        if (GCAL_SCRIPT_URL && !isGoogleAppsScriptUrl(GCAL_SCRIPT_URL)) {
          showToast(
            "calendar integration URL must look like script.google.com/macros/s/.../exec",
            "error",
            3500,
          );
          focusIntegrationField("gcal", mode);
          flashIntegrationFieldError("gcal", mode);
          return false;
        }

        const saveResult = await saveIntegrationsConfig();
        if (LOG_WEBHOOK_URL) {
          flushWebhookQueue().catch(() => {});
        }
        if (GCAL_SCRIPT_URL && state.currentDate) {
          state.calendarEvents = null;
          renderRightCol();
          loadCalendarEvents(state.currentDate).catch(() => {});
        }
        if (!saveResult.savedLocally) {
          showToast(
            "could not persist settings on this browser; check private mode/storage settings",
            "error",
            4200,
          );
          return false;
        }
        showToast("integration settings saved", "success");

        // verify calendar connectivity post-save so it never blocks the save itself
        if (GCAL_SCRIPT_URL) {
          requestCalendar(
            { action: "get_calendar_events", date: state.currentDate || isoToday() },
            { strict: true },

            showToast(
              `calendar connection check failed: ${err.message || "unknown error"}`,
              "error",
              4500,
            ),
          );
        }

        return true;
      }

      const TPL_USES_KEY = "df-tpl-uses"; // use counts: { [id]: number }
      const TPL_SORT_KEY = "df-tpl-sort"; // 'popular' | 'alpha'
      const TPL_RESET_VERSION_KEY = "df-tpl-reset-version";
      const TPL_RESET_VERSION = "2026-05-01-sync-from-library";

      function loadTemplates() {
        try {
          const appliedVersion = localStorage.getItem(TPL_RESET_VERSION_KEY) || "";
          if (appliedVersion !== TPL_RESET_VERSION) {
            localStorage.removeItem(TPL_STORE_KEY);
            localStorage.removeItem(TPL_USES_KEY);
            localStorage.removeItem(TPL_SORT_KEY);
            localStorage.setItem(TPL_RESET_VERSION_KEY, TPL_RESET_VERSION);
          }
        } catch {}

        try {
          const raw = localStorage.getItem(TPL_STORE_KEY);
          if (raw) {
            const stored = JSON.parse(raw);
            if (Array.isArray(stored) && stored.length) {
              const filteredStored = stored.filter(isTemplateAllowed);
              const normalizedStored = filteredStored.map((t) => ({
                id: t.id,
                name: t.name,
                category: normalizeTemplateCategory(t.category, t.name, t.tasks),
                tasks: Array.isArray(t.tasks) ? t.tasks : [],
              }));
              const seen = new Set(normalizedStored.map((t) => t.id));
              const merged = normalizedStored.concat(
                getDefaultTemplates()
                  .filter((t) => !seen.has(t.id))
                  .map((t) => ({
                    id: t.id,
                    name: t.name,
                    category: normalizeTemplateCategory(t.category, t.name, t.tasks),
                    tasks: Array.isArray(t.tasks) ? t.tasks.slice() : [],
                  })),
              );
              TEMPLATES = merged;
              if (
                merged.length !== normalizedStored.length ||
                filteredStored.length !== stored.length
              )
                saveTemplates();
              return;
            }
          }
        } catch {
          /* fall through to defaults */
        }
        TEMPLATES = getDefaultTemplates().map((t) => ({
          id: t.id,
          name: t.name,
          category: normalizeTemplateCategory(t.category, t.name, t.tasks),
          tasks: Array.isArray(t.tasks) ? t.tasks.slice() : [],
        }));
      }
      function saveTemplates() {
        try {
          localStorage.setItem(TPL_STORE_KEY, JSON.stringify(TEMPLATES));
        } catch {}
      }
      function getTplUses() {
        try {
          return JSON.parse(localStorage.getItem(TPL_USES_KEY) || "{}");
        } catch {
          return {};
        }
      }
      function bumpTplUse(id) {
        const u = getTplUses();
        u[id] = (u[id] || 0) + 1;
        try {
          localStorage.setItem(TPL_USES_KEY, JSON.stringify(u));
        } catch {}
      }
      function getTplSort() {
        const v = localStorage.getItem(TPL_SORT_KEY) || "alpha";
        return v === "popular" ? "popular" : "alpha";
      }
      function saveTplSort(v) {
        try {
          localStorage.setItem(TPL_SORT_KEY, v === "popular" ? "popular" : "alpha");
        } catch {}
      }

      // returns templates in the currently-selected sort order
      function getSortedTemplates() {
        const mode = getTplSort();
        if (mode === "popular") {
          const uses = getTplUses();
          return TEMPLATES.slice().sort(
            (a, b) => (uses[b.id] || 0) - (uses[a.id] || 0) || a.name.localeCompare(b.name),
          );
        }
        return TEMPLATES.slice().sort((a, b) => a.name.localeCompare(b.name));
      }

      // ============================================================

      function genId() {
        if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
        return Date.now().toString(36) + Math.random().toString(36).slice(2);
      }

      // ============================================================
      //  date utilities
      // ============================================================

      const _MS = [
        "Jan",
        "Feb",
        "Mar",
        "Apr",
        "May",
        "Jun",
        "Jul",
        "Aug",
        "Sep",
        "Oct",
        "Nov",
        "Dec",
      ];
      const _DL = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

      function _p2(n) {
        return String(n).padStart(2, "0");
      }

      function isoToday() {
        const d = new Date();
        return `${d.getFullYear()}-${_p2(d.getMonth() + 1)}-${_p2(d.getDate())}`;
      }

      function isoFromDate(d) {
        return `${d.getFullYear()}-${_p2(d.getMonth() + 1)}-${_p2(d.getDate())}`;
      }

      function isoAddDays(isoStr, n) {
        const [y, mo, day] = isoStr.split("-").map(Number);
        const d = new Date(y, mo - 1, day);
        d.setDate(d.getDate() + n);
        return isoFromDate(d);
      }

      function dateLabelFull(isoStr) {
        const [y, mo, day] = isoStr.split("-").map(Number);
        const d = new Date(y, mo - 1, day);
        const dow = _DL[d.getDay()].slice(0, 3);
        return `${dow}  ${_MS[mo - 1]} ${day}`;
      }

      function addedKey(d) {

      function addDeferred(d, c) {

        if (!l.includes(c)) l.push(c);

      // Global skip list — keyed by task text, not date.
      // Per-date skips were insufficient: carried tasks live on a previous date,
      // so marking them skipped only on currentDate never matched the carry-over scan.
      const GLOBAL_SKIP_KEY = "df-global-skipped";
      function getGlobalSkippedSet() {

      function skippedKey(d) {

      }

      function getKnCardIdMap() {

      function saveKnCardId(t, id) {

      // ============================================================
      //  estimate accuracy (rolling 14-day)
      //  reads from the API, falls back to nothing if unavailable
      // ============================================================

      async function getEstimateAccuracy() {
        let sumRatio = 0,
          count = 0;
        for (let i = 0; i < 14; i++) {
          const iso = isoAddDays(state.currentDate, -i);
          try {
            const result = await apiPost({ action: "get_tasks", date: iso });
            for (const t of result.tasks || []) {
              const est = parseMinutes(t.estimate || "");
              const act = parseMinutes(t.actual || "");
              if (est > 0 && act > 0) {
                sumRatio += Math.min(est, act) / Math.max(est, act);
                count++;
              }
            }
          } catch {
            /* skip */
          }
        }
        return count >= 2 ? Math.round((sumRatio / count) * 100) : null;
      }

      // ============================================================
      //  time / duration utilities
      // ============================================================

      function textKey(t) {
        return (t || "").toLowerCase().trim().substring(0, 60);
      }

      function normalizeTaskType(value) {
        const v = String(value || "").toLowerCase();
        if (v === "note" || v === "event") return v;
        return "task";
      }

      function normalizeCollectionName(value) {
        const trimmed = String(value || "").trim();
        return trimmed || null;
      }

      function taskGlyph(task) {
        const type = normalizeTaskType(task && task.taskType);
        if ((task && task.marker) === "DONE") return "x";
        if (type === "note") return "-";
        if (type === "event") return "○";
        return "•";
      }

      function canCompleteTask(task) {
        return normalizeTaskType(task && task.taskType) === "task";
      }

      function parseMinutes(str) {
        if (!str) return 0;
        let mins = 0;
        const h = str.match(MINUTES_REGEX_H);
        const m = str.match(MINUTES_REGEX_M);
        if (h) mins += parseFloat(h[1]) * 60;
        if (m) mins += parseInt(m[1]);
        if (!h && !m) mins = parseInt(str) || 0;
        return Math.round(mins);
      }

      function recurringDaysFromRule(recurrence) {
        const set = new Set();
        if (!recurrence) return set;
        if (recurrence === "daily") {
          for (let i = 0; i < 7; i++) set.add(i);
          return set;
        }
        if (recurrence === "weekdays") {
          [1, 2, 3, 4, 5].forEach((day) => set.add(day));
          return set;
        }
        const single = String(recurrence || "").match(WEEKLY_SINGLE);
        if (single) {
          set.add(parseInt(single[1], 10));
          return set;
        }
        const many = String(recurrence || "").match(WEEKLY_MANY);
        if (many) {
          many[1].split(",").forEach((day) => set.add(parseInt(day, 10)));
        }
        return set;
      }

      function recurrenceFromDays(daysSet) {
        const days = [...daysSet].sort((a, b) => a - b);
        if (!days.length) return "";
        if (days.length === 7) return "daily";
        if (days.join(",") === "1,2,3,4,5") return "weekdays";
        if (days.length === 1) return `weekly:${days[0]}`;
        return `weekly:${days.join(",")}`;
      }

      function heuristicBreakdown(taskText) {
        const text = String(taskText || "").trim();
        if (!text) return [];
        const words = text.split(/\s+/).filter(Boolean);
        const verb = words[0] || "do";
        return [
          `clarify outcome for: ${text}`,
          `gather inputs needed to ${verb.toLowerCase()}`,
          `start first focused pass`,
          `review and tighten final result`,
        ];
      }

      async function generateAIBreakdown(taskText) {
        const fallback = heuristicBreakdown(taskText);
        const modelApi = typeof window !== "undefined" ? window.ai : null;
        if (!modelApi || !modelApi.languageModel || !modelApi.languageModel.create) return fallback;
        try {
          const session = await modelApi.languageModel.create();
          const prompt = `Break this task into 4-7 actionable subtasks. Return only one subtask per line with no numbering. Task: ${taskText}`;
          const response = await session.prompt(prompt);
          const lines = String(response || "")
            .split("\n")
            .map((line) => line.replace(/^[-*\d.)\s]+/, "").trim())
            .filter(Boolean);
          return lines.length ? lines.slice(0, 7) : fallback;
        } catch {
          return fallback;
        }
      }

      function formatMinutes(total) {
        if (!total) return "";
        const h = Math.floor(total / 60),
          m = total % 60;
        if (h && m) return `${h}h ${m}m`;
        return h ? `${h}h` : `${m}m`;
      }

      function roundUpTo10(mins) {
        return Math.ceil(mins / 10) * 10;
      }

      function parseTimeInput(str) {
        const s = (str || "").trim().toLowerCase().replace(/\s+/g, "");
        let h, min, m;
        if ((m = s.match(TIME_REGEX_HM))) {
          h = +m[1];
          min = +m[2];
        } else if ((m = s.match(TIME_REGEX_HMAM))) {
          h = +m[1];
          min = +m[2];
          if (m[3] === "pm" && h < 12) h += 12;
          if (m[3] === "am" && h === 12) h = 0;
        } else if ((m = s.match(TIME_REGEX_HAM))) {
          h = +m[1];
          min = 0;
          if (m[2] === "pm" && h < 12) h += 12;
          if (m[2] === "am" && h === 12) h = 0;
        } else if ((m = s.match(TIME_REGEX_H))) {
          h = +m[1];
          min = 0;
        }
        if (h === undefined || h < 0 || h > 23 || min < 0 || min > 59) return null;
        return { h, min };
      }

      function fmtHM(h, min) {
        return `${h % 12 || 12}:${String(min).padStart(2, "0")}${h >= 12 ? "pm" : "am"}`;
      }
      function fmtCalTime(iso) {
        const d = new Date(iso);
        return fmtHM(d.getHours(), d.getMinutes());
      }

      function formatDueDate(iso) {
        if (!iso) return "";
        const [y, mo, d] = iso.split("-").map(Number);
        const due = new Date(y, mo - 1, d),
          today = new Date();
        today.setHours(0, 0, 0, 0);
        const diff = Math.round((due - today) / 86400000);
        if (diff < 0) return `${Math.abs(diff)}d overdue`;
        if (diff === 0) return "due today";
        if (diff === 1) return "due tomorrow";
        if (diff <= 7) return `due in ${diff}d`;
        return `due ${_MS[due.getMonth()]} ${due.getDate()}`;
      }

      function dueDateClass(iso) {
        if (!iso) return "";
        const [y, mo, d] = iso.split("-").map(Number);
        const due = new Date(y, mo - 1, d),
          today = new Date();
        today.setHours(0, 0, 0, 0);
        const diff = Math.round((due - today) / 86400000);
        if (diff < 0) return "overdue";
        if (diff === 0) return "today";
        if (diff <= 3) return "soon";
        return "later";
      }

      // ============================================================
      //  linkify / escape
      // ============================================================

      function esc(str) {
        return String(str || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function linkifyContent(raw) {
        if (!raw) return "";
        const parts = raw.split(LINK_REGEX);
        return parts
          .map((part, i) => {
            if (i % 2 === 0) return esc(part.replace(/\n/g, " "));
            const md = part.match(/^\[([^\]]+)\]\(([^)]+)\)$/);
            if (md)
              return `${esc(md[1])}<a class="task-link-arrow" href="${esc(md[2])}" target="_blank">&#x2192;</a>`;
            return `<a class="task-link-arrow" href="${esc(part)}" target="_blank">&#x2192;</a>`;
          })
          .join("");
      }

      // ============================================================
      //  toast
      // ============================================================

      function showToast(msg, type = "info", duration = 2800) {
        const c = document.getElementById("toast-container");
        const el = document.createElement("div");
        el.className = `toast ${type}`;
        el.textContent = msg;
        c.appendChild(el);

      // ============================================================
      //  kinopio helpers
      // ============================================================

      function knSlug(n) {
        return (n || "")
          .replace(/[^a-zA-Z0-9]+/g, "-")
          .replace(/^-|-$/g, "")
          .toLowerCase();
      }

      function knParseCard(card, spaceName, listName) {
        const raw = (card.name || "").trim();
        if (!raw) return null;
        const lines = raw.split("\n");
        let taskText = "",
          urls = [],
          due = null;
        for (const line of lines) {
          const s = line.trim();
          if (!s) continue;
          if (/^https?:\/\//.test(s)) {
            urls.push(s);
            continue;
          }
          if (/^due:/i.test(s)) {
            const m = s.match(/due:\s*(\d{1,2})[/\-](\d{1,2})(?:[/\-](\d{2,4}))?/i);
            if (m) {
              let y = m[3] ? parseInt(m[3]) : new Date().getFullYear();
              if (y < 100) y += 2000;
              due = `${y}-${String(+m[1]).padStart(2, "0")}-${String(+m[2]).padStart(2, "0")}`;
            }
            continue;
          }
          if (!taskText) taskText = s.replace(/^\[[ xX]?\]\s*/, "").trim();
        }
        if (!taskText) return null;
        const first = lines.find((l) => l.trim()) || "";
        const isDone = /^\[[xX]\]/.test(first.trim()) || !!card.isDone;
        return { id: card.id, text: taskText, isDone, urls, due, space: spaceName, list: listName };
      }

      async function knFetch(path) {
        const resp = await fetch(`https://api.kinopio.club${path}`, {
          headers: { Authorization: KN_API_KEY, "Content-Type": "application/json" },
        });
        if (!resp.ok) throw new Error(`kinopio ${path}: ${resp.status}`);
        return resp.json();
      }

      function knSpaceSortKey(n) {
        if (/broom/i.test(n)) return "0" + n;
        if (/ephemera/i.test(n)) return "2" + n;
        return "1" + n;
      }

      function findKnCardIdInState(cardText) {
        const key = textKey(cardText);
        for (const cards of Object.values(state.kinopioGroups || {})) {
          for (const card of cards || []) {
            if (textKey(card.text) === key && card.id) return card.id;
          }
        }
        return null;
      }

      function knCheckedName(name, checked = true) {
        const raw = String(name || "");
        const checkbox = /^\s*\[(?:\s|x|X)?\]\s*/;
        if (checkbox.test(raw)) {
          return raw.replace(checkbox, checked ? "[x] " : "[] ");
        }
        return `${checked ? "[x] " : "[] "}${raw}`.trim();
      }

      async function knMarkCardDone(cardText, cardId = null) {
        if (DEV_MODE) {
          // Dev logging suppressed
          return;
        }
        const resolvedId = cardId || getKnCardId(cardText) || findKnCardIdInState(cardText);
        if (!resolvedId) throw new Error("could not resolve kinopio card id");
        saveKnCardId(cardText, resolvedId);

        let originalName = "";
        try {
          const current = await knFetch(`/card/${encodeURIComponent(resolvedId)}`);
          originalName = String(current?.name || "");
        } catch {}

        const nextName = knCheckedName(originalName || cardText, true);
        const resp = await fetch("https://api.kinopio.club/card", {
          method: "PATCH",
          headers: { Authorization: KN_API_KEY, "Content-Type": "application/json" },
          body: JSON.stringify({ id: resolvedId, name: nextName }),
        });
        if (!resp.ok) {
          if (resp.status === 401 || resp.status === 403) {
            throw new Error(
              `kinopio denied update for card ${resolvedId} (check API key and edit access)`,
            );
          }
          const details = await resp.text().catch(() => "");
          throw new Error(`kinopio update failed (${resp.status})${details ? ": " + details : ""}`);
        }

        // Confirm the server-side card now has a checked checkbox prefix.
        try {
          const updated = await knFetch(`/card/${encodeURIComponent(resolvedId)}`);
          const checked = /^\s*\[[xX]\]\s*/.test(String(updated?.name || ""));
          if (!checked) throw new Error("kinopio accepted request but checkbox was not updated");
        } catch (err) {
          throw new Error(`kinopio verification failed: ${err.message || err}`);
        }
      }

      async function syncFromKinopio(opts = {}) {
        const interactive = !!opts.interactive;
        if (DEV_MODE) {
          // seed a couple of fake kinopio cards so the ui is exercisable
          state.kinopioGroups = {
            "dev sandbox": [
              {
                id: "dev-1",
                text: "example kinopio card",
                isDone: false,
                urls: [],
                due: null,
                space: "dev sandbox",
                list: null,
              },
              {
                id: "dev-2",
                text: "another one, drag me",
                isDone: false,
                urls: [],
                due: null,
                space: "dev sandbox",
                list: null,
              },
            ],
          };
          renderInboxTab();
          bindDynamicEvents();
          showToast("dev mode: fake kinopio data loaded", "info");
          return;
        }
        if (!requireKinopioConfig(interactive)) return;
        const btn = document.getElementById("kn-sync-btn");
        if (btn) {
          btn.disabled = true;
          btn.textContent = "↻ syncing\u2026";
        }
        try {
          const spaces = await knFetch("/user/todos");
          const completedKeys = new Set(
            (state.tasks || [])
              .filter((t) => {
                const marker = String((t && t.marker) || "").toUpperCase();
                return marker === "DONE" || marker === "CANCELED";
              })
              .map((t) => textKey(t.content)),
          );
          const groups = {};
          for (const space of spaces || []) {
            const spaceName = space.name || "Untitled";
            if (KN_HIDDEN_SPACES.has(knSlug(spaceName))) continue;
            const spaceCards = space.cards || [];
            let lists = {};
            let connectionsByCardId = {}; // cardId → [connected card texts]
            if (space.id) {
              try {
                const d = await knFetch(`/space/${space.id}`);
                for (const l of d.lists || []) if (l.id) lists[l.id] = l.name || "";
                // build a map of cardId → card name for connection resolution
                const cardNameById = {};
                for (const c of d.cards || [])
                  if (c.id)
                    cardNameById[c.id] = (c.name || "")
                      .split("\n")[0]
                      .replace(/^\[[ xX]?\]\s*/, "")
                      .trim();
                for (const conn of d.connections || []) {
                  const startId = conn.startItemId || conn.startCardId;
                  const endId = conn.endItemId || conn.endCardId;
                  if (startId && endId) {
                    if (!connectionsByCardId[startId]) connectionsByCardId[startId] = [];
                    if (!connectionsByCardId[endId]) connectionsByCardId[endId] = [];
                    if (cardNameById[endId]) connectionsByCardId[startId].push(cardNameById[endId]);
                    if (cardNameById[startId])
                      connectionsByCardId[endId].push(cardNameById[startId]);
                  }
                }
              } catch {}
            }
            for (const rawCard of spaceCards) {
              const parsed = knParseCard(rawCard, spaceName, lists[rawCard.listId] || null);
              if (!parsed) continue;
              if (parsed.id) saveKnCardId(parsed.text, parsed.id);
              if (parsed.isDone) continue;
              if (completedKeys.has(textKey(parsed.text))) continue;
              // skip cards we already marked done locally this session
              if (_knLocalDone.has(textKey(parsed.text))) continue;
              parsed.connectedCards = connectionsByCardId[rawCard.id] || [];
              if (!groups[spaceName]) groups[spaceName] = [];
              groups[spaceName].push(parsed);
            }
          }
          state.kinopioGroups = groups;
          renderInboxTab();
          bindDynamicEvents();
          showToast("kinopio synced", "success");
        } catch (err) {
          showToast("sync failed: " + (err.message || err), "error");
        } finally {
          if (btn) {
            btn.disabled = false;
            btn.textContent = "\u21bb sync";
          }
        }
      }

      function parseCalendarResult(result) {
        if (result && result.status === "error")
          throw new Error(result.message || "calendar error");
        return result;
      }

      function requestCalendarJsonp(payload) {
        return new Promise((resolve, reject) => {
          if (typeof document === "undefined" || !document.head) {
            reject(new Error("calendar fallback unavailable"));
            return;
          }

          const callbackName = `__dfCalendarCb_${Date.now()}_${Math.random().toString(36).slice(2)}`;
          const script = document.createElement("script");
          const url = new URL(GCAL_SCRIPT_URL);
          let timeoutId = null;

          const cleanup = () => {
            if (timeoutId) clearTimeout(timeoutId);
            if (script.parentNode) script.parentNode.removeChild(script);
            try {
              delete window[callbackName];
            } catch {
              window[callbackName] = undefined;
            }
          };

          for (const [key, value] of Object.entries(payload || {})) {
            if (value !== undefined && value !== null) url.searchParams.set(key, String(value));
          }
          url.searchParams.set("callback", callbackName);

          timeoutId = setTimeout(() => {
            cleanup();
            reject(new Error("calendar request timed out"));
          }, 15000);

          window[callbackName] = (data) => {
            cleanup();
            try {
              resolve(parseCalendarResult(data));
            } catch (err) {
              reject(err);
            }
          };

          script.src = url.toString();
          script.async = true;
          script.onerror = () => {
            cleanup();
            reject(new Error("calendar request failed"));
          };
          document.head.appendChild(script);
        });
      }

      function isMobileBrowser() {
        if (typeof navigator === "undefined") return false;
        const ua = String(navigator.userAgent || "");
        return (
          /Android|iPhone|iPad|iPod|Mobile/i.test(ua) ||
          (navigator.maxTouchPoints > 1 && /Macintosh/i.test(ua))
        );
      }

      async function requestCalendarFetch(payload) {
        const resp = await fetch(GCAL_SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(payload),
          cache: "no-store",
        });
        if (!resp.ok) throw new Error(`server error: ${resp.status}`);
        const result = await resp.json();
        return parseCalendarResult(result);
      }

      async function requestCalendar(payload, opts = {}) {
        const strict = !!opts.strict;
        const transport = opts.transport || "auto";
        const preferJsonp = transport === "jsonp" || (transport === "auto" && isMobileBrowser());

        if (preferJsonp) {
          try {
            return await requestCalendarJsonp(payload);
          } catch (err) {
            if (strict || transport === "jsonp") throw err;
            return requestCalendarFetch(payload);
          }
        }

        try {
          return await requestCalendarFetch(payload);
        } catch (err) {
          if (strict) throw err;
          return requestCalendarJsonp(payload);
        }
      }

        const id = state.schedulingId;
        if (!id) return;

        const task = state.tasks.find((t) => t.id === id);
        if (!task) {

          return;
        }
        const estMins = parseMinutes(task.estimate || ""),
          durationMins = estMins > 0 ? roundUpTo10(estMins) : 30;
        const [y, mo, d] = state.currentDate.split("-").map(Number);
        const start = new Date(y, mo - 1, d, parsed.h, parsed.min, 0);
        const end = new Date(start.getTime() + durationMins * 60000);
        const title = task.content;
        state.schedulingId = null;
        try {
          showToast("adding to calendar\u2026", "info", 2000);

          if (!requireCalendarConfig(true)) return;
          const result = await requestCalendar({

          showToast("calendar error: " + err.message, "error");
        }

      async function logToWebhook(payload) {
        if (DEV_MODE) {
          // Dev logging suppressed
          return;
        }
        if (!LOG_WEBHOOK_URL) {
          console.warn("[df] webhook skipped: LOG_WEBHOOK_URL not configured");
          return;

        try {
          await sendWebhookPayload(payload);
          await flushWebhookQueue();
        } catch (err) {
          enqueueWebhookPayload(payload);
          console.warn("[df] webhook failed; queued for retry", err);
          showToast("time tracking sync queued - will retry", "info");
        }
      }

      function readWebhookQueue() {
        try {
          const parsed = JSON.parse(localStorage.getItem(WEBHOOK_QUEUE_KEY) || "[]");
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function writeWebhookQueue(queue) {
        try {
          localStorage.setItem(WEBHOOK_QUEUE_KEY, JSON.stringify(queue));
        } catch {
          // ignore storage failures; user still gets immediate webhook attempts
        }
      }

      function enqueueWebhookPayload(payload) {
        const queue = readWebhookQueue();
        queue.push({
          payload,
          queuedAt: new Date().toISOString(),
        });
        writeWebhookQueue(queue.slice(-200));
      }

      async function sendWebhookPayload(payload, webhookUrl = LOG_WEBHOOK_URL, opts = {}) {
        if (isGoogleSheetUrl(webhookUrl)) {
          throw new Error(
            "LOG_WEBHOOK_URL points to a Google Sheet, not a script web app endpoint",
          );
        }
        if (!isGoogleAppsScriptUrl(webhookUrl)) {
          throw new Error("LOG_WEBHOOK_URL is not a valid Google Apps Script web app URL");
        }
        const strict = !!opts.strict;
        const wirePayload =
          payload && payload.action
            ? payload
            : Object.assign({ action: "log_task" }, payload || {});
        const body = JSON.stringify(wirePayload);

        try {
          const resp = await fetch(webhookUrl, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body,
            keepalive: true,
          });
          if (!resp.ok) throw new Error("status " + resp.status);

          if (strict) {
            const contentType = String(resp.headers.get("content-type") || "").toLowerCase();
            if (contentType.includes("application/json")) {
              const parsed = await resp.json().catch(() => null);
              if (parsed && parsed.status === "error") {
                throw new Error(parsed.message || "script returned error");
              }
            } else {
              const txt = await resp.text().catch(() => "");
              if (/\berror\b/i.test(txt)) {
                throw new Error(txt.slice(0, 180));
              }
            }
          }

          return;
        } catch (err) {
          if (strict) throw err;

          // Fallback transport for environments where Apps Script CORS response
          // is not readable even when the POST is accepted.
          if (typeof navigator !== "undefined" && typeof navigator.sendBeacon === "function") {
            try {
              const blob = new Blob([body], { type: "text/plain;charset=UTF-8" });
              if (navigator.sendBeacon(webhookUrl, blob)) return;
            } catch {
              // continue to no-cors fallback below
            }
          }

          // Last resort: no-cors sends the request even if response is opaque.
          await fetch(webhookUrl, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain" },
            body,
            keepalive: true,
          });
          return;
        }
      }

      async function flushWebhookQueue() {
        if (!LOG_WEBHOOK_URL) return;
        const queue = readWebhookQueue();
        if (!queue.length) return;
        const remaining = [];
        for (const item of queue) {
          try {
            await sendWebhookPayload(item.payload);
          } catch {
            remaining.push(item);
          }
        }
        writeWebhookQueue(remaining);
        if (!remaining.length) {
          showToast("time tracking sync caught up", "success", 1800);
        }
      }

      async function moveToTomorrow(taskId) {

        if (!task) return;
        const tomorrowISO = isoAddDays(state.currentDate, 1);
        const tomorrowTasks = await fetchTasks(tomorrowISO);
        const newDefers = (task.defers || 0) + 1;
        if (!tomorrowTasks.some((t) => textKey(t.content) === textKey(task.content))) {
          tomorrowTasks.push({
            ...task,
            id: genId(),
            marker: "TODO",
            carriedFrom: state.currentDate,
            actual: "",
            createdAt: new Date().toISOString(),
            defers: newDefers,
            pin: null,

          await persistTasks(tomorrowISO, tomorrowTasks);

        addDeferred(state.currentDate, task.content);
        // log the defer so we keep a running count per task
        logToWebhook({
          date: state.currentDate,
          task: task.content,
          estimate: task.estimate || "",
          actual: "",
          deferred: newDefers,
          event: "defer",

        await persistTasks(state.currentDate, state.tasks);
        render();
        showToast("moved to tomorrow", "success");

      let isCarryingOver = false;

      async function autoCarryUndoneTasksToDate(targetDateISO) {
        if (DEV_MODE) {
          // Dev logging suppressed
          return;
        }

        // Prevent race conditions by ensuring only one carry-over happens at a time
        if (isCarryingOver) {
          return;
        }
        isCarryingOver = true;

        try {
          const targetTasks = await fetchTasks(targetDateISO);
          const todayISO = isoToday();

          // Only carry over if the target date is today or later than today
          if (targetDateISO < todayISO) return;

          // Global skip list — tasks the user deliberately removed should never be re-carried.
          const globalSkippedKeys = getGlobalSkippedSet();

          // Start from yesterday and go back to find all undone tasks
          let currentBackDate = isoAddDays(targetDateISO, -1);
          const tasksToCarry = [];

          // Look back up to 7 days to find undone tasks
          for (let i = 0; i < 7; i++) {
            if (currentBackDate < "2024-01-01") break; // Safety limit

            const prevTasks = await fetchTasks(currentBackDate);
            const undone = prevTasks.filter((t) => t.marker !== "DONE" && t.marker !== "CANCELED");

            for (const task of undone) {
              // Check if this task already exists in the target date
              const alreadyExists = targetTasks.some(
                (t) => textKey(t.content) === textKey(task.content),
              );
              // Also check if this task is already in tasksToCarry to prevent duplicates
              const alreadyInCarry = tasksToCarry.some(
                (t) => textKey(t.content) === textKey(task.content),
              );
              // Skip tasks the user explicitly removed on any day in the window
              const wasSkipped = globalSkippedKeys.has(textKey(task.content));
              if (!alreadyExists && !alreadyInCarry && !wasSkipped) {
                tasksToCarry.push({
                  ...task,
                  id: genId(),
                  marker: "TODO",
                  carriedFrom: currentBackDate,
                  actual: "",
                  createdAt: new Date().toISOString(),
                  defers: (task.defers || 0) + 1,
                });
              }
            }

            currentBackDate = isoAddDays(currentBackDate, -1);
          }

          // Add all carried tasks to the target date
          if (tasksToCarry.length > 0) {
            // Re-fetch target tasks right before persist to catch any race conditions
            const latestTargetTasks = await fetchTasks(targetDateISO);

            // Filter out any carried tasks that now exist in the latest fetch
            // (in case another operation added them while we were looking back)
            const finalTasksToCarry = tasksToCarry.filter((carryTask) => {
              return !latestTargetTasks.some(
                (t) => textKey(t.content) === textKey(carryTask.content),
              );
            });

            // Only persist if there are actually new tasks to add
            if (finalTasksToCarry.length > 0) {
              latestTargetTasks.push(...finalTasksToCarry);
              await persistTasks(targetDateISO, latestTargetTasks);

              // Log each carryover to webhook
              for (const task of finalTasksToCarry) {
                logToWebhook({
                  date: targetDateISO,
                  task: task.content,
                  estimate: task.estimate || "",
                  actual: "",
                  deferred: task.defers,
                  event: "autocarry",
                  carriedFrom: task.carriedFrom,
                });
              }
            }
          }
        } catch (err) {
          console.warn("[df] autoCarryUndoneTasksToDate failed:", err);
        } finally {
          isCarryingOver = false;
        }
      }

      async function addSubtasks(taskId, lines) {

        if (!Array.isArray(task.subtasks)) task.subtasks = [];
        const steps = lines.map((l) => l.trim()).filter(Boolean);

          task.subtasks.push({ id: genId(), content: step, marker: "TODO" });

        showToast(`added ${steps.length} subtask${steps.length !== 1 ? "s" : ""}`, "success");

            content: cardObj.text,
            marker: "TODO",
            subtasks: [],
            dueDate: cardObj.due || null,
            carriedFrom: null,
            estimate: "",
            actual: "",
            createdAt: new Date().toISOString(),
            fromKinopio: true,
            knCardId: cardObj.id || null,
            taskType: "task",
            collection: normalizeCollectionName(cardObj.space),
            tags: [],
          });
          await persistTasks(state.currentDate, state.tasks);
        } else if (!existing.collection && cardObj.space) {
          existing.collection = normalizeCollectionName(cardObj.space);
          await persistTasks(state.currentDate, state.tasks);
        }
        markAddedToDay(state.currentDate, cardObj.text);
        renderFocusTab();
        renderInboxTab();
        bindDynamicEvents();
        showToast("added to today", "success");
      }

      // set of card IDs (or textKeys) we have locally marked done this session,
      // so a background re-sync does not resurrect them before the API confirms
      const _knLocalDone = new Set();

      async function markKinopioItemDone(cardText, cardId) {
        if (cardId) saveKnCardId(cardText, cardId);
        const k = textKey(cardText);
        // optimistically suppress this card in future syncs for this session
        _knLocalDone.add(k);
        try {
          await knMarkCardDone(cardText, cardId || null);
        } catch (err) {
          _knLocalDone.delete(k);
          showToast("kinopio update failed: " + (err.message || err), "error");
          return;
        }
        for (const s of Object.keys(state.kinopioGroups))
          state.kinopioGroups[s] = (state.kinopioGroups[s] || []).filter(
            (c) => textKey(c.text) !== k,
          );
        const before = state.tasks.length;
        state.tasks = state.tasks.filter((t) => textKey(t.content) !== k);
        if (state.tasks.length !== before) await persistTasks(state.currentDate, state.tasks);
        render();
        showToast("marked done in kinopio", "success");
        // note: intentionally no re-sync here — the PATCH may not have propagated yet.
        // the card is suppressed locally; a manual sync will confirm the server state.
      }

      // ---- recurring modal ----------------------------------------

      function openRecurringModal(taskId) {
        const task = state.tasks.find((t) => t.id === taskId);
        if (!task) return;
        state.recurringTaskId = taskId;
        // find if this task already has a recurring rule
        const existing = loadRecurring().find((r) => textKey(r.content) === textKey(task.content));
        const selected = recurringDaysFromRule(existing ? existing.recurrence : "");
        document.querySelectorAll("#recurring-weekdays input[data-day]").forEach((input) => {
          const day = parseInt(input.dataset.day, 10);
          input.checked = selected.has(day);
        });
        const info = document.getElementById("recurring-existing");
        info.textContent = existing ? `currently: ${recurringLabel(existing.recurrence)}` : "";
        document.getElementById("recurring-modal").style.display = "flex";
        setTimeout(() => {
          const first = document.querySelector('#recurring-weekdays input[data-day="1"]');
          if (first) first.focus();
        }, 50);
      }

      function saveRecurringFromModal() {
        const taskId = state.recurringTaskId;
        if (!taskId) return;
        const task = state.tasks.find((t) => t.id === taskId);
        if (!task) {
          closeRecurringModal();
          return;
        }
        const selected = new Set();
        document
          .querySelectorAll("#recurring-weekdays input[data-day]:checked")
          .forEach((input) => {
            selected.add(parseInt(input.dataset.day, 10));
          });
        const recurrence = recurrenceFromDays(selected);
        // remove any existing rule for this task content
        const list = loadRecurring().filter((r) => textKey(r.content) !== textKey(task.content));
        if (recurrence) {
          list.push({
            id: genId(),
            content: task.content,
            recurrence,
            estimate: task.estimate || "",
            priority: task.priority || null,
          });
          showToast("recurring task saved: " + recurringLabel(recurrence), "success");
        } else {
          showToast("recurring removed", "info");
        }
        saveRecurring(list);
        // stamp the task so a recur badge shows in the UI
        task.recurringId = recurrence ? list[list.length - 1]?.id || null : null;
        persistTasks(state.currentDate, state.tasks);
        render();
        closeRecurringModal();
      }

      function closeRecurringModal() {
        state.recurringTaskId = null;
        document.getElementById("recurring-modal").style.display = "none";
      }

      async function insertTemplate(id) {
        const tpl = TEMPLATES.find((t) => t.id === id);
        if (!tpl) return;
        const parentTask = {
          id: genId(),
          content: tpl.name,
          marker: "TODO",
          subtasks: tpl.tasks.map((step) => ({ id: genId(), content: step, marker: "TODO" })),
          dueDate: null,
          carriedFrom: null,
          estimate: "",
          actual: "",
          createdAt: new Date().toISOString(),
          fromKinopio: false,
          knCardId: null,
          priority: null,
          defers: 0,
          taskType: "task",
          pin: null,
        };
        state.tasks.push(parentTask);
        await persistTasks(state.currentDate, state.tasks);
        bumpTplUse(tpl.id);
        showToast("inserted: " + tpl.name, "success");
        switchTab("focus");
        render();
      }

      // ============================================================
      //  recurring tasks
      // ============================================================

      function loadRecurring() {
        try {
          return JSON.parse(localStorage.getItem(RECURRING_STORE_KEY) || "[]");
        } catch {
          return [];
        }
      }
      function saveRecurring(list) {
        try {
          localStorage.setItem(RECURRING_STORE_KEY, JSON.stringify(list));
        } catch {}
      }
      function addRecurringTask(content, recurrence, estimate, priority) {
        const list = loadRecurring();
        list.push({
          id: genId(),
          content,
          recurrence,
          estimate: estimate || "",
          priority: priority || null,
        });
        saveRecurring(list);
      }
      function deleteRecurringTask(id) {
        saveRecurring(loadRecurring().filter((r) => r.id !== id));
      }

      // returns true if the recurring rule fires on the given ISO date
      function recurringFiresOn(recurrence, isoStr) {
        const [y, mo, d] = isoStr.split("-").map(Number);
        const dow = new Date(y, mo - 1, d).getDay(); // 0=Sun
        return recurringDaysFromRule(recurrence).has(dow);
      }

      // inject any recurring tasks for dateISO that are not already present in tasks array
      function injectRecurringTasks(dateISO, tasks) {
        const recurring = loadRecurring();
        const skipped = getGlobalSkippedSet();
        let changed = false;
        for (const r of recurring) {
          if (!recurringFiresOn(r.recurrence, dateISO)) continue;
          const already = tasks.some((t) => textKey(t.content) === textKey(r.content));
          if (already) continue;
          // Don't re-add tasks that were previously skipped/deleted
          if (skipped.has(textKey(r.content))) continue;
          tasks.push({
            id: genId(),
            content: r.content,
            marker: "TODO",
            subtasks: [],
            dueDate: null,
            carriedFrom: null,
            estimate: r.estimate || "",
            actual: "",
            createdAt: new Date().toISOString(),
            fromKinopio: false,
            knCardId: null,
            priority: r.priority || null,
            defers: 0,
            taskType: "task",
            recurringId: r.id, // link back so we can identify it
          });
          changed = true;
        }
        return changed;
      }

      function recurringLabel(recurrence) {
        if (recurrence === "daily") return "daily";
        if (recurrence === "weekdays") return "weekdays";
        const m = (recurrence || "").match(/^weekly:([0-6](?:,[0-6])*)$/);
        if (m) {
          const labels = ["sun", "mon", "tue", "wed", "thu", "fri", "sat"];
          const days = m[1]
            .split(",")
            .map((v) => labels[parseInt(v, 10)])
            .filter(Boolean);
          return "weekly \u00b7 " + days.join("/");
        }
        return recurrence || "";
      }

      function slugifyTplName(name) {
        const base =
          (name || "")
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/^-|-$/g, "") || "template";
        // ensure uniqueness
        const existing = new Set(TEMPLATES.map((t) => t.id));
        if (!existing.has(base)) return base;
        let n = 2;
        while (existing.has(base + "-" + n)) n++;
        return base + "-" + n;
      }

      function openTemplateEditor(id) {
        state.editingTplId = id || null;
        const tpl = id ? TEMPLATES.find((t) => t.id === id) : null;
        document.getElementById("tpl-modal-title").textContent = tpl
          ? "edit template"
          : "new template";
        document.getElementById("tpl-name-input").value = tpl ? tpl.name : "";
        document.getElementById("tpl-category-select").value = tpl
          ? normalizeTemplateCategory(tpl.category, tpl.name, tpl.tasks)
          : "life";
        document.getElementById("tpl-tasks-input").value = tpl ? (tpl.tasks || []).join("\n") : "";
        document.getElementById("tpl-delete-btn").style.display = tpl ? "inline-block" : "none";
        document.getElementById("tpl-modal").style.display = "flex";
        setTimeout(() => document.getElementById("tpl-name-input").focus(), 50);
      }

      function closeTemplateEditor() {
        state.editingTplId = null;
        document.getElementById("tpl-modal").style.display = "none";
      }

      function saveTemplateFromEditor() {
        const name = document.getElementById("tpl-name-input").value.trim();
        const category = normalizeTemplateCategory(
          document.getElementById("tpl-category-select").value || "life",
        );
        const tasks = document
          .getElementById("tpl-tasks-input")
          .value.split("\n")
          .map((s) => s.trim())
          .filter(Boolean);
        if (!name) {
          showToast("name is required", "error");
          return;
        }
        if (tasks.length === 0) {
          showToast("add at least one step", "error");
          return;
        }

        const editingId = state.editingTplId;
        if (editingId) {
          const tpl = TEMPLATES.find((t) => t.id === editingId);
          if (tpl) {
            tpl.name = name;
            tpl.category = category;
            tpl.tasks = tasks;
          }
        } else {
          const id = slugifyTplName(name);
          TEMPLATES.push({ id, name, category, tasks });
        }
        saveTemplates();
        closeTemplateEditor();
        renderTemplatesTab();
        bindDynamicEvents();
        showToast(editingId ? "template updated" : "template added", "success");
      }

      function deleteTemplateFromEditor() {
        const id = state.editingTplId;
        if (!id) return;
        if (!confirm("delete this template?")) return;
        TEMPLATES = TEMPLATES.filter((t) => t.id !== id);
        saveTemplates();
        const uses = getTplUses();
        delete uses[id];
        try {
          localStorage.setItem(TPL_USES_KEY, JSON.stringify(uses));
        } catch {}
        closeTemplateEditor();
        renderTemplatesTab();
        bindDynamicEvents();
        showToast("template deleted", "success");
      }

      // ============================================================
      //  rendering
      // ============================================================

      function renderSubtaskList(task) {
        if (!task.subtasks || task.subtasks.length === 0) return "";
        const collapsed = state.collapsedTasks.has(task.id);
        const items = task.subtasks
          .map((sub) => {
            const done = sub.marker === "DONE";
            const isEditing =
              state.editingSubtask &&
              state.editingSubtask.taskId === task.id &&
              state.editingSubtask.subtaskId === sub.id;
            const content = isEditing
              ? `<input class="subtask-input" type="text" data-sub-id="${esc(sub.id)}" data-parent-id="${esc(task.id)}" value="${esc(sub.content)}" placeholder="clear to remove" autocomplete="off"/>`
              : `<span class="subtask-text ${done ? "done" : ""}" data-sub-id="${esc(sub.id)}" data-parent-id="${esc(task.id)}">${linkifyContent(sub.content)}</span>`;
            return `<div class="subtask-item">
      <div class="subtask-check ${done ? "done" : ""}" data-sub-id="${esc(sub.id)}" data-parent-id="${esc(task.id)}">${done ? "x" : "•"}</div>
      ${content}
    </div>`;
          })
          .join("");
        return `<div class="subtask-list" data-parent-id="${esc(task.id)}"${collapsed ? ' style="display:none"' : ""}>${items}</div>`;
      }

      function renderFilterBar() {
        const bar = document.getElementById("tag-filter-bar");
        const chip = document.getElementById("tag-filter-active");
        if (!bar || !chip) return;
        if (state.activeTagFilter) {
          bar.classList.add("active");
          chip.textContent = state.activeTagFilter;
        } else {
          bar.classList.remove("active");
          chip.textContent = "";
        }
      }

      function renderFocusTab() {
        renderFilterBar();
        const el = document.getElementById("task-list");
        const deferred = getDeferredList(state.currentDate);
        if (state.tasks.length === 0 && deferred.length === 0) {
          el.innerHTML =
            '<div class="empty-state">no tasks for this day.<br>add one above or use a template.</div>';
          return;
        }

        const filterTag = state.activeTagFilter;
        const filterFn = filterTag ? (task) => (task.tags || []).includes(filterTag) : () => true;

        const priorityA = state.tasks.filter(
          (t) => t.pin === "A" && t.marker !== "DONE" && filterFn(t),
        );
        const priorityB = state.tasks.filter(
          (t) => t.pin === "B" && t.marker !== "DONE" && filterFn(t),
        );
        const priorityC = state.tasks.filter(
          (t) => t.pin === "C" && t.marker !== "DONE" && filterFn(t),
        );
        const openTasks = state.tasks.filter((t) => !t.pin && t.marker !== "DONE" && filterFn(t));
        const doneTasks = state.tasks.filter((t) => t.marker === "DONE" && filterFn(t));
        const orderedTasks = priorityA
          .concat(priorityB)
          .concat(priorityC)
          .concat(openTasks)
          .concat(doneTasks);

        const CATEGORY_TAG_CLASSES = new Set(["life", "work", "body", "mind", "liminal"]);

        function renderTaskRow(task) {
          task.taskType = normalizeTaskType(task.taskType);
          const isDone = task.marker === "DONE";

          const taskCanComplete = canCompleteTask(task);
          const isEditingEst = state.editingEstId === task.id,
            isEditingContent = state.editingContentId === task.id;
          const hasSubtasks = !!(task.subtasks && task.subtasks.length > 0);
          const isCollapsed = state.collapsedTasks.has(task.id);
          const pinBadge = `<span class="pin-badge${task.pin ? " pin-" + esc(task.pin) : " pin-empty"}" data-pin-id="${esc(task.id)}" title="click to pin / cycle (A → B → C → off)">${task.pin ? esc(task.pin) : "·"}</span>`;
          const doingBadge =
            task.marker === "DOING" ? '<span class="doing-badge">DOING</span>' : "";
          const recurBadge = task.recurringId
            ? '<span class="recurring-badge" title="recurring task">&#x21ba;</span>'
            : "";
          const collectionBadge = task.collection
            ? `<span class="collection-badge" title="collection: ${esc(task.collection)}">${esc(task.collection)}</span>`
            : "";
          const toggleHtml = hasSubtasks
            ? `<span class="task-toggle${isCollapsed ? " collapsed" : ""}" data-toggle-id="${esc(task.id)}" title="${isCollapsed ? "expand subtasks" : "collapse subtasks"}"></span>`
            : "";
          const dueBadge = task.dueDate
            ? `<span class="due-badge ${dueDateClass(task.dueDate)}">${esc(formatDueDate(task.dueDate))}</span>`
            : "";
          const contentHtml = isEditingContent
            ? `<input class="task-content-input" type="text" data-edit-id="${esc(task.id)}" value="${esc(task.content)}" autocomplete="off"/>`
            : `<span class="task-content" data-content-id="${esc(task.id)}" title="double-click to edit">${linkifyContent(task.content)}</span>`;
          const estTag =
            !isDone && !isEditingEst && task.estimate
              ? `<span class="estimate-badge" data-est-id="${esc(task.id)}" title="click to edit">:${esc(task.estimate)}</span>`
              : "";
          const estEdit = isEditingEst
            ? `<div class="inline-edit" data-id="${esc(task.id)}"><input class="est-input" type="text" value="${esc(task.estimate)}" placeholder="e.g. 25m" autocomplete="off"><button class="save-btn">save</button><button class="cancel-est-btn">&#xd7;</button></div>`
            : "";
          const actHtml = task.actual
            ? `<span class="actual-badge">&#x2713; ${esc(task.actual)}</span>`
            : "";
          const isScheduled = (state.calendarEvents || []).some(
            (ev) => ev.title === "Focus: " + task.content,
          );
          const schedBtn =
            isDone || !taskCanComplete
              ? ""
              : `<button class="sched-btn${isScheduled ? " scheduled" : ""}" data-sched-id="${esc(task.id)}" title="${isScheduled ? "already on calendar" : "schedule as focus time"}">&#x2d35;</button>`;
          const hasMeta = estEdit || actHtml || dueBadge || collectionBadge;
          const tagsHtml = (task.tags || []).length
            ? `<div class="task-meta">${(task.tags || [])
                .map((t) => {
                  const catClass = CATEGORY_TAG_CLASSES.has(t) ? ` cat-${t}` : "";
                  return `<span class="task-tag${state.activeTagFilter === t ? " active-filter" : ""}${catClass}" data-tag="${esc(t)}" title="click to filter">${esc(t)}<span class="tag-remove" data-tag="${esc(t)}" data-tag-remove="1" title="remove tag">&times;</span></span>`;
                })
                .join("")}</div>`
            : "";
          return `
      <div class="task-item${task.fromKinopio ? " kn-task" : ""}${isDone ? " done-task" : ""}${task.pin ? " pinned" : ""}" data-id="${esc(task.id)}" draggable="true">
        <span class="drag-handle" title="drag to reorder">&#x22ee;&#x22ee;</span>
        <div class="task-check${isDone ? " done" : ""}${taskCanComplete ? "" : " passive"}" data-done-id="${esc(task.id)}" data-done-state="${isDone ? "done" : "todo"}" title="${taskCanComplete ? (isDone ? "completed" : "mark done") : `${task.taskType} entry`}">${taskGlyph(task)}</div>
        <div class="task-body">
          <div class="task-text">${pinBadge}${toggleHtml}${doingBadge}${recurBadge}${contentHtml}${isEditingContent ? "" : estTag + schedBtn}</div>
          ${hasMeta ? `<div class="task-meta">${estEdit}${actHtml}${dueBadge}${collectionBadge}</div>` : ""}
          ${tagsHtml}
        </div>
        <button class="task-menu-btn" data-menu-id="${esc(task.id)}" title="options">&#x22ef;</button>
      </div>
      ${renderSubtaskList(task)}`;
        }

        const items = orderedTasks.map(renderTaskRow).join("");

        if (orderedTasks.length === 0 && filterTag) {
          el.innerHTML = `<div class="empty-state">no tasks tagged <em>${esc(filterTag)}</em>.</div>`;
          return;
        }

        const deferredHtml =
          deferred.length === 0
            ? ""
            : `<div class="deferred-section"><div class="deferred-label">&#x2192; tomorrow</div>${deferred.map((t) => `<div class="deferred-item"><span>${linkifyContent(t)}</span><span class="deferred-remove" data-deferred-remove="${esc(t)}" title="remove">&times;</span></div>`).join("")}</div>`;

        el.innerHTML = items + deferredHtml;
      }

      function renderInboxTab() {
        const el = document.getElementById("inbox-list");
        const groups = state.kinopioGroups;
        const completedKeys = new Set(
          (state.tasks || [])
            .filter((t) => {
              const marker = String((t && t.marker) || "").toUpperCase();
              return marker === "DONE" || marker === "CANCELED";
            })
            .map((t) => textKey(t.content)),
        );
        const names = Object.keys(groups)
          .sort((a, b) => knSpaceSortKey(a).localeCompare(knSpaceSortKey(b)))
          .filter((s) =>
            (groups[s] || []).some(
              (card) => card && !card.isDone && !completedKeys.has(textKey(card.text)),
            ),
          );
        if (names.length === 0) {
          el.innerHTML =
            '<div class="empty-state">no kinopio cards loaded.<br>click sync to pull from the API.</div>';
          return;
        }
        // apply any saved manual order per space (from drag-reorder)
        for (const space of names) {
          const order = getKnOrder(space);
          if (order && order.length) {
            const cards = groups[space];
            const byKey = new Map(cards.map((c) => [textKey(c.text), c]));
            const ordered = [];
            for (const k of order)
              if (byKey.has(k)) {
                ordered.push(byKey.get(k));
                byKey.delete(k);
              }
            for (const [, c] of byKey) ordered.push(c);
            groups[space] = ordered;
          }
        }
        el.innerHTML = names
          .map((space) => {
            const dateISO = state.currentDate;
            const cardsHtml = (groups[space] || [])
              .filter((card) => card && !card.isDone && !completedKeys.has(textKey(card.text)))
              .map((card) => {
                const markerClass = card.isDone ? "done" : "todo";
                const dueBadge = card.due
                  ? `<span class="due-badge ${dueDateClass(card.due)}" style="display:inline-block;margin-top:3px">${esc(formatDueDate(card.due))}</span>`
                  : "";
                const added = isAddedToDay(dateISO, card.text);
                const addBtn = added
                  ? `<button class="inbox-readd-btn" data-kn-text="${esc(card.text)}" data-kn-id="${esc(card.id || "")}" data-kn-space="${esc(space)}" title="re-add to today">added &times;</button>`
                  : `<button class="inbox-add-btn"   data-kn-text="${esc(card.text)}" data-kn-id="${esc(card.id || "")}" data-kn-due="${esc(card.due || "")}" data-kn-space="${esc(space)}" title="add to today">+ day</button>`;
                const urlBtns = (card.urls || [])
                  .map(
                    (u) => `<a class="kn-url-arrow" href="${esc(u)}" target="_blank">&#x2192;</a>`,
                  )
                  .join("");
                const knKey = (space || "") + "::" + textKey(card.text);
                const statusBadge = card.isDone
                  ? `<span class="inbox-status done">DONE</span>`
                  : "";
                return `<div class="inbox-item" draggable="true" data-kn-key="${esc(knKey)}" data-kn-space="${esc(space)}">
        <span class="drag-handle" title="drag to reorder">&#x22ee;&#x22ee;</span>
        ${statusBadge}
        <span class="inbox-text">${linkifyContent(card.text)}${urlBtns}${dueBadge ? "<br>" + dueBadge : ""}</span>
        <div class="inbox-actions">${addBtn}<button class="inbox-done-btn" data-kn-text="${esc(card.text)}" data-kn-id="${esc(card.id || "")}">&#x2713;</button></div>
      </div>`;
              })
              .join("");
            return `<div class="inbox-space-header">${esc(space)}</div>${cardsHtml}`;
          })
          .join("");
      }

      function renderTemplatesTab() {
        const sort = getTplSort();
        const sortSelect = document.getElementById("tpl-sort");
        if (sortSelect && sortSelect.value !== sort) sortSelect.value = sort;
        const list = getSortedTemplates();
        const grouped = TEMPLATE_CATEGORY_ORDER.map((category) => ({
          category,
          templates: list.filter(
            (template) =>
              normalizeTemplateCategory(template.category, template.name, template.tasks) ===
              category,
          ),
        })).filter((group) => group.templates.length);
        document.getElementById("template-grid").innerHTML =
          grouped
            .map((group) => {
              const categoryMeta = getTemplateCategoryMeta(group.category);
              return `<section class="template-section">
      <div class="template-section-title">
        <span>${esc(categoryMeta.label)}</span>
      </div>
      <div class="template-section-body">${group.templates
        .map((t) => {
          const category = normalizeTemplateCategory(t.category, t.name, t.tasks);
          const badgeMeta = getTemplateCategoryMeta(category);
          return `<div class="template-card category-${esc(category)}" data-tpl-id="${esc(t.id)}">
          <button class="tpl-edit-btn" data-tpl-edit="${esc(t.id)}" title="edit template">edit</button>
          <div class="template-name">${esc(t.name)}</div>
          <div class="template-count"><span class="template-category-badge category-${esc(category)}">${esc(badgeMeta.label)}</span></div>
        </div>`;
        })
        .join("")}</div>
    </section>`;
            })
            .join("") || '<div class="empty-state">no templates yet</div>';
      }

      function renderRightCol() {
        const calendarConfigured = !!GCAL_SCRIPT_URL;

      const STATS_CACHE_KEY = "df-stats-cache";
      const STATS_CACHE_TTL_MS = 60 * 60 * 1000;
      const STATS_DAYS = 14;

      async function computeStats(forceRefresh = false) {
        if (!forceRefresh) {
          try {
            const cached = JSON.parse(localStorage.getItem(STATS_CACHE_KEY) || "null");
            if (cached && cached.ts && Date.now() - cached.ts < STATS_CACHE_TTL_MS)
              return cached.data;
          } catch {}
        }
        const days = [];
        for (let i = 0; i < STATS_DAYS; i++) {
          const iso = isoAddDays(state.currentDate, -i);
          try {
            const result = await apiPost({ action: "get_tasks", date: iso });
            days.push({ iso, tasks: result.tasks || [] });
          } catch {
            days.push({ iso, tasks: [] });
          }
        }
        let totalTasks = 0,
          doneTasks = 0,
          totalWithEst = 0,
          estAccuracySum = 0,
          totalDeferred = 0;
        const tagCounts = { life: 0, work: 0, body: 0, mind: 0, liminal: 0 };
        const deferMap = {};
        const taskLoadPerDay = [];
        for (const { iso, tasks } of days) {
          const dayCount = tasks.filter((t) => !t.taskType || t.taskType === "task").length;
          taskLoadPerDay.push({ iso, count: dayCount });
          for (const t of tasks) {
            const isTask = !t.taskType || t.taskType === "task";
            if (isTask) {
              totalTasks++;
              if (t.marker === "DONE") doneTasks++;
              if ((t.defers || 0) > 0) {
                totalDeferred++;
                const key = (t.content || "").trim().toLowerCase().slice(0, 60);
                deferMap[key] = Math.max(deferMap[key] || 0, t.defers);
              }
            }
            for (const tag of t.tags || []) {
              if (tag in tagCounts) tagCounts[tag]++;
            }
            const est = parseMinutes(t.estimate || "");
            const act = parseMinutes(t.actual || "");
            if (est > 0 && act > 0) {
              estAccuracySum += Math.min(est, act) / Math.max(est, act);
              totalWithEst++;
            }
          }
        }
        const completionRate = totalTasks > 0 ? Math.round((doneTasks / totalTasks) * 100) : null;
        const estAccuracyPct =
          totalWithEst >= 2 ? Math.round((estAccuracySum / totalWithEst) * 100) : null;
        const topDeferred = Object.entries(deferMap)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 5)
          .map(([content, count]) => ({ content, count }));
        const skipCount = getGlobalSkippedSet().size;
        const dailyLoad = taskLoadPerDay.slice(0, 7).reverse();
        const data = {
          completionRate,
          estAccuracyPct,
          totalDeferred,
          topDeferred,
          skipCount,
          tagCounts,
          dailyLoad,
          totalTasks,
          doneTasks,
          daysAnalyzed: days.filter((d) => d.tasks.length > 0).length,
        };
        try {
          localStorage.setItem(STATS_CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
        } catch {}
        return data;
      }

      async function renderStatsTab(forceRefresh = false) {
        if (state.currentTab !== "stats") return;
        const body = document.getElementById("stats-body");
        if (!body) return;
        body.innerHTML = '<div class="cal-loading">computing&#x2026;</div>';
        const btn = document.getElementById("stats-refresh-btn");
        if (btn) btn.disabled = true;
        let data;
        try {
          data = await computeStats(forceRefresh);
        } catch {
          body.innerHTML = '<div class="cal-loading">error loading stats</div>';
          if (btn) btn.disabled = false;
          return;
        }
        if (btn) btn.disabled = false;

        const categories = ["life", "work", "body", "mind", "liminal"];
        const maxTag = Math.max(...categories.map((c) => data.tagCounts[c] || 0), 1);

        const completionHtml = `<div class="stats-section">
          <div class="stats-section-title">completion rate &middot; ${data.daysAnalyzed}d of data</div>
          <div class="stats-big">${data.completionRate !== null ? data.completionRate + "%" : "—"}</div>
          <div class="stats-sub">${data.doneTasks} of ${data.totalTasks} tasks completed</div>
        </div>`;

        const topDeferredRows =
          data.topDeferred
            .map(
              (d) =>
                `<div class="stats-row"><span class="stats-row-label" title="${esc(d.content)}">${esc(d.content.slice(0, 40))}</span><span class="stats-row-value">${d.count}&times;</span></div>`,
            )
            .join("") || '<div class="stats-sub">none — good work</div>';

        const deferHtml = `<div class="stats-section">
          <div class="stats-section-title">deferred &amp; skipped</div>
          <div class="stats-row"><span class="stats-row-label">tasks deferred at least once</span><span class="stats-row-value">${data.totalDeferred}</span></div>
          <div class="stats-row"><span class="stats-row-label">globally skipped / removed</span><span class="stats-row-value">${data.skipCount}</span></div>
          <div class="stats-section-title" style="margin-top:12px">most deferred</div>
          ${topDeferredRows}
        </div>`;

        const tagHtml = `<div class="stats-section">
          <div class="stats-section-title">task spread by category</div>
          ${categories
            .map((c) => {
              const count = data.tagCounts[c] || 0;
              const pct = Math.round((count / maxTag) * 100);
              return `<div class="stats-bar-row"><span class="stats-bar-label">${c}</span><div class="stats-bar-track"><div class="stats-bar-fill" style="width:${pct}%"></div></div><span class="stats-bar-value">${count}</span></div>`;
            })
            .join("")}
        </div>`;

        const estHtml = `<div class="stats-section">
          <div class="stats-section-title">estimate accuracy</div>
          <div class="stats-big">${data.estAccuracyPct !== null ? data.estAccuracyPct + "%" : "—"}</div>
          <div class="stats-sub">${data.estAccuracyPct !== null ? "avg overlap between estimate and actual" : "need more completed tasks with estimate + actual filled in"}</div>
        </div>`;

        const maxDay = Math.max(...data.dailyLoad.map((d) => d.count), 1);
        const loadHtml = `<div class="stats-section">
          <div class="stats-section-title">daily task load (last 7 days)</div>
          ${
            data.dailyLoad
              .map((d) => {
                const pct = Math.round((d.count / maxDay) * 100);
                return `<div class="stats-bar-row"><span class="stats-bar-label">${d.iso.slice(5)}</span><div class="stats-bar-track"><div class="stats-bar-fill" style="width:${pct}%"></div></div><span class="stats-bar-value">${d.count}</span></div>`;
              })
              .join("") || '<div class="stats-sub">no data</div>'
          }
        </div>`;

        let cacheNote = "";
        try {
          const cached = JSON.parse(localStorage.getItem(STATS_CACHE_KEY) || "null");
          if (cached && cached.ts) {
            const mins = Math.round((Date.now() - cached.ts) / 60000);
            cacheNote = `<div class="stats-cache-note">cached ${mins === 0 ? "just now" : mins + "m ago"} &middot; ${STATS_DAYS} days of data</div>`;
          }
        } catch {}

        body.innerHTML = completionHtml + deferHtml + tagHtml + estHtml + loadHtml + cacheNote;
      }

      async function scheduleZombieDay() {
        if (!requireCalendarConfig(true)) return;
        const day = getZombieDay();
        const [y, mo, dd] = state.currentDate.split("-").map(Number);
        function makeISO(timeStr) {
          const { hours: h, minutes: m } = parseHHMM(timeStr);
          return new Date(y, mo - 1, dd, h, m, 0).toISOString();
        }
        const blocks = [
          { title: "Zombie: Morning Ignition", start: makeISO(day.morningStart), end: makeISO(day.morningEnd) },
          { title: "Zombie: Focus Block", start: makeISO(day.focusStart), end: makeISO(day.focusEnd) },
          {
            title: `Zombie: Movement — ${day.movementChoice || "TBD"}`,
            start: makeISO(day.movementStart),
            end: makeISO(day.movementEnd),
          },
          { title: "Zombie: Housekeeping", start: makeISO(day.housekeepingStart), end: makeISO(day.housekeepingEnd) },
        ];
        showToast("scheduling zombie day…", "info", 2500);
        const created = [];
        for (const b of blocks) {
          try {
            const result = await requestCalendar({
              action: "create_focus_time",
              title: b.title,
              start: b.start,
              end: b.end,
            });
            created.push({
              id: result.id || "local-" + Date.now(),
              title: b.title,
              start: b.start,
              end: b.end,
            });
          } catch (err) {
            showToast('calendar error on "' + b.title + '": ' + err.message, "error");
            return;
          }
        }
        state.calendarEvents = (state.calendarEvents || [])
          .concat(created)
          .sort((a, b) => new Date(a.start) - new Date(b.start));
        renderRightCol();
        showToast("zombie day on calendar ✓", "success");
      }

      function parseHHMM(str) {
        const [h, m] = (str || "00:00").split(":").map(Number);
        return { hours: h || 0, minutes: m || 0 };
      }

      function fmtTime(str) {
        const { hours: h, minutes: m } = parseHHMM(str);
        return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
      }

      function renderZombieLiveDay(day, reading, queue) {
        const now = new Date();
        const hhmm = now.getHours() * 60 + now.getMinutes();

        function toMins(t) { const {hours:h,minutes:m} = parseHHMM(t); return h*60+m; }
        const BLOCKS = [
          { key: "morning",      s: toMins(day.morningStart),      e: toMins(day.morningEnd) },
          { key: "focus",        s: toMins(day.focusStart),        e: toMins(day.focusEnd) },
          { key: "movement",     s: toMins(day.movementStart),     e: toMins(day.movementEnd) },
          { key: "housekeeping", s: toMins(day.housekeepingStart), e: toMins(day.housekeepingEnd) },
        ];
        const wallActive = (BLOCKS.find((b) => hhmm >= b.s && hhmm < b.e) || {}).key || null;

        function isDone(key) {
          return {
            morning: day.paperRead && !!day.reactionNote,
            focus: day.focusBlockStarted,
            movement: day.movementDone,
            housekeeping: day.housekeepingDone,
          }[key];
        }
        function blockCls(key) {
          let c = "zombie-block";
          if (isDone(key)) c += " done-block";
          else if (wallActive === key) c += " active-block";
          return c;
        }
        function statusBadge(key) {
          const s = isDone(key) ? "complete" : wallActive === key ? "active" : "pending";
          return `<span class="zombie-block-status status-${s}">${s}</span>`;
        }

        const paperEntry = reading.find((r) => r.id === day.paperId);
        const paperLabel = paperEntry ? paperEntry.title : day.paperCustom || "—";
        const paperUrl = paperEntry ? paperEntry.url : null;
        const projEntry = queue.find((p) => p.id === day.projectId);
        const projLabel = projEntry ? projEntry.name : day.projectCustom || "—";

        const morningBlock = `
          <div class="${blockCls("morning")}">
            <div class="zombie-block-head">
              <span class="zombie-block-title">morning ignition</span>
              <span class="zombie-block-time">${esc(fmtTime(day.morningStart))} – ${esc(fmtTime(day.morningEnd))}</span>
              ${statusBadge("morning")}

                 <button class="zombie-action-btn" data-zombie-action="save-reaction-note">save note</button>`
            }

        const focusDimmed = !day.paperRead;
        const focusBlock = `
          <div class="${blockCls("focus")}">
            <div class="zombie-block-head">

              ${statusBadge("focus")}
            </div>
            <div class="zombie-block-body">no email until paper is read — single deliverable</div>
            <div class="zombie-block-detail">${esc(projLabel)}</div>
            ${

                ? `<button class="zombie-action-btn primary" data-zombie-action="start-focus"${focusDimmed ? ' style="opacity:0.4;cursor:not-allowed" title="read the paper first"' : ""}>start focus</button>`
                : `<span class="zombie-block-body" style="color:var(--success)">&#x2713; focus block underway</span>`

        const movBlock = `

            <div class="zombie-preload-section">

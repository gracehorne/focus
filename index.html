<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>daily focus</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cellipse cx='20' cy='24' rx='16' ry='10' fill='%23ca9ee6' opacity='0.85' transform='rotate(-20 20 24)'/%3E%3Cellipse cx='44' cy='24' rx='16' ry='10' fill='%23a37fce' opacity='0.85' transform='rotate(20 44 24)'/%3E%3Cellipse cx='18' cy='42' rx='12' ry='8' fill='%23ca9ee6' opacity='0.7' transform='rotate(15 18 42)'/%3E%3Cellipse cx='46' cy='42' rx='12' ry='8' fill='%23a37fce' opacity='0.7' transform='rotate(-15 46 42)'/%3E%3Cellipse cx='32' cy='32' rx='3' ry='18' fill='%23414559'/%3E%3Ccircle cx='32' cy='14' r='3' fill='%23414559'/%3E%3Cline x1='30' y1='14' x2='22' y2='6' stroke='%23414559' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='34' y1='14' x2='42' y2='6' stroke='%23414559' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #303446;
      --surface:    #292c3c;
      --surface2:   #414559;
      --border:     #51576d;
      --accent:     #ca9ee6;
      --accent-dim: #a37fce;
      --text:       #c6d0f5;
      --text-muted: #838ba7;
      --danger:     #e78284;
      --success:    #a6d189;
      --peach:      #ef9f76;
      --radius:     6px;
      --font:       'Input Sans Narrow', 'SF Pro Text', system-ui, sans-serif;
      --font-mono:  'Input Mono', 'SF Mono', monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

    /* ---- login overlay ---- */

    #login-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9000;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 32px 28px;
      width: 280px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.6);
    }

    .login-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-transform: lowercase;
      margin-bottom: 20px;
    }

    .login-box input[type="password"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 8px 12px;
      outline: none;
      margin-bottom: 10px;
    }
    .login-box input[type="password"]:focus { border-color: var(--accent); }

    #login-error {
      font-size: 11px;
      color: var(--danger);
      margin-bottom: 10px;
      min-height: 16px;
    }

    .login-btn {
      width: 100%;
      background: var(--accent-dim);
      border: none;
      border-radius: var(--radius);
      color: #303446;
      cursor: pointer;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      padding: 8px;
    }
    .login-btn:hover { background: var(--accent); }

    /* ---- app shell ---- */

    #layout { display: flex; flex-direction: column; height: 100vh; }

    #app-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 11px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .app-name {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--accent);
      text-transform: lowercase;
    }

    .date-nav { display: flex; align-items: center; gap: 8px; }

    .date-nav-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      padding: 2px 8px;
      line-height: 1.5;
    }
    .date-nav-btn:hover { color: var(--text); border-color: var(--text-muted); }

    .date-label { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); min-width: 120px; text-align: center; }

    .today-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 2px 7px;
    }
    .today-btn:hover { color: var(--accent); border-color: var(--accent); }

    .calendar-config-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 2px 7px;
    }
    .calendar-config-btn:hover { color: var(--accent); border-color: var(--accent); }

    .sync-indicator {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      margin-left: auto;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .sync-indicator.visible { opacity: 1; }

    .logout-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 11px;
      padding: 2px 6px;
    }
    .logout-btn:hover { color: var(--danger); }

    /* ---- two-column layout ---- */

    #columns { display: flex; flex: 1; overflow: hidden; }

    #left-col {
      flex: 0 0 62%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    #right-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    /* ---- tabs ---- */

    .tabs-bar { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }

    .tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-family: var(--font);
      font-size: 12px;
      padding: 8px 14px 9px;
      letter-spacing: 0.04em;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ---- quick add ---- */

    .quick-add-row {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
    }

    .quick-add-row input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 5px 10px;
      outline: none;
    }
    .quick-add-row input::placeholder { color: var(--text-muted); opacity: 1; }
    .quick-add-row input:focus { border-color: var(--accent); }

    .quick-add-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--accent);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 2px 10px 4px;
    }
    .quick-add-btn:hover { background: rgba(202,158,230,0.15); }

    /* ---- main scroll area ---- */

    #left-scroll { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ---- task items ---- */

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 9px 14px;
      border-bottom: 1px solid var(--surface2);
      position: relative;
    }
    .task-item:hover { background: rgba(255,255,255,0.025); }
    .task-item.kn-task { border-left: 2px solid rgba(202,158,230,0.35); padding-left: 12px; }

    .task-check {
      width: 14px; height: 14px;
      border: 1.5px solid var(--text-muted);
      border-radius: 3px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      transition: border-color 0.1s;
    }
    .task-check:hover { border-color: var(--accent); }

    .task-body { flex: 1; min-width: 0; }

    .task-text {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 5px;
      font-size: 13px;
      line-height: 1.4;
    }

    .task-content { flex: 1; min-width: 0; word-break: break-word; overflow-wrap: anywhere; }

    .task-content-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--accent);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 2px 6px;
      outline: none;
      width: 100%;
    }

    .carried-badge {
      font-size: 9px; font-family: var(--font-mono);
      color: var(--peach); background: rgba(239,159,118,0.11);
      border: 1px solid rgba(239,159,118,0.28);
      padding: 1px 6px; border-radius: 8px; letter-spacing: 0.02em; flex-shrink: 0;
    }

    .doing-badge {
      font-size: 9px; font-family: var(--font-mono);
      color: var(--accent); border: 1px solid rgba(202,158,230,0.4);
      border-radius: 2px; padding: 0 3px;
    }

    .task-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 5px; margin-top: 4px; }

    .estimate-badge {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--accent); background: rgba(202,158,230,0.1);
      padding: 1px 8px; border-radius: 10px;
      cursor: pointer; border: 1px solid rgba(202,158,230,0.25);
      user-select: none; letter-spacing: 0.02em;
    }
    .estimate-badge:hover { background: rgba(202,158,230,0.2); border-color: rgba(202,158,230,0.5); }
    .estimate-badge.overrun { background: rgba(231,130,132,0.15); color: var(--danger); border-color: rgba(231,130,132,0.35); }

    .actual-badge { font-family: var(--font-mono); font-size: 10px; color: var(--success); background: rgba(166,209,137,0.1); padding: 1px 6px; border-radius: 3px; }

    .due-badge { font-family: var(--font-mono); font-size: 10px; padding: 1px 6px; border-radius: 3px; }
    .due-badge.overdue { color: var(--danger); background: rgba(231,130,132,0.12); }
    .due-badge.today   { color: var(--peach);  background: rgba(239,159,118,0.12); }
    .due-badge.soon    { color: var(--text-muted); background: var(--surface2); }
    .due-badge.later   { color: var(--text-muted); background: var(--surface2); }

    .task-toggle { font-size: 7px; color: var(--text-muted); cursor: pointer; user-select: none; line-height: 1; }
    .task-toggle:hover { color: var(--accent); }

    .task-link-arrow, .kn-url-arrow {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; margin-left: 4px; border-radius: 5px;
      background: rgba(239,159,118,0.13); border: 1px solid rgba(239,159,118,0.35);
      color: var(--peach); font-size: 11px; text-decoration: none;
      cursor: pointer; vertical-align: middle; flex-shrink: 0;
    }
    .task-link-arrow:hover, .kn-url-arrow:hover { background: rgba(239,159,118,0.28); border-color: var(--peach); }

    .timer-btn {
      background: transparent; border: 1px solid var(--border);
      border-radius: 3px; color: var(--text-muted); cursor: pointer;
      font-size: 9px; line-height: 1; padding: 2px 5px; flex-shrink: 0;
    }
    .timer-btn:hover { border-color: var(--accent); color: var(--accent); }
    .timer-btn.running { border-color: rgba(239,159,118,0.6); color: var(--peach); }

    .task-elapsed { font-size: 10px; font-family: var(--font-mono); color: var(--peach); flex-shrink: 0; }

    .sched-btn {
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      font-size: 11px; padding: 1px 3px; border-radius: 3px; line-height: 1; flex-shrink: 0; opacity: 0.55;
    }
    .sched-btn:hover { color: var(--accent); opacity: 1; background: var(--surface2); }
    .sched-btn.scheduled { color: var(--accent); opacity: 1; }

    .task-menu-btn {
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 18px; padding: 0 3px; opacity: 0; flex-shrink: 0; line-height: 1;
    }
    .task-item:hover .task-menu-btn { opacity: 1; }
    .task-menu-btn:hover { color: var(--text); }


    .inline-edit { display: flex; align-items: center; gap: 5px; margin-top: 4px; }
    .inline-edit input {
      width: 80px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 3px; color: var(--text); font-family: var(--font-mono); font-size: 11px; padding: 3px 7px; outline: none;
    }
    .inline-edit input:focus { border-color: var(--accent); }
    .inline-edit .save-btn { background: var(--accent-dim); border: none; border-radius: 3px; color: #303446; cursor: pointer; font-size: 11px; padding: 3px 8px; }
    .inline-edit .cancel-est-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 11px; }

    .subtask-list { border-left: 2px solid var(--surface2); margin: 0 14px 3px 36px; }
    .subtask-item { display: flex; align-items: center; gap: 7px; padding: 4px 8px; }
    .subtask-check { width: 11px; height: 11px; border: 1.5px solid var(--text-muted); border-radius: 2px; cursor: pointer; flex-shrink: 0; }
    .subtask-check:hover:not(.done) { border-color: var(--accent); }
    .subtask-check.done { border-color: var(--success); background: rgba(166,209,137,0.15); }
    .subtask-text { font-size: 12px; color: var(--text-muted); flex: 1; line-height: 1.4; word-break: break-word; }
    .subtask-text.done { text-decoration: line-through; opacity: 0.45; }

    .deferred-section { margin-top: 10px; border-top: 1px solid var(--border); padding: 7px 14px 4px; }
    .deferred-label { font-family: var(--font-mono); font-size: 9px; color: var(--peach); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 4px; opacity: 0.7; }
    .deferred-item { font-size: 11px; color: var(--text-muted); padding: 2px 0; opacity: 0.45; text-decoration: line-through; text-decoration-color: rgba(239,159,118,0.35); }

    .recurring-badge {
      font-size: 9px; font-family: var(--font-mono);
      color: var(--success); background: rgba(166,209,137,0.1);
      border: 1px solid rgba(166,209,137,0.28);
      padding: 1px 6px; border-radius: 8px; letter-spacing: 0.02em; flex-shrink: 0;
    }

    .empty-state { padding: 48px 20px; text-align: center; color: var(--text-muted); font-size: 12px; line-height: 1.7; }

    /* ---- options menu ---- */

    #options-menu {
      position: fixed; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      z-index: 500; min-width: 175px; overflow: hidden;
    }
    #options-menu button { display: block; width: 100%; text-align: left; background: none; border: none; color: var(--text); cursor: pointer; font-family: var(--font); font-size: 12px; padding: 8px 14px; }
    #options-menu button:hover { background: var(--surface2); }
    #options-menu button.danger { color: var(--danger); }
    #options-menu button.danger:hover { background: rgba(231,130,132,0.1); }
    .menu-sep { height: 1px; background: var(--border); margin: 2px 0; }

    /* ---- kinopio inbox ---- */

    .inbox-header-bar { display: flex; align-items: center; justify-content: flex-end; padding: 8px 14px 0; }

    .kn-sync-btn { background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--text-muted); cursor: pointer; font-family: var(--font-mono); font-size: 10px; padding: 3px 9px; }
    .kn-sync-btn:hover { border-color: var(--accent); color: var(--accent); }
    .kn-sync-btn:disabled { opacity: 0.45; cursor: default; }

    .inbox-space-header { font-size: 11px; font-weight: 600; color: var(--text-muted); padding: 10px 14px 4px; letter-spacing: 0.06em; text-transform: lowercase; }

    .inbox-item { display: flex; align-items: flex-start; gap: 8px; padding: 7px 14px; border-bottom: 1px solid var(--surface2); }
    .inbox-item:hover { background: rgba(255,255,255,0.025); }

    .inbox-status { font-size: 9px; font-family: var(--font-mono); padding: 1px 4px; border-radius: 2px; flex-shrink: 0; margin-top: 2px; }
    .inbox-status.todo  { color: var(--text-muted); border: 1px solid var(--border); }
    .inbox-status.doing { color: var(--accent); border: 1px solid rgba(202,158,230,0.4); }
    .inbox-status.done  { color: var(--success); border: 1px solid rgba(166,209,137,0.3); }

    .inbox-text { flex: 1; font-size: 13px; line-height: 1.4; color: var(--text); word-break: break-word; }
    .inbox-actions { display: flex; gap: 5px; flex-shrink: 0; align-items: flex-start; }

    .inbox-add-btn { background: rgba(202,158,230,0.1); border: 1px solid rgba(202,158,230,0.3); border-radius: 3px; color: var(--accent); cursor: pointer; font-size: 10px; padding: 2px 8px; white-space: nowrap; }
    .inbox-add-btn:hover { background: rgba(202,158,230,0.22); border-color: var(--accent); }

    .inbox-readd-btn { background: none; border: 1px solid var(--border); border-radius: 3px; color: var(--text-muted); cursor: pointer; font-family: var(--font-mono); font-size: 10px; padding: 2px 6px; opacity: 0.6; }
    .inbox-readd-btn:hover { opacity: 1; border-color: var(--accent); color: var(--accent); }

    .inbox-done-btn { background: none; border: 1px solid var(--border); border-radius: 3px; color: var(--text-muted); cursor: pointer; font-size: 10px; padding: 2px 8px; }
    .inbox-done-btn:hover { border-color: var(--success); color: var(--success); }

    /* ---- templates ---- */

    .template-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; }
    .template-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 12px; cursor: pointer; }
    .template-card:hover { border-color: var(--accent); background: var(--surface2); }
    .template-name { font-size: 12px; color: var(--text); line-height: 1.3; }
    .template-count { font-size: 10px; color: var(--text-muted); margin-top: 3px; font-family: var(--font-mono); }

    /* ---- right column ---- */

    .right-section { padding: 16px; border-bottom: 1px solid var(--border); }
    .right-section:last-child { border-bottom: none; }

    .right-section-title { font-size: 10px; font-family: var(--font-mono); color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }

    .cal-refresh-btn { background: none; border: 1px solid transparent; color: var(--text-muted); cursor: pointer; font-size: 11px; padding: 2px 7px; border-radius: 3px; }
    .cal-refresh-btn:hover { color: var(--accent); }
    .cal-refresh-btn.calendar-config-btn { border-color: var(--border); }
    .cal-refresh-btn.calendar-config-btn:hover { border-color: var(--accent); }

    .cal-event { display: flex; align-items: center; gap: 6px; font-size: 11px; padding: 3px 0; }
    .cal-event-time { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); width: 84px; flex-shrink: 0; }
    .cal-event-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .cal-event-dot.focus { background: var(--accent-dim); }
    .cal-event-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-muted); }
    .cal-event-title.focus { color: var(--accent); }
    .cal-loading { font-size: 11px; color: var(--text-muted); font-style: italic; }

    .summary-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); margin-bottom: 5px; }

    .accuracy-badge { font-size: 10px; padding: 1px 6px; border-radius: 10px; border: 1px solid var(--border); }
    .accuracy-good { color: #a6d189; border-color: rgba(166,209,137,0.3); }
    .accuracy-ok   { color: #e5c890; border-color: rgba(229,200,144,0.3); }
    .accuracy-poor { color: #e78284; border-color: rgba(231,130,132,0.3); }

    .pri-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .pri-chip { font-family: var(--font-mono); font-size: 10px; padding: 1px 6px; border-radius: 10px; border: 1px solid var(--border); }
    .pri-a { color: #e78284; border-color: rgba(231,130,132,0.3); }
    .pri-b { color: #e5c890; border-color: rgba(229,200,144,0.3); }
    .pri-c { color: #a6d189; border-color: rgba(166,209,137,0.3); }

    /* ---- priority badge (clickable, on task rows) ---- */
    .priority-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; border-radius: 50%;
      font-family: var(--font-mono); font-size: 10px; font-weight: 700;
      border: 1px solid var(--border); color: var(--text-muted);
      background: transparent; cursor: pointer; user-select: none;
      flex-shrink: 0; padding: 0; line-height: 1;
    }
    .priority-badge:hover { border-color: var(--text); color: var(--text); }
    .priority-badge.pri-a { color: #e78284; border-color: rgba(231,130,132,0.55); background: rgba(231,130,132,0.12); }
    .priority-badge.pri-b { color: #e5c890; border-color: rgba(229,200,144,0.55); background: rgba(229,200,144,0.12); }
    .priority-badge.pri-c { color: #a6d189; border-color: rgba(166,209,137,0.55); background: rgba(166,209,137,0.12); }
    .priority-badge.pri-none::before { content: "\2219"; }

    /* ---- drag and drop ---- */
    .drag-handle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 14px; color: var(--text-muted); cursor: grab;
      font-size: 12px; line-height: 1; opacity: 0; flex-shrink: 0;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    .task-item:hover .drag-handle,
    .inbox-item:hover .drag-handle { opacity: 0.7; }
    .drag-handle:hover { color: var(--accent); opacity: 1 !important; }
    .drag-handle:active { cursor: grabbing; }

    .task-item.dragging,
    .inbox-item.dragging { opacity: 0.35; }
    .task-item.drop-above { box-shadow: inset 0 2px 0 0 var(--accent); }
    .task-item.drop-below { box-shadow: inset 0 -2px 0 0 var(--accent); }
    .inbox-item.drop-above { box-shadow: inset 0 2px 0 0 var(--accent); }
    .inbox-item.drop-below { box-shadow: inset 0 -2px 0 0 var(--accent); }

    /* ---- templates toolbar + editor ---- */
    .template-toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px 0; flex-wrap: wrap;
    }
    .template-toolbar label {
      font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .template-toolbar select {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 3px; color: var(--text); font-family: var(--font);
      font-size: 12px; padding: 3px 8px; outline: none;
    }
    .template-toolbar select:focus { border-color: var(--accent); }
    .template-toolbar .new-tpl-btn {
      margin-left: auto;
      background: rgba(202,158,230,0.1); border: 1px solid rgba(202,158,230,0.3);
      border-radius: 3px; color: var(--accent); cursor: pointer;
      font-family: var(--font); font-size: 12px; padding: 3px 10px;
    }
    .template-toolbar .new-tpl-btn:hover { background: rgba(202,158,230,0.22); border-color: var(--accent); }

    .template-card { position: relative; }
    .template-card .tpl-edit-btn {
      position: absolute; top: 6px; right: 6px;
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 12px; padding: 2px 6px; line-height: 1;
      opacity: 0; border-radius: 3px;
    }
    .template-card:hover .tpl-edit-btn { opacity: 1; }
    .template-card .tpl-edit-btn:hover { color: var(--accent); background: var(--surface2); }
    .modal-box.wide { width: 420px; max-width: calc(100vw - 32px); }
    .tpl-delete-btn {
      background: none; border: 1px solid rgba(231,130,132,0.4);
      border-radius: 3px; color: var(--danger); cursor: pointer;
      font-family: var(--font); font-size: 12px; padding: 5px 12px;
      margin-right: auto;
    }
    .tpl-delete-btn:hover { background: rgba(231,130,132,0.12); }

    /* ---- modals ---- */

    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,0.55); }
    .modal-box p { font-size: 13px; margin-bottom: 12px; color: var(--text); }
    .modal-label { font-size: 11px; color: var(--text-muted); margin-bottom: 5px; display: block; }
    .modal-box input, .modal-box textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; color: var(--text); font-family: var(--font-mono); font-size: 12px; padding: 6px 10px; outline: none; margin-bottom: 12px; }
    .modal-box textarea { font-family: var(--font); resize: vertical; }
    .modal-box input:focus, .modal-box textarea:focus { border-color: var(--accent); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .modal-actions button { background: none; border: 1px solid var(--border); border-radius: 3px; color: var(--text-muted); cursor: pointer; font-family: var(--font); font-size: 12px; padding: 5px 12px; }
    .modal-actions button.primary { background: var(--accent-dim); border-color: var(--accent-dim); color: #303446; }
    .modal-actions button:hover:not(.primary) { color: var(--text); border-color: var(--text-muted); }

    /* ---- toast ---- */

    #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
    .toast { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 14px; font-size: 12px; color: var(--text); box-shadow: 0 4px 16px rgba(0,0,0,0.4); animation: toast-in 0.15s ease; max-width: 280px; }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--danger); }
    .toast.info    { border-left: 3px solid var(--accent); }
    @keyframes toast-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ============================================================
       mobile — screens narrower than 768 px
       ============================================================ */

    @media (max-width: 768px) {

      /* --- base --- */
      html, body { font-size: 15px; }

      /* prevent iOS auto-zoom on input focus */
      input, textarea, select { font-size: 16px !important; }

      /* --- header --- */
      #app-header { padding: 8px 12px; gap: 8px; flex-wrap: wrap; }
      .app-name   { font-size: 12px; }
      .date-label { min-width: 78px; font-size: 11px; }
      .date-nav-btn { padding: 5px 11px; font-size: 15px; min-height: 36px; }
      .today-btn  { padding: 5px 10px; min-height: 36px; }
      .sync-indicator { display: none; }
      .logout-btn { padding: 5px 8px; font-size: 12px; min-height: 36px; }

      /* --- columns: stack vertically --- */
      #columns    { flex-direction: column; overflow-y: auto; overflow-x: hidden; }

      #left-col   {
        flex: none; width: 100%;
        border-right: none; border-bottom: 1px solid var(--border);
        overflow: visible;
      }

      /* cap the task list scroll area so the right col is reachable below */
      #left-scroll { max-height: 58vh; }

      #right-col  { flex: none; width: 100%; overflow-y: visible; padding-bottom: 32px; }

      /* --- tabs: fill full width --- */
      .tabs-bar   { display: grid; grid-template-columns: repeat(3, 1fr); }
      .tab        { padding: 11px 8px 12px; font-size: 13px; text-align: center; }

      /* --- quick-add --- */
      .quick-add-row          { padding: 10px 12px; gap: 8px; }
      .quick-add-row input    { padding: 9px 12px; }
      .quick-add-btn          { padding: 4px 14px 6px; font-size: 22px; min-width: 44px; }

      /* --- task items --- */
      .task-item { padding: 12px 12px; gap: 10px; }
      .drag-handle { opacity: 0.7; font-size: 16px; width: 20px; padding-right: 4px; }

      /* bigger visual checkbox */
      .task-check {
        width: 20px; height: 20px; font-size: 13px;
        border-width: 2px; margin-top: 0; flex-shrink: 0;
      }

      .task-text { font-size: 14px; }

      /* action buttons hidden on hover are useless on touch — always show them */
      .task-menu-btn   { opacity: 1 !important; font-size: 20px; padding: 2px 8px; }
      .sched-btn       { opacity: 1; font-size: 14px; padding: 3px 6px; }

      .timer-btn  { padding: 5px 9px; font-size: 10px; min-height: 28px; }

      /* --- subtasks --- */
      .subtask-item  { padding: 7px 8px; gap: 10px; }
      .subtask-check { width: 17px; height: 17px; flex-shrink: 0; }
      .subtask-text  { font-size: 13px; }

      /* --- options menu --- */
      /* JS sets inline left/top; on mobile we override width and reposition via JS */
      #options-menu button { padding: 12px 16px; font-size: 14px; }

      /* --- modals --- */
      .modal-box {
        width: calc(100% - 32px); max-width: 460px;
        padding: 24px 20px;
        /* keep modals inside the viewport vertically */
        max-height: 90vh; overflow-y: auto;
      }
      .modal-box input, .modal-box textarea { padding: 9px 12px; }
      .modal-actions button { padding: 10px 18px; font-size: 13px; }

      /* --- login --- */
      .login-box {
        width: calc(100% - 40px); max-width: 360px;
        padding: 28px 24px;
      }
      .login-box input[type="password"] { padding: 10px 12px; }
      .login-btn { padding: 11px; font-size: 14px; }

      /* --- toast: span full width --- */
      #toast-container { bottom: 16px; right: 12px; left: 12px; }
      .toast { max-width: 100%; }

      /* --- right col --- */
      .right-section { padding: 14px 14px; }
      .cal-event-time { font-size: 10px; width: 76px; }
      .calendar-config-btn { padding: 5px 10px; font-size: 11px; min-height: 30px; }

      /* --- template grid: single column --- */
      .template-grid { grid-template-columns: 1fr; gap: 8px; padding: 12px; }
      .template-card { padding: 14px 14px; }
      .template-name { font-size: 13px; }

      /* --- inbox --- */
      .inbox-item { padding: 10px 14px; }
      .inbox-item .drag-handle { opacity: 0.7; font-size: 16px; width: 20px; padding-right: 4px; }
      .inbox-text { font-size: 14px; }
      .inbox-add-btn, .inbox-done-btn, .inbox-readd-btn {
        padding: 6px 10px; font-size: 11px; min-height: 30px;
      }
    }
  </style>
</head>
<body>

<!-- login overlay — shown when not authenticated -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-title">daily focus</div>
    <input type="password" id="login-pw" placeholder="password" autocomplete="current-password" />
    <div id="login-error"></div>
    <button class="login-btn" id="login-btn">sign in</button>
  </div>
</div>

<div id="layout">
  <header id="app-header">
    <span class="app-name">daily focus</span>
    <div class="date-nav">
      <button class="date-nav-btn" id="prev-day-btn">&#x2039;</button>
      <span class="date-label" id="date-label"></span>
      <button class="date-nav-btn" id="next-day-btn">&#x203a;</button>
    </div>
    <button class="today-btn" id="go-today-btn">today</button>
    <span class="sync-indicator" id="sync-indicator">saving&#x2026;</span>
    <span id="dev-mode-badge" style="display:none;font-family:var(--font-mono);font-size:10px;color:var(--peach);border:1px solid rgba(239,159,118,0.5);background:rgba(239,159,118,0.1);padding:2px 7px;border-radius:3px;letter-spacing:0.05em;">DEV MODE</span>
    <button class="logout-btn" id="logout-btn" title="sign out">&#x2192; out</button>
  </header>

  <div id="columns">
    <div id="left-col">
      <nav class="tabs-bar">
        <button class="tab active" data-tab="focus">focus</button>
        <button class="tab" data-tab="inbox">kinopio</button>
        <button class="tab" data-tab="templates">templates</button>
      </nav>

      <div class="quick-add-row" id="quick-add-row">
        <input type="text" id="quick-add-input" placeholder="add a task&#x2026;" autocomplete="off" />
        <button class="quick-add-btn" id="quick-add-btn">+</button>
      </div>

      <div id="left-scroll">
        <section id="tab-focus" class="tab-content active">
          <div id="task-list"></div>
        </section>
        <section id="tab-inbox" class="tab-content">
          <div class="inbox-header-bar">
            <button class="kn-sync-btn" id="kn-sync-btn">&#x21bb; sync</button>
          </div>
          <div id="inbox-list"></div>
        </section>
        <section id="tab-templates" class="tab-content">
          <div class="template-toolbar">
            <select id="tpl-sort">
              <option value="popular">most popular</option>
              <option value="alpha">alphabetical</option>
            </select>
            <button class="new-tpl-btn" id="tpl-new-btn">+ new template</button>
          </div>
          <div id="template-grid" class="template-grid"></div>
        </section>
      </div>
    </div>

    <div id="right-col">
      <div class="right-section">
        <div class="right-section-title">
          <span>calendar</span>
          <button class="cal-refresh-btn" id="cal-refresh-btn">&#x21bb;</button>
        </div>
        <div id="cal-events"><div class="cal-loading">loading&#x2026;</div></div>
      </div>
      <div class="right-section">
        <div class="right-section-title">time</div>
        <div id="time-summary-body"><div class="cal-loading">no estimates set</div></div>
      </div>
    </div>
  </div>
</div>

<!-- options menu -->
<div id="options-menu" style="display:none">
  <button data-action="edit-content">edit task</button>
  <button data-action="edit-estimate">edit estimate</button>
  <button data-action="breakdown">add subtasks</button>
  <button data-action="set-recurring">set recurring</button>
  <div class="menu-sep"></div>
  <button data-action="move-tomorrow">move to tomorrow</button>
  <button data-action="skip" class="danger">remove</button>
</div>

<!-- actual time modal -->
<div id="actual-modal" class="modal-backdrop" style="display:none">
  <div class="modal-box">
    <p>how long did it actually take?</p>
    <input type="text" id="actual-input" placeholder="e.g. 25m or 1h 10m" autocomplete="off" />
    <label class="modal-label" for="actual-notes">notes <span style="opacity:0.5">(optional)</span></label>
    <textarea id="actual-notes" rows="3" placeholder="anything worth remembering"></textarea>
    <div class="modal-actions">
      <button id="actual-skip-btn">skip</button>
      <button id="actual-confirm-btn" class="primary">done</button>
    </div>
  </div>
</div>

<!-- subtask breakdown modal -->
<div id="breakdown-modal" class="modal-backdrop" style="display:none">
  <div class="modal-box">
    <p>add subtasks (one per line)</p>
    <textarea id="breakdown-input" rows="5" placeholder="research the topic&#10;write outline&#10;draft first section" style="font-family:var(--font)"></textarea>
    <div class="modal-actions">
      <button id="breakdown-cancel-btn">cancel</button>
      <button id="breakdown-confirm-btn" class="primary">add</button>
    </div>
  </div>
</div>

<!-- template editor modal -->
<div id="tpl-modal" class="modal-backdrop" style="display:none">
  <div class="modal-box wide">
    <p id="tpl-modal-title">new template</p>
    <label class="modal-label" for="tpl-name-input">name</label>
    <input type="text" id="tpl-name-input" placeholder="e.g. morning routine" autocomplete="off" />
    <label class="modal-label" for="tpl-tasks-input">steps <span style="opacity:0.5">(one per line)</span></label>
    <textarea id="tpl-tasks-input" rows="8" placeholder="first step&#10;second step&#10;third step" style="font-family:var(--font)"></textarea>
    <div class="modal-actions">
      <button id="tpl-delete-btn" class="tpl-delete-btn" style="display:none">delete</button>
      <button id="tpl-cancel-btn">cancel</button>
      <button id="tpl-save-btn" class="primary">save</button>
    </div>
  </div>
</div>

<!-- schedule modal -->
<div id="schedule-modal" class="modal-backdrop" style="display:none">
  <div class="modal-box">
    <p>schedule as focus time</p>
    <label class="modal-label">start time</label>
    <input type="text" id="schedule-time-input" placeholder="e.g. 2pm or 14:30" autocomplete="off" />
    <div id="schedule-dur-hint" style="font-size:11px;color:var(--text-muted);margin:-6px 0 12px;min-height:16px;"></div>
    <div class="modal-actions">
      <button id="schedule-cancel-btn">cancel</button>
      <button id="schedule-confirm-btn" class="primary">add to calendar</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<!-- integrations modal -->
<div id="integrations-modal" class="modal-backdrop" style="display:none">
  <div class="modal-box wide">
    <p>integrations</p>
    <label class="modal-label" for="kn-api-key-input">kinopio api key</label>
    <input type="password" id="kn-api-key-input" placeholder="paste kinopio api key" autocomplete="off" />
    <label class="modal-label" for="gcal-script-url-input">google calendar script url</label>
    <input type="text" id="gcal-script-url-input" placeholder="https://script.google.com/macros/s/.../exec" autocomplete="off" />
    <label class="modal-label" for="log-webhook-url-input">log webhook url <span style="opacity:0.5">(optional)</span></label>
    <input type="text" id="log-webhook-url-input" placeholder="https://..." autocomplete="off" />
    <div class="modal-actions">
      <button id="integrations-cancel-btn">cancel</button>
      <button id="integrations-save-btn" class="primary">save</button>
    </div>
  </div>
</div>

<!-- recurring task modal -->
<div id="recurring-modal" class="modal-backdrop" style="display:none">
  <div class="modal-box">
    <p>set recurring</p>
    <label class="modal-label">repeat</label>
    <select id="recurring-select" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:13px;padding:7px 10px;outline:none;margin-bottom:14px;">
      <option value="">not recurring</option>
      <option value="daily">every day</option>
      <option value="weekdays">weekdays (mon&#x2013;fri)</option>
      <option value="weekly:1">every monday</option>
      <option value="weekly:2">every tuesday</option>
      <option value="weekly:3">every wednesday</option>
      <option value="weekly:4">every thursday</option>
      <option value="weekly:5">every friday</option>
      <option value="weekly:6">every saturday</option>
      <option value="weekly:0">every sunday</option>
    </select>
    <div id="recurring-existing" style="margin-bottom:10px;font-size:11px;color:var(--text-muted);"></div>
    <div class="modal-actions">
      <button id="recurring-cancel-btn">cancel</button>
      <button id="recurring-save-btn" class="primary">save</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ============================================================
//  constants
// ============================================================

// dev mode: open focus.html?dev=1 to skip login and stub the backend with localStorage.
// intended for local testing only — no server/DB/webhook needed.
const DEV_MODE = new URLSearchParams(location.search).has('dev');

// SECURITY: All sensitive configuration keys are now stored server-side in .env
// The frontend no longer needs direct access to API keys — requests are proxied through api.php
// DO NOT add sensitive keys here. Instead:
// 1. Create a .env file with your API keys (see .env.example)
// 2. Load them in api.php using environment variables
// 3. Have the frontend proxy API requests through api.php
//
// If you are running this as a static app without api.php, the app falls back
// to localStorage for integrations config.

const INTEGRATIONS_STORE_KEY = 'df-integrations-config';
const INTEGRATIONS_ACCOUNT_KEY = '__integrations__';

let LOG_WEBHOOK_URL = '';
let GCAL_SCRIPT_URL = '';
let KN_API_KEY = '';
const KN_HIDDEN_SPACES = new Set(['inbox']);
const KN_LIST_STATUS_MAP = {
  'todo':'TODO','active':'DOING','doing':'DOING','now':'NOW','later':'LATER',
  'waiting':'WAITING','done':'DONE','canceled':'CANCELED','cancelled':'CANCELED',
};

// recurring tasks store key — entries: { id, content, recurrence, estimate, priority }
// recurrence: 'daily' | 'weekdays' | 'weekly:<0-6>' (0=Sun)
const RECURRING_STORE_KEY = 'df-recurring-tasks';

const DEFAULT_TEMPLATES = [
  { id:'morning-routine', name:'morning routine', tasks:['journal + daily intention \u2014 5 min','movement \u2014 20 min','breakfast','check calendar for today','name top 3 priorities'] },
  { id:'weekly-review', name:'weekly review', tasks:['mark anything completed that is still open in your notes','open calendar \u2014 scan last 7 days for loose ends','brain dump: what is still rattling around in your head?','check each active project \u2014 is the next action clear?','what can you drop or delegate?','pick 3 priorities for next week','block time on the calendar for those priorities'] },
  { id:'blog-post', name:'writing a blog post', tasks:['brain dump \u2014 what is the core idea?','draft outline','write first draft','step away \u2014 minimum 30 min','edit and cut ruthlessly','final read-through','publish'] },
  { id:'inbox-zero', name:'inbox zero', tasks:['open inbox','for each: delete, archive, reply (<2 min), or defer','unsubscribe from anything unhelpful','review tasks section','reach zero'] },
  { id:'grocery', name:'grocery shopping', tasks:['check pantry + fridge for staples','check meal plan for the week','write list by section','shop','put groceries away'] },
  { id:'cleaning', name:'house cleaning', tasks:['clear all surfaces','vacuum / sweep all floors','mop','bathrooms','kitchen \u2014 counters, sink, stove','start laundry','move laundry to dryer','put laundry away'] },
  { id:'pomodoro', name:'pomodoro', tasks:['decide task for this session','work \u2014 25 min','break \u2014 5 min','work \u2014 25 min','break \u2014 5 min','work \u2014 25 min','long break \u2014 15 min'] },
  { id:'eat-the-frog', name:'eat the frog', tasks:['name the frog \u2014 the task you have been avoiding','clear environment \u2014 close tabs, silence phone','work on frog task \u2014 no interruptions','log how it went'] },
  { id:'brain-dump', name:'brain dump', tasks:['set a timer for 10 min','write everything in your head \u2014 tasks, worries, ideas, anything','go through the list: delete, defer, delegate, or do','move keepers into your task list or projects','notice how much lighter you feel'] },
  { id:'shutdown-routine', name:'shutdown routine', tasks:['finish or deliberately pause any open work','check today\u2019s tasks \u2014 anything to carry forward?','scan calendar for tomorrow \u2014 any prep needed?','clear your desktop and close tabs','write one sentence: what was today about?','close your laptop or step away from your workspace'] },
  { id:'pt-stretches', name:'PT stretches', tasks:['seated straight-leg hamstring stretch \u2014 tall lumbar spine \u00d7 2 (60s each side)','standing quad stretch \u2014 top of foot on table, right knee flexed, tuck buttock under \u00d7 2 (60s each side)','standing straight-knee calf stretch \u00d7 2 (60s each side)'] },
  { id:'movement', name:'movement', tasks:['pick your move: run / yoga / rollerblade / cycle','get your gear on \u2014 the hardest part is starting','warm up for 5 min easy','go \u2014 any duration counts','stretch or cool down for 5 min','note how you feel after'] },

const _MS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const _DL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function _p2(n) { return String(n).padStart(2,'0'); }

function isoToday() {
  const d = new Date();
  return `${d.getFullYear()}-${_p2(d.getMonth()+1)}-${_p2(d.getDate())}`;
}

function isoFromDate(d) {
  return `${d.getFullYear()}-${_p2(d.getMonth()+1)}-${_p2(d.getDate())}`;
}

function isoAddDays(isoStr, n) {
  const [y, mo, day] = isoStr.split('-').map(Number);
  const d = new Date(y, mo - 1, day);
  d.setDate(d.getDate() + n);
  return isoFromDate(d);
}

function dateLabelFull(isoStr) {
  const [y, mo, day] = isoStr.split('-').map(Number);
  const d   = new Date(y, mo - 1, day);
  const dow = _DL[d.getDay()].slice(0,3);
  return `${dow}  ${_MS[mo-1]} ${day}`;
}

// ============================================================
//  estimate accuracy (rolling 14-day)
//  reads from the API, falls back to nothing if unavailable
// ============================================================

async function getEstimateAccuracy() {
  let sumRatio = 0, count = 0;
  for (let i = 0; i < 14; i++) {
    const iso = isoAddDays(state.currentDate, -i);
    try {
      const result = await apiPost({ action: 'get_tasks', date: iso });
      for (const t of (result.tasks || [])) {
        const est = parseMinutes(t.estimate || '');
        const act = parseMinutes(t.actual   || '');
        if (est > 0 && act > 0) { sumRatio += Math.min(est,act)/Math.max(est,act); count++; }
      }
    } catch { /* skip */ }
  }
  return count >= 2 ? Math.round((sumRatio / count) * 100) : null;
}

// ============================================================
//  time / duration utilities
// ============================================================

function textKey(t) { return (t||'').toLowerCase().trim().substring(0,60); }

// ---- priority helpers --------------------------------------
// priority lives either on task.priority ('A'|'B'|'C'|null)
// or legacy [#A] / [#B] / [#C] anywhere in task.content
function getPriority(task) {
  if (task && task.priority && /^[ABC]$/i.test(task.priority)) return task.priority.toUpperCase();
  const m = (task && task.content || '').match(/\[#([ABC])\]/i);
  return m ? m[1].toUpperCase() : null;
}
function stripPriority(content) { return (content||'').replace(/\[#[ABC]\]\s*/gi, '').trim(); }
function nextPriority(cur) {
  if (!cur)        return 'A';
  if (cur === 'A') return 'B';
  if (cur === 'B') return 'C';
  return null;  // C -> none
}

function parseMinutes(str) {
  if (!str) return 0;
  let mins = 0;
  const h = str.match(/(\d+(?:\.\d+)?)\s*h/i);
  const m = str.match(/(\d+)\s*m(?!o)/i);
  if (h) mins += parseFloat(h[1])*60;
  if (m) mins += parseInt(m[1]);
  if (!h && !m) mins = parseInt(str)||0;
  return Math.round(mins);
}

function formatMinutes(total) {
  if (!total) return '';
  const h = Math.floor(total/60), m = total%60;
  if (h && m) return `${h}h ${m}m`;
  return h ? `${h}h` : `${m}m`;
}

function roundUpTo10(mins) { return Math.ceil(mins/10)*10; }

function parseTimeInput(str) {
  const s = (str||'').trim().toLowerCase().replace(/\s+/g,'');
  let h, min, m;
  if      ((m = s.match(/^(\d{1,2}):(\d{2})$/)))            { h=+m[1]; min=+m[2]; }
  else if ((m = s.match(/^(\d{1,2}):(\d{2})(am|pm)$/)))     { h=+m[1]; min=+m[2]; if(m[3]==='pm'&&h<12)h+=12; if(m[3]==='am'&&h===12)h=0; }
  else if ((m = s.match(/^(\d{1,2})(am|pm)$/)))              { h=+m[1]; min=0;     if(m[2]==='pm'&&h<12)h+=12; if(m[2]==='am'&&h===12)h=0; }
  else if ((m = s.match(/^(\d{1,2})$/)))                     { h=+m[1]; min=0; }
  if (h===undefined||h<0||h>23||min<0||min>59) return null;
  return {h, min};
}

function fmtHM(h, min) { return `${h%12||12}:${String(min).padStart(2,'0')}${h>=12?'pm':'am'}`; }
function fmtCalTime(iso) { const d=new Date(iso); return fmtHM(d.getHours(),d.getMinutes()); }

function formatDueDate(iso) {
  if (!iso) return '';
  const [y,mo,d] = iso.split('-').map(Number);
  const due = new Date(y,mo-1,d), today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((due-today)/86400000);
  if (diff<0)  return `${Math.abs(diff)}d overdue`;
  if (diff===0) return 'due today';
  if (diff===1) return 'due tomorrow';
  if (diff<=7)  return `due in ${diff}d`;
  return `due ${_MS[due.getMonth()]} ${due.getDate()}`;
}

function dueDateClass(iso) {
  if (!iso) return '';
  const [y,mo,d] = iso.split('-').map(Number);
  const due = new Date(y,mo-1,d), today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((due-today)/86400000);
  if (diff<0) return 'overdue'; if (diff===0) return 'today'; if (diff<=3) return 'soon'; return 'later';
}

// ============================================================
//  linkify / escape
// ============================================================

function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function linkifyContent(raw) {
  if (!raw) return '';
  const parts = raw.split(/(\[[^\]]+\]\([^)]+\)|https?:\/\/[^\s]+)/g);
  return parts.map((part,i) => {
    if (i%2===0) return esc(part.replace(/\n/g,' '));
    const md = part.match(/^\[([^\]]+)\]\(([^)]+)\)$/);
    if (md) return `${esc(md[1])}<a class="task-link-arrow" href="${esc(md[2])}" target="_blank">&#x2192;</a>`;
    return `<a class="task-link-arrow" href="${esc(part)}" target="_blank">&#x2192;</a>`;
  }).join('');
}

function knSlug(n) { return (n||'').replace(/[^a-zA-Z0-9]+/g,'-').replace(/^-|-$/g,'').toLowerCase(); }

function knParseCard(card, spaceName, listName) {
  const raw = (card.name||'').trim();
  if (!raw) return null;
  const lines = raw.split('\n');
  let taskText='', urls=[], due=null;
  for (const line of lines) {
    const s = line.trim();
    if (!s) continue;
    if (/^https?:\/\//.test(s)) { urls.push(s); continue; }
    if (/^due:/i.test(s)) {
      const m = s.match(/due:\s*(\d{1,2})[/\-](\d{1,2})(?:[/\-](\d{2,4}))?/i);
      if (m) { let y=m[3]?parseInt(m[3]):new Date().getFullYear(); if(y<100)y+=2000; due=`${y}-${String(+m[1]).padStart(2,'0')}-${String(+m[2]).padStart(2,'0')}`; }
      continue;
    }
    if (!taskText) taskText = s.replace(/^\[[ xX]?\]\s*/,'').trim();
  }
  if (!taskText) return null;
  const first = lines.find(l=>l.trim())||'';
  const isDone = /^\[[xX]\]/.test(first.trim())||!!card.isDone;
  return { id: card.id, text: taskText, isDone, urls, due, space: spaceName, list: listName };
}

async function knFetch(path) {
  const resp = await fetch(`https://api.kinopio.club${path}`, {
    headers: { 'Authorization': KN_API_KEY, 'Content-Type': 'application/json' },
  });
  if (!resp.ok) throw new Error(`kinopio ${path}: ${resp.status}`);
  return resp.json();
}

function knSpaceSortKey(n) { if(/broom/i.test(n))return'0'+n; if(/ephemera/i.test(n))return'2'+n; return'1'+n; }

function findKnCardIdInState(cardText) {
  const key = textKey(cardText);
  for (const cards of Object.values(state.kinopioGroups || {})) {
    for (const card of (cards || [])) {
      if (textKey(card.text) === key && card.id) return card.id;
    }
  }
  return null;
}

function knCheckedName(name, checked=true) {
  const raw = String(name || '');
  const checkbox = /^\s*\[(?:\s|x|X)?\]\s*/;
  if (checkbox.test(raw)) {
    return raw.replace(checkbox, checked ? '[x] ' : '[] ');
  }
  return `${checked ? '[x] ' : '[] '}${raw}`.trim();
}

async function knMarkCardDone(cardText, cardId = null) {
  if (DEV_MODE) { console.log('[df dev] knMarkCardDone suppressed:', cardText); return; }
  const resolvedId = cardId || getKnCardId(cardText) || findKnCardIdInState(cardText);
  if (!resolvedId) throw new Error('could not resolve kinopio card id');
  saveKnCardId(cardText, resolvedId);

  let originalName = '';
  try {
    const current = await knFetch(`/card/${encodeURIComponent(resolvedId)}`);
    originalName = String(current?.name || '');
  } catch {}

  const nextName = knCheckedName(originalName || cardText, true);
  const resp = await fetch('https://api.kinopio.club/card', {
    method: 'PATCH',
    headers: { 'Authorization': KN_API_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: resolvedId, name: nextName }),
  });
  if (!resp.ok) {
    if (resp.status === 401 || resp.status === 403) {
      throw new Error(`kinopio denied update for card ${resolvedId} (check API key and edit access)`);
    }
    const details = await resp.text().catch(() => '');
    throw new Error(`kinopio update failed (${resp.status})${details ? ': ' + details : ''}`);
  }

  // Confirm the server-side card now has a checked checkbox prefix.
  try {
    const updated = await knFetch(`/card/${encodeURIComponent(resolvedId)}`);
    const checked = /^\s*\[[xX]\]\s*/.test(String(updated?.name || ''));
    if (!checked) throw new Error('kinopio accepted request but checkbox was not updated');
  } catch (err) {
    throw new Error(`kinopio verification failed: ${err.message || err}`);
  }
}

async function syncFromKinopio(opts = {}) {
  const interactive = !!opts.interactive;
  if (DEV_MODE) {
    // seed a couple of fake kinopio cards so the ui is exercisable
    state.kinopioGroups = {
      'dev sandbox': [
        { id:'dev-1', text:'example kinopio card', isDone:false, urls:[], due:null, space:'dev sandbox', list:null },
        { id:'dev-2', text:'another one, drag me',  isDone:false, urls:[], due:null, space:'dev sandbox', list:null },
      ],
    };
    renderInboxTab(); bindDynamicEvents();
    showToast('dev mode: fake kinopio data loaded','info');
    return;
  }
  if (!requireKinopioConfig(interactive)) return;
  const btn = document.getElementById('kn-sync-btn');
  if (btn) { btn.disabled=true; btn.textContent='↻ syncing\u2026'; }
  try {
    const spaces  = await knFetch('/user/todos');
    const todayStr = state.currentDate;
    const groups  = {};
    for (const space of (spaces||[])) {
      const spaceName  = space.name||'Untitled';
      if (KN_HIDDEN_SPACES.has(knSlug(spaceName))) continue;
      const spaceCards = space.cards||[];
      let lists = {};
      if (space.id && spaceCards.some(c=>c.listId)) {
        try { const d=await knFetch(`/space/${space.id}`); for(const l of(d.lists||[]))if(l.id)lists[l.id]=l.name||''; } catch{}
      }
      for (const rawCard of spaceCards) {
        const parsed = knParseCard(rawCard, spaceName, lists[rawCard.listId]||null);
        if (!parsed) continue;
        if (parsed.id) saveKnCardId(parsed.text, parsed.id);
        if (parsed.isDone && rawCard.updatedAt && rawCard.updatedAt.replace('Z','').split('T')[0] < todayStr) continue;
        // skip cards we already marked done locally this session
        if (_knLocalDone.has(textKey(parsed.text))) continue;
        if (!groups[spaceName]) groups[spaceName]=[];
        groups[spaceName].push(parsed);
      }
    }
    state.kinopioGroups = groups;
    renderInboxTab();
    bindDynamicEvents();
    showToast('kinopio synced', 'success');
  } catch (err) {
    showToast('sync failed: '+(err.message||err), 'error');
  } finally {
    if (btn) { btn.disabled=false; btn.textContent='\u21bb sync'; }
  }
}

async function loadCalendarEvents(dateISO) {
  if (DEV_MODE) { state.calendarEvents = []; renderRightCol(); return; }
  if (!requireCalendarConfig(false)) {
    state.calendarEvents = [];
    renderRightCol();
    return;
  }
  try {
    const resp = await fetch(GCAL_SCRIPT_URL, {
      method: 'POST', headers: {'Content-Type':'text/plain'},
      body: JSON.stringify({action:'get_calendar_events', date:dateISO}),
    });
    if (!resp.ok) throw new Error('status '+resp.status);
    const events = await resp.json();
    if (events && events.status === 'error') throw new Error(events.message || 'calendar error');
    state.calendarEvents = (Array.isArray(events)?events:[]).sort((a,b)=>new Date(a.start)-new Date(b.start));
  } catch (err) {
    console.warn('[df] loadCalendarEvents failed:', err.message);
    state.calendarEvents = [];
    const calEl = document.getElementById('cal-events');
    if (calEl) calEl.innerHTML = `<div class="cal-loading" style="font-size:11px;color:var(--danger)">calendar unavailable: ${esc(err.message)}</div>`;
    return;
  }
  renderRightCol();
}

function scheduleTask(taskId) {
  const task = state.tasks.find(t=>t.id===taskId);
  if (!task) return;
  state.schedulingId = taskId;
  const est = task.estimate||'', mins = parseMinutes(est), rounded = mins>0?roundUpTo10(mins):null;
  const hint = document.getElementById('schedule-dur-hint');
  if (hint) hint.textContent = rounded ? `duration: ${formatMinutes(rounded)} (${est} rounded up to nearest 10m)` : 'no estimate set \u2014 will default to 30m';
  document.getElementById('schedule-time-input').value = '';
  document.getElementById('schedule-modal').style.display = 'flex';
  setTimeout(()=>document.getElementById('schedule-time-input').focus(), 50);
}

async function confirmScheduleTask() {
  const id = state.schedulingId;
  if (!id) return;
  document.getElementById('schedule-modal').style.display = 'none';
  const task = state.tasks.find(t=>t.id===id);
  if (!task) { state.schedulingId=null; return; }
  const parsed = parseTimeInput(document.getElementById('schedule-time-input').value);
  if (!parsed) { showToast('invalid time \u2014 try "2pm" or "14:30"','error'); state.schedulingId=null; return; }
  const estMins = parseMinutes(task.estimate||''), durationMins = estMins>0?roundUpTo10(estMins):30;
  const [y,mo,d] = state.currentDate.split('-').map(Number);
  const start = new Date(y,mo-1,d,parsed.h,parsed.min,0);
  const end   = new Date(start.getTime()+durationMins*60000);
  const title = stripPriority(task.content);
  state.schedulingId = null;
  try {
    showToast('adding to calendar\u2026','info',2000);
    if (DEV_MODE) {
      // in dev mode, fake the response and just add to the local calendar list
      state.calendarEvents = (state.calendarEvents||[]).concat([{id:'dev-'+Date.now(),title:'Focus: '+title,start:start.toISOString(),end:end.toISOString()}]).sort((a,b)=>new Date(a.start)-new Date(b.start));
      renderRightCol(); renderFocusTab(); bindDynamicEvents();
      showToast(`[dev] ${fmtHM(parsed.h,parsed.min)}\u2013${fmtCalTime(end.toISOString())} (${formatMinutes(durationMins)})`,'success');
      return;
    }
    if (!requireCalendarConfig(true)) return;
    const resp = await fetch(GCAL_SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'create_focus_time',title,start:start.toISOString(),end:end.toISOString()})});
    if (!resp.ok) throw new Error('status '+resp.status);
    const result = await resp.json();
    if (result.status==='error') throw new Error(result.message);
    state.calendarEvents = (state.calendarEvents||[]).concat([{id:result.id||('local-'+Date.now()),title:'Focus: '+title,start:start.toISOString(),end:end.toISOString()}]).sort((a,b)=>new Date(a.start)-new Date(b.start));
    renderRightCol(); renderFocusTab(); bindDynamicEvents();
    showToast(`\u{1F4C5} ${fmtHM(parsed.h,parsed.min)}\u2013${fmtCalTime(end.toISOString())} (${formatMinutes(durationMins)})`,'success');
  } catch(err) { showToast('calendar error: '+err.message,'error'); }
}

  const task = { id:genId(), content, marker:'TODO', subtasks:[], dueDate:null, carriedFrom:null, estimate:'', actual:'', createdAt:new Date().toISOString(), fromKinopio:false, knCardId:null, priority:null, defers:0 };
  state.tasks.push(task);
  await persistTasks(state.currentDate, state.tasks);
  render();
  document.getElementById('quick-add-input').value = '';
  showToast('task added','success');
}

async function setPriority(taskId, pri) {
  const task = state.tasks.find(t => t.id === taskId);
  if (!task) return;
  // clear any legacy [#X] out of the content so it doesn't double-up
  task.content = stripPriority(task.content);
  task.priority = pri || null;
  await persistTasks(state.currentDate, state.tasks);
  render();

function markDone(taskId) {
  state.pendingDoneId = taskId;
  let prefilledTime = '';
  if (state.activeTimerUuid === taskId) { const {elapsed}=stopTimer(); prefilledTime=elapsedToTimeStr(elapsed); }
  document.getElementById('actual-input').value = prefilledTime;
  document.getElementById('actual-notes').value = '';
  document.getElementById('actual-modal').style.display = 'flex';
  setTimeout(()=>{ const inp=document.getElementById('actual-input'); inp.focus(); if(prefilledTime)inp.select(); },50);
}

async function completeDone(actualTime, notes) {
  const id = state.pendingDoneId;
  if (!id) return;
  document.getElementById('actual-modal').style.display = 'none';
  const task = state.tasks.find(t=>t.id===id);
  if (!task) { state.pendingDoneId=null; return; }
  const actualTrimmed = (actualTime||'').trim();
  task.marker = 'DONE';
  if (actualTrimmed) task.actual = actualTrimmed;
  state.tasks = state.tasks.filter(t=>t.id!==id);
  await persistTasks(state.currentDate, state.tasks);
  logToWebhook({ date:state.currentDate, task:stripPriority(task.content), estimate:task.estimate||'', actual:actualTrimmed, deferred:task.defers||0, notes:(notes||'').trim(), event:'done', priority:getPriority(task)||'' });
  if (task.fromKinopio && task.knCardId) {
    try {
      await knMarkCardDone(task.content, task.knCardId);
    } catch (err) {
      showToast('kinopio update failed: ' + (err.message || err), 'error');
    }
    for (const s of Object.keys(state.kinopioGroups)) state.kinopioGroups[s]=(state.kinopioGroups[s]||[]).filter(c=>textKey(c.text)!==textKey(task.content));
    // force a re-sync so kinopio state is confirmed (and the card does not re-appear on next pull)
    syncFromKinopio().catch(() => {});
  }
  state.pendingDoneId = null;
  render();
}

async function logToWebhook(payload) {
  if (DEV_MODE) { console.log('[df dev] logToWebhook suppressed:', payload); return; }
  if (!LOG_WEBHOOK_URL) return;
  try { await fetch(LOG_WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)}); }
  catch(err){ console.warn('[df] webhook failed',err); }
}

async function skipTask(taskId) {
  const task = state.tasks.find(t=>t.id===taskId);
  if (task && task.fromKinopio) unmarkAddedToDay(state.currentDate, task.content);
  state.tasks = state.tasks.filter(t=>t.id!==taskId);
  await persistTasks(state.currentDate, state.tasks);
  render();
}

async function moveToTomorrow(taskId) {
  const task = state.tasks.find(t=>t.id===taskId);
  if (!task) return;
  const tomorrowISO   = isoAddDays(state.currentDate, 1);
  const tomorrowTasks = await fetchTasks(tomorrowISO);
  const newDefers = (task.defers || 0) + 1;
  if (!tomorrowTasks.some(t=>textKey(t.content)===textKey(task.content))) {
    tomorrowTasks.push({...task, id:genId(), marker:'TODO', carriedFrom:state.currentDate, actual:'', createdAt:new Date().toISOString(), defers: newDefers});
    await persistTasks(tomorrowISO, tomorrowTasks);
  }
  addDeferred(state.currentDate, task.content);
  // log the defer so we keep a running count per task
  logToWebhook({ date:state.currentDate, task:stripPriority(task.content), estimate:task.estimate||'', actual:'', deferred:newDefers, event:'defer', priority:getPriority(task)||'' });
  state.tasks = state.tasks.filter(t=>t.id!==taskId);
  await persistTasks(state.currentDate, state.tasks);
  render();
  showToast('moved to tomorrow','success');
}

async function updateEstimate(taskId, value) {
  const task = state.tasks.find(t=>t.id===taskId);
  if (!task) return;
  task.estimate = (value||'').trim();
  await persistTasks(state.currentDate, state.tasks);
  state.editingEstId = null;

async function updateContent(taskId, newContent) {
  const task = state.tasks.find(t=>t.id===taskId);

  const trimmed = (newContent||'').replace(/^(TODO|DOING|DONE|NOW|LATER|WAITING)\s+/i,'').trim();
  if (trimmed) task.content = trimmed;
  await persistTasks(state.currentDate, state.tasks);

async function addSubtasks(taskId, lines) {
  const task  = state.tasks.find(t=>t.id===taskId);
  if (!task) return;
  const steps = lines.map(l=>l.trim()).filter(Boolean);
  if (!steps.length) return;
  for (const step of steps) task.subtasks.push({id:genId(), content:step, marker:'TODO'});
  await persistTasks(state.currentDate, state.tasks);
  showToast(`added ${steps.length} subtask${steps.length!==1?'s':''}`, 'success');
  render();
}

async function toggleSubtask(taskId, subtaskId) {
  const task    = state.tasks.find(t=>t.id===taskId);
  if (!task) return;
  const subtask = task.subtasks.find(s=>s.id===subtaskId);
  if (!subtask) return;
  subtask.marker = subtask.marker==='DONE'?'TODO':'DONE';
  await persistTasks(state.currentDate, state.tasks);
  const check = document.querySelector(`.subtask-check[data-sub-id="${subtaskId}"]`);
  const text  = document.querySelector(`.subtask-text[data-sub-id="${subtaskId}"]`);
  if (check) check.classList.toggle('done', subtask.marker==='DONE');
  if (text)  text.classList.toggle('done',  subtask.marker==='DONE');
}

async function addKinopioItemToDay(cardObj) {
  if (!cardObj || !cardObj.text) return;
  const already = state.tasks.some(t=>textKey(t.content)===textKey(cardObj.text));
  if (!already) {
    state.tasks.push({id:genId(), content:cardObj.text, marker:'TODO', subtasks:[], dueDate:cardObj.due||null, carriedFrom:null, estimate:'', actual:'', createdAt:new Date().toISOString(), fromKinopio:true, knCardId:cardObj.id||null});
    await persistTasks(state.currentDate, state.tasks);
  }
  markAddedToDay(state.currentDate, cardObj.text);
  renderFocusTab(); renderInboxTab(); bindDynamicEvents();
  showToast('added to today','success');
}

// set of card IDs (or textKeys) we have locally marked done this session,
// so a background re-sync does not resurrect them before the API confirms
const _knLocalDone = new Set();

async function markKinopioItemDone(cardText, cardId) {
  if (cardId) saveKnCardId(cardText, cardId);
  const k = textKey(cardText);
  // optimistically suppress this card in future syncs for this session
  _knLocalDone.add(k);
  try {
    await knMarkCardDone(cardText, cardId || null);
  } catch (err) {
    _knLocalDone.delete(k);
    showToast('kinopio update failed: ' + (err.message || err), 'error');
    return;
  }
  for (const s of Object.keys(state.kinopioGroups)) state.kinopioGroups[s]=(state.kinopioGroups[s]||[]).filter(c=>textKey(c.text)!==k);
  const before = state.tasks.length;
  state.tasks = state.tasks.filter(t=>textKey(t.content)!==k);
  if (state.tasks.length!==before) await persistTasks(state.currentDate, state.tasks);
  render();
  showToast('marked done in kinopio','success');
  // note: intentionally no re-sync here — the PATCH may not have propagated yet.
  // the card is suppressed locally; a manual sync will confirm the server state.
}

// returns true if the recurring rule fires on the given ISO date
function recurringFiresOn(recurrence, isoStr) {
  const [y, mo, d] = isoStr.split('-').map(Number);
  const dow = new Date(y, mo - 1, d).getDay(); // 0=Sun
  if (recurrence === 'daily') return true;
  if (recurrence === 'weekdays') return dow >= 1 && dow <= 5;
  const m = (recurrence || '').match(/^weekly:(\d)$/);
  if (m) return dow === parseInt(m[1]);
  return false;
}

// inject any recurring tasks for dateISO that are not already present in tasks array
function injectRecurringTasks(dateISO, tasks) {
  const recurring = loadRecurring();
  let changed = false;
  for (const r of recurring) {
    if (!recurringFiresOn(r.recurrence, dateISO)) continue;
    const already = tasks.some(t => textKey(t.content) === textKey(r.content));
    if (already) continue;
    tasks.push({
      id: genId(), content: r.content, marker: 'TODO', subtasks: [],
      dueDate: null, carriedFrom: null, estimate: r.estimate || '',
      actual: '', createdAt: new Date().toISOString(),
      fromKinopio: false, knCardId: null,
      priority: r.priority || null, defers: 0,
      recurringId: r.id,   // link back so we can identify it
    });
    changed = true;
  }
  return changed;
}

function recurringLabel(recurrence) {
  if (recurrence === 'daily') return 'daily';
  if (recurrence === 'weekdays') return 'weekdays';
  const m = (recurrence || '').match(/^weekly:(\d)$/);
  if (m) return 'weekly \u00b7 ' + ['sun','mon','tue','wed','thu','fri','sat'][parseInt(m[1])];
  return recurrence || '';
}

function slugifyTplName(name) {
  const base = (name||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') || 'template';
  // ensure uniqueness
  const existing = new Set(TEMPLATES.map(t => t.id));
  if (!existing.has(base)) return base;
  let n = 2;
  while (existing.has(base + '-' + n)) n++;
  return base + '-' + n;
}

      // ============================================================
      //  drag and drop
      // ============================================================

      function clearDropHints(selector) {
        document.querySelectorAll(selector).forEach((el) => {
          el.classList.remove("drop-above", "drop-below", "drop-before", "drop-after");
        });
      }

      const touchDragState = {
        active: false,
        kind: null,
        pointerId: null,
        sourceEl: null,
        sourceId: null,
        sourceSpace: null,
        targetEl: null,
        before: true,
      };

      function getTouchDropTarget(kind, clientX, clientY) {
        const el = document.elementFromPoint(clientX, clientY);
        if (!el) return null;
        return el.closest(
          kind === "task" ? '.task-item[draggable="true"]' : '.inbox-item[draggable="true"]',
        );
      }

      function updateTouchDropHint(kind, targetEl, clientX, clientY) {
        const selector = kind === "task" ? ".task-item" : ".inbox-item";
        clearDropHints(selector);
        if (!targetEl) return true;
        const rect = targetEl.getBoundingClientRect();
        const before = clientY - rect.top < rect.height / 2;
        targetEl.classList.add(before ? "drop-above" : "drop-below");
        touchDragState.targetEl = targetEl;
        touchDragState.before = before;
        return before;
      }

      function beginTouchDrag(kind, itemEl, pointerId) {
        touchDragState.active = true;
        touchDragState.kind = kind;
        touchDragState.pointerId = pointerId;
        touchDragState.sourceEl = itemEl;
        touchDragState.sourceId = kind === "task" ? itemEl.dataset.id : itemEl.dataset.knKey;
        touchDragState.sourceSpace = kind === "task" ? null : itemEl.dataset.knSpace;
        touchDragState.targetEl = itemEl;
        touchDragState.before = true;
        itemEl.classList.add("dragging");
      }

      function cancelTouchDrag() {
        if (!touchDragState.active) return;
        if (touchDragState.sourceEl) touchDragState.sourceEl.classList.remove("dragging");
        clearDropHints(touchDragState.kind === "task" ? ".task-item" : ".inbox-item");
        touchDragState.active = false;
        touchDragState.kind = null;
        touchDragState.pointerId = null;
        touchDragState.sourceEl = null;
        touchDragState.sourceId = null;
        touchDragState.sourceSpace = null;
        touchDragState.targetEl = null;
        touchDragState.before = true;
      }

      async function commitTouchDrag(clientX, clientY) {
        if (!touchDragState.active) return;
        const { kind, sourceEl, sourceId, sourceSpace } = touchDragState;
        const targetEl = getTouchDropTarget(kind, clientX, clientY);
        const before = updateTouchDropHint(kind, targetEl, clientX, clientY);
        if (!targetEl || !sourceEl) {
          cancelTouchDrag();
          return;
        }

        if (kind === "task") {
          const dstId = targetEl.dataset.id;
          if (!sourceId || !dstId || sourceId === dstId) {
            cancelTouchDrag();
            return;
          }
          const srcIdx = state.tasks.findIndex((t) => t.id === sourceId);
          const dstIdx = state.tasks.findIndex((t) => t.id === dstId);
          if (srcIdx < 0 || dstIdx < 0) {
            cancelTouchDrag();
            return;
          }
          const [moved] = state.tasks.splice(srcIdx, 1);
          const adjustedDstIdx = state.tasks.findIndex((t) => t.id === dstId);
          state.tasks.splice(before ? adjustedDstIdx : adjustedDstIdx + 1, 0, moved);
          await persistTasks(state.currentDate, state.tasks);
          render();
          return;
        }

        const dstKey = targetEl.dataset.knKey;
        if (
          !sourceId ||
          !dstKey ||
          sourceId === dstKey ||
          sourceSpace !== targetEl.dataset.knSpace
        ) {
          cancelTouchDrag();
          return;
        }
        const cards = state.kinopioGroups[sourceSpace] || [];
        const srcKey = sourceId.split("::").slice(1).join("::");
        const dstTextKey = dstKey.split("::").slice(1).join("::");
        const srcIdx = cards.findIndex((c) => textKey(c.text) === srcKey);
        const dstIdx = cards.findIndex((c) => textKey(c.text) === dstTextKey);
        if (srcIdx < 0 || dstIdx < 0) {
          cancelTouchDrag();
          return;
        }
        const [moved] = cards.splice(srcIdx, 1);
        const adjustedDstIdx = cards.findIndex((c) => textKey(c.text) === dstTextKey);
        cards.splice(before ? adjustedDstIdx : adjustedDstIdx + 1, 0, moved);
        state.kinopioGroups[sourceSpace] = cards;
        saveKnOrder(
          sourceSpace,
          cards.map((c) => textKey(c.text)),
        );
        renderInboxTab();
        bindDynamicEvents();
      }

      function bindTouchReorderListeners() {
        if (document.__dfTouchReorderBound) return;
        document.__dfTouchReorderBound = true;

        function isAnyModalOpen() {
          const modals = document.querySelectorAll(".modal-backdrop");
          for (const modal of modals) {
            if (modal && modal.style && modal.style.display !== "none") return true;
          }
          return false;
        }

        document.addEventListener(
          "pointermove",
          (e) => {
            if (isAnyModalOpen()) {
              cancelTouchDrag();
              return;
            }
            if (!touchDragState.active || e.pointerId !== touchDragState.pointerId) return;
            e.preventDefault();
            const targetEl = getTouchDropTarget(touchDragState.kind, e.clientX, e.clientY);
            updateTouchDropHint(touchDragState.kind, targetEl, e.clientX, e.clientY);
          },
          { passive: false },
        );
        document.addEventListener("pointerup", (e) => {
          if (!touchDragState.active || e.pointerId !== touchDragState.pointerId) return;
          commitTouchDrag(e.clientX, e.clientY).catch(() => cancelTouchDrag());
          cancelTouchDrag();
        });
        document.addEventListener("pointercancel", (e) => {
          if (!touchDragState.active || e.pointerId !== touchDragState.pointerId) return;
          cancelTouchDrag();
        });
      }

      function reorderTaskByPointer(srcId, dstId, before) {
        const srcIdx = state.tasks.findIndex((t) => t.id === srcId);
        const dstIdx = state.tasks.findIndex((t) => t.id === dstId);
        if (srcIdx < 0 || dstIdx < 0) return false;
        const [moved] = state.tasks.splice(srcIdx, 1);
        const adjustedDstIdx = state.tasks.findIndex((t) => t.id === dstId);
        state.tasks.splice(before ? adjustedDstIdx : adjustedDstIdx + 1, 0, moved);
        return true;
      }

      function reorderInboxCardByPointer(space, srcKey, dstKey, before) {
        const cards = state.kinopioGroups[space] || [];
        const srcIdx = cards.findIndex((c) => textKey(c.text) === srcKey);
        if (srcIdx < 0) return false;
        const [moved] = cards.splice(srcIdx, 1);
        const adjustedDstIdx = cards.findIndex((c) => textKey(c.text) === dstKey);
        if (adjustedDstIdx < 0) {
          cards.push(moved);
        } else {
          cards.splice(before ? adjustedDstIdx : adjustedDstIdx + 1, 0, moved);
        }
        state.kinopioGroups[space] = cards;
        return true;
      }

      function bindTaskDragEvents() {
        document.querySelectorAll('.task-item[draggable="true"]').forEach((item) => {
          item.addEventListener("dragstart", (e) => {
            state.draggingTaskId = item.dataset.id;
            item.classList.add("dragging");
            try {
              e.dataTransfer.setData("text/plain", item.dataset.id);
            } catch {}
            if (e.dataTransfer) e.dataTransfer.effectAllowed = "move";
          });
          item.addEventListener("dragend", () => {
            item.classList.remove("dragging");
            clearDropHints(".task-item");
            state.draggingTaskId = null;
          });
          item.addEventListener("dragover", (e) => {
            if (!state.draggingTaskId && !state.draggingChipType) return;
            e.preventDefault();
            if (state.draggingChipType) {
              if (e.dataTransfer) e.dataTransfer.dropEffect = "copy";
              clearDropHints(".task-item");
              item.classList.add("chip-drop-target");
            } else {
              if (e.dataTransfer) e.dataTransfer.dropEffect = "move";
              const rect = item.getBoundingClientRect();
              const above = e.clientY - rect.top < rect.height / 2;
              clearDropHints(".task-item");
              item.classList.add(above ? "drop-above" : "drop-below");
            }
          });
          item.addEventListener("dragleave", () => {
            item.classList.remove("drop-above", "drop-below", "chip-drop-target");
          });
          item.addEventListener("drop", async (e) => {
            e.preventDefault();
            clearDropHints(".task-item");
            item.classList.remove("chip-drop-target");
            if (state.draggingChipType) {
              const task = state.tasks.find((t) => t.id === item.dataset.id);
              if (!task) return;
              if (state.draggingChipType === "time") {
                task.estimate = state.draggingChipValue;
              } else if (state.draggingChipType === "tpl") {
                task.tags = task.tags || [];
                if (!task.tags.includes(state.draggingChipValue)) {
                  task.tags.push(state.draggingChipValue);
                }
              }
              await persistTasks(state.currentDate, state.tasks);
              render();
              return;
            }
            const srcId = state.draggingTaskId;
            const dstId = item.dataset.id;
            if (!srcId || !dstId || srcId === dstId) return;
            const rect = item.getBoundingClientRect();
            const above = e.clientY - rect.top < rect.height / 2;
            if (!reorderTaskByPointer(srcId, dstId, above)) return;
            await persistTasks(state.currentDate, state.tasks);
            render();
          });

          const handle = item.querySelector(".drag-handle");
          if (handle) {
            handle.addEventListener(
              "pointerdown",
              (e) => {
                if (e.pointerType === "mouse") return;
                e.preventDefault();
                e.stopPropagation();
                beginTouchDrag("task", item, e.pointerId);
              },
              { passive: false },
            );
          }
        });
      }

      function bindInboxDragEvents() {
        document.querySelectorAll('.inbox-item[draggable="true"]').forEach((item) => {
          item.addEventListener("dragstart", (e) => {
            state.draggingKnKey = { key: item.dataset.knKey, space: item.dataset.knSpace };
            item.classList.add("dragging");
            if (e.dataTransfer) e.dataTransfer.effectAllowed = "move";
          });
          item.addEventListener("dragend", () => {
            item.classList.remove("dragging");
            clearDropHints(".inbox-item");
            state.draggingKnKey = null;
          });
          item.addEventListener("dragover", (e) => {
            if (!state.draggingKnKey) return;
            // only allow reordering within the same space
            if (state.draggingKnKey.space !== item.dataset.knSpace) return;
            e.preventDefault();
            if (e.dataTransfer) e.dataTransfer.dropEffect = "move";
            const rect = item.getBoundingClientRect();
            const above = e.clientY - rect.top < rect.height / 2;
            clearDropHints(".inbox-item");
            item.classList.add(above ? "drop-above" : "drop-below");
          });
          item.addEventListener("dragleave", () => {
            item.classList.remove("drop-above", "drop-below");
          });
          item.addEventListener("drop", (e) => {
            e.preventDefault();
            const drag = state.draggingKnKey;
            clearDropHints(".inbox-item");
            if (!drag) return;
            if (drag.space !== item.dataset.knSpace) return;
            if (drag.key === item.dataset.knKey) return;

            const space = drag.space;
            const cards = state.kinopioGroups[space] || [];
            // find indices by textKey (knKey = space::textKey)
            const srcKey = drag.key.split("::").slice(1).join("::");
            const dstKey = item.dataset.knKey.split("::").slice(1).join("::");
            const rect = item.getBoundingClientRect();
            const above = e.clientY - rect.top < rect.height / 2;
            if (!reorderInboxCardByPointer(space, srcKey, dstKey, above)) return;
            saveKnOrder(
              space,
              cards.map((c) => textKey(c.text)),
            );
            renderInboxTab();
            bindDynamicEvents();
          });

          const handle = item.querySelector(".drag-handle");
          if (handle) {
            handle.addEventListener(
              "pointerdown",
              (e) => {
                if (e.pointerType === "mouse") return;
                e.preventDefault();
                e.stopPropagation();
                beginTouchDrag("inbox", item, e.pointerId);
              },
              { passive: false },
            );
          }
        });
      }

      // ---- column resize handle ----
      (function initColResize() {
        const STORAGE_KEY = "df-col-left-pct";
        const COLLAPSE_THRESHOLD = 0.82; // collapse right panel when left exceeds 82% of total width
        const MIN_LEFT_PCT = 0.30;
        const MAX_LEFT_PCT = 0.97;

        const handle = document.getElementById("col-resize-handle");
        const leftCol = document.getElementById("left-col");
        const rightCol = document.getElementById("right-col");
        if (!handle || !leftCol || !rightCol) return;

        function applyPct(pct) {
          const collapsed = pct >= COLLAPSE_THRESHOLD;
          const clampedPct = Math.min(pct, collapsed ? 1 : COLLAPSE_THRESHOLD - 0.01);
          leftCol.style.flex = `0 0 ${(clampedPct * 100).toFixed(1)}%`;
          rightCol.classList.toggle("collapsed", collapsed);
          handle.classList.toggle("hidden-handle", collapsed);
        }

        // restore saved width
        const saved = parseFloat(localStorage.getItem(STORAGE_KEY));
        if (!isNaN(saved)) applyPct(saved);

        let startX, startLeftW, totalW;
        handle.addEventListener("mousedown", (e) => {
          e.preventDefault();
          startX = e.clientX;
          startLeftW = leftCol.getBoundingClientRect().width;
          totalW = document.getElementById("columns").getBoundingClientRect().width;
          handle.classList.add("dragging");
          document.body.style.cursor = "col-resize";
          document.body.style.userSelect = "none";
        });
        document.addEventListener("mousemove", (e) => {
          if (!handle.classList.contains("dragging")) return;
          const delta = e.clientX - startX;
          const newPct = Math.min(MAX_LEFT_PCT, Math.max(MIN_LEFT_PCT, (startLeftW + delta) / totalW));
          applyPct(newPct);
          localStorage.setItem(STORAGE_KEY, newPct);
        });
        document.addEventListener("mouseup", () => {
          if (!handle.classList.contains("dragging")) return;
          handle.classList.remove("dragging");
          document.body.style.cursor = "";
          document.body.style.userSelect = "";
        });

        // double-click to reset to default
        handle.addEventListener("dblclick", () => {
          applyPct(0.62);
          localStorage.setItem(STORAGE_KEY, 0.62);
        });
      })();

      (function initSectionResize() {
        const STORAGE_KEY = "df-section-heights";
        const MIN_H = 60;
        const MAX_H = 800;

        function loadHeights() {
          try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
          catch { return {}; }
        }
        function saveHeights(h) {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(h));
        }
        function applyHeights() {
          const heights = loadHeights();
          for (const [id, h] of Object.entries(heights)) {
            const el = document.getElementById(id);
            if (el) el.style.maxHeight = h + "px";
          }
        }
        applyHeights();

        let activeHandle = null, startY = 0, startH = 0, targetEl = null;

        document.addEventListener("mousedown", (e) => {
          const handle = e.target.closest(".section-resize-handle");
          if (!handle) return;
          const panelId = handle.dataset.resizePanel;
          targetEl = document.getElementById(panelId);
          if (!targetEl) return;
          e.preventDefault();
          activeHandle = handle;
          startY = e.clientY;
          startH = targetEl.getBoundingClientRect().height;
          handle.classList.add("dragging");
          document.body.style.cursor = "ns-resize";
          document.body.style.userSelect = "none";
        });
        document.addEventListener("mousemove", (e) => {
          if (!activeHandle || !targetEl) return;
          const newH = Math.min(MAX_H, Math.max(MIN_H, startH + (e.clientY - startY)));
          targetEl.style.maxHeight = newH + "px";
        });
        document.addEventListener("mouseup", () => {
          if (!activeHandle || !targetEl) return;
          const heights = loadHeights();
          heights[targetEl.id] = parseInt(targetEl.style.maxHeight);
          saveHeights(heights);
          activeHandle.classList.remove("dragging");
          document.body.style.cursor = "";
          document.body.style.userSelect = "";
          activeHandle = null;
          targetEl = null;
        });

        // double-click handle to reset section height
        document.addEventListener("dblclick", (e) => {
          const handle = e.target.closest(".section-resize-handle");
          if (!handle) return;
          const panelId = handle.dataset.resizePanel;
          const el = document.getElementById(panelId);
          if (!el) return;
          el.style.maxHeight = "";
          const heights = loadHeights();
          delete heights[panelId];
          saveHeights(heights);
        });
      })();

          }, 40);
        } else if (action === "breakdown") {
          const task = state.tasks.find((t) => t.id === id);
          if (!task) return;
          state.breakdownMode = "ai";
          state.breakdownId = id;
          document.querySelector("#breakdown-modal p").textContent =
            "breakdown (edit before saving)";
          document.getElementById("breakdown-input").value = "generating...";
          document.getElementById("breakdown-modal").style.display = "flex";
          const lines = await generateAIBreakdown(stripPriority(task.content));
          if (state.breakdownId !== id) return;
          document.getElementById("breakdown-input").value = lines.join("\n");
          setTimeout(() => document.getElementById("breakdown-input").focus(), 50);
        } else if (action === "set-recurring") {
          openRecurringModal(id);
        } else if (action === "skip") await skipTask(id);
        else if (action === "move-tomorrow") await moveToTomorrow(id);
      });

      document.addEventListener("click", (e) => {
        const menu = document.getElementById("options-menu");
        if (menu.style.display !== "none" && !menu.contains(e.target)) {
          menu.style.display = "none";
          state.activeMenuId = null;
        }
      });

      document
        .getElementById("actual-confirm-btn")
        .addEventListener("click", () =>
          completeDone(
            document.getElementById("actual-input").value,
            document.getElementById("actual-notes").value,
          ),
        );
      document
        .getElementById("actual-skip-btn")
        .addEventListener("click", () => completeDone("", ""));
      document.getElementById("actual-cancel-btn").addEventListener("click", () => {
        document.getElementById("actual-modal").style.display = "none";
        state.pendingDoneId = null;
      });
      document.getElementById("actual-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter")
          completeDone(e.target.value, document.getElementById("actual-notes").value);
        if (e.key === "Escape") {
          document.getElementById("actual-modal").style.display = "none";
          state.pendingDoneId = null;
        }
      });
      document.getElementById("actual-notes").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && (e.ctrlKey || e.metaKey))
          completeDone(document.getElementById("actual-input").value, e.target.value);
        if (e.key === "Escape") {
          document.getElementById("actual-modal").style.display = "none";
          state.pendingDoneId = null;
        }
      });

      document.getElementById("breakdown-confirm-btn").addEventListener("click", () => {
        const id = state.breakdownId;
        const lines = document.getElementById("breakdown-input").value.split("\n");
        document.getElementById("breakdown-modal").style.display = "none";
        document.querySelector("#breakdown-modal p").textContent = "breakdown (edit before saving)";
        state.breakdownId = null;
        state.breakdownMode = "manual";
        if (id) addSubtasks(id, lines);
      });
      document.getElementById("breakdown-cancel-btn").addEventListener("click", () => {
        document.getElementById("breakdown-modal").style.display = "none";
        document.querySelector("#breakdown-modal p").textContent = "breakdown (edit before saving)";
        state.breakdownId = null;
        state.breakdownMode = "manual";
      });
      document.getElementById("breakdown-input").addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          document.getElementById("breakdown-modal").style.display = "none";
          document.querySelector("#breakdown-modal p").textContent =
            "breakdown (edit before saving)";
          state.breakdownId = null;
          state.breakdownMode = "manual";
        }
        if (e.key === "Enter" && (e.ctrlKey || e.metaKey))
          document.getElementById("breakdown-confirm-btn").click();
      });

      document
        .getElementById("schedule-confirm-btn")
        .addEventListener("click", confirmScheduleTask);
      document.getElementById("schedule-cancel-btn").addEventListener("click", () => {
        document.getElementById("schedule-modal").style.display = "none";
        state.schedulingId = null;
      });
      document.getElementById("schedule-time-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") confirmScheduleTask();
        if (e.key === "Escape") {
          document.getElementById("schedule-modal").style.display = "none";
          state.schedulingId = null;
        }
      });

      document
        .getElementById("integrations-save-btn")
        .addEventListener("click", saveIntegrationsFromModal);
      document
        .getElementById("integrations-test-btn")
        .addEventListener("click", testWebhookFromModal);
      document
        .getElementById("integrations-cancel-btn")
        .addEventListener("click", closeIntegrationsModal);
      document
        .getElementById("integrations-close-btn")
        .addEventListener("click", closeIntegrationsModal);
      document
        .getElementById("integrations-inline-save-btn")
        .addEventListener("click", saveIntegrationsFromInline);
      document
        .getElementById("integrations-inline-test-btn")
        .addEventListener("click", testWebhookFromInline);
      document
        .getElementById("integrations-inline-close-btn")
        .addEventListener("click", closeIntegrationsInline);
      document.getElementById("integrations-modal").addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeIntegrationsModal();
        if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) saveIntegrationsFromModal();
      });
      document.getElementById("integrations-modal").addEventListener("click", (e) => {
        if (e.target && e.target.id === "integrations-modal") closeIntegrationsModal();
      });

      document.getElementById("cal-refresh-btn").addEventListener("click", () => {
        if (!GCAL_SCRIPT_URL) {
          openIntegrationsModal("gcal");
          state.calendarEvents = [];
          renderRightCol();
          return;
        }
        state.calendarEvents = null;
        renderRightCol();
        loadCalendarEvents(state.currentDate).catch(() => {});
      });
      document
        .getElementById("kn-sync-btn")
        .addEventListener("click", () => syncFromKinopio({ interactive: true }));
      window.addEventListener("online", () => {
        flushWebhookQueue().catch(() => {});
      });

      document
        .getElementById("recurring-save-btn")
        .addEventListener("click", saveRecurringFromModal);
      document
        .getElementById("recurring-cancel-btn")
        .addEventListener("click", closeRecurringModal);
      document.getElementById("recurring-select-all-btn").addEventListener("click", () => {
        document.querySelectorAll("#recurring-weekdays input[data-day]").forEach((input) => {
          input.checked = true;
        });
      });
      document.getElementById("recurring-weekdays-btn").addEventListener("click", () => {
        document.querySelectorAll("#recurring-weekdays input[data-day]").forEach((input) => {
          const day = parseInt(input.dataset.day, 10);
          input.checked = day >= 1 && day <= 5;
        });
      });
      document.getElementById("recurring-clear-btn").addEventListener("click", () => {
        document.querySelectorAll("#recurring-weekdays input[data-day]").forEach((input) => {
          input.checked = false;
        });
      });
      document.getElementById("recurring-modal").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) saveRecurringFromModal();
        if (e.key === "Escape") closeRecurringModal();
      });

      // --- template editor wiring ---
      document
        .getElementById("tpl-new-btn")
        .addEventListener("click", () => openTemplateEditor(null));
      document.getElementById("tpl-sort").addEventListener("change", (e) => {
        saveTplSort(e.target.value);
        renderTemplatesTab();
        bindDynamicEvents();
      });
      document.getElementById("tpl-save-btn").addEventListener("click", saveTemplateFromEditor);
      document.getElementById("tpl-cancel-btn").addEventListener("click", closeTemplateEditor);
      document.getElementById("tpl-delete-btn").addEventListener("click", deleteTemplateFromEditor);
      document.getElementById("tpl-name-input").addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeTemplateEditor();
        if (e.key === "Enter") {
          e.preventDefault();
          document.getElementById("tpl-tasks-input").focus();
        }
      });
      document.getElementById("tpl-tasks-input").addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeTemplateEditor();
        if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) saveTemplateFromEditor();
      });

      // ============================================================
      //  init — check session then load
      // ============================================================

      (async () => {
        loadCollapsedPanels();
        loadTemplates();
        if (DEV_MODE) {
          await loadIntegrationsConfig();
          flushWebhookQueue().catch(() => {});
          document.getElementById("dev-mode-badge").style.display = "inline-block";
          hideLogin();
          await setDate(isoToday());
          return;
        }
        try {
          const result = await apiPost({ action: "check" });
          if (result.ok) {
            await loadIntegrationsConfig();
            flushWebhookQueue().catch(() => {});
            hideLogin();
            await setDate(isoToday());
          } else {
            showLogin();
          }
        } catch {
          showLogin();
        }
      })();
    </script>
  <div id="kn-tooltip" class="kn-tooltip"></div>
  </body>
</html>

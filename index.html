              ${tmrwTplSel ? `<label class="modal-label">tomorrow's template</label>${tmrwTplSel}` : ""}
              <label class="modal-label">tomorrow's paper</label>
              ${tmrwPaperSel}
              <label class="modal-label">tomorrow's project</label>
              ${tmrwProjSel}
              <div style="margin-top:4px">
                <button class="zombie-times-toggle" id="zombie-tmrw-times-toggle" data-open="false">adjust tomorrow's times &#x25be;</button>
              </div>
              <div id="zombie-tmrw-times-panel" style="display:none">
                ${renderZombieTimeInputs("tmrw",
                  day.tomorrowMorningStart || day.morningStart,
                  day.tomorrowMorningEnd || day.morningEnd,
                  day.tomorrowFocusStart || day.focusStart,
                  day.tomorrowFocusEnd || day.focusEnd,
                  day.tomorrowMovementStart || day.movementStart,
                  day.tomorrowMovementEnd || day.movementEnd,
                  day.tomorrowHousekeepingStart || day.housekeepingStart,
                  day.tomorrowHousekeepingEnd || day.housekeepingEnd)}
              </div>
              <button class="zombie-action-btn primary" data-zombie-action="save-tomorrow">save tomorrow's picks</button>
            </div>
          </div>`;

        const calBtn = GCAL_SCRIPT_URL
          ? `<div style="padding:12px 14px 0"><button class="zombie-action-btn primary" id="zombie-gcal-btn"><i class="bi bi-calendar-event"></i> schedule to calendar</button></div>`
          : `<div style="padding:12px 14px 0"><span class="zombie-block-body" style="font-size:11px">connect calendar in settings to schedule zombie blocks</span></div>`;

        return `
          <div class="zombie-header">
            <span class="zombie-header-title">zombie mode</span>
            <span class="zombie-header-date">${esc(state.currentDate)}</span>
            <button class="zombie-reset-btn" id="zombie-reset-btn" title="reset today's day">reset</button>
          </div>
          ${calBtn}
          <div class="zombie-blocks">
            ${morningBlock}
            ${focusBlock}
            ${movBlock}
            ${hkBlock}
          </div>
          ${renderZombieReadingListManager(tomorrowReading)}
          ${renderZombieProjectQueueManager(tomorrowQueue)}`;
      }

      let _zombieDragId = null;
      let _zombieDragType = null; // "reading" | "project"

      function bindZombieDragDrop(containerId, type) {
        const container = document.getElementById(containerId);
        if (!container) return;

        container.addEventListener("dragstart", (e) => {
          const item = e.target.closest("[data-reading-id],[data-project-id]");
          if (!item) return;
          _zombieDragId = item.dataset.readingId || item.dataset.projectId;
          _zombieDragType = type;
          item.classList.add("zombie-drag-ghost");
          e.dataTransfer.effectAllowed = "move";
        });
        container.addEventListener("dragend", (e) => {
          e.target.closest("[data-reading-id],[data-project-id]")?.classList.remove("zombie-drag-ghost");
        });
        container.addEventListener("dragover", (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = "move";
          const over = e.target.closest("[data-reading-id],[data-project-id]");
          container.querySelectorAll(".zombie-drag-over").forEach((el) => el.classList.remove("zombie-drag-over"));
          if (over) over.classList.add("zombie-drag-over");
        });
        container.addEventListener("dragleave", () => {
          container.querySelectorAll(".zombie-drag-over").forEach((el) => el.classList.remove("zombie-drag-over"));
        });
        container.addEventListener("drop", (e) => {
          e.preventDefault();
          container.querySelectorAll(".zombie-drag-over").forEach((el) => el.classList.remove("zombie-drag-over"));
          const over = e.target.closest("[data-reading-id],[data-project-id]");
          const overId = over ? (over.dataset.readingId || over.dataset.projectId) : null;
          if (!_zombieDragId || !overId || _zombieDragId === overId) return;

          if (_zombieDragType === "reading") {
            const list = loadZombieReadingList();
            const fromIdx = list.findIndex((r) => r.id === _zombieDragId);
            const toIdx = list.findIndex((r) => r.id === overId);
            if (fromIdx < 0 || toIdx < 0) return;
            list.splice(toIdx, 0, list.splice(fromIdx, 1)[0]);
            saveZombieReadingList(list);
          } else {
            const list = loadZombieProjectQueue();
            const fromIdx = list.findIndex((p) => p.id === _zombieDragId);
            const toIdx = list.findIndex((p) => p.id === overId);
            if (fromIdx < 0 || toIdx < 0) return;
            list.splice(toIdx, 0, list.splice(fromIdx, 1)[0]);
            saveZombieProjectQueue(list);
          }
          _zombieDragId = null;
          renderZombieTab();
        });
      }

      function bindZombieTimesToggle(toggleId, panelId) {
        const btn = document.getElementById(toggleId);
        const panel = document.getElementById(panelId);
        if (!btn || !panel) return;
        btn.addEventListener("click", () => {
          const open = btn.dataset.open === "true";
          btn.dataset.open = open ? "false" : "true";
          btn.innerHTML = open ? "adjust &#x25be;" : "hide &#x25b4;";
          panel.style.display = open ? "none" : "";
        });
      }

      function bindZombieListEvents() {
        document.getElementById("zombie-reading-add")?.addEventListener("click", () => {
          const title = (document.getElementById("zombie-reading-title")?.value || "").trim();
          if (!title) {
            showToast("enter a paper title", "info");
            return;
          }
          const url = (document.getElementById("zombie-reading-url")?.value || "").trim();
          const list = loadZombieReadingList();
          list.push({ id: genId(), title, url, addedAt: new Date().toISOString() });
          saveZombieReadingList(list);
          renderZombieTab();
        });
        document.getElementById("zombie-project-add")?.addEventListener("click", () => {
          const name = (document.getElementById("zombie-project-name")?.value || "").trim();
          if (!name) {
            showToast("enter a project name", "info");
            return;
          }
          const desc = (document.getElementById("zombie-project-desc")?.value || "").trim();
          const list = loadZombieProjectQueue();
          list.push({ id: genId(), name, description: desc });
          saveZombieProjectQueue(list);
          renderZombieTab();
        });

        // Template add — track selected color via module var
        let _tplColor = ZOMBIE_TEMPLATE_COLORS[0];
        document.querySelectorAll("[data-tpl-color]").forEach((chip) => {
          if (chip.dataset.tplColor === _tplColor) chip.classList.add("selected");
          chip.addEventListener("click", () => {
            _tplColor = chip.dataset.tplColor;
            document.querySelectorAll("[data-tpl-color]").forEach((c) => c.classList.remove("selected"));
            chip.classList.add("selected");
          });
        });
        document.getElementById("zombie-tpl-add")?.addEventListener("click", () => {
          const name = (document.getElementById("zombie-tpl-name")?.value || "").trim();
          if (!name) { showToast("enter a template name", "info"); return; }
          const ms = document.getElementById("tpl-morning-start")?.value || "07:00";
          const me = document.getElementById("tpl-morning-end")?.value || "09:00";
          const fs = document.getElementById("tpl-focus-start")?.value || "09:00";
          const fe = document.getElementById("tpl-focus-end")?.value || "12:00";
          const vs = document.getElementById("tpl-movement-start")?.value || "13:00";
          const ve = document.getElementById("tpl-movement-end")?.value || "14:00";
          const hs = document.getElementById("tpl-housekeeping-start")?.value || "16:00";
          const he = document.getElementById("tpl-housekeeping-end")?.value || "17:30";
          const list = loadZombieTemplates();
          list.push({ id: genId(), name, color: _tplColor,
            morningStart: ms, morningEnd: me,
            focusStart: fs, focusEnd: fe,
            movementStart: vs, movementEnd: ve,
            housekeepingStart: hs, housekeepingEnd: he });
          saveZombieTemplates(list);
          renderZombieTab();
        });

        bindZombieDragDrop("zombie-reading-list", "reading");
        bindZombieDragDrop("zombie-project-queue", "project");

      function bindZombieSetupEvents() {
        const body = document.getElementById("zombie-body");
        if (!body) return;

        bindZombieTimesToggle("zombie-times-toggle", "zombie-times-panel");

        body.addEventListener("click", (e) => {
          // Movement chips
          const chip = e.target.closest("[data-movement]");
          if (chip) {
            updateZombieDay({ movementChoice: chip.dataset.movement });
            return;
          }

          // Save today's custom times
          const btn = e.target.closest("[data-zombie-action]");
          if (btn && btn.dataset.zombieAction === "save-today-times") {
            updateZombieDay({
              morningStart:      document.getElementById("today-morning-start")?.value || "07:00",
              morningEnd:        document.getElementById("today-morning-end")?.value || "09:00",
              focusStart:        document.getElementById("today-focus-start")?.value || "09:00",
              focusEnd:          document.getElementById("today-focus-end")?.value || "12:00",
              movementStart:     document.getElementById("today-movement-start")?.value || "13:00",
              movementEnd:       document.getElementById("today-movement-end")?.value || "14:00",
              housekeepingStart: document.getElementById("today-housekeeping-start")?.value || "16:00",
              housekeepingEnd:   document.getElementById("today-housekeeping-end")?.value || "17:30",
            });
            showToast("times saved ✓", "success");
            return;
          }

          // Start day
          if (e.target.id === "zombie-start-btn") {
            const day = getZombieDay();
            if (
              !day.movementChoice ||
              !(day.paperId || day.paperCustom) ||
              !(day.projectId || day.projectCustom)
            ) {
              showToast("fill in paper, project, and movement first", "info");
              return;
            }
            renderZombieTab();
            scheduleZombieDay().catch((err) =>
              showToast("calendar error: " + err.message, "error"),
            );
            return;
          }

          // Delete reading list entry
          const delR = e.target.closest("[data-del-reading]");
          if (delR) {
            const id = delR.dataset.delReading;
            const list = loadZombieReadingList().filter((r) => r.id !== id);
            saveZombieReadingList(list);
            if (state.zombieDay?.paperId === id) updateZombieDay({ paperId: null });
            else renderZombieTab();
            return;
          }

          // Delete project queue entry
          const delP = e.target.closest("[data-del-project]");
          if (delP) {
            const id = delP.dataset.delProject;
            const list = loadZombieProjectQueue().filter((p) => p.id !== id);
            saveZombieProjectQueue(list);
            if (state.zombieDay?.projectId === id) updateZombieDay({ projectId: null });
            else renderZombieTab();
            return;
          }

          // Delete template
          const delT = e.target.closest("[data-del-template]");
          if (delT) {
            const id = delT.dataset.delTemplate;
            const list = loadZombieTemplates().filter((t) => t.id !== id);
            saveZombieTemplates(list);
            renderZombieTab();
            return;
          }
        });

        // Template select → apply times
        document.getElementById("zombie-tpl-sel")?.addEventListener("change", (e) => {
          const id = e.target.value;
          if (!id) return;
          const tpl = loadZombieTemplates().find((t) => t.id === id);
          if (!tpl) return;
          updateZombieDay({
            morningStart: tpl.morningStart, morningEnd: tpl.morningEnd,
            focusStart: tpl.focusStart, focusEnd: tpl.focusEnd,
            movementStart: tpl.movementStart, movementEnd: tpl.movementEnd,
            housekeepingStart: tpl.housekeepingStart, housekeepingEnd: tpl.housekeepingEnd,
          });
          showToast(`template "${tpl.name}" applied ✓`, "success");
        });

        // Paper select
        document.getElementById("zombie-paper-sel")?.addEventListener("change", (e) => {
          updateZombieDay({ paperId: e.target.value || null, paperCustom: null });
        });
        document.getElementById("zombie-paper-custom")?.addEventListener("change", (e) => {
          const v = e.target.value.trim();
          updateZombieDay({ paperCustom: v || null, paperId: null });
        });

        // Project select
        document.getElementById("zombie-project-sel")?.addEventListener("change", (e) => {
          updateZombieDay({ projectId: e.target.value || null, projectCustom: null });
        });
        document.getElementById("zombie-project-custom")?.addEventListener("change", (e) => {
          const v = e.target.value.trim();
          updateZombieDay({ projectCustom: v || null, projectId: null });
        });

        bindZombieListEvents();
      }

      function bindZombieDayEvents() {
        const body = document.getElementById("zombie-body");
        if (!body) return;

        bindZombieTimesToggle("zombie-tmrw-times-toggle", "zombie-tmrw-times-panel");

        body.addEventListener("click", (e) => {
          // Delegated action buttons
          const btn = e.target.closest("[data-zombie-action]");
          if (btn) {
            const action = btn.dataset.zombieAction;
            if (action === "mark-paper-read") {
              updateZombieDay({ paperRead: true });
            } else if (action === "save-reaction-note") {
              const note = document.getElementById("zombie-reaction-note")?.value.trim() || "";
              updateZombieDay({ reactionNote: note });
            } else if (action === "start-focus") {
              if (!getZombieDay().paperRead) {
                showToast("read the paper first", "info");
                return;
              }
              updateZombieDay({ focusBlockStarted: true });
            } else if (action === "log-movement") {
              updateZombieDay({ movementDone: true });
            } else if (action === "complete-housekeeping") {
              updateZombieDay({ housekeepingDone: true });
            } else if (action === "save-tomorrow") {
              const tPaper = document.getElementById("zombie-tmrw-paper")?.value || null;
              const tProject = document.getElementById("zombie-tmrw-project")?.value || null;
              const tTemplate = document.getElementById("zombie-tmrw-template")?.value || null;
              const tpl = tTemplate ? loadZombieTemplates().find((t) => t.id === tTemplate) : null;
              updateZombieDay({
                tomorrowPaperId: tPaper,
                tomorrowProjectId: tProject,
                tomorrowTemplateId: tTemplate,
                tomorrowMorningStart:      tpl ? tpl.morningStart      : (document.getElementById("tmrw-morning-start")?.value || null),
                tomorrowMorningEnd:        tpl ? tpl.morningEnd        : (document.getElementById("tmrw-morning-end")?.value || null),
                tomorrowFocusStart:        tpl ? tpl.focusStart        : (document.getElementById("tmrw-focus-start")?.value || null),
                tomorrowFocusEnd:          tpl ? tpl.focusEnd          : (document.getElementById("tmrw-focus-end")?.value || null),
                tomorrowMovementStart:     tpl ? tpl.movementStart     : (document.getElementById("tmrw-movement-start")?.value || null),
                tomorrowMovementEnd:       tpl ? tpl.movementEnd       : (document.getElementById("tmrw-movement-end")?.value || null),
                tomorrowHousekeepingStart: tpl ? tpl.housekeepingStart : (document.getElementById("tmrw-housekeeping-start")?.value || null),
                tomorrowHousekeepingEnd:   tpl ? tpl.housekeepingEnd   : (document.getElementById("tmrw-housekeeping-end")?.value || null),
              });
              showToast("tomorrow pre-loaded ✓", "success");
            }
            return;
          }

          // Tomorrow template select → open times panel with template values
          if (e.target.id === "zombie-tmrw-template") {
            // handled via change event below
            return;
          }

          // Calendar button
          if (e.target.id === "zombie-gcal-btn") {
            scheduleZombieDay().catch((err) =>
              showToast("calendar error: " + err.message, "error"),
            );
            return;
          }

          // Reset day — clears decisions and progress, keeps times and tomorrow pre-loads
          if (e.target.id === "zombie-reset-btn") {
            if (!confirm("Reset today's zombie day? Your decisions and progress will be cleared.")) return;
            const day = getZombieDay();
            updateZombieDay({
              paperId: null, paperCustom: null,
              projectId: null, projectCustom: null,
              movementChoice: null,
              paperRead: false, reactionNote: "",
              focusBlockStarted: false,
              movementDone: false,
              housekeepingDone: false,
            });
            return;
          }

          // Delete reading list entry
          const delR = e.target.closest("[data-del-reading]");
          if (delR) {
            const id = delR.dataset.delReading;
            const list = loadZombieReadingList().filter((r) => r.id !== id);
            saveZombieReadingList(list);
            if (state.zombieDay?.paperId === id) updateZombieDay({ paperId: null });
            else renderZombieTab();
            return;
          }

          // Delete project queue entry
          const delP = e.target.closest("[data-del-project]");
          if (delP) {
            const id = delP.dataset.delProject;
            const list = loadZombieProjectQueue().filter((p) => p.id !== id);
            saveZombieProjectQueue(list);
            if (state.zombieDay?.projectId === id) updateZombieDay({ projectId: null });
            else renderZombieTab();
            return;
          }
        });

        // Tomorrow template → pre-fill time inputs if panel is open
        document.getElementById("zombie-tmrw-template")?.addEventListener("change", (e) => {
          const id = e.target.value;
          const panel = document.getElementById("zombie-tmrw-times-panel");
          if (!id || !panel || panel.style.display === "none") return;
          const tpl = loadZombieTemplates().find((t) => t.id === id);
          if (!tpl) return;
          ["morning","focus","movement","housekeeping"].forEach((k) => {
            const s = document.getElementById(`tmrw-${k}-start`);
            const en = document.getElementById(`tmrw-${k}-end`);
            if (s) s.value = tpl[`${k}Start`];
            if (en) en.value = tpl[`${k}End`];
          });
        });

        bindZombieListEvents();
      }

      function renderZombieTab() {
        if (state.currentTab !== "zombie") return;
        const body = document.getElementById("zombie-body");
        if (!body) return;

        const day = getZombieDay();
        const reading = loadZombieReadingList();
        const queue = loadZombieProjectQueue();

        const hasPaper = !!(day.paperId || day.paperCustom);
        const hasProject = !!(day.projectId || day.projectCustom);
        const isSetup = !day.movementChoice || !hasPaper || !hasProject;

        if (isSetup) {
          body.innerHTML = renderZombieSetup(day, reading, queue);
          bindZombieSetupEvents();
        } else {
          body.innerHTML = renderZombieLiveDay(day, reading, queue);
          bindZombieDayEvents();
        }
      }

      function render() {
        renderFocusTab();
        renderInboxTab();
        renderTemplatesTab();
        renderRightCol();
        renderTagPalette();
        applyPanelCollapseState();
        bindDynamicEvents();
      }

      // ============================================================
      //  tab switching
      // ============================================================

      function switchTab(name) {
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.toggle("active", t.dataset.tab === name));
        document
          .querySelectorAll(".tab-content")
          .forEach((c) => c.classList.toggle("active", c.id === "tab-" + name));
        document.getElementById("quick-add-row").style.display = name === "focus" ? "flex" : "none";
        state.currentTab = name;
        if (name === "stats") renderStatsTab(false).catch(() => {});
        if (name === "zombie") renderZombieTab();
      }

      // ============================================================
      //  date navigation
      // ============================================================

      async function setDate(isoStr) {
        state.currentDate = isoStr;
        state.calendarEvents = null;
        document.getElementById("date-label").textContent = dateLabelFull(isoStr);

        // Auto-carry undone tasks from previous days
        await autoCarryUndoneTasksToDate(isoStr);

        state.tasks = (await fetchTasks(isoStr)).map((task) => ({
          ...task,
          subtasks: Array.isArray(task.subtasks) ? task.subtasks : [],
          taskType: normalizeTaskType(task.taskType),
          collection: normalizeCollectionName(task.collection),
        }));
        const recurringAdded = injectRecurringTasks(isoStr, state.tasks);
        if (recurringAdded) await persistTasks(isoStr, state.tasks);
        render();
        loadCalendarEvents(isoStr).catch(() => {});
      }

      // ============================================================
      //  dynamic event binding
      // ============================================================

      function bindDynamicEvents() {
        document.querySelectorAll("[data-done-id]").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            const task = state.tasks.find((t) => t.id === el.dataset.doneId);
            if (!task || !canCompleteTask(task)) return;
            if (el.dataset.doneState === "done") {
              undoDone(el.dataset.doneId).catch(() => {});
              return;
            }
            markDone(el.dataset.doneId);
          }),
        );

        document.querySelectorAll("[data-content-id]").forEach((el) =>
          el.addEventListener("dblclick", (e) => {
            e.stopPropagation();
            state.editingContentId = el.dataset.contentId;
            render();
            setTimeout(() => {
              const inp = document.querySelector(
                `.task-content-input[data-edit-id="${el.dataset.contentId}"]`,
              );
              if (inp) {
                inp.focus();
                inp.select();
              }
            }, 30);
          }),
        );

        document.querySelectorAll(".task-content-input").forEach((el) => {
          el.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              updateContent(el.dataset.editId, el.value);
            }
            if (e.key === "Escape") {
              state.editingContentId = null;
              render();
            }
          });
          el.addEventListener("blur", () => updateContent(el.dataset.editId, el.value));
        });

        document.querySelectorAll("[data-est-id]").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            state.editingEstId = el.dataset.estId;
            render();
            setTimeout(() => {
              const inp = document.querySelector(".est-input");
              if (inp) {
                inp.focus();
                inp.select();
              }
            }, 30);
          }),
        );

        document.querySelectorAll(".save-btn").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            const row = el.closest(".inline-edit");
            if (row) updateEstimate(row.dataset.id, row.querySelector(".est-input").value);
          }),
        );
        document.querySelectorAll(".cancel-est-btn").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            state.editingEstId = null;
            render();
          }),
        );
        document.querySelectorAll(".est-input").forEach((el) =>
          el.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              const row = el.closest(".inline-edit");
              if (row) updateEstimate(row.dataset.id, el.value);
            } else if (e.key === "Escape") {
              state.editingEstId = null;
              render();
            }
          }),
        );

        document.querySelectorAll("[data-toggle-id]").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            const id = el.dataset.toggleId;
            const list = document.querySelector(`.subtask-list[data-parent-id="${id}"]`);
            if (state.collapsedTasks.has(id)) {
              state.collapsedTasks.delete(id);
              el.classList.remove("collapsed");
              el.title = "collapse subtasks";
              if (list) list.style.display = "block";
            } else {
              state.collapsedTasks.add(id);
              el.classList.add("collapsed");
              el.title = "expand subtasks";
              if (list) list.style.display = "none";
            }
          }),
        );

        // pin badge — click cycles null → A → B → C → null
        document.querySelectorAll("[data-pin-id]").forEach((el) =>
          el.addEventListener("click", async (e) => {
            e.stopPropagation();
            const PIN_CYCLE = [null, "A", "B", "C"];
            const task = state.tasks.find((t) => t.id === el.dataset.pinId);
            if (!task) return;
            const cur = PIN_CYCLE.indexOf(task.pin || null);
            const next = PIN_CYCLE[(cur + 1) % PIN_CYCLE.length];
            await pinTask(el.dataset.pinId, next);
          }),
        );

        document.querySelectorAll(".subtask-check").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            toggleSubtask(el.dataset.parentId, el.dataset.subId);
          }),
        );

        document.querySelectorAll(".subtask-text[data-sub-id]").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            beginSubtaskEdit(el.dataset.parentId, el.dataset.subId);
          }),
        );

        document.querySelectorAll(".subtask-input").forEach((el) => {
          el.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              saveSubtaskEdit(el.dataset.parentId, el.dataset.subId, el.value);
            } else if (e.key === "Escape") {
              cancelSubtaskEdit();
            }
          });
          el.addEventListener("blur", () =>
            saveSubtaskEdit(el.dataset.parentId, el.dataset.subId, el.value),
          );
        });

        document.querySelectorAll("[data-delete-id]").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            skipTask(el.dataset.deleteId);
          }),
        );

        document.querySelectorAll("[data-menu-id]").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            state.activeMenuId = el.dataset.menuId;
            const rect = el.getBoundingClientRect(),
              menu = document.getElementById("options-menu");
            const menuHeight = 200; // approximate menu height
            const spaceBelow = window.innerHeight - rect.bottom;
            const spaceAbove = rect.top;
            const useDropUp = spaceBelow < menuHeight && spaceAbove > spaceBelow;

            menu.style.display = "block";
            if (window.innerWidth < 768) {
              // on mobile: center the menu horizontally with 16px side margins
              const mw = window.innerWidth - 32;
              menu.style.width = mw + "px";
              menu.style.left = "16px";
              if (useDropUp) {
                // drop-up: position above the button
                menu.style.top = Math.max(8, rect.top - menuHeight - 4) + "px";
              } else {
                // drop-down: position below the button
                const top = Math.min(rect.bottom + 4, window.innerHeight - menuHeight - 12);
                menu.style.top = Math.max(8, top) + "px";
              }
            } else {
              menu.style.width = "";
              const menuW = 180;
              const left = Math.min(rect.left - menuW + rect.width, window.innerWidth - menuW - 8);
              menu.style.left = Math.max(8, left) + "px";
              if (useDropUp) {
                // drop-up: position above the button
                menu.style.top = Math.max(8, rect.top - menuHeight - 4) + "px";
              } else {
                // drop-down: position below the button
                menu.style.top = rect.bottom + 4 + "px";
              }
            }
          }),
        );

        document.querySelectorAll("[data-sched-id]").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            if (!el.classList.contains("scheduled")) scheduleTask(el.dataset.schedId);
          }),
        );

        document.querySelectorAll(".inbox-add-btn").forEach((el) =>
          el.addEventListener("click", () =>
            addKinopioItemToDay({
              text: el.dataset.knText,
              id: el.dataset.knId || null,
              due: el.dataset.knDue || null,
              space: el.dataset.knSpace || null,
            }),
          ),
        );
        document.querySelectorAll(".inbox-readd-btn").forEach((el) =>
          el.addEventListener("click", async () => {
            const knText = el.dataset.knText;
            unmarkAddedToDay(state.currentDate, knText);
            const key = textKey(knText);
            state.tasks = state.tasks.filter((t) => textKey(t.content) !== key);
            await persistTasks(state.currentDate, state.tasks);
            render();
          }),
        );
        document
          .querySelectorAll(".inbox-done-btn")
          .forEach((el) =>
            el.addEventListener("click", () =>
              markKinopioItemDone(el.dataset.knText, el.dataset.knId),
            ),
          );

        // template card: click to insert, edit-btn to open editor
        document.querySelectorAll("[data-tpl-id]").forEach((el) =>
          el.addEventListener("click", (e) => {
            if (e.target.closest("[data-tpl-edit]")) return; // handled below
            insertTemplate(el.dataset.tplId);
          }),
        );
        document.querySelectorAll("[data-tpl-edit]").forEach((el) =>
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            openTemplateEditor(el.dataset.tplEdit);
          }),
        );

        // tag filter — delegated so it survives renderFocusTab() DOM replacement
        const taskList = document.getElementById("task-list");
        if (taskList && !taskList._tagDelegated) {
          taskList._tagDelegated = true;
          taskList.addEventListener("click", (e) => {
            const el = e.target.closest("[data-tag]");
            if (!el) return;
            e.stopPropagation();
            const tag = el.dataset.tag;
            if (el.dataset.tagRemove) {
              // remove tag from task
              const taskId = el.closest("[data-id]")?.dataset.id;
              const task = state.tasks.find((t) => t.id === taskId);
              if (task) {
                task.tags = (task.tags || []).filter((t) => t !== tag);
                persistTasks(state.currentDate, state.tasks);
                render();
              }
            } else {
              state.activeTagFilter = state.activeTagFilter === tag ? null : tag;
              renderFocusTab();
            }
          });
        }

        bindTaskDragEvents();
        bindInboxDragEvents();
        bindTouchReorderListeners();
        bindChipDragEvents();

        const taskListDeferred = document.getElementById("task-list");
        if (taskListDeferred && !taskListDeferred._deferredRemoveDelegated) {
          taskListDeferred._deferredRemoveDelegated = true;
          taskListDeferred.addEventListener("click", (e) => {
            const btn = e.target.closest("[data-deferred-remove]");
            if (!btn) return;
            e.stopPropagation();
            const text = btn.dataset.deferredRemove;
            const list = getDeferredList(state.currentDate).filter((t) => t !== text);
            localStorage.setItem(deferredKey(state.currentDate), JSON.stringify(list));
            renderFocusTab();
          });
        }

        // kinopio hover tooltip — delegated on inbox-list so it survives re-renders
        const inboxList = document.getElementById("inbox-list");
        if (inboxList && !inboxList._tooltipDelegated) {
          inboxList._tooltipDelegated = true;
          inboxList.addEventListener("mouseover", (e) => {
            const item = e.target.closest(".inbox-item");
            if (item === _knTooltipCurrentItem) return;
            clearTimeout(_knTooltipTimer);
            hideKnTooltip();
            _knTooltipCurrentItem = item;
            if (!item) return;
            _knTooltipTimer = setTimeout(() => showKnTooltip(item, e), 400);
          });
          inboxList.addEventListener("mouseleave", () => {
            clearTimeout(_knTooltipTimer);
            hideKnTooltip();
            _knTooltipCurrentItem = null;
          });
          inboxList.addEventListener("mousemove", positionKnTooltip);
        }
      }

      // ---- kinopio tooltip ----
      let _knTooltipTimer = null;
      let _knTooltipCurrentItem = null;

      function showKnTooltip(item, e) {
        const space = item.dataset.knSpace;
        const cards = (state.kinopioGroups[space] || []).filter(Boolean);
        const knKey = item.dataset.knKey || "";
        const cardTextKey = knKey.includes("::") ? knKey.slice(knKey.indexOf("::") + 2) : "";
        const card = cardTextKey
          ? cards.find((c) => textKey(c.text) === cardTextKey)
          : cards.find(
              (c) =>
                textKey(c.text) === textKey(item.querySelector(".inbox-text")?.textContent || ""),
            );
        const connected = card && card.connectedCards ? card.connectedCards.filter(Boolean) : [];
        if (connected.length === 0) return;
        const tooltip = document.getElementById("kn-tooltip");
        tooltip.innerHTML =
          `<div class="kn-tooltip-title">connected</div>` +
          connected
            .map((text) => `<div class="kn-tooltip-card">${esc((text || "").slice(0, 60))}</div>`)
            .join("");
        tooltip.style.display = "block";
        positionKnTooltip(e);
      }

      function positionKnTooltip(e) {
        const tooltip = document.getElementById("kn-tooltip");
        if (tooltip.style.display === "none") return;
        const x = Math.min(e.clientX + 14, window.innerWidth - 260);
        const y = Math.min(e.clientY - 8, window.innerHeight - 160);
        tooltip.style.left = x + "px";
        tooltip.style.top = y + "px";
      }

      function hideKnTooltip() {
        const tooltip = document.getElementById("kn-tooltip");
        if (tooltip) tooltip.style.display = "none";
      }

      function bindChipDragEvents() {
        const palette = document.getElementById("tag-palette-container");
        if (!palette || palette._chipDragDelegated) return;
        palette._chipDragDelegated = true;
        palette.addEventListener("dragstart", (e) => {
          const chip = e.target.closest(".tag-chip");
          if (!chip) return;
          state.draggingChipType = chip.dataset.chipType;
          state.draggingChipValue = chip.dataset.chipValue;
          state.draggingChipEl = chip;
          chip.classList.add("dragging");
          if (e.dataTransfer) e.dataTransfer.effectAllowed = "copy";
        });
        palette.addEventListener("dragend", (e) => {
          const chip = e.target.closest(".tag-chip");
          if (chip) chip.classList.remove("dragging");
          clearDropHints(".task-item");
          state.draggingChipType = null;
          state.draggingChipValue = null;
          state.draggingChipEl = null;
        });

        // document-level fallback: cleans up if dragend fires on a detached chip
        // (happens when render() replaces innerHTML before dragend fires)
        if (!document._chipDragEndBound) {
          document._chipDragEndBound = true;
          document.addEventListener("dragend", () => {
            state.draggingChipType = null;
            state.draggingChipValue = null;
            if (state.draggingChipEl) {
              state.draggingChipEl.classList.remove("dragging");
              state.draggingChipEl = null;
            }
            clearDropHints(".task-item");
          });
        }
      }

      // ============================================================
      //  drag and drop
      // ============================================================

      function clearDropHints(selector) {
        document.querySelectorAll(selector).forEach((el) => {
          el.classList.remove("drop-above", "drop-below", "drop-before", "drop-after");
        });
      }

      const touchDragState = {
        active: false,
        kind: null,
        pointerId: null,
        sourceEl: null,
        sourceId: null,
        sourceSpace: null,
        targetEl: null,
        before: true,
      };

      function getTouchDropTarget(kind, clientX, clientY) {
        const el = document.elementFromPoint(clientX, clientY);
        if (!el) return null;
        return el.closest(
          kind === "task" ? '.task-item[draggable="true"]' : '.inbox-item[draggable="true"]',
        );
      }

      function updateTouchDropHint(kind, targetEl, clientX, clientY) {
        const selector = kind === "task" ? ".task-item" : ".inbox-item";
        clearDropHints(selector);
        if (!targetEl) return true;
        const rect = targetEl.getBoundingClientRect();
        const before = clientY - rect.top < rect.height / 2;
        targetEl.classList.add(before ? "drop-above" : "drop-below");
        touchDragState.targetEl = targetEl;
        touchDragState.before = before;
        return before;
      }

      function beginTouchDrag(kind, itemEl, pointerId) {
        touchDragState.active = true;
        touchDragState.kind = kind;
        touchDragState.pointerId = pointerId;
        touchDragState.sourceEl = itemEl;
        touchDragState.sourceId = kind === "task" ? itemEl.dataset.id : itemEl.dataset.knKey;
        touchDragState.sourceSpace = kind === "task" ? null : itemEl.dataset.knSpace;
        touchDragState.targetEl = itemEl;
        touchDragState.before = true;
        itemEl.classList.add("dragging");
      }

      function cancelTouchDrag() {
        if (!touchDragState.active) return;
        if (touchDragState.sourceEl) touchDragState.sourceEl.classList.remove("dragging");
        clearDropHints(touchDragState.kind === "task" ? ".task-item" : ".inbox-item");
        touchDragState.active = false;
        touchDragState.kind = null;
        touchDragState.pointerId = null;
        touchDragState.sourceEl = null;
        touchDragState.sourceId = null;
        touchDragState.sourceSpace = null;
        touchDragState.targetEl = null;
        touchDragState.before = true;
      }

      async function commitTouchDrag(clientX, clientY) {
        if (!touchDragState.active) return;
        const { kind, sourceEl, sourceId, sourceSpace } = touchDragState;
        const targetEl = getTouchDropTarget(kind, clientX, clientY);
        const before = updateTouchDropHint(kind, targetEl, clientX, clientY);
        if (!targetEl || !sourceEl) {
          cancelTouchDrag();
          return;
        }

        if (kind === "task") {
          const dstId = targetEl.dataset.id;
          if (!sourceId || !dstId || sourceId === dstId) {
            cancelTouchDrag();
            return;
          }
          const srcIdx = state.tasks.findIndex((t) => t.id === sourceId);
          const dstIdx = state.tasks.findIndex((t) => t.id === dstId);
          if (srcIdx < 0 || dstIdx < 0) {
            cancelTouchDrag();
            return;
          }
          const [moved] = state.tasks.splice(srcIdx, 1);
          const adjustedDstIdx = state.tasks.findIndex((t) => t.id === dstId);
          state.tasks.splice(before ? adjustedDstIdx : adjustedDstIdx + 1, 0, moved);
          await persistTasks(state.currentDate, state.tasks);
          render();
          return;
        }

        const dstKey = targetEl.dataset.knKey;
        if (
          !sourceId ||
          !dstKey ||
          sourceId === dstKey ||
          sourceSpace !== targetEl.dataset.knSpace
        ) {
          cancelTouchDrag();
          return;
        }
        const cards = state.kinopioGroups[sourceSpace] || [];
        const srcKey = sourceId.split("::").slice(1).join("::");
        const dstTextKey = dstKey.split("::").slice(1).join("::");
        const srcIdx = cards.findIndex((c) => textKey(c.text) === srcKey);
        const dstIdx = cards.findIndex((c) => textKey(c.text) === dstTextKey);
        if (srcIdx < 0 || dstIdx < 0) {
          cancelTouchDrag();
          return;
        }
        const [moved] = cards.splice(srcIdx, 1);
        const adjustedDstIdx = cards.findIndex((c) => textKey(c.text) === dstTextKey);
        cards.splice(before ? adjustedDstIdx : adjustedDstIdx + 1, 0, moved);
        state.kinopioGroups[sourceSpace] = cards;
        saveKnOrder(
          sourceSpace,
          cards.map((c) => textKey(c.text)),
        );
        renderInboxTab();
        bindDynamicEvents();
      }

      function bindTouchReorderListeners() {
        if (document.__dfTouchReorderBound) return;
        document.__dfTouchReorderBound = true;

        function isAnyModalOpen() {
          const modals = document.querySelectorAll(".modal-backdrop");
          for (const modal of modals) {
            if (modal && modal.style && modal.style.display !== "none") return true;
          }
          return false;
        }

        document.addEventListener(
          "pointermove",
          (e) => {
            if (isAnyModalOpen()) {
              cancelTouchDrag();
              return;
            }
            if (!touchDragState.active || e.pointerId !== touchDragState.pointerId) return;
            e.preventDefault();
            const targetEl = getTouchDropTarget(touchDragState.kind, e.clientX, e.clientY);
            updateTouchDropHint(touchDragState.kind, targetEl, e.clientX, e.clientY);
          },
          { passive: false },
        );
        document.addEventListener("pointerup", (e) => {
          if (!touchDragState.active || e.pointerId !== touchDragState.pointerId) return;
          commitTouchDrag(e.clientX, e.clientY).catch(() => cancelTouchDrag());
          cancelTouchDrag();
        });
        document.addEventListener("pointercancel", (e) => {
          if (!touchDragState.active || e.pointerId !== touchDragState.pointerId) return;
          cancelTouchDrag();
        });
      }

      function reorderTaskByPointer(srcId, dstId, before) {
        const srcIdx = state.tasks.findIndex((t) => t.id === srcId);
        const dstIdx = state.tasks.findIndex((t) => t.id === dstId);
        if (srcIdx < 0 || dstIdx < 0) return false;
        const [moved] = state.tasks.splice(srcIdx, 1);
        const adjustedDstIdx = state.tasks.findIndex((t) => t.id === dstId);
        state.tasks.splice(before ? adjustedDstIdx : adjustedDstIdx + 1, 0, moved);
        return true;
      }

      function reorderInboxCardByPointer(space, srcKey, dstKey, before) {
        const cards = state.kinopioGroups[space] || [];
        const srcIdx = cards.findIndex((c) => textKey(c.text) === srcKey);
        if (srcIdx < 0) return false;
        const [moved] = cards.splice(srcIdx, 1);
        const adjustedDstIdx = cards.findIndex((c) => textKey(c.text) === dstKey);
        if (adjustedDstIdx < 0) {
          cards.push(moved);
        } else {
          cards.splice(before ? adjustedDstIdx : adjustedDstIdx + 1, 0, moved);
        }
        state.kinopioGroups[space] = cards;
        return true;
      }

      function bindTaskDragEvents() {
        document.querySelectorAll('.task-item[draggable="true"]').forEach((item) => {
          item.addEventListener("dragstart", (e) => {
            state.draggingTaskId = item.dataset.id;
            item.classList.add("dragging");
            try {
              e.dataTransfer.setData("text/plain", item.dataset.id);
            } catch {}
            if (e.dataTransfer) e.dataTransfer.effectAllowed = "move";
          });
          item.addEventListener("dragend", () => {
            item.classList.remove("dragging");
            clearDropHints(".task-item");
            state.draggingTaskId = null;
          });
          item.addEventListener("dragover", (e) => {
            if (!state.draggingTaskId && !state.draggingChipType) return;
            e.preventDefault();
            if (state.draggingChipType) {
              if (e.dataTransfer) e.dataTransfer.dropEffect = "copy";
              clearDropHints(".task-item");
              item.classList.add("chip-drop-target");
            } else {
              if (e.dataTransfer) e.dataTransfer.dropEffect = "move";
              const rect = item.getBoundingClientRect();
              const above = e.clientY - rect.top < rect.height / 2;
              clearDropHints(".task-item");
              item.classList.add(above ? "drop-above" : "drop-below");
            }
          });
          item.addEventListener("dragleave", () => {
            item.classList.remove("drop-above", "drop-below", "chip-drop-target");
          });
          item.addEventListener("drop", async (e) => {
            e.preventDefault();
            clearDropHints(".task-item");
            item.classList.remove("chip-drop-target");
            if (state.draggingChipType) {
              const task = state.tasks.find((t) => t.id === item.dataset.id);
              if (!task) {
                // Clear state even if task not found
                state.draggingChipType = null;
                state.draggingChipValue = null;
                return;
              }
              if (state.draggingChipType === "time") {
                task.estimate = state.draggingChipValue;
              } else if (state.draggingChipType === "tpl") {
                task.tags = task.tags || [];
                if (!task.tags.includes(state.draggingChipValue)) {
                  task.tags.push(state.draggingChipValue);
                }
              }
              // Clear the dragging state before render
              state.draggingChipType = null;
              state.draggingChipValue = null;
              state.draggingChipEl = null;
              await persistTasks(state.currentDate, state.tasks);
              render();
              return;
            }
            const srcId = state.draggingTaskId;
            const dstId = item.dataset.id;
            if (!srcId || !dstId || srcId === dstId) return;
            const rect = item.getBoundingClientRect();
            const above = e.clientY - rect.top < rect.height / 2;
            if (!reorderTaskByPointer(srcId, dstId, above)) return;
            await persistTasks(state.currentDate, state.tasks);
            render();
          });

          const handle = item.querySelector(".drag-handle");
          if (handle) {
            handle.addEventListener(
              "pointerdown",
              (e) => {
                if (e.pointerType === "mouse") return;
                e.preventDefault();
                e.stopPropagation();
                beginTouchDrag("task", item, e.pointerId);
              },
              { passive: false },
            );
          }
        });
      }

      function bindInboxDragEvents() {

          item.addEventListener("dragover", (e) => {

            e.preventDefault();

          item.addEventListener("drop", (e) => {

            const drag = state.draggingKnKey;
            clearDropHints(".inbox-item");

            if (drag.space !== item.dataset.knSpace) return;

            const rect = item.getBoundingClientRect();
            const above = e.clientY - rect.top < rect.height / 2;
            if (!reorderInboxCardByPointer(space, srcKey, dstKey, above)) return;
            saveKnOrder(

              },
              { passive: false },
            );
          }
        });
      }

      // ---- column resize handle ----
      (function initColResize() {
        const STORAGE_KEY = "df-col-left-pct";
        const COLLAPSE_THRESHOLD = 0.82; // collapse right panel when left exceeds 82% of total width
        const MIN_LEFT_PCT = 0.3;
        const MAX_LEFT_PCT = 0.97;

        const handle = document.getElementById("col-resize-handle");
        const leftCol = document.getElementById("left-col");
        const rightCol = document.getElementById("right-col");
        if (!handle || !leftCol || !rightCol) return;

        function applyPct(pct) {
          const collapsed = pct >= COLLAPSE_THRESHOLD;
          const clampedPct = Math.min(pct, collapsed ? 1 : COLLAPSE_THRESHOLD - 0.01);
          leftCol.style.flex = `0 0 ${(clampedPct * 100).toFixed(1)}%`;
          rightCol.classList.toggle("collapsed", collapsed);
          handle.classList.toggle("hidden-handle", collapsed);
        }

        // restore saved width (default 62%)
        const saved = parseFloat(localStorage.getItem(STORAGE_KEY));
        applyPct(!isNaN(saved) ? saved : 0.62);

        let startX, startLeftW, totalW;
        handle.addEventListener("mousedown", (e) => {
          e.preventDefault();
          startX = e.clientX;
          startLeftW = leftCol.getBoundingClientRect().width;
          totalW = document.getElementById("columns").getBoundingClientRect().width;
          handle.classList.add("dragging");
          document.body.style.cursor = "col-resize";
          document.body.style.userSelect = "none";
        });
        document.addEventListener("mousemove", (e) => {
          if (!handle.classList.contains("dragging")) return;
          const delta = e.clientX - startX;
          const newPct = Math.min(
            MAX_LEFT_PCT,
            Math.max(MIN_LEFT_PCT, (startLeftW + delta) / totalW),
          );
          applyPct(newPct);
          localStorage.setItem(STORAGE_KEY, newPct);
        });
        document.addEventListener("mouseup", () => {
          if (!handle.classList.contains("dragging")) return;
          handle.classList.remove("dragging");
          document.body.style.cursor = "";
          document.body.style.userSelect = "";
        });

        // double-click to reset to default
        handle.addEventListener("dblclick", () => {
          applyPct(0.62);
          localStorage.setItem(STORAGE_KEY, 0.62);
        });

        // collapse right col when window is too narrow
        const WINDOW_COLLAPSE_WIDTH = 768;
        function checkWindowCollapse() {
          if (window.innerWidth < WINDOW_COLLAPSE_WIDTH) {
            rightCol.classList.add("collapsed");
            handle.classList.add("hidden-handle");
            leftCol.style.flex = "";
          } else {
            const saved = parseFloat(localStorage.getItem(STORAGE_KEY)) || 0.62;
            applyPct(saved);
          }
        }
        window.addEventListener("resize", checkWindowCollapse);
        checkWindowCollapse();
      })();

            await loadIntegrationsConfig();
            flushWebhookQueue().catch(() => {});
            hideLogin();
            await setDate(isoToday());
          } else {
            showLogin();
          }
        } catch {
          showLogin();
        }
      })();
    </script>
    <div id="kn-tooltip" class="kn-tooltip"></div>
  </body>
</html>
